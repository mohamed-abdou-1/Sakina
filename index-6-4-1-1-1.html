/* ---- Real ownership/permissions sheet ----
   Owner/admin (of this community) can add or remove admins/mods. Only Super Admin
   can transfer ownership itself, to avoid an owner locking out Super Admin oversight
   or handing the community to themselves in a loop. Everything here is written
   through saveCommunityOverride, so it reaches every device/member live — same as
   the rest of community settings. */
function openCommunityOwnershipSheet(communityId){
  const c = COMMUNITIES.find(x=>x.id===communityId);
  if(!c) return;
  if(!isAdminOfCommunity(c)){ showToast('هذه الميزة متاحة لمالك المجتمع أو المدير العام فقط'); return; }
  const iAmSuper = authIsSuperAdmin();
  const ownerName = communityUserName(c.ownerUid);
  const adminRows = (c.adminUids||[]).map(uid=>{
    const n = communityUserName(uid) || uid;
    return `<div class="set-row"><div class="lbl">${ICONS.user} ${esc(n)} <span class="mod-badge admin">مشرف</span></div>
      <button class="btn-secondary" style="padding:6px 10px;font-size:11px;" onclick="removeCommunityRole(${communityId},'${esc(uid)}','admin')">إزالة</button></div>`;
  }).join('');
  const modRows = (c.modUids||[]).map(uid=>{
    const n = communityUserName(uid) || uid;
    return `<div class="set-row"><div class="lbl">${ICONS.user} ${esc(n)} <span class="mod-badge mod">مساعد</span></div>
      <button class="btn-secondary" style="padding:6px 10px;font-size:11px;" onclick="removeCommunityRole(${communityId},'${esc(uid)}','mod')">إزالة</button></div>`;
  }).join('');
  openSheet(`<h3>نقل الملكية / تعيين مشرفين</h3>
    <div class="location-card"><div class="lbl">${PICONS.shield} مالك المجتمع الحالي</div><span class="set-row-value">${ownerName? esc(ownerName) : 'لا يوجد مالك محدد بعد'}</span></div>
    ${adminRows || modRows ? `<div class="set-section-title">المشرفون الحاليون</div>${adminRows}${modRows}` : ''}
    <div class="set-section-title">${iAmSuper? 'إضافة / تعيين حسب اسم المستخدم':'إضافة مشرف بالاسم'}</div>
    <div class="field"><label>ابحث بالاسم أو اسم المستخدم</label><input type="text" id="coSearchInput" placeholder="اكتب للبحث..." oninput="filterCommunityOwnershipCandidates(this.value, ${communityId})"></div>
    <div id="coCandidates"></div>
    <div class="sheet-actions" style="margin-top:14px;"><button class="btn-secondary" style="width:100%;" onclick="openCommunitySettingsSheet(${communityId})">رجوع لإعدادات المجتمع</button></div>
  `);
}
function filterCommunityOwnershipCandidates(q, communityId){
  const box = document.getElementById('coCandidates');
  if(!box) return;
  const query = (q||'').trim();
  if(!query){ box.innerHTML=''; return; }
  const c = COMMUNITIES.find(x=>x.id===communityId);
  const iAmSuper = authIsSuperAdmin();
  const results = authLoadUsers().filter(u=> matchAr(u.name||'',query) || matchAr(u.username||'',query)).slice(0,8);
  box.innerHTML = results.length ? results.map(u=>`
    <div class="set-row">
      <div class="lbl">${ICONS.user} ${esc(u.name)} <span class="sub">@${esc(u.username||'')}</span></div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        ${iAmSuper? `<button class="btn-secondary" style="padding:6px 8px;font-size:10.5px;" onclick="assignCommunityRole(${communityId},'${u.id}','owner')">مالك</button>`:''}
        <button class="btn-secondary" style="padding:6px 8px;font-size:10.5px;" onclick="assignCommunityRole(${communityId},'${u.id}','admin')">مشرف</button>
        <button class="btn-secondary" style="padding:6px 8px;font-size:10.5px;" onclick="assignCommunityRole(${communityId},'${u.id}','mod')">مساعد</button>
      </div>
    </div>`).join('') : `<div class="sub" style="padding:8px;">لا نتائج</div>`;
}
function assignCommunityRole(communityId, uid, role){
  const c = COMMUNITIES.find(x=>x.id===communityId); if(!c) return;
  const iAmSuper = authIsSuperAdmin();
  if(role==='owner' && !iAmSuper){ showToast('نقل الملكية متاح للمدير العام فقط'); return; }
  if(role!=='owner' && !isAdminOfCommunity(c)){ showToast('غير مسموح'); return; }
  let ownerUid = c.ownerUid, adminUids = [...(c.adminUids||[])], modUids = [...(c.modUids||[])];
  adminUids = adminUids.filter(id=>id!==uid);
  modUids = modUids.filter(id=>id!==uid);
  if(role==='owner') ownerUid = uid;
  else if(role==='admin') adminUids.push(uid);
  else if(role==='mod') modUids.push(uid);
  Object.assign(c, {ownerUid, adminUids, modUids});
  saveCommunityOverride(communityId, {ownerUid, adminUids, modUids});
  showToast('تم تحديث صلاحيات المجتمع ✓');
  openCommunityOwnershipSheet(communityId);
}
function removeCommunityRole(communityId, uid, role){
  const c = COMMUNITIES.find(x=>x.id===communityId); if(!c) return;
  if(!isAdminOfCommunity(c)){ showToast('غير مسموح'); return; }
  let ownerUid = c.ownerUid, adminUids = [...(c.adminUids||[])], modUids = [...(c.modUids||[])];
  if(role==='admin') adminUids = adminUids.filter(id=>id!==uid);
  if(role==='mod') modUids = modUids.filter(id=>id!==uid);
  Object.assign(c, {ownerUid, adminUids, modUids});
  saveCommunityOverride(communityId, {ownerUid, adminUids, modUids});
  openCommunityOwnershipSheet(communityId);
}
function handleCommunityCoverUpload(e, communityId){
  const f=e.target.files && e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=()=>{
    const c=COMMUNITIES.find(x=>x.id===communityId);
    c.cover=reader.result;
    saveCommunityOverride(communityId, {cover:c.cover});
    showToast('تم تحديث صورة الغلاف ✓');
  };
  reader.readAsDataURL(f);
}
function copyInviteLink(id){
  const link = 'sakina.app/c/'+id;
  if(navigator.clipboard){ navigator.clipboard.writeText(link).then(()=>showToast('تم نسخ رابط الدعوة ✓')); }
  else showToast('تعذر نسخ الرابط');
}
function saveCommunitySettings(communityId){
  const c = COMMUNITIES.find(x=>x.id===communityId);
  const name=(document.getElementById('csName').value||'').trim();
  const desc=(document.getElementById('csDesc').value||'').trim();
  const category=(document.getElementById('csCategory').value||'').trim();
  const tags=(document.getElementById('csTags').value||'').split(/[،,]/).map(s=>s.trim()).filter(Boolean);
  const rules=(document.getElementById('csRules').value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const privacy = document.getElementById('csPrivacyToggle').classList.contains('on') ? 'private':'public';
  if(!name){ showToast('اسم المجتمع مطلوب'); return; }
  Object.assign(c, {name, desc, category, tags, rules, privacy});
  saveCommunityOverride(communityId, {name, desc, category, tags, rules, privacy});
  closeSheet(); render(); showToast('تم حفظ إعدادات المجتمع ✓');
}
function communityMemberPool(c){
  const authors = new Set(CommunityStore.getFeed(c.id).map(p=>p.authorName));
  (c.mods||[]).forEach(n=>authors.add(n));
  (c.admins||[]).forEach(n=>authors.add(n));
  authors.delete(userProfile.name);
  return [...authors];
}
function openManageMembersSheet(communityId){
  const c = COMMUNITIES.find(x=>x.id===communityId);
  const members = communityMemberPool(c);
  openSheet(`<h3>إدارة الأعضاء</h3>
    ${members.length? members.map(n=>{
      const banned = CommunityStore.isBanned(communityId, n);
      const muted = CommunityStore.isMuted(communityId, n);
      return `<div class="set-row">
        <div class="lbl">${ICONS.user} ${esc(n)} ${banned?'<span class="mod-badge admin" style="color:#c0392b;background:rgba(192,57,43,.15);">محظور</span>':''}${muted?'<span class="mod-badge mod">مكتوم</span>':''}</div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button class="btn-secondary" style="padding:6px 10px;font-size:11px;" onclick="handleToggleMute(${communityId},'${esc(n)}')">${muted?'إلغاء الكتم':'كتم'}</button>
          <button class="btn-secondary" style="padding:6px 10px;font-size:11px;color:#c0392b;" onclick="handleToggleBan(${communityId},'${esc(n)}')">${banned?'إلغاء الحظر':'حظر'}</button>
        </div>
      </div>`;
    }).join('') : emptyState('لا يوجد أعضاء لعرضهم بعد')}
    <div class="sheet-actions" style="margin-top:14px;"><button class="btn-primary" style="width:100%;" onclick="closeSheet()">تم</button></div>`);
}
function handleToggleMute(cid,name){ const m=CommunityStore.toggleMute(cid,name); openManageMembersSheet(cid); showToast(m?'تم كتم العضو':'تم إلغاء الكتم'); }
function handleToggleBan(cid,name){ const b=CommunityStore.toggleBan(cid,name); openManageMembersSheet(cid); showToast(b?'تم حظر العضو':'تم إلغاء الحظر'); render(); }

function aiLoadChats(){
  try{ aiChats = JSON.parse(localStorage.getItem('sakina_ai_chats')||'[]'); }
  catch(e){ aiChats = []; }
  aiChats.sort(aiChatSortFn);
}
function aiSaveChats(){
  try{ localStorage.setItem('sakina_ai_chats', JSON.stringify(aiChats)); }catch(e){}
}
function aiChatSortFn(a,b){
  if(!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
  return (b.updatedAt||0) - (a.updatedAt||0);
}
function aiCreateBlankChat(){
  return {id:'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,7), title:'محادثة جديدة', pinned:false, createdAt:Date.now(), updatedAt:Date.now(), messages:[]};
}
/* Existing conversations always stay fixed/restored: we remember which
   chat was open last, so re-opening سكينة شات (even after closing the app
   or reloading) resumes the same conversation instead of starting blank. */
const AI_CURRENT_CHAT_KEY = 'sakina_ai_current_chat_id';
function aiSetCurrentChat(chat){
  aiCurrentChat = chat;
  try{ localStorage.setItem(AI_CURRENT_CHAT_KEY, chat && chat.id ? chat.id : ''); }catch(e){}
}
function aiEnsureCurrentChat(){
  if(aiCurrentChat) return aiCurrentChat;
  let lastId = null;
  try{ lastId = localStorage.getItem(AI_CURRENT_CHAT_KEY); }catch(e){}
  const restored = lastId ? aiChats.find(c=>c.id===lastId) : null;
  aiCurrentChat = restored || aiChats[0] || aiCreateBlankChat();
  return aiCurrentChat;
}
function aiPersistCurrentChat(){
  if(!aiCurrentChat) return;
  aiCurrentChat.updatedAt = Date.now();
  const idx = aiChats.findIndex(c=>c.id===aiCurrentChat.id);
  if(idx===-1) aiChats.unshift(aiCurrentChat); else aiChats[idx]=aiCurrentChat;
  aiChats.sort(aiChatSortFn);
  aiSaveChats();
  try{ localStorage.setItem(AI_CURRENT_CHAT_KEY, aiCurrentChat.id); }catch(e){}
}

  const firstUser = chat.messages.find(m=>m.role==='user');
  if(firstUser) chat.title = firstUser.text.slice(0,40) + (firstUser.text.length>40?'…':'');
}

function aiScoreEntry(normQuery, entry){
  let score = 0;
  for(const kw of entry.keywords){
    if(normQuery.includes(normalizeAr(kw))) score++;
  }
  return score;
}
function aiClassifyOffline(text){
  const normQuery = normalizeAr(text);
  let best = null, bestScore = 0;
  for(const entry of aiKB){
    const s = aiScoreEntry(normQuery, entry);
    if(s > bestScore){ bestScore = s; best = entry; }
  }
  if(best && bestScore >= AI_OFFLINE_THRESHOLD) return best;
  return null;
}

/* ---- online engine (Gemini) ---- */
function aiBuildGeminiContents(chat){
  const recent = chat.messages.filter(m=>!m.pending && !m.error).slice(-16);
  return recent.map(m=>({ role: m.role==='user' ? 'user':'model', parts:[{text:m.text}] }));
}
async function aiCallGemini(chat){
  const body = {
    system_instruction: { parts:[{text: AI_SYSTEM_PROMPT}] },
    contents: aiBuildGeminiContents(chat),
    // v14 fix: 900 tokens was cutting answers off mid-sentence. On top of
    // that, gemini-flash-latest spends part of its output budget on hidden
    // "thinking" tokens before it writes the visible answer, so a small
    // budget could be fully consumed by thinking with nothing left to show
    // — thinkingBudget:0 turns that off so the whole budget goes to the
    // actual reply, and maxOutputTokens is raised so full hadith
    // explanations (headings, sections, etc.) fit in one reply.
    generationConfig:{ temperature:0.4, maxOutputTokens:4096, thinkingConfig:{ thinkingBudget:0 } }
  };
  const res = await fetch(GEMINI_ENDPOINT, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if(!res.ok){
    let msg = 'تعذّر الوصول للمساعد الذكي حاليًا.';
    try{
      const j = await res.json();
      const raw = j && j.error && j.error.message || '';
      if(res.status===429 || /quota|rate.?limit|RESOURCE_EXHAUSTED/i.test(raw)){
        msg = 'تم الوصول للحد الأقصى المسموح به مؤقتًا من الأسئلة. حاول تاني بعد شوية.';
      } else if(raw){
        msg = raw;
      }
    }catch(e){}
    throw new Error(msg);
  }
  const data = await res.json();
  const cand = data && data.candidates && data.candidates[0];
  const text = cand && cand.content && cand.content.parts && cand.content.parts.map(p=>p.text||'').join('') || '';
  if(!text) throw new Error('لم يصل رد من سكينة شات، حاول مرة أخرى.');
  return text;
}

/* ---- internet detection ---- */
function aiHasInternet(){ return typeof navigator!=='undefined' ? navigator.onLine : true; }

/* ---- lightweight markdown -> safe HTML ---- */
function aiRenderMarkdown(text){
  const lines = (text+'').split('\n');
  let html = ''; let inList = false;
  for(let raw of lines){
    let line = esc(raw);
    line = line.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
    const trimmed = raw.trim();
    if(/^[-*•]\s+/.test(trimmed)){
      if(!inList){ html += '<ul>'; inList = true; }
      html += '<li>' + line.replace(/^[-*•]\s+/, '') + '</li>';
      continue;
    }
    if(inList){ html += '</ul>'; inList = false; }
    if(trimmed==='') continue;
    html += '<p>' + line + '</p>';
  }
  if(inList) html += '</ul>';
  return html || '<p></p>';
}

/* ---- AI INTEGRATION #16: the assistant understands the user's live Khatma progress ---- */
function aiKhatmaAnswer(text){
  const t = (text||'').trim();
  const norm = t.replace(/[إأآا]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي');
  const mentionsKhatma = /ختم|ختمه|صفح|جزء|اجزاء|وين وصلت|أين وصلت|كام يوم|كم يوم|متاخر|متأخر|اقرا اليوم|أقرأ اليوم|هدف اليوم/.test(norm);
  if(!mentionsKhatma) return null;
  const k = getActiveKhatma();
  if(!k){
    if(/ختم|ختمه/.test(norm)) return 'لا توجد لديك ختمة نشطة حاليًا. يمكنك بدء ختمة جديدة من قسم "ختمة" في التطبيق، واختيار قراءة أو حفظ أو مراجعة والخطة الزمنية المناسبة لك.';
    return null;
  }
  khatmaEnsureTodayGoal(k);
  const remaining = khatmaPagesRemaining(k);
  const tk = todayKey();
  const loggedToday = k.dailyLog[tk]||0;
  const goalToday = k.todayGoalPages||0;
  const daysRemaining = khatmaDaysRemaining(k);
  const surahName = (SURAHS.find(s=>s.id===khatmaPageToSurah(Math.min(QURAN_TOTAL_PAGES,k.pagesCompleted+1)))||{}).name || '';

  if(/وين وصلت|أين وصلت|اين وصلت/.test(norm)){
    return `آخر موضع لك في ${KHATMA_MODE_LABELS[k.mode]} هو الصفحة ${k.pagesCompleted} من ${QURAN_TOTAL_PAGES} (بداية سورة ${surahName})، وأنجزت ${khatmaPercent(k)}% من الختمة حتى الآن.`;
  }
  if(/كام صفح|كم صفح/.test(norm) && /باق|متبقي|متبقٍ/.test(norm)){
    return `تبقّى لديك ${remaining} صفحة لإتمام ختمتك، أي حوالي ${QURAN_TOTAL_JUZ-khatmaJuzCompleted(k)} جزءًا متبقيًا.`;
  }
  if(/كام يوم|كم يوم/.test(norm) && /باق|متبقي|متبقٍ/.test(norm)){
    return `يتبقّى تقريبًا ${daysRemaining} يوم على الموعد المستهدف لإتمام ختمتك، بمعدل ${khatmaPagesPerDay(k)} صفحة يوميًا.`;
  }
  if(/ماذا اقرا|ماذا أقرأ|اقرا اليوم|أقرأ اليوم|هدف اليوم|خطة اليوم/.test(norm)){
    return `هدف اليوم في ختمتك هو ${goalToday} صفحة (${khatmaTodayRangeLabel(k)}). قرأت منها ${loggedToday} صفحة حتى الآن، ${goalToday-loggedToday>0?`وتبقّى ${goalToday-loggedToday} صفحة لإتمام هدف اليوم.`:'وقد أتممت هدف اليوم بالكامل، بارك الله فيك! 🤍'}`;
  }
  if(/متاخر|متأخر/.test(norm)){
    const behind = loggedToday < goalToday;
    return behind ? `نعم، أنت متأخر قليلًا عن هدف اليوم بمقدار ${goalToday-loggedToday} صفحة، لكن الخطة ستُعاد حسابها تلقائيًا لتوزيع الصفحات المتبقية على الأيام القادمة.` : 'لا، أنت في المسار الصحيح ولم تتأخر عن خطتك الحالية، أحسنت! 🤍';
  }
  return `أنت الآن في ${KHATMA_MODE_LABELS[k.mode]}، أنجزت ${khatmaPercent(k)}% (${k.pagesCompleted} من ${QURAN_TOTAL_PAGES} صفحة)، وتبقّى ${remaining} صفحة. هدف اليوم: ${goalToday} صفحة.`;
}

function aiSendMessage(text, isRetry, forceOnline){
  text = (text||'').trim();
  if(!text || aiIsSending) return;
  const chat = aiEnsureCurrentChat();
  if(!isRetry){
    chat.messages.push({role:'user', text, time:Date.now()});
    aiAutoTitle(chat);
  } else {
    chat.messages = chat.messages.filter(m=>!m.error);
  }
  aiIsSending = true;
  chat.messages.push({role:'assistant', text:'', pending:true, time:Date.now()});
  aiPersistCurrentChat();
  aiRenderChatScroll();

  // forceOnline (used by hadithAskAssistant) skips the offline app-FAQ
  // classifier entirely: a hadith's own text/citation ("صحيح البخاري",
  // "الباب: ...", "رقم الحديث: ...") can accidentally match the offline
  // knowledge-base keywords for "مكتبة الحديث" and hijack the reply with a
  // canned answer about that app page instead of actually answering the
  // question. Real user-typed messages still go through the offline
  // classifier as before (fast answers about the app, no network needed).
  const khatmaHit = (!forceOnline && typeof aiKhatmaAnswer==='function') ? (aiKhatmaGroupAnswer(text) || aiKhatmaAnswer(text)) : null;
  const offlineHit = forceOnline ? null : (khatmaHit ? {answer: khatmaHit} : aiClassifyOffline(text));
  const finish = (answer, engine)=>{
    chat.messages.pop(); // remove pending
    chat.messages.push({role:'assistant', text:answer, engine, time:Date.now()});
    aiIsSending = false;
    aiPersistCurrentChat();
    aiRenderChatScroll(true, engine);
  };
  const fail = (msg)=>{
    chat.messages.pop();
    chat.messages.push({role:'assistant', text:msg, error:true, time:Date.now()});
    aiIsSending = false;
    aiLastFailedText = text;
    aiLastFailedForceOnline = !!forceOnline;
    aiPersistCurrentChat();
    aiRenderChatScroll();
  };

  if(offlineHit){
    setTimeout(()=>finish(offlineHit.answer, 'offline'), 260);
    return;
  }
  if(!aiHasInternet()){
    fail('هذا السؤال يحتاج إلى اتصال بالإنترنت للإجابة عليه.');
    return;
  }
  aiCallGemini(chat).then(answer=>{
    finish(answer, 'online');
  }).catch(err=>{
    if(!aiHasInternet()) fail('هذا السؤال يحتاج إلى اتصال بالإنترنت للإجابة عليه.');
    else fail('حدث خطأ أثناء الاتصال بسكينة شات. ' + (err && err.message ? err.message : ''));
  });
}
function aiRetryLast(){
  if(aiLastFailedText) aiSendMessage(aiLastFailedText, true, aiLastFailedForceOnline);
}

/* ---- UI: message actions (with fallback for WebViews / non-secure contexts
   where navigator.clipboard or navigator.share are unavailable, e.g. content://) ---- */
function aiLegacyCopyText(text){
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly','');
    ta.style.position='fixed'; ta.style.top='-9999px'; ta.style.left='-9999px'; ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}
function aiCopyMessage(idx){
  const chat = aiEnsureCurrentChat();
  const m = chat.messages[idx];
  if(!m) return;
  const text = m.text || '';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('تم نسخ الرسالة ✓')).catch(()=>{
      showToast(aiLegacyCopyText(text) ? 'تم نسخ الرسالة ✓' : 'تعذّر نسخ الرسالة');
    });
  } else {
    showToast(aiLegacyCopyText(text) ? 'تم نسخ الرسالة ✓' : 'تعذّر نسخ الرسالة');
  }
}
function aiShareMessage(idx){
  const chat = aiEnsureCurrentChat();
  const m = chat.messages[idx];
  if(!m) return;
  const text = m.text || '';
  if(navigator.share){
    navigator.share({text}).catch(()=>{});
  } else {
    showToast(aiLegacyCopyText(text) ? 'مفيش مشاركة مباشرة على المتصفح ده، اتنسخت الرسالة بدلاً منها ✓' : 'تعذّر نسخ الرسالة');
  }
}

/* ---- voice input: tap the mic to record, speech is transcribed automatically
   and sent to سكينة شات as soon as you stop talking. Requires a browser that
   supports the Web Speech API AND a secure context (https/localhost) for
   microphone access — it will show a clear message if unsupported. */
function aiGetSpeechRecognitionCtor(){
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}
function aiSendBtnClick(){
  const ta = document.getElementById('aiComposerInput');
  if(aiIsListening){ aiStopListening(); return; }
  const hasText = ta && ta.value.trim().length>0;
  if(hasText) aiSubmitComposer(); else aiStartListening();
}
function aiBeginRecognition(SR){
  try{
    aiRecognition = new SR();
    aiRecognition.lang = (typeof appSettings!=='undefined' && appSettings.lang==='en') ? 'en-US' : 'ar-SA';
    aiRecognition.interimResults = true;
    aiRecognition.continuous = true;
    aiRecognition.onstart = ()=>{ aiIsListening = true; aiUpdateSendBtnIcon(); const s=document.getElementById('aiStatusLine'); if(s) s.innerHTML = aiStatusLineHtml(); };
    aiRecognition.onresult = (e)=>{
      let transcript = '';
      for(let i=0;i<e.results.length;i++) transcript += e.results[i][0].transcript;
      const ta = document.getElementById('aiComposerInput');
      if(ta){ ta.value = transcript; aiAutosize(ta); }
    };
    aiRecognition.onerror = (e)=>{
      aiIsListening = false;
      aiUpdateSendBtnIcon();
      const s=document.getElementById('aiStatusLine'); if(s) s.innerHTML = aiStatusLineHtml();
      const reason = e && e.error;
      if(reason==='not-allowed' || reason==='service-not-allowed') showToast('تم رفض إذن الميكروفون. افتح إعدادات المتصفح للموقع واسمح بالميكروفون');
      else if(reason==='no-speech') showToast('معملتش أي كلام، جرّب تاني');
      else showToast('تعذّر التعرف على الصوت');
    };
    aiRecognition.onend = ()=>{
      aiIsListening = false;
      aiUpdateSendBtnIcon();
      const s=document.getElementById('aiStatusLine'); if(s) s.innerHTML = aiStatusLineHtml();
      const ta = document.getElementById('aiComposerInput');
      if(ta && ta.value.trim()) aiSubmitComposer();
    };
    aiRecognition.start();
  }catch(e){
    aiIsListening = false;
    aiUpdateSendBtnIcon();
    showToast('تعذّر بدء التسجيل الصوتي');
  }
}
function aiStartListening(){
  const SR = aiGetSpeechRecognitionCtor();
  if(!SR){ showToast('التعرف على الصوت مش مدعوم في المتصفح ده'); return; }
  if(aiIsSending || aiIsListening) return;
  /* Explicitly ask for the microphone first. This is what actually makes the
     browser show a real permission dialog — starting SpeechRecognition alone
     doesn't reliably trigger the OS/browser prompt on every WebView. */
  if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      stream.getTracks().forEach(t=>t.stop());
      aiBeginRecognition(SR);
    }).catch(err=>{
      const name = err && err.name;
      if(name==='NotAllowedError' || name==='SecurityError') showToast('محتاجين إذن استخدام الميكروفون. المتصفح رفض عرض طلب الإذن على الرابط ده (content://) — لازم الصفحة تتفتح عبر https عشان تظهر رسالة الإذن');
      else if(name==='NotFoundError') showToast('مفيش ميكروفون متاح على الجهاز');
      else showToast('تعذّر الوصول للميكروفون');
    });
  } else {
    aiBeginRecognition(SR);
  }
}
function aiStopListening(){
  if(aiRecognition){ try{ aiRecognition.stop(); }catch(e){} }
}

/* ---- date helpers for WhatsApp-style day separators ---- */
function aiSameDay(t1,t2){
  const a=new Date(t1), b=new Date(t2);
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function aiDateLabel(ts){
  const d = new Date(ts), now = new Date();
  if(aiSameDay(ts, now.getTime())) return 'اليوم';
  const yest = new Date(now); yest.setDate(now.getDate()-1);
  if(aiSameDay(ts, yest.getTime())) return 'أمس';
  return d.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
}
function aiFormatTime(ts){
  try{ return new Date(ts).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}); }
  catch(e){ return ''; }
}
function aiDoubleCheckSvg(read){

}

/* ================================================================
   MY JOURNEY — "رحلتي"
   Personal dashboard. Summaries only — every number below is computed
   from the SAME state/functions the rest of the app already uses
   (khatma*, wird*, tsb*, counters/adhkar*), so there is no duplicated
   data and no mock/placeholder values. Each card links to its real
   module for the full experience ("عرض التفاصيل").

/* ---- points / level (derived purely from real activity — no separate storage) ---- */
function journeyPoints(){
  const k = getActiveKhatma();
  const khatmaPages = (k ? k.pagesCompleted : 0) + getKhatmaHistory().length*QURAN_TOTAL_PAGES;
  const achDone = getProfileAchievements().filter(a=>a.done).length;
  return Math.round(
    khatmaPages*2 +
    tsbLifetimeTotal()*0.5 +
    totalAdhkarCount()*1 +
    wirdFullDaysThisMonth()*15 +
    achDone*40
  );
}
const JOURNEY_LEVEL_STEP = 500;
function journeyLevel(){ return Math.floor(journeyPoints()/JOURNEY_LEVEL_STEP)+1; }
function journeyLevelProgressPct(){ return Math.round(((journeyPoints()%JOURNEY_LEVEL_STEP)/JOURNEY_LEVEL_STEP)*100); }

/* ---- daily quote (stable per calendar day) ---- */
const JOURNEY_QUOTES = [
  'خطوة صغيرة كل يوم تصنع فرقًا كبيرًا في رحلتك مع الله.',
  'من ثبت ولو بقليل، كان خيرًا ممن انقطع بعد كثير.',
  'اجعل لكل يوم نصيبًا من القرآن، ولو آية واحدة.',
  'الاستمرار على القليل خيرٌ من الانقطاع عن الكثير.',
  'ذِكر الله طمأنينة القلب في زحمة الحياة.',
  'كل تسبيحة وكل صفحة تُقرأ ترفع درجتك عند الله.',
  'لا تحتقر يسير الطاعات، فربما كانت سبب رضا الله عنك.',
];
function journeyTodayQuote(){
  const now = new Date();
  const start = new Date(now.getFullYear(),0,0);
  const dayOfYear = Math.floor((now-start)/86400000);
  return JOURNEY_QUOTES[dayOfYear % JOURNEY_QUOTES.length];
}

/* ---- rank title, derived purely from level (no separate storage) ---- */
const JOURNEY_RANKS = [
  {min:1, title:'مبتدئ', ic:'🌱'}, {min:3, title:'مجتهد', ic:'🌿'},
  {min:6, title:'ملتزم', ic:'🌳'}, {min:10, title:'متميز', ic:'⭐'},
  {min:15, title:'قدوة', ic:'💎'}, {min:25, title:'ربّاني', ic:'🕋'},
];
function journeyRank(level){
  let r = JOURNEY_RANKS[0];
  for(const x of JOURNEY_RANKS){ if(level>=x.min) r=x; }
  return r;
}

  if(k){ const goal = k.todayGoalPages||0, val = k.dailyLog[todayKey()]||0; tasks.push(goal>0 ? val>=goal : val>0); }
  wirdGoals.forEach(g=>tasks.push(wirdTodayVal(g.id)>=g.target));
  tasks.push(adhkarCatPercentToday('morning')>=100);
  tasks.push(adhkarCatPercentToday('evening')>=100);
  const tsbTgt = tsbTarget(tsbSelected);
  if(tsbTgt) tasks.push(tsbTodayCount(tsbSelected)>=tsbTgt);
  return tasks;
}
function journeyTodayProgressPct(){
  const tasks = journeyTodayTasks();
  return tasks.length ? Math.round(tasks.filter(Boolean).length/tasks.length*100) : 0;
}
function journeyOverallPct(){
  const k = getActiveKhatma(), hist = getKhatmaHistory();
  const khatmaCompletion = k ? khatmaPercent(k) : (hist.length ? 100 : 0);
  const list = getProfileAchievements();
  const achRatio = list.length ? Math.round(list.filter(a=>a.done).length/list.length*100) : 0;
  const parts = [khatmaCompletion, wirdMonthAvg(), achRatio];
  return Math.round(parts.reduce((a,b)=>a+b,0)/parts.length);
}

/* ---- SMART AI INSIGHTS (rule-based, generated only from real state) ---- */
function generateJourneySmartInsights(){
  const insights = [];
  const k = getActiveKhatma(), hist = getKhatmaHistory();
  if(k){
    const pct = khatmaPercent(k);
    if(pct>=80 && pct<100) insights.push({ic:'📖', text:'أنت قريب جدًا من إتمام ختمتك، أكمل رحلتك ولا تتوقف الآن!'});
    if(khatmaStreak(k)===0 && khatmaDaysElapsed(k)>1) insights.push({ic:'⏰', text:'لم تقرأ في ختمتك اليوم بعد — بادر بهدف اليوم قبل انتهاء الوقت.'});
    if(khatmaStreak(k)>=7) insights.push({ic:'🔥', text:`أنت منتظم في القراءة منذ ${khatmaStreak(k)} يومًا متتاليًا، بارك الله فيك!`});
  } else if(!hist.length){
    insights.push({ic:'🌱', text:'لم تبدأ ختمتك الأولى بعد — ابدأها اليوم وتابع تقدمك خطوة بخطوة.'});
  }
  if(wirdGoals.length){
    if(wirdStreak()>=7) insights.push({ic:'👏', text:`وِردك اليومي منتظم منذ ${wirdStreak()} أيام متتالية، استمر على هذا النهج.`});
    else if(wirdOverallPercent()<100) insights.push({ic:'✨', text:'لم تُكمل أهداف وِردك اليوم بعد — بقيت خطوات قليلة لإنجازها.'});
  }
  if(tsbStreak()>=7) insights.push({ic:'🌙', text:'تسبيحك مستمر منذ أسبوع كامل على الأقل، تقبّل الله منك.'});
  if(!adhkarAnyDoneOn(new Date())) insights.push({ic:'🕊️', text:'لم تُكمل أذكار الصباح أو المساء اليوم بعد.'});
  else if(adhkarStreak()>=3) insights.push({ic:'💚', text:`حافظت على أذكارك ${adhkarStreak()} أيام متتالية، استمر!`});
  const lvl = journeyLevel(), lvlPct = journeyLevelProgressPct();
  if(lvlPct>=70) insights.push({ic:'🏅', text:`اقتربت من المستوى ${lvl+1} — بقي ${100-lvlPct}% فقط لترقيتك!`});
  const week = wirdLast7Days(), weeklyAvg = Math.round(week.reduce((s,d)=>s+d.pct,0)/week.length);
  if(weeklyAvg>=80) insights.push({ic:'📈', text:`أداؤك هذا الأسبوع ممتاز بمتوسط ${weeklyAvg}% لأهدافك اليومية.`});
  else if(weeklyAvg<40 && weeklyAvg>0) insights.push({ic:'💡', text:'نشاطك هذا الأسبوع أقل من المعتاد — حاول تعويضه تدريجيًا.'});
  const list = getProfileAchievements();
  const lockedCount = list.filter(a=>!a.done).length;
  if(lockedCount>0 && lockedCount<=3) insights.push({ic:'🎖️', text:`أنت على بعد ${lockedCount} إنجازات فقط من إكمال كل الشارات المتاحة.`});
  if(!insights.length) insights.push({ic:'🤍', text:'استمر في رحلتك الإيمانية، كل خطوة تقربك من الله تُحسب.'});
  if(insights.length<3) insights.push({ic:'🌟', text:'رحلتك لا تزال في بدايتها — كل يوم فرصة جديدة للتقرب من الله.'});
  if(insights.length<3) insights.push({ic:'📿', text:'جرّب تنويع عباداتك اليوم بين القرآن والأذكار والتسبيح.'});
  return insights.slice(0,5);
}

/* ---- RECENT ACTIVITY (newest first, built only from real timestamped/dated state) ---- */
function journeyDateKeyToTs(dk){ const p=dk.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]).getTime(); }
function journeyRelativeDay(dk){
  const diffDays = Math.round((journeyDateKeyToTs(todayKey()) - journeyDateKeyToTs(dk))/86400000);
  if(diffDays<=0) return 'اليوم';
  if(diffDays===1) return 'أمس';
  return diffDays+' أيام مضت';
}
function journeyExactTime(ts){
  const d = new Date(ts);
  let h = d.getHours(); const m = String(d.getMinutes()).padStart(2,'0');
  const ap = h>=12 ? 'م' : 'ص';
  h = h%12; if(h===0) h=12;
  return `${h}:${m} ${ap}`;
}
function getRecentActivityFeed(){
  const items = [];
  if(quranReading.lastRead){
    items.push({ts:quranReading.lastRead.time, ic:'📖', text:`قرأت سورة ${quranReading.lastRead.surahName}`, time:timeAgo(quranReading.lastRead.time), exact:journeyExactTime(quranReading.lastRead.time)});
  }
  const k = getActiveKhatma();
  if(k){
    const dk = todayKey();
    if((k.dailyLog[dk]||0)>0) items.push({ts:Date.now()-1000, ic:'✅', text:`سجّلت ${k.dailyLog[dk]} صفحة في ${KHATMA_MODE_LABELS[k.mode]} اليوم`, time:'اليوم'});
  }
  const wDk = Object.keys(wirdLog).sort().pop();
  if(wDk){
    const doneCount = wirdGoals.filter(g=>(wirdLog[wDk][g.id]||0)>=g.target).length;
    if(doneCount>0) items.push({ts:journeyDateKeyToTs(wDk)+2000, ic:'🎯', text:`أنجزت ${doneCount} من ${wirdGoals.length} أهداف الورد اليومي`, time:journeyRelativeDay(wDk)});
  }
  const tDk = Object.keys(tsbLog).sort().pop();
  if(tDk && tsbLog[tDk].total>0){
    items.push({ts:journeyDateKeyToTs(tDk)+3000, ic:'📿', text:`أكملت ${tsbLog[tDk].total} تسبيحة`, time:journeyRelativeDay(tDk)});
  }
  const aDk = adhkarLastActiveDateKey();
  if(aDk){
    items.push({ts:journeyDateKeyToTs(aDk)+4000, ic:'🕊️', text:'أتممت جزءًا من أذكارك', time:journeyRelativeDay(aDk)});
  }
  const achDone = getProfileAchievements().filter(a=>a.done);
  if(achDone.length>1){
    const latest = achDone[achDone.length-1];
    items.push({ts:1, ic:latest.icon, text:`إنجاز مفتوح: ${latest.title}`, time:''});
  }
  return items.sort((a,b)=>b.ts-a.ts).slice(0,6);
}

  return `
  <div class="journey-card">
    <div class="journey-card-head"><div class="t"><span class="ic">🕘</span>النشاط الأخير</div></div>
    ${items.length? items.map(i=>`
    <div class="journey-activity-item">
      <div class="ic">${i.ic}</div>
      <div class="body"><div class="txt">${esc(i.text)}</div>${i.time?`<div class="time">${i.exact?`${esc(i.exact)} • `:''}${esc(i.time)}</div>`:''}</div>
    </div>`).join('') : `<div class="journey-empty-note"><span class="ic">🕘</span><span>لا يوجد نشاط بعد — ابدأ رحلتك اليوم!</span></div>`}
  </div>`;
}

/* ---- QUICK ACTIONS ---- */

    {ic:ICONS.wird, label:'الورد اليومي', fn:"navigateTo('wird')"},
    {ic:ICONS.clock, label:'مواقيت الصلاة', fn:"navigateTo('prayertimes')"},
    {ic:ICONS.tasbeeh, label:'التسبيح', fn:"navigateTo('tasbeeh')"},
    {ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 3v2.5M12 18.5V21M4.2 4.2l1.8 1.8M18 18l1.8 1.8M3 12h2.5M18.5 12H21M4.2 19.8L6 18M18 6l1.8-1.8"/></svg>', label:'أذكار الصباح', fn:"navigateTo('adhkar',{cat:'morning'})"},
    {ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 14.5A8.5 8.5 0 019.5 4a8.5 8.5 0 1010.5 10.5z"/></svg>', label:'أذكار المساء', fn:"navigateTo('adhkar',{cat:'evening'})"},

      ${actions.map(a=>`<div class="journey-quick-btn" role="button" tabindex="0" aria-label="${esc(a.label)}" onclick="${a.fn}" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}"><div class="ic">${a.ic}</div><span>${esc(a.label)}</span></div>`).join('')}

/* ---- PERSONALIZATION (card order / show-hide, persisted + instant) ---- */
const JOURNEY_CARDS = [
  {id:'overview', title:'نظرة عامة على الرحلة'},
  {id:'khatma', title:'ملخص الختمة'},
  {id:'wird', title:'الورد اليومي'},
  {id:'prayer', title:'الصلاة'},
  {id:'adhkar', title:'الأذكار'},
  {id:'tasbeeh', title:'التسبيح'},
  {id:'achievements', title:'الإنجازات'},
  {id:'stats', title:'الإحصائيات العامة'},
  {id:'goals', title:'الأهداف'},
  {id:'insights', title:'رؤى ذكية'},
  {id:'activity', title:'النشاط الأخير'},
  {id:'quick', title:'إجراءات سريعة'},
];
const JOURNEY_RENDERERS = {
  overview: journeyOverviewCard,
  khatma: renderKhatmaProfileSummary, wird: journeyWirdCard, prayer: journeyPrayerCard,
  adhkar: journeyAdhkarCard, tasbeeh: journeyTasbeehCard, achievements: journeyAchievementsCard,
  stats: journeyStatsCard, goals: journeyGoalsCard, insights: journeyInsightsCard,
  activity: journeyActivityCard, quick: journeyQuickActionsCard,
};
let journeyLayout = JSON.parse(localStorage.getItem('sakina_journey_layout')||'null');
function journeySaveLayout(){ localStorage.setItem('sakina_journey_layout', JSON.stringify(journeyLayout)); }
function ensureJourneyLayout(){
  const allIds = JOURNEY_CARDS.map(c=>c.id);
  if(!journeyLayout || !Array.isArray(journeyLayout.order)){
    journeyLayout = {order: allIds.slice(), hidden: []};
    journeySaveLayout();
    return;
  }
  allIds.forEach(id=>{ if(journeyLayout.order.indexOf(id)===-1) journeyLayout.order.push(id); });
  journeyLayout.order = journeyLayout.order.filter(id=>allIds.indexOf(id)!==-1);
  journeyLayout.hidden = (journeyLayout.hidden||[]).filter(id=>allIds.indexOf(id)!==-1);
}
function journeyToggleHidden(id){
  ensureJourneyLayout();
  const idx = journeyLayout.hidden.indexOf(id);
  if(idx===-1) journeyLayout.hidden.push(id); else journeyLayout.hidden.splice(idx,1);
  journeySaveLayout(); render(); openJourneyPersonalizeSheet();
}
function journeyMoveCard(id, dir){
  ensureJourneyLayout();
  const arr = journeyLayout.order, i = arr.indexOf(id), j = i+dir;
  if(j<0 || j>=arr.length) return;
  const tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  journeySaveLayout(); render(); openJourneyPersonalizeSheet();
}
function openJourneyPersonalizeSheet(){
  ensureJourneyLayout();
  const arr = journeyLayout.order;
  openSheet(`
    <h3>تخصيص لوحة رحلتي</h3>
    <div class="note-box" style="margin-top:0;">رتّب البطاقات بالأسهم وأخفِ ما لا تحتاجه بالمفتاح — يتم الحفظ فورًا.</div>
    ${arr.map((id,i)=>{
      const card = JOURNEY_CARDS.find(c=>c.id===id);
      const hidden = journeyLayout.hidden.indexOf(id)!==-1;
      return `
      <div class="journey-personalize-row">
        <div class="reorder-btns">
          <button ${i===0?'disabled':''} onclick="journeyMoveCard('${id}',-1)" aria-label="نقل للأعلى">↑</button>
          <button ${i===arr.length-1?'disabled':''} onclick="journeyMoveCard('${id}',1)" aria-label="نقل للأسفل">↓</button>
        </div>
        <div class="name">${esc(card.title)}</div>
        <div class="switch ${hidden?'':'on'}" onclick="journeyToggleHidden('${id}')"></div>
      </div>`;
    }).join('')}
    <div class="sheet-actions"><button class="btn-primary" style="width:100%;" onclick="closeSheet()">تم</button></div>
  `);
}

/* ---- smooth counters (micro-animation) ---- */
function journeyAnimateCounters(){
  $main.querySelectorAll('.journey-counter[data-count]').forEach(el=>{
    const target = parseInt(el.dataset.count,10)||0;
    const dur = 600; const start = performance.now();
    function step(now){
      const p = Math.min(1,(now-start)/dur);
      el.textContent = Math.round(target*(1-Math.pow(1-p,3)));
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

/* ---- PAGE RENDER ---- */
function renderMyJourney(){
  ensureJourneyLayout();
  const visible = journeyLayout.order.filter(id=>journeyLayout.hidden.indexOf(id)===-1 && JOURNEY_RENDERERS[id]);
  return `
  ${journeyHeaderCard()}
  <div class="journey-toolbar">
    <span>لوحتي</span>
    <button class="journey-customize-btn" onclick="openJourneyPersonalizeSheet()">${PICONS.gear} تخصيص</button>
  </div>
  ${visible.length? visible.map(id=>JOURNEY_RENDERERS[id]()).join('') : `<div class="journey-empty-note"><span class="ic">🧭</span><span>أخفيت جميع البطاقات</span><span class="link" onclick="openJourneyPersonalizeSheet()">اضغط هنا لإظهارها مجددًا</span></div>`}
  <div style="height:10px;"></div>`;
}

/* Replaces the old always-on static prayer/wird/tasbeeh reminder entries with
   ones computed from real current state: a prayer reminder only appears when
   a prayer is genuinely coming up soon, a wird reminder only when today's
   wird truly isn't finished yet, a tasbeeh reminder only when today's goal
   truly hasn't been reached. Called once at boot, after real user data
   (wird/tasbeeh logs) has synced, and safe to call again later. */
function refreshReminderNotifications(){
  notifications = notifications.filter(n=>![1,2,7].includes(n.id));
  const readSet = new Set(JSON.parse(localStorage.getItem('sakina_notif_read')||'[]'));
  try{
    const nowMs = cairoNow().getTime();
    const next = (typeof PRAYERS!=='undefined'?PRAYERS:[]).find(p=>p.date.getTime()>nowMs);
    if(next){
      const minsLeft = Math.round((next.date.getTime()-nowMs)/60000);
      if(minsLeft>=0 && minsLeft<=30){
        notifications.unshift({id:1, type:'prayer', title:'اقترب وقت صلاة '+next.name,
          msg:'تبقّى '+minsLeft+' دقيقة على أذان '+next.name+'، لا تنسَ صلاتك في وقتها.',
          mins:0, read:readSet.has(1), nav:{page:'prayertimes'}});
      }
    }
  }catch(e){}
  try{
    if(typeof wirdGoals!=='undefined' && typeof wirdTodayVal==='function' && wirdGoals.some(g=>wirdTodayVal(g.id)<g.target)){
      notifications.unshift({id:2, type:'wird', title:'وردك اليومي بانتظارك',
        msg:'لم تكمل وِردك من الأذكار اليوم، خصص بضع دقائق الآن.', mins:0, read:readSet.has(2), nav:{page:'adhkar'}});
    }
  }catch(e){}
  try{
    if(typeof tsbSelected!=='undefined' && typeof tsbTodayCount==='function' && tsbTodayCount(tsbSelected)<tsbTarget(tsbSelected)){
      notifications.unshift({id:7, type:'reminder', title:'تذكير: تسبيح اليوم',
        msg:'لم تصل بعد إلى هدفك اليومي من التسبيح، أكمله الآن.', mins:0, read:readSet.has(7), nav:{page:'tasbeeh'}});
    }
  }catch(e){}
  if(typeof updateNotifBadge==='function') updateNotifBadge();
}

/* init */
async function boot(){
  try{ history.replaceState({sakinaDepth:1}, '', location.href); }catch(e){}
  // PHASE 1: migrate any pre-existing hadith localStorage data into IndexedDB
  // and warm the synchronous "which books are downloaded" set — fired
  // without awaiting so it never delays first paint or the auth check below.
  hadithInitStorage();
  // Create the one-and-only default Super Admin account the first time
  // the app is ever initialized (no-op on every later run).
  await authEnsureDefaultSuperAdmin();
  // If the app was opened from a Firebase password-reset email link
  // (?mode=resetPassword&oobCode=...), show the reset screen first,
  // regardless of whether a session already exists.
  const oobCode = authGetResetOobCode();
  if(oobCode){ showAuthScreen('reset', {oobCode}); return; }
  const session = authGetSession();
  if(session && authCurrentUser()){
    await syncStartForUser(session.userId);
    refreshReminderNotifications();
    showApp();
  } else {
    showAuthScreen('login');
  }
}
boot();
</script>
