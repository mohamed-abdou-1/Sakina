      {title:"الجزء الثاني: المؤامرة والإلقاء في الجُبّ",
       content:`اجتمع إخوة يوسف العشرة وتشاوروا فيما بينهم، وقالوا: "ليوسف وأخوه أحبّ إلى أبينا منّا ونحن عصبة، إن أبانا لفي ضلال مبين". قرروا التخلص من يوسف بأي طريقة، فاقترح بعضهم قتله، لكن أحدهم — وهو الأكبر أو الأعقل فيهم — خفّف من غلوائهم فقال: "لا تقتلوا يوسف وألقوه في غيابت الجُبّ يلتقطه بعض السيّارة إن كنتم فاعلين"، أي ألقوه في قاع بئر مظلم، وستمرّ قافلة عابرة فتلتقطه وتأخذه بعيدًا، وبذلك يتخلصون منه دون أن تتلطخ أيديهم بدمه.

جاءوا إلى أبيهم يعقوب في اليوم التالي بخطة محكمة: طلبوا منه أن يرسل يوسف معهم ليلعب ويرتع، ووعدوه بأن يحفظوه. تردد يعقوب، وقال: "إني ليحزنني أن تذهبوا به وأخاف أن يأكله الذئب وأنتم عنه غافلون". لكنهم أقسموا وألحّوا حتى اطمأن قلبه، فأرسله معهم.

في الطريق، حين خلا بهم يوسف بعيدًا عن أعين أبيه، نفّذوا خطتهم؛ أمسكوه وألقوه في الجُبّ. وأوحى الله إلى يوسف في تلك اللحظة المفزعة، وهو طفل صغير وحيد في ظلمة البئر، آية عظيمة تثبّته: "لتُنبئنّهم بأمرهم هذا وهم لا يشعرون" — بشارة مبكرة أن الأمر لن ينتهي هنا، وأن يومًا سيأتي يواجه فيه إخوته بما فعلوه دون أن يعرفوه.

عاد الإخوة إلى أبيهم عشاءً يبكون، وقالوا: "يا أبانا إنا ذهبنا نستبق وتركنا يوسف عند متاعنا فأكله الذئب، وما أنت بمؤمن لنا ولو كنا صادقين"، وجاءوا على قميصه بدمٍ كذب (دم لم يكن من ذبيحة حقيقية بل خدعة). لم يصدقهم يعقوب تمامًا، ففطن قلب الأب أن القصة غير متماسكة (كيف أكله الذئب والقميص سليم لم يتمزق؟)، فقال الكلمة الخالدة: "بل سوّلت لكم أنفسكم أمرًا، فصبر جميل، والله المستعان على ما تصفون".`,
       lessons:[
        "الحسد إذا تُرك دون علاج يتدرّج من مجرد شعور إلى مؤامرة فعلية قد تصل لإيذاء أقرب الناس.",
        "من رحمة الله أن يُلهم بعض أهل الشرّ تخفيف الأذى، كما خفّف أحد الإخوة فكرة القتل إلى الإلقاء في البئر.",
        "الله يثبّت عبده المبتلى حتى في أحلك اللحظات، كما أوحى ليوسف الطفل وهو في قاع الجُبّ.",
        "الصبر الجميل هو صبر بلا شكوى للخلق ولا جزع، وهذا ما اختاره يعقوب عليه السلام رغم مرارة الخبر."
       ]},
      {title:"الجزء الثالث: القافلة والبيع في مصر",
       content:`مرّت قافلة من المسافرين (السيّارة) بالقرب من الجُبّ، فأرسلوا من يستقي لهم الماء. أدلى الرجل دلوه، فتعلّق به يوسف وخرج، ففرح الرجل وقال: "يا بُشرى هذا غلام!" وأخفوه عن رفاق القافلة بضاعةً يبيعونها، خوفًا أن يُطالَب بحقّ فيه أحد.

حملوه إلى مصر، وباعوه هناك بثمن بخس زهيد — دراهم معدودة لا تليق بقيمته الحقيقية، لأنهم كانوا يريدون التخلص منه سريعًا لا تحقيق ربح. اشتراه رجل من عِلْيَة القوم في مصر، وهو العزيز (يُقال إنه كان مسؤولًا كبيرًا في خزائن الدولة)، فأوصى امرأته قائلاً: "أكرمي مثواه عسى أن ينفعنا أو نتخذه ولدًا"، لأنهما لم يُرزقا بأولاد.

بهذا التدبير الإلهي الدقيق، انتقل يوسف من ظلمة البئر إلى بيت من أرقى بيوت مصر، حيث تلقّى تربية راقية، ونشأ وسط الحكمة والعلم، وآتاه الله في شبابه حُسنًا (جمالًا) وعلمًا وحكمًا، جزاءً لإحسانه وصبره.`,
       lessons:[
        "تدبير الله للأمور يفوق تدبير البشر؛ فما بدا نهاية مأساوية (البيع رقيقًا) كان بداية تمكين عظيم.",
        "الإحسان إلى الغريب واليتيم قد يكون سببًا لبركة عظيمة تعود على صاحبها، كما فعل العزيز حين أوصى بإكرام يوسف.",
        "من صبر على ابتلائه بلا تسخّط، أعقبه الله رفعة في العلم والخُلق كما آتى يوسف حُسنًا وحكمًا."
       ]},
      {title:"الجزء الرابع: فتنة امرأة العزيز وثبوت البراءة",
       content:`كبر يوسف في بيت العزيز، وبلغ أشدّه، فراودته امرأة العزيز عن نفسه؛ غلّقت الأبواب وقالت: "هيت لك" (تعالَ، أنا مستعدة لك). فكان جواب يوسف الفوري الحازم: "معاذ الله إنه ربي أحسن مثواي، إنه لا يفلح الظالمون" — استعصم بذكر الله وبأمانة العهد الذي بينه وبين زوجها الذي أكرمه، فرفض الخيانة رفضًا قاطعًا رغم إغراء الموقف وقوة الفتنة.

هرب يوسف نحو الباب، فتبعته المرأة وأمسكت بقميصه من الخلف فتمزّق. وصادف أنهما وجدا زوجها (العزيز) عند الباب، فبادرته المرأة بالاتهام: قالت إن جزاء من أراد بأهلك سوءًا إلا أن يُسجن أو عذاب أليم، متهمة يوسف زورًا لتغطي فعلتها.

لكن الله أظهر الحق: شهد شاهد من أهلها (طفل في المهد بمعجزة، أو رجل حكيم بحسب بعض الأقوال) بحكم منطقي دامغ: "إن كان قميصه قُدّ من قُبل فصدقت وهو من الكاذبين، وإن كان قميصه قُدّ من دُبر فكذبت وهو من الصادقين". فلما رأى العزيز قميصه قُدّ من دُبر (أي أن يوسف كان هاربًا والمرأة تمسكه من خلفه) عرف الحق وقال: "إنه من كيدكن، إن كيدكن عظيم. يوسف أعرض عن هذا، واستغفري لذنبك إنك كنتِ من الخاطئين".

رغم ظهور البراءة بشكل قاطع أمام شهود، إلا أن نساء المدينة أخذن يتحدثن بالقصة، فقالت امرأة العزيز: لأثبتنّ لهنّ برأتي أو أُدينهم بأنهم من فعل مثل ما تفعل. فجمعتهنّ في مجلس، وأعطت كل واحدة سكينًا، وأمرت يوسف أن يخرج عليهنّ. فلما رأينه أُخذن بجماله وحسنه حتى قطّعن أيديهنّ من فرط الدهشة دون أن يشعرن، وقلن: "حاش لله ما هذا بشرًا إن هذا إلا مَلَك كريم". عند ذلك قالت امرأة العزيز معترفة أمامهنّ: "فذلكنّ الذي لمتنني فيه، ولقد راودته عن نفسه فاستعصم، ولئن لم يفعل ما آمره ليُسجننّ وليكونًا من الصاغرين".`,
       lessons:[
        "العفّة الحقيقية تظهر في لحظة الخلوة والقدرة على الفعل، لا في العلن حيث الرقابة.",
        "من استعصم بالله في الفتنة، أظهر الله براءته ولو بعد حين، بأدلة لا تقبل الشك.",
        "الجمال والمنصب ليسا حماية من الابتلاء؛ فقد ابتُلي يوسف بفتنة النساء رغم عفّته وتقواه.",
        "الاعتراف بالخطأ، كما فعلت امرأة العزيز أخيرًا أمام صويحباتها، خطوة نحو التوبة ولو تأخرت."
       ]},
      {title:"الجزء الخامس: السجن... سنوات الصبر والدعوة",
       content:`رغم أن الأدلة أثبتت براءة يوسف تمامًا، رأى العزيز وأهل بيته أن سجنه لفترة هو الحل الأنسب لإسكات الألسنة وتهدئة الفضيحة في المجتمع؛ فقال يوسف بنفسه، مفضّلًا السجن على الخطيئة: "ربّ السجن أحبّ إليّ مما يدعونني إليه، وإلا تصرف عني كيدهنّ أصبُ إليهنّ وأكن من الجاهلين". فدعا ربه أن يصرف عنه الفتنة، واستجاب الله له، فدخل السجن مظلومًا لكن بقلب مطمئن.

لم يكن يوسف في السجن رجلًا يائسًا ينتظر الفَرَج فحسب، بل كان داعيًا إلى الله حتى خلف القضبان. دخل معه السجن فتيان، فرأى كل منهما رؤيا: أحدهما رأى نفسه يعصر خمرًا، والآخر رأى فوق رأسه خبزًا تأكل منه الطير. طلبا من يوسف تفسير رؤياهما، لأنهما لاحظا فيه أخلاقًا ونورًا "إنا نراك من المحسنين".

قبل أن يجيب على سؤالهما، اغتنم يوسف الفرصة ليدعوهما إلى التوحيد، فقال لهما مبتدئًا بالدعوة قبل التفسير: "لا يأتيكما طعام تُرزقانه إلا نبأتكما بتأويله قبل أن يأتيكما... إني تركتُ ملّة قوم لا يؤمنون بالله وهم بالآخرة هم كافرون... أأرباب متفرقون خير أم الله الواحد القهّار؟ ما تعبدون من دونه إلا أسماء سمّيتموها أنتم وآباؤكم". ثم فسّر لهما: أما أحدهما فيُسقى ربه خمرًا (أي ينجو ويعود لخدمة الملك)، وأما الآخر فيُصلب وتأكل الطير من رأسه. وطلب من الناجي منهما: "اذكرني عند ربك"، أي اطلب من الملك أن ينظر في أمري وظلامتي.

لكن الشيطان أنسى الرجل الناجي أن يذكر يوسف عند الملك، فلبث يوسف في السجن بضع سنين إضافية بعد ثبوت الأسباب الظاهرة لخروجه — وهذا من أعظم الابتلاءات: أن يُنسى الإنسان رغم إحسانه، وأن يطول الأمل بعد أن بدا قريبًا.`,
       lessons:[
        "اختيار الأذى المؤقت (كالسجن) على الوقوع في المعصية هو عين الفلاح، وإن بدا خسارة ظاهرية.",
        "الداعية الصادق لا تشغله محنته عن دعوة من حوله؛ فيوسف دعا فتيَي السجن قبل أن يفسّر لهما رؤياهما.",
        "طلب الأسباب المشروعة (كطلب يوسف من الناجي أن يذكره) لا يتنافى مع التوكل على الله.",
        "قد يبتلي الله عبده بنسيان الناس له بعد إحسانه، ليعلّمه ألا يعلّق قلبه إلا بالله وحده."
       ]},
      {title:"الجزء السادس: رؤيا الملك والخروج من السجن",
       content:`بعد سنوات، رأى ملك مصر رؤيا أقلقته: سبع بقرات سمان يأكلهن سبع عجاف (هزيلات)، وسبع سنبلات خضر وأُخَر يابسات. جمع كبار قومه وسألهم تفسيرها فعجزوا وقالوا: "أضغاث أحلام وما نحن بتأويل الأحلام بعالمين". عندئذ تذكّر الرجل الناجي من السجن (الساقي) يوسف، بعد نسيان طويل، وقال: "أنا أنبئكم بتأويله فأرسلون".

ذهب إلى يوسف في السجن وسأله عن تفسير الرؤيا، فأجابه يوسف دون تردد، مقدّمًا حلًا اقتصاديًا متكاملًا لا مجرد تفسير: "تزرعون سبع سنين دأبًا، فما حصدتم فذروه في سنبله إلا قليلًا مما تأكلون. ثم يأتي من بعد ذلك سبع شداد يأكلن ما قدّمتم لهنّ إلا قليلًا مما تُحصنون. ثم يأتي من بعد ذلك عام فيه يُغاث الناس وفيه يعصرون" — أي سبع سنوات خصب توفَّر فيها الحبوب، ثم سبع سنوات قحط شديد يُستهلك فيها المخزون، ثم عام خير يعقبها.

عاد الرسول بهذا التفسير الدقيق إلى الملك، فأُعجب به وقال: "ائتوني به". لكن يوسف، تمسّكًا بكرامته ورغبة في إثبات براءته الكاملة أمام الجميع قبل خروجه، لم يخرج فورًا، بل قال للرسول: "ارجع إلى ربك فاسأله ما بال النسوة اللاتي قطّعن أيديهنّ، إن ربي بكيدهنّ عليم" — يريد أن يخرج من السجن بلا شبهة تلاحقه، لا مجرد نجاة عابرة. فسأل الملك النسوة، فاعترفن جميعًا: "حاش لله ما علمنا عليه من سوء"، واعترفت امرأة العزيز نفسها: "الآن حصحص الحق، أنا راودتُه عن نفسه وإنه لمن الصادقين".

عند ذلك أمر الملك بإحضار يوسف وقال: "ائتوني به أستخلصه لنفسي"، فلما كلّمه وجده رجلًا ذا علم وأمانة وحكمة نادرة، فقال له الملك: "إنك اليوم لدينا مكين أمين". فطلب يوسف منصبًا يُثبت فيه جدارته ويخدم به الأمة: "اجعلني على خزائن الأرض إني حفيظ عليم"، فوُلّي على خزائن مصر، بعد سنوات طويلة من الرقّ والسجن والظلم.`,
       lessons:[
        "الحكمة والعلم يظهران في وقتهما المقدّر، ولو طال الانتظار.",
        "طلب تبرئة الاسم كاملًا قبل قبول المنصب دليل على عزّة نفس يوسف وحرصه على نظافة سيرته لا على مجرد الخروج من الأزمة.",
        "من أتقن عمله وأظهر أمانته، فتح الله له أبوابًا لم يكن يتخيلها.",
        "طلب المنصب حين يكون العبد أهلًا له وقادرًا على خدمة الناس ليس من الحرص المذموم، كما طلب يوسف الإشراف على الخزائن."
       ]},
      {title:"الجزء السابع: عزيز مصر وإخوته في سنوات القحط",
       content:`تولّى يوسف خزائن مصر، وأدار سنوات الخصب بحكمة فادّخر الحبوب استعدادًا للسنوات العجاف. ولما جاء القحط، امتدّ إلى الأراضي المجاورة، ومنها أرض كنعان حيث كان يعقوب وبنوه. جاء إخوة يوسف العشرة إلى مصر يطلبون الميرة (الطعام)، فمثلوا أمام يوسف — وهو الآن عزيز مصر بكامل هيبته ومنصبه — فعرفهم فورًا، لكنهم لم يعرفوه؛ فقد تغيّرت ملامحه بمرور السنين، وآخر ما عرفوه عنه أنه طفل ألقوه في بئر، لا يتخيلون أن يكون هذا العزيز المهيب هو أخوهم.

أكرمهم يوسف وأوفى لهم الكيل، ثم سألهم عن أحوالهم فذكروا أن لهم أخًا صغيرًا (بنيامين، أخاه الشقيق) تركوه عند أبيهم. طلب يوسف أن يأتوه به في المرة القادمة إن أرادوا مزيدًا من الميرة، وأمر غلمانه سرًّا أن يضعوا بضاعتهم (ثمن الطعام) في رحالهم دون علمهم، ليرجعوا إليه طوعًا حين يجدونها.

عادوا إلى أبيهم، فأخبروه بطلب العزيز، وطلبوا إرسال بنيامين معهم. تردد يعقوب في البداية خوفًا عليه بعد فقدان يوسف، لكنه اضطر أخيرًا، وأخذ عليهم موثقًا من الله أن يأتوه به إلا أن يُحاط بهم. وقال لهم موصيًا: "لا تدخلوا من باب واحد وادخلوا من أبواب متفرقة"، حذرًا من العين والحسد، مع إيمانه أن الحذر لا يرد قدر الله: "وما أُغني عنكم من الله من شيء، إن الحكم إلا لله، عليه توكلت وعليه فليتوكل المتوكلون".

عند وصولهم بأخيهم بنيامين، خلا يوسف بأخيه وعرّفه بنفسه سرًّا: "إني أنا أخوك فلا تبتئس بما كانوا يعملون". ثم دبّر يوسف بحكمة إلهية خطة ليبقي أخاه عنده بطريقة مشروعة لا ظلم فيها: أمر غلمانه أن يضعوا صواع الملك (إناء كبير للكيل) في رحل أخيه بنيامين خفيةً، ثم نادى منادٍ: "أيتها العير إنكم لسارقون!". فتشوا الرحال، فوجدوا الصواع في رحل بنيامين، فأخذوه عندهم عقابًا (بحسب شريعتهم التي كانوا عليها آنذاك: أن يُسترقّ السارق).

حزن الإخوة وحاولوا إقناع يوسف بأخذ أحدهم بدلًا منه لكبر سنه أو مكانة أبيهم، فرفض يوسف بلباقة: "معاذ الله أن نأخذ إلا من وجدنا متاعنا عنده، إنّا إذًا لظالمون". فعاد التسعة إلى أبيهم دون بنيامين، وكبيرهم قرر ألا يبرح مصر حتى يأذن له أبوه أو يحكم الله له. اشتد حزن يعقوب من جديد، وابيضّت عيناه من الحزن الذي كتمه: "يا أسفى على يوسف وابيضّت عيناه من الحزن فهو كظيم"، لكنه لم ييأس من رحمة الله: "إنما أشكو بثّي وحزني إلى الله وأعلم من الله ما لا تعلمون... لا تيأسوا من روح الله، إنه لا ييأس من روح الله إلا القوم الكافرون".`,
       lessons:[
        "الإدارة الحكيمة للموارد في زمن الرخاء تقي الأمة من كوارث زمن الشدة.",
        "الأخذ بالأسباب (كالدخول من أبواب متفرقة) لا يناقض التوكل على الله؛ فكلاهما مطلوب معًا.",
        "من ابتلي بفقدٍ متكرر، فليعلم أن اليأس من رحمة الله من صفات الكافرين لا المؤمنين الصابرين.",
        "التدبير اللطيف لتحقيق مقصد مشروع (إبقاء بنيامين) خير من المواجهة المباشرة التي قد تُحرج الجميع."
       ]},
      {title:"الجزء الثامن: كشف الحقيقة ولمّ الشمل",
       content:`عاد الإخوة إلى مصر مرة أخرى، هذه المرة يستعطفون العزيز بعد أن اشتد بهم الفقر والقحط: "يا أيها العزيز مسّنا وأهلنا الضرّ وجئنا ببضاعة مزجاة فأوفِ لنا الكيل وتصدق علينا، إن الله يجزي المتصدقين". عند هذه اللحظة، بعد أن رأى يوسف تمام انكسارهم وصدق حاجتهم، لم يعد قادرًا على كتمان الأمر أكثر، فسألهم سؤالًا فاجأهم: "هل علمتم ما فعلتم بيوسف وأخيه إذ أنتم جاهلون؟".

ارتبك الإخوة وسألوه: "أإنك لأنت يوسف؟"، فأجاب بكل بساطة وثقة: "أنا يوسف وهذا أخي، قد منّ الله علينا، إنه من يتّقِ ويصبر فإن الله لا يضيع أجر المحسنين". لم تكن هذه لحظة انتقام كما كان متوقعًا من رجل بيده كل السلطة وأمامه من ظلمه، بل كانت لحظة عفو وصفح، فقالوا معترفين خجلًا: "تالله لقد آثرك الله علينا وإن كنا لخاطئين"، فقال يوسف كلمته الخالدة التي تُعد قمة العفو في القرآن: "لا تثريب عليكم اليوم، يغفر الله لكم، وهو أرحم الراحمين".

ثم طلب منهم أن يأخذوا قميصه ويلقوه على وجه أبيه، وأخبرهم أنه سيعود بصره: "اذهبوا بقميصي هذا فألقوه على وجه أبي يأتِ بصيرًا، وأتوني بأهلكم أجمعين". وفي كنعان، وقبل أن تصل القافلة، أحسّ يعقوب برائحة يوسف: "إني لأجد ريح يوسف لولا أن تفنّدون" (تُسفّهون رأيي). فلما وصل البشير وألقى القميص على وجهه، ارتدّ يعقوب بصيرًا بإذن الله بعد سنوات من الحزن الذي أعمى عينيه.

انتقلت الأسرة كلها إلى مصر، فاستقبل يوسف أبويه وإخوته بحفاوة، وأجلس أبويه على العرش، وخرّ الجميع له سجدًا (سجود تحية وتكريم لا عبادة) — فتحققت الرؤيا التي رآها وهو طفل صغير بعد أكثر من عشرين عامًا: "يا أبتِ هذا تأويل رؤياي من قبل، قد جعلها ربي حقًا". فحمد يوسف ربه بقلب المؤمن الشاكر: "ربّ قد آتيتني من الملك وعلّمتني من تأويل الأحاديث، فاطر السماوات والأرض أنت وليّي في الدنيا والآخرة، توفّني مسلمًا وألحقني بالصالحين".`,
       lessons:[
        "العفو عند المقدرة أعظم مكارم الأخلاق، وقد جسّده يوسف مع من ظلموه أشد الظلم دون أدنى تردد.",
        "الصبر الطويل والتقوى ثمنهما لا يضيع عند الله، مهما طال الطريق.",
        "الرؤيا الصادقة تتحقق في وقتها المقدَّر، ولو بعد عشرين عامًا من الانتظار.",
        "ختام النعمة بالشكر لله، لا بالافتخار بالنفس، هو أدب الأنبياء كما ختم يوسف قصته بالدعاء والحمد."
       ]}
    ],
    hadith:"قال ﷺ: «رحم الله أخي يوسف، لو لبثتُ في السجن طول ما لبث، لأجبت الداعي» (رواه البخاري)، وفي هذا إشارة إلى تواضع يوسف عليه السلام وعدم استعجاله الخروج قبل ظهور براءته. وقصته وردت كاملة في سورة يوسف التي سمّاها الله «أحسن القصص»: ﴿نَحْنُ نَقُصُّ عَلَيْكَ أَحْسَنَ الْقَصَصِ﴾."},
  {id:2, name:"سيدنا نوح عليه السلام", desc:"أول رسول إلى أهل الأرض، دعا قومه ٩٥٠ عامًا بالصبر والحكمة قبل أن يأتي أمر الله بالطوفان.", icon:"water", c1:"var(--teal-700)", c2:"var(--teal-950)",
    summary:"أرسل الله نوحًا عليه السلام أول رسول إلى أهل الأرض بعد أن عبدوا الأصنام من دون الله، فدعاهم ليلاً ونهارًا سرًا وجهرًا تسعمئة وخمسين عامًا فلم يزدهم دعاؤه إلا فرارًا، حتى أُمر ببناء سفينة وسط سخرية قومه، فحمل فيها من آمن معه وزوجين من كل نوع، وأرسل الله الطوفان فأغرق كل من كذّبه حتى ابنه، ونجا نوح ومن معه، واستقرت السفينة على الجودي، فكان أول رسل الله إلى أهل الأرض وأصبر الأنبياء على قومه.",
    parts:[
      {title:"الجزء الأول: بداية الدعوة وطول الصبر عليها",
       content:`أرسل الله نوحًا عليه السلام إلى قومه وهم أول قوم على الأرض عبدوا الأصنام من دون الله بعد آدم عليه السلام، فقد كان قوم نوح قد اتخذوا من رجال صالحين ماتوا فيهم صورًا تذكارية إجلالاً لهم، ثم مع مرور الأجيال زيّن لهم الشيطان أن يعبدوا تلك الصور نفسها، فسمّوها بأسماء: "وَدّ وسُواع ويَغُوث ويَعُوق ونَسْر"، وصارت آلهة تُعبد من دون الله. فبعث الله نوحًا يدعوهم إلى توحيده وحده: "يا قوم اعبدوا الله ما لكم من إله غيره، إني أخاف عليكم عذاب يوم عظيم".

استمر نوح عليه السلام في دعوته تسعمئة وخمسين سنة، كما أخبر القرآن: "فلبث فيهم ألف سنة إلا خمسين عامًا"، وهي أطول مدة دعوة عُرفت لنبي في تاريخ الرسالات، يدعو قومه ليلاً ونهارًا دون كلل: "قال ربّ إني دعوت قومي ليلاً ونهارًا فلم يزدهم دعائي إلا فرارًا". جمع نوح عليه السلام بين أساليب الدعوة كلها: الجهر والإسرار، والترغيب بالمغفرة والرزق، والترهيب من العذاب، فقال لهم: "استغفروا ربكم إنه كان غفارًا، يرسل السماء عليكم مدرارًا، ويُمددكم بأموال وبنين ويجعل لكم جنّات ويجعل لكم أنهارًا، مالكم لا ترجون لله وقارًا؟".

رغم هذا الجهد المتواصل عبر قرون من عمره المديد، لم يستجب له إلا قلة قليلة من قومه، وظل أكثرهم متمسكين بشرك آبائهم، مصداقًا لسنة الله في أن أكثر الناس -مهما طال زمن الدعوة- لا يستجيبون بسهولة لدعوة الحق إذا تمكن الباطل من قلوبهم بالعادة والتقليد.`,
       lessons:[
        "الشرك قد ينشأ من نية حسنة كتعظيم الصالحين، ثم يتحول بمرور الأجيال إلى عبادة صريحة إذا لم يُنكر من بدايته.",
        "طول مدة الدعوة لا يبرر اليأس منها، فقد صبر نوح عليه السلام قرابة ألف سنة يدعو بلا كلل.",
        "تنويع أساليب الدعوة بين الترغيب والترهيب والإسرار والجهر من حكمة الداعية الصادق.",
        "كثرة المكذبين لا تدل على بطلان الدعوة، فقد كذّب أكثر قوم نوح رغم صحة ما جاء به."
       ]},
      {title:"الجزء الثاني: استمرار العناد واستهزاء الملأ",
       content:`واجه نوح عليه السلام عنادًا متزايدًا من كبراء قومه (الملأ)، فقالوا عنه: "ما هذا إلا بشر مثلكم يريد أن يتفضل عليكم"، مستنكرين أن يكون الرسول بشرًا مثلهم لا ملكًا. ولما رأوا أن أتباع نوح هم من ضعفاء الناس وفقرائهم، احتقروهم وقالوا لنوح: "أنؤمن لك واتّبعك الأرذلون؟"، فردّ عليهم نوح بحكمة بالغة موضحًا أن معيار الإيمان ليس الجاه أو المال بل صدق القلب: "وما أنا بطارد الذين آمنوا... وما علمي بما كانوا يعملون، إن حسابهم إلا على ربي لو تشعرون، وما أنا بطارد المؤمنين".

اتهموه بالضلال حينًا وبالجنون حينًا آخر، وقالوا: "إن نقول إلا اعتراك بعض آلهتنا بسوء"، أي أصابك مسّ من غضب الآلهة عليك، فردّ عليهم نوح بثقة الرسول الواثق برسالته: "إني أُشهد الله واشهدوا أني بريء مما تشركون، فكيدوني جميعًا ثم لا تُنظرون". ومع كل هذا العناد المستمر، لم يفقد نوح عليه السلام الأمل، بل استمر في دعوته الفردية حتى قارب كل واحد من قومه على حدة كما ورد في بعض الآثار، معلّلاً لهم كل مرة بأسلوب جديد.

في النهاية، ويأس نوح عليه السلام من إيمان من بقي من قومه بعد كل هذه القرون من الدعوة، ورأى أنهم لن يلدوا إلا فاجرًا كفارًا يُضل من بعده، دعا ربه دعوة الرسول الذي استنفد كل وسيلة: "ربّ لا تذر على الأرض من الكافرين ديارًا، إنك إن تذرهم يُضلّوا عبادك ولا يلدوا إلا فاجرًا كفارًا"، فكانت هذه الدعوة إيذانًا بقرب نزول العذاب عليهم.`,
       lessons:[
        "معيار الإيمان صدق القلب لا الجاه أو المال، وقد احتقر كبراء قوم نوح أتباعه لفقرهم فردّ عليهم بالحق.",
        "اتهام الدعاة بالجنون أو الضلال أسلوب قديم يواجهه كل من يدعو إلى الحق، فلا يجزع منه الداعية الصادق.",
        "التبرؤ الصريح من الشرك أمام الملأ، كما فعل نوح، موقف يحتاج شجاعة لا تلين مهما كثر المعاندون.",
        "الدعاء على القوم لا يكون إلا بعد استنفاد كل وسيلة ويأس تام من هدايتهم، لا عن تسرع أو غضب عابر."
       ]},
      {title:"الجزء الثالث: أمر بناء الفلك والاستهزاء بها",
       content:`أوحى الله إلى نوح عليه السلام أن وقت العذاب قد اقترب، فأمره ببناء سفينة عظيمة بمواصفات ووحي إلهي: "واصنع الفلك بأعيننا ووحينا ولا تخاطبني في الذين ظلموا إنهم مُغرقون". أخذ نوح عليه السلام يبني السفينة في مكان بعيد عن الماء، فكان قومه كلما مرّوا به سخروا منه واستهزؤوا، إذ رأوا نبيًا يبني سفينة ضخمة في أرض جافة لا بحر فيها ولا نهر قريب، فتعجبوا وضحكوا منه، فردّ عليهم بثقة من يعلم أن السخرية عابرة والحق باقٍ: "إن تسخروا منّا فإنا نسخر منكم كما تسخرون، فسوف تعلمون من يأتيه عذاب يُخزيه ويحل عليه عذاب مقيم".

استمر نوح عليه السلام في بناء السفينة بصبر رغم كل هذا الاستهزاء، حتى أتمها بأمر الله. وحين اقترب الأمر، أخبره الله بعلامة بدء الطوفان: "فإذا جاء أمرنا وفار التنّور"، أي إذا فار الماء من التنور (موضع خبز أو صخرة معينة، على خلاف بين المفسرين) فذلك إيذان ببدء الطوفان. فأمره الله أن يحمل في السفينة من كل زوجين اثنين من الحيوانات ليبقى النسل، وأن يحمل أهله إلا من سبق عليه القول (من كفر منهم)، ومن آمن معه من الناس.

آمن مع نوح عليه السلام نفر قليل جدًا رغم طول دعوته، كما قال تعالى: "وما آمن معه إلا قليل"، فكانت هذه القلة هي كل من نجا من الطوفان، بينما بقي أكثر قومه على كفرهم مستهزئين حتى اللحظة الأخيرة قبل نزول العذاب.`,
       lessons:[
        "الطاعة لأمر الله لا تحتاج تفسيرًا مقنعًا للناس، فقد بنى نوح السفينة رغم غرابة الأمر في نظر قومه.",
        "السخرية من أهل الحق مؤقتة، وسينكشف يوم يُظهر الله الحقيقة أن الساخر هو الخاسر الحقيقي.",
        "الاستعداد للابتلاء يكون قبل وقوعه بزمن كافٍ، كما بُنيت السفينة قبل الطوفان بفترة طويلة.",
        "قلة عدد المؤمنين لا تعني بطلان دعوتهم، فالعبرة بصدق الإيمان لا بكثرة العدد."
       ]},
      {title:"الجزء الرابع: الطوفان وغرق من كذّب حتى ابنه",
       content:`جاء أمر الله، وفار الماء من كل مكان: من التنور، ومن السماء بمطر منهمر لا ينقطع، ومن الأرض بعيون تفجرت في كل مكان: "ففتحنا أبواب السماء بماء منهمر، وفجّرنا الأرض عيونًا فالتقى الماء على أمر قد قُدر". ركب نوح عليه السلام ومن آمن معه في السفينة، وهي تجري بهم في موج كالجبال هولاً وارتفاعًا، وفي تلك اللحظة العصيبة، نادى نوح ابنه الذي اعتزل عن الإيمان وكان بعيدًا يظن أنه سينجو بنفسه: "يا بُنيّ اركب معنا ولا تكن مع الكافرين"، فأجابه الابن بغرور من يثق بقوته لا برحمة ربه: "سآوي إلى جبل يعصمني من الماء"، فقال نوح محذرًا: "لا عاصم اليوم من أمر الله إلا من رحم"، وحال بينهما الموج فكان الابن من المغرقين.

في تلك اللحظة، تحرك قلب الأب المفجوع، فدعا نوح ربه بدافع الأبوة الفطرية: "ربّ إن ابني من أهلي وإن وعدك الحق وأنت أحكم الحاكمين"، فجاءه الجواب الإلهي الحاسم الذي يعلّم أن رابطة الدين أقوى من رابطة الدم: "يا نوح إنه ليس من أهلك، إنه عمل غير صالح، فلا تسألن ما ليس لك به علم، إني أعظك أن تكون من الجاهلين". فاستغفر نوح ربه معتذرًا: "ربّ إني أعوذ بك أن أسألك ما ليس لي به علم، وإلا تغفر لي وترحمني أكن من الخاسرين".

استمر الطوفان يعمّ الأرض حتى غطّى كل شيء وأغرق كل من كذّب برسالة نوح، إلا من كان معه في السفينة، فتحققت بذلك دعوته على قومه بعد قرون من الصبر عليهم والإنذار المتكرر.`,
       lessons:[
        "رابطة الإيمان أقوى من رابطة الدم، فقد نجا المؤمنون الغرباء وغرق ابن النبي لكفره.",
        "الاغترار بالقوة الذاتية عند نزول العذاب لا ينفع شيئًا، كما ظن ابن نوح أن الجبل سيعصمه من الله.",
        "حتى الأنبياء قد يخطئون في تقدير أمور غيبية فيصححهم الله، وقد بادر نوح بالاعتذار فور تنبيهه.",
        "لا عاصم من أمر الله يوم ينزل إلا رحمته سبحانه، ولو كان المرء على أعلى جبل."
       ]},
      {title:"الجزء الخامس: النجاة واستقرار السفينة على الجودي",
       content:`بعد أن أتمّ الطوفان مهمته في إهلاك من كذّب، جاء الأمر الإلهي بانتهاء العذاب: "وقيل يا أرض ابلعي ماءك، ويا سماء أقلعي، وغيض الماء وقُضي الأمر واستوت على الجودي، وقيل بُعدًا للقوم الظالمين"، فابتلعت الأرض ماءها، وأمسكت السماء عن المطر، واستقرت السفينة على جبل الجودي، وانتهى الابتلاء الذي استمر أمدًا طويلاً منذ بداية الدعوة.

خرج نوح عليه السلام ومن معه من المؤمنين من السفينة سالمين بأمر الله: "قيل يا نوح اهبط بسلام منا وبركات عليك وعلى أمم ممن معك"، فكانت هذه بشارة أن الأمم التي ستأتي من ذريته ومن آمن معه ستحمل بركة تلك النجاة. وقبل أن يهبط، دعا نوح عليه السلام دعاءً جميلاً يعلّم أدب الشكر عند النجاة من كل ابتلاء: "ربّ أنزلني منزلاً مباركًا وأنت خير المنزلين"، فلم ينسَ ربه لحظة النجاة كما لم ينسه لحظة الشدة.

بهذا ختمت قصة أول رسول أرسله الله إلى أهل الأرض، بعد أطول دعوة عرفها التاريخ، لتبقى عبرة خالدة في الصبر على الدعوة ولو طال أمدها، وفي عدل الله الذي أنجى المؤمنين القليلين وأهلك المكذبين الكثيرين مهما بلغت قوتهم وعنادهم.`,
       lessons:[
        "بعد كل عسر ينزله الله يسر، وقد أعقب الطوفان الهائل استقرار وسلام وبركة على من نجا.",
        "الشكر عند النجاة من الابتلاء من صفات الأنبياء، كما دعا نوح بعد نجاته بدل أن ينشغل بفرحة النجاة وحدها.",
        "عاقبة الصبر الطويل في سبيل الله لا تضيع، ولو استغرقت قرونًا من العمر كما استغرقت دعوة نوح.",
        "عدل الله لا يفرّق في الحساب بين قوي وضعيف، فقد أغرق الجميع ممن كذّب مهما كانت مكانته."
       ]}
    ],
    hadith:"قال تعالى: «إنا أرسلنا نوحًا إلى قومه أن أنذر قومك من قبل أن يأتيهم عذاب أليم» (نوح: ١)، وسمّاه الله في القرآن «عبدًا شكورًا»، وثبت في الحديث أنه أول الرسل إلى أهل الأرض؛ ففي حديث الشفاعة الطويل يأتي الناس إلى آدم فيعتذر ثم يقولون: «ائتوا نوحًا أول رسول بعثه الله إلى أهل الأرض» (متفق عليه)، فكان بحق أبا البشرية الثاني وأول من واجه تكذيب الأمم بصبر لم يتكرر."},
  {id:3, name:"سيدنا إبراهيم عليه السلام", desc:"خليل الرحمن، كسّر الأصنام وهو فتى، وابتُلي بذبح ابنه، فكان أبا الأنبياء وباني الكعبة.", icon:"kaaba", c1:"var(--tan-500)", c2:"var(--teal-700)",
    summary:"بحث إبراهيم عليه السلام عن ربه بفطرته السليمة فاهتدى إلى التوحيد، وحطّم أصنام قومه فأُلقي في النار فكانت عليه بردًا وسلامًا، ثم هاجر بدينه وترك زوجته هاجر وابنه إسماعيل بأمر الله في وادٍ لا زرع فيه فكان الابتلاء سببًا لظهور زمزم، ثم ابتُلي بأعظم ابتلاء حين أُمر بذبح ابنه ففداه الله بذبح عظيم، وختم حياته ببناء الكعبة مع إسماعيل ودعا لمكة وذريته، فاستحق أن يكون خليل الرحمن وأبا الأنبياء.",
    parts:[
      {title:"الجزء الأول: النشأة والبحث عن الحق",
       content:`نشأ إبراهيم عليه السلام في قوم يعبدون الأصنام والكواكب، وكان أبوه آزر يصنع الأصنام ويبيعها، فأنكر إبراهيم عليه السلام هذا الشرك منذ صغره بفطرة سليمة هداه الله بها، وقال لأبيه بأدب الابن الناصح لا بجفاء المتعالي: "يا أبتِ لِمَ تعبد ما لا يسمع ولا يبصر ولا يُغني عنك شيئًا؟ يا أبتِ إني قد جاءني من العلم ما لم يأتك فاتّبعني أهدك صراطًا سويًا". فردّ عليه أبوه بالتهديد بالرجم والهجر، فقال إبراهيم مودّعًا بلطف: "سلام عليك سأستغفر لك ربي إنه كان بي حفيًا".

خرج إبراهيم عليه السلام يتأمل في الكون باحثًا عن الحق بعقله ووجدانه قبل أن يُوحى إليه، كما قصّ القرآن عنه: فلما رأى كوكبًا في الليل قال "هذا ربي"، فلما أفل قال: "لا أحب الآفلين". فلما رأى القمر بازغًا قال: "هذا ربي"، فلما أفل قال: "لئن لم يهدني ربي لأكونن من القوم الضالين". فلما رأى الشمس بازغة قال: "هذا ربي، هذا أكبر"، فلما أفلت قال معلنًا يقينه: "يا قوم إني بريء مما تشركون، إني وجّهت وجهي للذي فطر السماوات والأرض حنيفًا وما أنا من المشركين".

بهذا التدرج الفطري في التفكر، وصل إبراهيم عليه السلام إلى اليقين التام بأن الإله الحق لا بد أن يكون دائمًا لا يأفل ولا يغيب، فآمن بالله الواحد رب كل شيء وخالقه، ورفض كل ما كان عليه قومه من عبادة الكواكب والأصنام، فبدأ منذ تلك اللحظة رحلته في مواجهة قومه بالحجة والبرهان.`,
       lessons:[
        "دعوة الوالدين تكون بالرفق والأدب حتى مع إصرارهم على الباطل، كما خاطب إبراهيم أباه بـ'يا أبتِ' لا بالتجريح.",
        "التفكر في خلق الله طريق راسخ لليقين، وقد استخدمه إبراهيم عليه السلام ليصل إلى معرفة ربه.",
        "الإله الحق لا يجوز أن يتصف بالنقص أو الغياب أو الأفول، وهذا ميزان عقلي بسيط ميّز به إبراهيم الحق من الباطل.",
        "إعلان البراءة من الشرك بوضوح، كما فعل إبراهيم أمام قومه، خطوة ضرورية قبل الدعوة إلى التوحيد."
       ]},
      {title:"الجزء الثاني: تحطيم الأصنام والإلقاء في النار",
       content:`انتهز إبراهيم عليه السلام فرصة خروج قومه إلى عيد لهم، فدخل معبدهم خفية وحطّم أصنامهم كلها إلا الصنم الأكبر، وعلّق الفأس التي حطّم بها في رقبته، ليضع قومه أمام تناقضهم الفاضح. فلما رجعوا ورأوا أصنامهم محطمة، سألوا: "من فعل هذا بآلهتنا إنه لمن الظالمين؟" فقال بعضهم: "سمعنا فتى يذكرهم يقال له إبراهيم"، فأحضروه وسألوه: "أأنت فعلت هذا بآلهتنا يا إبراهيم؟" فأجابهم بذكاء يفضح عجز أصنامهم: "بل فعله كبيرهم هذا فاسألوهم إن كانوا ينطقون". فرجعوا إلى أنفسهم لحظة يعترفون بالحق: "إنكم أنتم الظالمون"، ثم عادوا إلى عنادهم وقالوا: "لقد علمت ما هؤلاء ينطقون"، فردّ عليهم إبراهيم بالحجة الدامغة: "أفتعبدون من دون الله ما لا ينفعكم شيئًا ولا يضركم؟ أُفٍّ لكم ولما تعبدون من دون الله، أفلا تعقلون؟".

غضب القوم لعجزهم عن الرد بالحجة، فلجأوا إلى القوة، وقرروا حرقه انتقامًا وتشفيًا، فجمعوا حطبًا كثيرًا وأججوا نارًا عظيمة، وقذفوه فيها بمنجنيق من بعيد خشية حرّها. وفي تلك اللحظة الرهيبة، لم يطلب إبراهيم عليه السلام من أحد شيئًا، بل فوّض أمره كله لله، فقيل إن جبريل عليه السلام عرض عليه المساعدة فقال: "أما إليك فلا"، اكتفاءً بعلم الله بحاله دون سؤال. فأمر الله النار: "يا نار كوني بردًا وسلامًا على إبراهيم"، فتحوّلت النار إلى برد وسلام لا تحرقه، بل احترق منها وثاقه فقط، وخرج إبراهيم عليه السلام منها سالمًا لم تمسّه بسوء.

خرج قوم إبراهيم من هذا الابتلاء العظيم مهزومين حجة وعاجزين عن مواجهة معجزة ظاهرة أمام أعينهم، ورغم ذلك أصرّ أكثرهم على كفرهم، فقرر إبراهيم عليه السلام الهجرة بدينه بعيدًا عن قوم لا يريدون الهداية.`,
       lessons:[
        "المواجهة بالحجة العقلية قبل المواجهة المادية من منهج الأنبياء في الدعوة إلى التوحيد.",
        "التوكل الحق هو تفويض الأمر لله دون طلب من غيره، كما رفض إبراهيم عرض المساعدة من جبريل.",
        "الله قادر أن يقلب طبائع الأشياء لنصرة أوليائه، فالنار التي خُلقت للإحراق صارت بردًا وسلامًا بأمره.",
        "العناد بعد ظهور الحجة الواضحة صفة من صفات من طُبع على قلبه، وهذا ما استمر عليه أكثر قوم إبراهيم."
       ]},
      {title:"الجزء الثالث: الهجرة وترك هاجر وإسماعيل في وادي مكة",
       content:`هاجر إبراهيم عليه السلام بدينه من أرض قومه، ورُزق بابنه الأول إسماعيل من زوجته هاجر بعد سنوات طويلة من الانتظار والدعاء، وكان قد تجاوز الثمانين من عمره. ثم جاءه أمر إلهي عجيب: أن يأخذ هاجر وابنها الرضيع إسماعيل ويتركهما في وادٍ قفر لا زرع فيه ولا ماء، وهو موضع مكة اليوم. نفّذ إبراهيم عليه السلام الأمر بقلب المسلّم رغم قسوته الظاهرة على مشاعر الأب، فلما وضعهما هناك وأدار ليرجع، لحقت به هاجر تسأله: "يا إبراهيم أين تذهب وتتركنا في هذا الوادي الذي ليس فيه إنس ولا شيء؟" فلم يلتفت إليها، فكررت السؤال مرارًا فلم يجبها، فسألته أخيرًا: "آلله أمرك بهذا؟" فقال: "نعم"، فقالت بيقين المؤمنة الواثقة: "إذًا لا يُضيّعنا".

نفد الماء الذي معهما، وعطش الرضيع إسماعيل واشتد بكاؤه، فقامت هاجر تبحث عن الماء في هلع الأم، فصعدت جبل الصفا تتطلع فلا ترى شيئًا، فنزلت وسعت إلى جبل المروة تتطلع أيضًا، فكررت السعي بين الجبلين سبع مرات وهي تدعو الله وتلتمس الغوث لابنها، فكان هذا أصل شعيرة السعي بين الصفا والمروة في الحج إلى اليوم. وبينما هي كذلك، إذ بالملك جبريل عليه السلام يضرب بعقبه أو بجناحه الأرض عند قدم إسماعيل، فنبع الماء، فجعلت هاجر تحوّطه بالتراب خشية أن يفيض ويضيع وهي تقول: "زمي زمي" فسُميت زمزم، وهي عين لا تنضب إلى يومنا هذا.

بهذه البركة، بدأت الحياة تدبّ في ذلك الوادي القفر؛ فمرّت قبيلة جرهم فرأت الطير يحوم فوق الماء فعلموا أن هناك عينًا، فنزلوا واستأذنوا هاجر بالإقامة فأذنت لهم، فتكوّنت حول تلك العين قرية صغيرة صارت فيما بعد مكة المكرمة، أشرف بقاع الأرض.`,
       lessons:[
        "الطاعة المطلقة لله ولو خالفت مشاعر القلب، كما نفّذ إبراهيم أمرًا بدا في ظاهره قاسيًا على أبوّته.",
        "اليقين بأن الله لن يُضيّع من ترك كل شيء طاعة له، كما قالت هاجر: 'إذًا لا يُضيّعنا'.",
        "الأخذ بالأسباب مع اليقين بالله لا يتناقضان؛ فقد سعت هاجر تبحث عن الماء رغم علمها أن الله لن يضيّعها.",
        "من بركات الابتلاء أن تتحول أرض قفراء بلا حياة إلى أشرف بقاع الأرض، كما صارت مكة."
       ]},
      {title:"الجزء الرابع: رؤيا الذبح العظيم",
       content:`لما بلغ إسماعيل عليه السلام سنّ السعي مع أبيه، وأصبح شابًا يافعًا يؤنس وحدة أبيه بعد غيابه الطويل عنهما، جاء الابتلاء الأعظم: رأى إبراهيم عليه السلام في المنام أنه يذبح ابنه إسماعيل، ورؤيا الأنبياء وحي حق لا تحتمل التأويل. لم يستبدّ إبراهيم عليه السلام برأيه في تنفيذ هذا الأمر الجلل رغم صعوبته البالغة، بل عرضه على ابنه بأسلوب المستشير لا الآمر المتسلط: "يا بُنيّ إني أرى في المنام أني أذبحك فانظر ماذا ترى"، فجاء جواب إسماعيل عليه السلام معجزة في الإيمان والتسليم رغم صغر سنه: "يا أبتِ افعل ما تؤمر، ستجدني إن شاء الله من الصابرين".

مضى الأب والابن معًا إلى تنفيذ أمر الله، في مشهد يجسّد أعلى درجات الطاعة والتسليم من الاثنين معًا: "فلما أسلما وتلّه للجبين"، أي استسلم الأب لأمر ربه، واستسلم الابن فاستلقى على جبينه استعدادًا للذبح. وفي تلك اللحظة الحاسمة، حين تحقق الاختبار وثبت صدق النية والتسليم التام، نادى الله إبراهيم: "يا إبراهيم قد صدّقت الرؤيا، إنا كذلك نجزي المحسنين، إن هذا لهو البلاء المبين"، وفدى الله إسماعيل بذبح عظيم (كبش) أُنزل من الجنة، فذُبح الكبش بدلاً منه.

بهذا الفداء العظيم تحققت الحكمة الإلهية: لم يكن المقصود إراقة الدم بل اختبار صدق الاستسلام والطاعة الكاملة لله فوق كل حب آخر، حتى حب الأب لابنه الوحيد الذي طال انتظاره. فجعل الله هذه الواقعة سنة خالدة يحيها المسلمون كل عام في عيد الأضحى، إحياءً لذكرى هذا التسليم المطلق الذي سطّره أب وابنه معًا.`,
       lessons:[
        "التسليم لأمر الله يتقدّم على كل تعلّق قلبي، ولو كان بأعز الأبناء بعد طول انتظار.",
        "الشورى بين الوالد وابنه حتى في أخطر القرارات، كما استشار إبراهيم ابنه إسماعيل قبل التنفيذ.",
        "صدق النية وحده كافٍ ليقبل الله الطاعة، وقد اكتفى الله بصدق العزم دون إتمام الذبح الفعلي.",
        "الابتلاء العظيم يستوجب جزاءً عظيمًا، وقد أعقب هذا التسليم فداء من الجنة وذكرى خالدة إلى يوم القيامة."
       ]},
      {title:"الجزء الخامس: بناء الكعبة ودعوة الحج",
       content:`بعد أن كبر إسماعيل عليه السلام وصار رجلاً، أمر الله أباه إبراهيم أن يرفع قواعد بيت الله الحرام في مكة، فاجتمع الأب وابنه على هذا العمل الجليل، وإبراهيم يضع الحجارة وإسماعيل يناوله إياها، وهما يدعوان الله في أثناء العمل بخشوع العابد لا بفخر الباني: "ربنا تقبّل منا إنك أنت السميع العليم". فلما ارتفع البناء، وضعا الحجر الأسود في مكانه، وأتمّا بناء الكعبة أول بيت وُضع للناس يعبدون فيه الله وحده.

لم يكتفِ إبراهيم عليه السلام بالبناء المادي، بل دعا بدعوات عظيمة ما زالت آثارها ظاهرة إلى اليوم: دعا لمكة بالأمن والرزق: "ربّ اجعل هذا بلدًا آمنًا وارزق أهله من الثمرات"، ودعا لذريته بالهداية وإقامة الصلاة: "ربّ اجعلني مقيم الصلاة ومن ذريتي، ربنا وتقبّل دعاء"، ودعا دعوة عظيمة القدر استجابها الله بعد قرون طويلة: "ربنا وابعث فيهم رسولاً منهم يتلو عليهم آياتك ويعلّمهم الكتاب والحكمة ويزكّيهم"، وهي الدعوة التي كان استجابتها مبعث النبي محمد ﷺ من ذرية إسماعيل عليه السلام في مكة نفسها.

وبعد إتمام البناء، أمر الله إبراهيم أن يؤذّن في الناس بالحج: "وأذّن في الناس بالحج يأتوك رجالاً وعلى كل ضامر يأتين من كل فجّ عميق"، فصار بيته الذي بناه بيده مع ابنه قِبلة يحج إليها المسلمون من كل أرض إلى يوم القيامة، وصار هو عليه السلام أبًا للأنبياء الذين خرجوا من ذريته، ونال بذلك أعلى منزلة سمّاه الله بها: "واتخذ الله إبراهيم خليلاً".`,
       lessons:[
        "العمل الصالح يقترن بالدعاء بقبوله، لا بالعُجب به، كما دعا إبراهيم وإسماعيل عند رفع القواعد.",
        "دعوة الوالد الصالح لذريته بالهداية والصلاح من أعظم الأمانات التي يحملها الآباء.",
        "استجابة الدعاء قد تتأخر قرونًا لكنها لا تضيع، كما تحققت دعوة إبراهيم ببعثة النبي محمد ﷺ بعد آلاف السنين.",
        "بيت الله الحرام رمز التوحيد الذي أسّسه إبراهيم وإسماعيل، يجمع المسلمين على اختلاف أقطارهم في عبادة واحدة."
       ]}
    ],
    hadith:"قال ﷺ: «إن الله اتخذني خليلاً كما اتخذ إبراهيم خليلاً» (رواه مسلم)، وسمّاه الله في كتابه: «إن إبراهيم كان أمة قانتًا لله حنيفًا ولم يك من المشركين» (النحل: ١٢٠)، فجمع بين التوحيد الخالص والطاعة الكاملة حتى استحق أن يكون إمامًا للناس وأبًا للأنبياء من بعده."},
  {id:4, name:"سيدنا موسى عليه السلام", desc:"من التابوت في اليمّ إلى مواجهة فرعون، وتفليق البحر، وكليم الله على جبل الطور.", icon:"star", c1:"var(--teal-600)", c2:"var(--teal-900)",
    summary:"وُلد موسى عليه السلام في زمن كان فرعون يذبح فيه أبناء بني إسرائيل، فأُلقي في اليمّ طفلاً فالتقطه آل فرعون ونشأ في قصره، ثم هرب إلى مدين بعد قتله رجلاً خطأً، فناداه الله عند جبل الطور وأرسله بمعجزات إلى فرعون، فكذّبه وتحدّاه بالسحرة فآمن السحرة برب موسى، ثم أغرق الله فرعون في البحر بعد أن فلقه لموسى وقومه، وابتُلي بعدها بعبادة قومه للعجل، وكلّمه الله تكليمًا فاستحق لقب كليم الله.",
    parts:[
      {title:"الجزء الأول: الولادة والتابوت في اليمّ",
       content:`في عهد فرعون الطاغية، طغى واستكبر في الأرض حتى ادّعى الألوهية، وذبّح أبناء بني إسرائيل خوفًا من نبوءة بلغته بأن غلامًا منهم سيكون هلاك ملكه، ويستحيي نساءهم. في هذه الظروف القاسية وُلد موسى عليه السلام، فأوحى الله إلى أمه -وحي إلهام لا وحي نبوة- بأمر عجيب يطمئن قلب الأم الخائفة: "أن أرضعيه، فإذا خفتِ عليه فألقيه في اليمّ ولا تخافي ولا تحزني، إنا رادّوه إليك وجاعلوه من المرسلين". أطاعت الأم هذا الأمر رغم هوله على قلبها، فوضعت رضيعها في تابوت وألقته في نهر النيل، وأرسلت أخته تتبع مسيره من بعيد لتعرف مصيره.

سار التابوت باليمّ حتى وصل إلى قصر فرعون نفسه، فالتقطه آل فرعون، وأرادت زوجته آسية -وكانت مؤمنة تكتم إيمانها- أن يتبنياه فقالت لفرعون: "قرة عين لي ولك لا تقتلوه عسى أن ينفعنا أو نتخذه ولدًا". فأصبح موسى عليه السلام يُربّى في بيت أشد أعدائه دون أن يدري فرعون أنه يربي بيده من سيكون سبب هلاكه، تحقيقًا لحكمة الله البالغة.

لكن الرضيع رفض ثدي كل مرضعة عرضوها عليه، فاقترحت أخته -وكانت تراقب من بعيد- أن تدلّهم على أهل بيت يكفلونه بالرضاعة، فقالت: "هل أدلّكم على أهل بيت يكفلونه لكم وهم له ناصحون؟" فأحضرت أمه دون أن يعرف أحد صلتها به، فقبِل الرضيع ثديها، فتحققت بذلك بشارة الله لأمه: "إنا رادّوه إليك"، فرجع إليها وهي تُكافأ على أمانتها وحسن رعايتها له، وقرّت عينها به آمنة مطمئنة.`,
       lessons:[
        "الثقة بوعد الله ولو بدا الأمر مخيفًا في ظاهره، كما ألقت أم موسى ابنها في اليمّ طاعة لإلهام ربها.",
        "تدبير الله يجري من حيث لا يحتسب العبد، فقد نشأ موسى في بيت عدوه ليكون سبب هلاكه فيما بعد.",
        "الإيمان قد يُخفى في أشد بيئات الكفر عداوة، كما كتمت آسية زوجة فرعون إيمانها في قصره.",
        "الأسباب الظاهرة لا تُبطل تدبير الله، فرفض الرضيع كل المرضعات كان سببًا لعودته إلى أمه كما وعد الله."
       ]},
      {title:"الجزء الثاني: النشأة في قصر فرعون والهروب إلى مدين",
       content:`نشأ موسى عليه السلام في قصر فرعون، وآتاه الله حكمًا وعلمًا وهو بعد شاب. وفي يوم دخل المدينة في وقت غفلة أهلها، فوجد رجلين يقتتلان: أحدهما من بني إسرائيل (قومه) والآخر من قوم فرعون، فاستغاثه الإسرائيلي على خصمه، فوكز موسى القبطي وكزة أودت بحياته دون أن يقصد قتله، فندم أشد الندم وقال: "ربّ إني ظلمت نفسي فاغفر لي"، فغفر الله له. لكن الخبر انتشر في المدينة، وسعى رجل يحذّره أن الملأ يتآمرون على قتله، فقال له: "إن الملأ يأتمرون بك ليقتلوك فاخرج إني لك من الناصحين".

خرج موسى عليه السلام خائفًا يترقّب، لا يعرف وجهته، داعيًا ربه: "ربّ نجّني من القوم الظالمين"، حتى توجّه تلقاء مدين. وهناك، وجد على ماء مدين جماعة من الناس يسقون مواشيهم، ووجد امرأتين تنتظران بعيدًا تكفّان أغنامهما عن الازدحام، فسألهما عن حالهما، فأخبرتاه أن أباهما شيخ كبير لا يستطيع السقي، فسقى لهما موسى مروءة وإحسانًا دون أن يطلب مقابلاً، ثم تولّى إلى الظل وقال داعيًا بحاجته دون أن يسأل أحدًا من الخلق: "ربّ إني لما أنزلت إليّ من خير فقير".

جاءت إحدى الفتاتين تدعوه إلى أبيها ليجزيه أجر سقيه لهما، فذهب معها، وقصّ على الشيخ (وهو نبي الله شعيب عليه السلام في قول كثير من المفسرين) قصته، فطمأنه: "لا تخف نجوت من القوم الظالمين". فعرضت إحدى ابنتيه أن يستأجره أبوها لما رأت فيه من القوة والأمانة، فزوّجه الشيخ إحدى ابنتيه على أن يعمل عنده ثماني سنين أو يُتمّها عشرًا تفضلاً منه، فمكث موسى عليه السلام في مدين سنين طويلة بعيدًا عن مصر وفرعون.`,
       lessons:[
        "الاستغفار الفوري عند الخطأ غير المقصود، كما فعل موسى بعد وكزته التي أودت بحياة رجل دون قصد.",
        "المروءة والإحسان بلا مقابل، كما سقى موسى للمرأتين دون أن ينتظر جزاءً، تفتح أبواب الرزق والستر.",
        "طلب الحاجة من الله وحده أولاً، كما دعا موسى: 'إني لما أنزلت إليّ من خير فقير'، قبل أن يسأل الناس.",
        "القوة والأمانة معًا معيار اختيار الرجل الصالح للعمل والمسؤولية، كما وصفت ابنة شعيب موسى عليه السلام."
       ]},
      {title:"الجزء الثالث: النداء عند الطور والرسالة إلى فرعون",
       content:`بعد أن قضى موسى عليه السلام الأجل في مدين، سار بأهله راجعًا نحو مصر، فلما كان عند جبل الطور، رأى من بعيد نارًا، فقال لأهله: "امكثوا إني آنست نارًا لعلي آتيكم منها بخبر أو جذوة من النار لعلكم تصطلون". فلما أتاها، نُودي من شجرة في البقعة المباركة: "يا موسى، إني أنا الله ربّ العالمين"، وأمره أن يخلع نعليه تعظيمًا للمكان المقدس، ثم أراه الله آيتين عظيمتين: عصاه تتحول إلى ثعبان يسعى فيأخذها فتعود عصا كما كانت، ويده يُدخلها في جيبه فتخرج بيضاء من غير سوء (مرض) آية أخرى.

أمره الله بالذهاب إلى فرعون الطاغية الذي طغى، فاستشعر موسى ثقل المهمة وضعف نفسه، فدعا ربه بصدق العبد المفتقر: "ربّ اشرح لي صدري، ويسّر لي أمري، واحلل عقدة من لساني يفقهوا قولي، واجعل لي وزيرًا من أهلي، هارون أخي، اشدد به أزري وأشركه في أمري". فاستجاب الله دعاءه وأشركه مع أخيه هارون في الرسالة، وأوصاهما أن يخاطبا فرعون بلين رغم طغيانه: "فقولا له قولاً لينًا لعله يتذكر أو يخشى"، ففي هذا درس أن اللين مقدّم على الشدة في الدعوة ولو مع أعتى الطغاة.

ذهب موسى وهارون عليهما السلام إلى فرعون، وعرضا عليه الرسالة بوضوح: أن يرسل معهما بني إسرائيل ويكف عن أذاهم، فتكبّر فرعون وقال ساخرًا: "ألم نربّك فينا وليدًا ولبثت فينا من عمرك سنين، وفعلت فعلتك التي فعلت وأنت من الكافرين؟" مذكّرًا إياه بالوكزة القديمة وبنشأته في قصره، فردّ موسى بحكمة: "فعلتها إذًا وأنا من الضالين"، أي فعلتها قبل أن يوحى إليّ وأنا لا أعلم عاقبتها. ثم أراه موسى الآيتين: العصا واليد، فادّعى فرعون أنه سحر، وبدأ التحدي.`,
       lessons:[
        "التواضع أمام عظمة الله يبدأ بأبسط الأفعال، كما أُمر موسى بخلع نعليه في البقعة المباركة.",
        "الشعور بالضعف أمام المهمة الكبرى لا يمنع من قبولها، بل يدفع لطلب العون من الله كما فعل موسى.",
        "الشراكة في حمل الرسالة تخفف الأعباء، كما طلب موسى إشراك أخيه هارون في الأمر.",
        "اللين في الدعوة مقدّم على الشدة حتى مع أعتى الطغاة، كما أُمر موسى وهارون أن يخاطبا فرعون قولاً لينًا."
       ]},
      {title:"الجزء الرابع: التحدي مع السحرة",
       content:`جمع فرعون سحرة مصر المهرة ليواجه بهم موسى عليه السلام، ظنًا منه أن ما جاء به سحر يُقابَل بسحر مثله، ووعد السحرة بالجزاء والتقريب إن غلبوا موسى. اجتمع الناس في يوم مشهود، وألقى السحرة حبالهم وعصيّهم فإذا هي بسحرهم تتحرك كأنها حيات تسعى، حتى خُيّل لموسى في نفسه شيء من الخوف الفطري، فأوحى الله إليه: "لا تخف إنك أنت الأعلى، وألقِ ما في يمينك تلقّف ما صنعوا، إنما صنعوا كيد ساحر ولا يفلح الساحر حيث أتى".

ألقى موسى عصاه، فإذا هي ثعبان حقيقي لا خيال سحري، فابتلعت كل ما صنع السحرة من حبال وعصي في لحظات. أدرك السحرة على الفور أن هذا ليس سحرًا مثل سحرهم، بل معجزة إلهية حقيقية لا تُضاهى؛ فهم أهل الصنعة وأعرف الناس بحدودها، فخرّوا ساجدين معلنين إيمانهم أمام الملأ جميعًا: "آمنّا برب هارون وموسى"، في مشهد من أعجب مشاهد التحول الإيماني السريع في القرآن.

غضب فرعون غضبًا شديدًا من هذا التحول المفاجئ، وهدّد السحرة بقطع أيديهم وأرجلهم من خلاف وصلبهم على جذوع النخل، فلم يتزعزع إيمانهم الوليد رغم هول التهديد، وقالوا بثبات من ذاق حلاوة الإيمان توًّا: "لن نؤثرك على ما جاءنا من البينات والذي فطرنا، فاقضِ ما أنت قاضٍ، إنما تقضي هذه الحياة الدنيا... إنا آمنّا بربنا ليغفر لنا خطايانا وما أكرهتنا عليه من السحر، والله خير وأبقى"، فآثروا رضا الله على حياتهم الدنيا كلها.`,
       lessons:[
        "الخوف الفطري لحظة المواجهة لا ينافي اليقين، وقد طمأن الله موسى قائلاً: 'لا تخف إنك أنت الأعلى'.",
        "أهل الاختصاص أقدر الناس على تمييز المعجزة الحقيقية من الخداع، كما ميّز السحرة بين سحرهم ومعجزة موسى.",
        "الإيمان الصادق قد يتحول إليه القلب في لحظة واحدة، كما سجد السحرة فور رؤيتهم الحق.",
        "الثبات على الإيمان ولو كلّف أقسى الثمن دليل على صدقه، كما ثبت السحرة أمام تهديد فرعون بالقتل."
       ]},
      {title:"الجزء الخامس: الخروج وفلق البحر",
       content:`بعد أن أصرّ فرعون على كفره وطغيانه رغم الآيات الواضحة، أرسل الله على قومه سلسلة من العذاب المتتابع: الطوفان والجراد والقُمّل والضفادع والدم، آيات مفصّلات، وكلما نزل عذاب استغاثوا موسى ووعدوه بالإيمان إن كُشف عنهم، فإذا كُشف نكثوا. أخيرًا أمر الله موسى أن يخرج ببني إسرائيل ليلاً من مصر، فخرجوا في جنح الظلام تاركين ديارهم، فلما علم فرعون أرسل في المدائن حاشرين يجمع جيشه الجرار ليلحق بهم غاضبًا مستكبرًا.

أدرك فرعون وجنوده بني إسرائيل عند شاطئ البحر، فرأى القوم أنفسهم محاصرين: البحر أمامهم وفرعون خلفهم، فقال أصحاب موسى في تلك اللحظة الحرجة: "إنا لمُدركون"، فأجابهم موسى بيقين النبي الواثق برب لا يتخلى عن أوليائه: "كلا، إن معي ربي سيهدين". فأوحى الله إليه: "أن اضرب بعصاك البحر"، فضربه، فانفلق البحر اثني عشر طريقًا يابسة، وصار الماء بينها كالجبل العظيم، فعبر موسى وقومه جميعًا سالمين.

لما رأى فرعون البحر منفلقًا، ظن أنه طريق عادي فاندفع بجيشه خلفهم مستكبرًا، حتى إذا توسّطوا البحر، أطبق الله عليهم الماء فأغرقهم عن آخرهم، وفي لحظة غرقه الأخيرة، أدرك فرعون الحقيقة متأخرًا فقال: "آمنت أنه لا إله إلا الذي آمنت به بنو إسرائيل وأنا من المسلمين"، فلم يُقبل منه هذا الإيمان بعد فوات الأوان ومعاينة الموت، وقال الله له: "آلآن وقد عصيت قبل وكنت من المفسدين؟"، ونجّى الله بدنه ليكون عبرة لمن بعده: "فاليوم نُنجيك ببدنك لتكون لمن خلفك آية".`,
       lessons:[
        "اليقين بمعية الله يزيل أشد المخاوف، كما قال موسى لأصحابه: 'كلا، إن معي ربي سيهدين'.",
        "لا ينفع الإيمان عند معاينة العذاب أو الموت، كما لم يُقبل إيمان فرعون في اللحظة الأخيرة.",
        "الله يحفظ آيات عبرته للأجيال القادمة، كما حفظ بدن فرعون ليكون آية لمن يعتبر.",
        "الاستكبار قد يقود صاحبه إلى هلاكه بنفس الطريق الذي ظنه سبيل نجاته، كما اندفع فرعون خلف موسى في البحر."
       ]},
      {title:"الجزء السادس: التيه وفتنة العجل وكليم الله",
       content:`بعد النجاة، واصل موسى عليه السلام قومه المسير، فمرّوا بقوم يعبدون أصنامًا، فطلب بعض بني إسرائيل من موسى -بجهل بعد كل ما رأوا من آيات- أن يجعل لهم إلهًا كآلهتهم، فأنكر عليهم موسى هذا الطلب أشد الإنكار. ثم واعد الله موسى ثلاثين ليلة أتمّها بعشر فصارت أربعين، ليكلّمه الله ويُنزل عليه التوراة، وترك على قومه أخاه هارون خليفة فيهم موصيًا: "اخلفني في قومي وأصلح ولا تتّبع سبيل المفسدين". وفي غيابه، صنع السامري لبني إسرائيل عجلاً من الذهب له صوت كالخوار، وأغواهم فعبدوه من دون الله، رغم تحذير هارون لهم.

لما رجع موسى عليه السلام ورأى قومه يعبدون العجل، غضب غضبًا شديدًا وألقى الألواح التي فيها التوراة، وأمسك برأس أخيه هارون يجرّه إليه غضبًا لله، فاعتذر هارون موضحًا أنه حاول منعهم فخشي أن يتهمه موسى بالتفريق: "إني خشيت أن تقول فرّقت بين بني إسرائيل ولم ترقب قولي"، فلما تبيّن له عذر أخيه دعا الله لهما معًا بالرحمة والمغفرة. وواجه موسى السامري نفسه، فطرده وأمر بحرق العجل ونسفه في اليمّ، وتاب على من تاب من قومه.

وفي أعظم لحظات قربه من الله، كلّم الله موسى تكليمًا مباشرًا بلا واسطة عند جبل الطور، فاستحق بذلك لقب "كليم الله" الذي لم يُشاركه فيه نبي آخر بهذه الصورة، وسأل موسى ربه أن يراه فقال: "ربّ أرني أنظر إليك"، فقال الله: "لن تراني ولكن انظر إلى الجبل فإن استقر مكانه فسوف تراني"، فلما تجلّى ربه للجبل جعله دكًّا (مسواة بالأرض) وخرّ موسى صعقًا، فلما أفاق قال: "سبحانك تبت إليك وأنا أول المؤمنين"، مدركًا عظمة الله التي لا تحتملها مخلوقات هذه الدنيا.`,
       lessons:[
        "الرسوخ في الإيمان لا يحمي من الفتنة تلقائيًا، فقد عاد بعض بني إسرائيل لعبادة العجل رغم رؤيتهم آيات عظيمة.",
        "الاستماع لعذر الأخ والتثبت قبل الغضب، كما هدأ موسى بعد سماعه عذر هارون رغم غضبه الشديد.",
        "أعظم درجات القرب من الله تكليمه العبد مباشرة، وهي منزلة خصّ الله بها موسى عليه السلام دون غيره.",
        "إدراك ضعف الإنسان أمام عظمة الله من علامات كمال المعرفة، كما خرّ موسى صعقًا حين تجلّى الله للجبل."
       ]}
    ],
    hadith:"قال ﷺ: «إنه كليم الله» في وصفه لموسى عليه السلام (رواه البخاري ومسلم)، وقال تعالى: «وكلّم الله موسى تكليمًا» (النساء: ١٦٤)، فكانت هذه المنزلة الفريدة تتويجًا لصبره على فرعون وثباته في أعتى الابتلاءات، حتى صار أحد أولي العزم من الرسل."},
  {id:5, name:"سيدنا عيسى عليه السلام", desc:"وُلد بمعجزة من مريم العذراء، وأيّده الله بآيات باهرات، ودعا بني إسرائيل إلى توحيد الله.", icon:"star", c1:"var(--teal-500)", c2:"var(--teal-700)",
    summary:"اصطفى الله مريم ابنة عمران وجعلها آية للعالمين، فبشّرها بغلام زكي من غير أب بكلمة 'كن' فحملت بعيسى وولدته وحدها، فتكلم في المهد يدافع عنها، ثم بعثه الله نبيًا لبني إسرائيل مؤيدًا بمعجزات باهرة كإحياء الموتى وشفاء الأكمه والأبرص، فكذّبه أكثر قومه وتآمروا على قتله، فرفعه الله إليه ونجّاه ولم يُقتل ولم يُصلب كما زعموا، وسيعود قبل قيام الساعة كما أخبر النبي ﷺ.",
    parts:[
      {title:"الجزء الأول: بشارة مريم واصطفاؤها",
       content:`كانت مريم بنت عمران من ذرية أسرة صالحة معروفة بالعبادة والتقوى في بني إسرائيل، وقد نذرتها أمها لخدمة بيت المقدس قبل أن تلدها: "ربّ إني نذرت لك ما في بطني محررًا فتقبّل مني"، ولما وضعتها أنثى، دعت الله أن يعيذها وذريتها من الشيطان الرجيم. تكفّل بتربيتها زكريا عليه السلام نبي بني إسرائيل، وجعل لها محرابًا خاصًا تتعبد فيه، فكان كلما دخل عليها وجد عندها رزقًا لم يأتِ به أحد، فسألها: "يا مريم أنّى لك هذا؟" فقالت: "هو من عند الله، إن الله يرزق من يشاء بغير حساب"، فكانت هذه الكرامة أول آية ظاهرة في حياتها.

اصطفى الله مريم عليها السلام اصطفاءً خاصًا: "يا مريم إن الله اصطفاكِ وطهّركِ واصطفاكِ على نساء العالمين"، وأرسل إليها الملك جبريل في صورة بشر سوي وهي في عزلتها، فارتاعت منه وقالت مستعيذة: "إني أعوذ بالرحمن منك إن كنت تقيًا"، فطمأنها: "إنما أنا رسول ربك لأهب لك غلامًا زكيًا". استغربت مريم عليها السلام هذه البشارة العجيبة لامرأة عذراء لم يمسسها بشر: "أنّى يكون لي غلام ولم يمسسني بشر ولم أكُ بغيًا؟" فجاءها الجواب الحاسم الذي يحسم كل تساؤل: "كذلك، قال ربك هو عليّ هيّن، ولنجعله آية للناس ورحمة منا، وكان أمرًا مقضيًا".

بهذه الكلمة العجيبة "كُن"، نفخ جبريل عليه السلام من روح الله في مريم بأمره سبحانه، فحملت بعيسى عليه السلام حملاً معجزًا خارقًا للعادة، لتكون بذلك أعظم آية إلهية على قدرة الله المطلقة، وليصبح عيسى عليه السلام آية لبني إسرائيل ولكل العالمين على أن الله على كل شيء قدير.`,
       lessons:[
        "العبادة الخالصة والعزلة عن اللهو قد تكون سببًا لاصطفاء إلهي عظيم، كما اصطُفيت مريم لعبادتها في المحراب.",
        "قدرة الله لا تحدّها أسباب الطبيعة المعتادة، فقد خلق عيسى من غير أب بكلمة 'كن' كما خلق آدم من غير أب ولا أم.",
        "الحياء والاستعاذة عند الشعور بالخطر، كما استعاذت مريم بالله حين رأت الملك في صورة بشر، أدب رفيع.",
        "الرزق قد يأتي من حيث لا يُحتسب لمن أخلص العبادة، كما كان يجد زكريا عند مريم رزقًا لا يعرف مصدره."
       ]},
      {title:"الجزء الثاني: الولادة المعجزة ونطق عيسى في المهد",
       content:`لما اشتد بها الحمل، انتبذت مريم عليها السلام من قومها مكانًا شرقيًا، بعيدًا عنهم حياءً وخشية من كلامهم، فأجاءها المخاض إلى جذع نخلة، وكانت في تلك اللحظة العصيبة وحيدة بلا معين، فتمنّت من شدة الألم والوحشة: "يا ليتني متّ قبل هذا وكنت نسيًا منسيًا"، فناداها منادٍ من تحتها (قيل جبريل، وقيل عيسى نفسه بعد ولادته) يخفف عنها: "ألّا تحزني قد جعل ربك تحتك سريًا (جدولاً من الماء)، وهزّي إليك بجذع النخلة تُساقط عليك رطبًا جنيًا، فكلي واشربي وقرّي عينًا".

خافت مريم عليها السلام من مواجهة قومها بمولود بلا أب، فأمرها الله أن تصمت وتشير إلى الطفل عند سؤالهم: "فإما تريِنّ من البشر أحدًا فقولي إني نذرت للرحمن صومًا فلن أُكلّم اليوم إنسيًا". حملت طفلها وأتت به قومها، فلما رأوها اتهموها بالفاحشة وقالوا: "يا مريم لقد جئتِ شيئًا فريًا، يا أخت هارون ما كان أبوكِ امرأ سوءٍ وما كانت أمّكِ بغيًا"، فأشارت إليه كما أُمرت، فتعجبوا واستنكروا: "كيف نكلّم من كان في المهد صبيًا؟".

في تلك اللحظة الحرجة، تحققت معجزة أخرى غير معجزة الميلاد نفسها: تكلّم عيسى عليه السلام وهو رضيع في المهد، مدافعًا عن أمه وبراءتها ومعلنًا نبوته منذ اللحظة الأولى: "إني عبد الله آتاني الكتاب وجعلني نبيًا، وجعلني مباركًا أينما كنت، وأوصاني بالصلاة والزكاة ما دمت حيًا، وبرًا بوالدتي ولم يجعلني جبارًا شقيًا، والسلام عليّ يوم وُلدت ويوم أموت ويوم أُبعث حيًا"، فانقلبت تهمة قومها إلى معجزة باهرة تشهد ببراءة مريم منذ اللحظة الأولى.`,
       lessons:[
        "الألم والضيق الشديد قد يعقبهما فرج قريب، كما جاء الفرج لمريم بالنخلة والماء بعد لحظة يأسها.",
        "الصمت أحيانًا أبلغ رد على الاتهام الباطل حين يتكفل الله بإظهار الحق بطريقته الخاصة.",
        "الطفولة لا تمنع من حمل رسالة عظيمة إن أراد الله ذلك، فقد نطق عيسى بالحكمة وهو في المهد.",
        "برّ الوالدين وصية إلهية لصقت بنبوة عيسى منذ أول كلمة نطق بها، دلالة على مكانتها العظيمة."
       ]},
      {title:"الجزء الثالث: النبوة والمعجزات الباهرة",
       content:`بعث الله عيسى عليه السلام نبيًا إلى بني إسرائيل، وأيّده بمعجزات باهرة تفوق ما أُعطي غيره من الأنبياء في زمانه، ليكون دليلاً قاطعًا على صدق رسالته أمام قوم عُرفوا بالجدل والتشكيك. فكان يخلق من الطين هيئة كهيئة الطير بإذن الله، فينفخ فيه فيصير طيرًا حقيقيًا يطير بإذن الله، وهي معجزة لم تكن لأحد من الأنبياء قبله. وكان يبرئ الأكمه (من وُلد أعمى) والأبرص بإذن الله، ويُحيي الموتى بإذن الله بعد أن يدعو ربه فيقوم الميت من قبره حيًا.

من أعجب آياته أيضًا أنه كان يخبر بني إسرائيل بالغيب: "وأُنبّئكم بما تأكلون وما تدّخرون في بيوتكم"، فكان يخبر الرجل بما أكل في بيته وما ادّخره لأولاده دون أن يراه، وهذا من أعظم الآيات التي حيّرت قومه. وكرر في كل معجزة قوله موضحًا أنها كلها بإذن الله لا من ذاته: "بإذن الله"، تأكيدًا لعبوديته لله ونفيًا لأي ادعاء بالألوهية قد يلحقه به بعض من غلا فيه لاحقًا.

كان بنو إسرائيل، رغم كل هذه الآيات الواضحة، منقسمين حول عيسى عليه السلام: فمنهم من آمن وصدّق، ومنهم من كذّب وقال إنه ساحر يستخدم سحرًا لتضليل الناس، فكانت هذه الآيات بلاءً يُميّز الصادق من المكذّب، لا وسيلة إجبار على الإيمان، فبقيت مشيئة الإيمان في القلوب حرة رغم وضوح البرهان.`,
       lessons:[
        "المعجزات وإن عظمت لا تجبر القلوب المعاندة على الإيمان، فقد كذّب كثير من بني إسرائيل رغم وضوح الآيات.",
        "تكرار عيسى قوله 'بإذن الله' مع كل معجزة درس في التواضع ونسبة الفضل كله لله لا للنفس.",
        "الآيات الباهرة وسيلة اختبار للقلوب لا وسيلة إكراه، وهذا سرّ حكمة الله في عدم إيمان الجميع رغم وضوح البراهين.",
        "علم الغيب الجزئي الذي أطلعه الله عليه إنما كان بإذن الله وتعليمه، لا من ذات عيسى عليه السلام."
       ]},
      {title:"الجزء الرابع: الحواريون والمائدة من السماء",
       content:`لما اشتد إعراض أكثر بني إسرائيل، أحسّ عيسى عليه السلام منهم الكفر والصدود، فنادى ينادي عن أنصار يحملون معه راية الدعوة: "من أنصاري إلى الله؟" فأجابه الحواريون -وهم مجموعة مختارة من أصفياء أتباعه- بإيمان صادق: "نحن أنصار الله، آمنا بالله واشهد بأننا مسلمون". آمن الحواريون بعيسى عليه السلام إيمانًا كاملاً وصدّقوا برسالته وحملوا معه أعباء الدعوة إلى بني إسرائيل، وكانوا نموذجًا للتلاميذ المخلصين الذين يثبتون مع نبيهم في وجه التكذيب.

في أحد المواقف، طلب الحواريون من عيسى عليه السلام معجزة تطمئن قلوبهم أكثر وتكون عيدًا يتذكرونه: "قالوا يا عيسى ابن مريم هل يستطيع ربك أن يُنزّل علينا مائدة من السماء؟ قال اتقوا الله إن كنتم مؤمنين"، فاستنكر عليهم عيسى عليه السلام سؤالهم بهذه الصيغة التي قد توحي بالشك، لكنهم أوضحوا مقصدهم الطيب: "قالوا نريد أن نأكل منها وتطمئن قلوبنا ونعلم أن قد صدقتنا ونكون عليها من الشاهدين"، فدعا عيسى ربه: "اللهم ربنا أنزل علينا مائدة من السماء تكون لنا عيدًا لأولنا وآخرنا وآية منك وارزقنا وأنت خير الرازقين".

استجاب الله دعاءه وأنزل المائدة، محذرًا في الوقت نفسه من كفران هذه النعمة العظيمة: "إني منزّلها عليكم فمن يكفر بعد منكم فإني أعذّبه عذابًا لا أُعذّبه أحدًا من العالمين"، فكانت هذه المائدة آية إضافية أُقيمت الحجة بها على بني إسرائيل، تمامًا كما أُقيمت الحجة بكل معجزة سبقتها.`,
       lessons:[
        "طلب الأنصار المخلصين ضروري لحمل أي دعوة، وقد وجد عيسى عليه السلام ذلك في الحواريين.",
        "طلب زيادة الطمأنينة القلبية لا يتناقض مع أصل الإيمان، كما وضّح الحواريون مقصدهم الطيب من طلب المائدة.",
        "كل نعمة عظيمة تُنزل استجابة للدعاء تحمل مسؤولية أكبر في الشكر، وقد حذّر الله من كفرانها بعقاب مشدد.",
        "الإيمان الصادق يستلزم الفعل والنصرة لا القول وحده، كما جسّد الحواريون بالتزامهم العملي مع عيسى."
       ]},
      {title:"الجزء الخامس: المؤامرة والرفع إلى السماء",
       content:`لما استمر عيسى عليه السلام في دعوته وازداد أتباعه، تآمر أعداؤه من بني إسرائيل للتخلص منه وقتله، وسعوا إلى السلطات الرومانية آنذاك لتنفيذ مؤامرتهم. لكن الله أبطل مكرهم بأعظم صورة، فرفعه إليه حيًا بجسده وروحه، ولم يُقتل ولم يُصلب كما زعم من زعم، بل شُبّه لهم الأمر فظنوا أنهم قتلوه وصلبوه بينما كان الحقيقة غير ذلك تمامًا: "وما قتلوه وما صلبوه ولكن شُبّه لهم، وإن الذين اختلفوا فيه لفي شكّ منه، ما لهم به من علم إلا اتّباع الظن، وما قتلوه يقينًا، بل رفعه الله إليه، وكان الله عزيزًا حكيمًا".

قبل رفعه، أخبر الله عيسى عليه السلام ببشارة عظيمة تحمل معنى الطهارة من كل ما نُسب إليه زورًا من ادعاءات لاحقة بالألوهية أو البنوة الإلهية: "إني متوفيك ورافعك إليّ ومطهرك من الذين كفروا"، فأعلن الله براءته من كل من غلا فيه أو ادّعى فيه ما لم يقله هو نفسه، وقد أخبر القرآن أن عيسى نفسه سيتبرأ يوم القيامة ممن عبده من دون الله: "أأنت قلت للناس اتخذوني وأمي إلهين من دون الله؟ قال سبحانك ما يكون لي أن أقول ما ليس لي بحق... ما قلت لهم إلا ما أمرتني به أن اعبدوا الله ربي وربكم".

أخبر النبي محمد ﷺ أن عيسى عليه السلام لم يمت بعد، وأنه سينزل قرب قيام الساعة حاكمًا بشريعة الإسلام، فيكسر الصليب ويقتل الخنزير (كناية عن إبطال ما نُسب إليه زورًا من عقائد باطلة)، ليختم بذلك رسالته الأولى بشهادة عملية على التوحيد الخالص الذي دعا إليه منذ اللحظة الأولى وهو في المهد.`,
       lessons:[
        "مكر الأعداء مهما بلغ لا يقف أمام تدبير الله، فقد نجّى الله عيسى من مؤامرة قتله بأعجب صورة.",
        "براءة الأنبياء مما نُسب إليهم زورًا من عقائد لم يقولوها ثابتة عند الله ولو طال بها الزمن والاختلاف.",
        "الادعاءات التي تُنسب لنبي بعد رفعه أو وفاته لا تُحاسَب بها ذمته، فالحساب على ما قاله هو حقًا لا على ما زعمه غيره.",
        "عودة عيسى عليه السلام المنتظرة، كما أخبر النبي ﷺ، تحمل رسالة استمرار الحق وانتصاره في نهاية المطاف."
       ]}
    ],
    hadith:"قال ﷺ: «وإني أولى الناس بابن مريم، والأنبياء إخوة لعلّات، أمهاتهم شتى ودينهم واحد» (متفق عليه)، وقال تعالى واصفًا مكانته: «إن مثل عيسى عند الله كمثل آدم، خلقه من تراب ثم قال له كن فيكون» (آل عمران: ٥٩)، فكان عبدًا لله ورسولاً، لا إلهًا ولا ابنًا لله كما زعم من غلا فيه، وستبقى كلمته الخالدة في المهد شاهدة على توحيده الخالص: «إني عبد الله آتاني الكتاب وجعلني نبيًا»."},
  {id:6, name:"سيدنا محمد ﷺ", desc:"خاتم الأنبياء والمرسلين، رحمة للعالمين، من مولده في مكة إلى الهجرة والفتح ونشر رسالة الإسلام.", icon:"mosque", c1:"var(--teal-800)", c2:"var(--tan-400)",
    summary:"وُلد محمد ﷺ يتيمًا في مكة، ونشأ صادقًا أمينًا حتى لُقّب بذلك قبل النبوة، فأكرمه الله بالوحي في غار حراء وهو ابن أربعين، فدعا سرًا ثم جهرًا فآذته قريش وعذّبت أصحابه، فهاجر إلى المدينة وأسّس فيها أول دولة للإسلام، وخاض غزوات بدر وأُحد والخندق، حتى فتح مكة عفوًا لا انتقامًا، وحجّ حجة الوداع مكمّلاً الدين، ثم لحق بالرفيق الأعلى بعد أن ترك للأمة نورًا لا تضلّ به. رحمة أُرسلت للعالمين.",
    parts:[
      {title:"الجزء الأول: المولد والنشأة والصادق الأمين",
       content:`وُلد محمد بن عبد الله ﷺ في مكة عام الفيل، وقد توفي أبوه عبد الله قبل مولده، فنشأ يتيم الأب. أرضعته حليمة السعدية في بادية بني سعد سنوات طفولته الأولى، حيث شهدت بيتها بركة عجيبة منذ قدومه إليها. ثم توفيت أمه آمنة بنت وهب وهو ابن ست سنين، فكفله جدّه عبد المطلب سيد قريش، الذي أحبّه حبًا شديدًا وقدّمه على أبنائه. لكن القدر لم يُمهله طويلاً، فتوفي عبد المطلب وللنبي ﷺ من العمر ثماني سنين، فانتقلت كفالته إلى عمه أبي طالب الذي رعاه ونصره طوال حياته وإن لم يدخل الإسلام.

نشأ محمد ﷺ في بيئة قريش وهي تعبد الأصنام، لكن الله عصمه من كل ما كان عليه قومه من الشرك ومساوئ الأخلاق؛ فلم يسجد لصنم قط، ولم يشرب خمرًا، ولم يشهد مجالس اللهو التي كانت تُقام في مكة. عمل في رعي الغنم صغيرًا، ثم خرج في تجارة إلى الشام مع عمه وهو صبي، فلقيه الراهب بحيرا وتفرّس فيه علامات النبوة التي وجدها في كتبه، فأوصى عمه أن يحفظه من كيد اليهود.

كبر محمد ﷺ بين قومه معروفًا بالصدق والأمانة حتى لُقّب بـ"الصادق الأمين" قبل أن يوحى إليه بسنوات؛ فكانت قريش، رغم عداوتها له بعد البعثة، تودع عنده أماناتها لثقتها التامة بحفظه لها. عمل في تجارة خديجة بنت خويلد فرأت من أمانته وبركته ما جعلها تعرض عليه الزواج فتزوجها وهو ابن خمس وعشرين سنة، وكانت أكبر منه سنًا، فكانت نِعم الزوجة والسند له طوال حياتها. ثم شهد وهو في الخامسة والثلاثين حادثة بناء الكعبة بعد سيل جارف هدم أجزاء منها، فلما اختلفت قبائل قريش فيمن يضع الحجر الأسود في مكانه، رضوا بتحكيمه فوضعه بحكمته في ثوب وأمر كل قبيلة أن تمسك بطرف منه، ثم رفعه بيده الشريفة ووضعه، فمنع بذلك حربًا كادت تشتعل.`,
       lessons:[
        "اليُتم لا يمنع التمكين؛ فقد أعدّ الله محمدًا ﷺ ليكون رحمة للعالمين وهو يتيم الأبوين.",
        "الصدق والأمانة أساس بناء الثقة قبل أي دعوة، وقد سبقت صفة الصادق الأمين دعوته بسنوات طويلة.",
        "الحكمة في حل الخلافات بإرضاء جميع الأطراف، كما فعل في قصة وضع الحجر الأسود، من صفات القيادة الرشيدة.",
        "عصمة الله لأنبيائه من مساوئ أقوامهم قبل النبوة تمهيد إلهي لرسالتهم."
       ]},
      {title:"الجزء الثاني: بدء الوحي في غار حراء",
       content:`لما قارب محمد ﷺ الأربعين من عمره، حبّب الله إليه الخلوة، فكان يتعبّد الليالي ذوات العدد في غار حراء، وهو غار صغير في جبل قرب مكة، يتفكر في خلق الله ويبتعد عن ضجيج قومه وشركهم. وفي ليلة من رمضان، جاءه المَلَك جبريل عليه السلام وقال له: "اقرأ"، فقال ﷺ: "ما أنا بقارئ"، فأخذه وضمّه حتى بلغ منه الجهد ثم أرسله وكرّر الأمر ثلاث مرات، حتى قال له: "اقرأ باسم ربك الذي خلق، خلق الإنسان من علق، اقرأ وربك الأكرم"، فكانت هذه أول آيات نزلت من القرآن الكريم.

رجع النبي ﷺ يرجف فؤاده من هول ما رأى، فدخل على خديجة رضي الله عنها وهو يقول: "زمّلوني زمّلوني" (غطّوني)، فزمّلته حتى ذهب عنه الروع، فأخبرها الخبر وقال: "لقد خشيت على نفسي"، فطمأنته بكلمات خالدة: "كلا والله لا يخزيك الله أبدًا، إنك لتصل الرحم، وتحمل الكَلّ، وتكسب المعدوم، وتقري الضيف، وتُعين على نوائب الحق". ثم ذهبت به إلى ابن عمها ورقة بن نوفل، وكان شيخًا نصرانيًا قد قرأ الكتب السابقة، فلما سمع القصة قال: "هذا الناموس الذي نزّل الله على موسى، يا ليتني فيها جذعًا، ليتني أكون حيًا إذ يخرجك قومك"، فسأله النبي ﷺ: "أومخرجيّ هم؟" فقال: "نعم، لم يأتِ رجل قط بمثل ما جئت به إلا عُودي".

بعد فترة انقطع فيها الوحي حتى حزن النبي ﷺ، تتابع نزول القرآن، فبدأت الدعوة سرًا، فآمنت به خديجة رضي الله عنها فكانت أول من أسلم من الناس، ثم علي بن أبي طالب من الصبيان، وأبو بكر الصديق من الرجال الأحرار، وزيد بن حارثة من الموالي. وكان أبو بكر رجلاً محببًا مؤلفًا لقومه، فدعا من يثق بهم فأسلم على يديه عدد من كبار الصحابة كعثمان بن عفان وطلحة والزبير وسعد بن أبي وقاص وعبد الرحمن بن عوف رضي الله عنهم، فكانت هذه النواة الأولى للإسلام.`,
       lessons:[
        "الخوف الفطري عند مواجهة أمر عظيم لا يتنافى مع الثبات، وقد وجل قلب النبي ﷺ ثم ثبّته الله.",
        "الزوجة الصالحة سكن وسند في أحرج اللحظات، كما كانت خديجة رضي الله عنها في أول الوحي.",
        "معرفة أهل الكتاب السابقين بعلامات النبوة، كما فطن ورقة بن نوفل، شهادة من خارج الدائرة تؤكد صدق الرسالة.",
        "الدعوة تبدأ بأقرب الناس ثقة، ثم تنتشر بالثقة المتبادلة كما فعل أبو بكر مع من يثق بهم."
       ]},
      {title:"الجزء الثالث: الدعوة الجهرية والاضطهاد وعام الحزن",
       content:`بعد ثلاث سنين من الدعوة السرية، أُمر النبي ﷺ بإعلان دعوته، فصعد جبل الصفا ونادى قبائل قريش، فلما اجتمعوا قال: "أرأيتكم لو أخبرتكم أن خيلاً بالوادي تريد أن تغير عليكم، أكنتم مصدقيّ؟" قالوا: "نعم، ما جربنا عليك إلا صدقًا"، فقال: "فإني نذير لكم بين يدي عذاب شديد". فقام عمه أبو لهب غاضبًا يقول: "تبًا لك سائر اليوم، أَلِهذا جمعتنا؟" فنزل قوله تعالى: "تبّت يدا أبي لهب وتبّ". منذ تلك اللحظة بدأت قريش عداوتها السافرة، فسخروا منه واتهموه بالسحر والجنون، وآذوا من استطاعوا أذاه من ضعفاء المسلمين كبلال بن رباح الذي كان يُعذَّب على الرمضاء وهو يقول: "أحد أحد"، وسمية بنت خباط أول شهيدة في الإسلام التي قُتلت على ثباتها.

اشتد الأذى فأمر النبي ﷺ من استطاع من أصحابه بالهجرة إلى الحبشة فرارًا بدينهم، فاستقبلهم النجاشي ملكها العادل، ولما جاءت وفود قريش تطلب ردّهم، قرأ عليه جعفر بن أبي طالب من سورة مريم فبكى النجاشي وقال: "إن هذا والذي جاء به موسى ليخرج من مشكاة واحدة"، ورفض تسليمهم. ثم حاصرت قريش بني هاشم وبني المطلب في شِعب أبي طالب ثلاث سنين، مقاطعين لهم اقتصاديًا واجتماعيًا حتى أكلوا ورق الشجر من شدة الجوع، ولم يُفكّ الحصار إلا بتدخل رجال من قريش أنفسهم أنكروا الصحيفة الظالمة.

توالت على النبي ﷺ أحزان في عام واحد سُمّي "عام الحزن": وفاة عمه أبي طالب الذي كان يحميه من أذى قريش، ثم وفاة زوجته خديجة رضي الله عنها سنده الأول. خرج بعدها إلى الطائف يطلب النصرة فكذّبوه وسخروا منه وأغروا به صبيانهم يرمونه بالحجارة حتى سالت قدماه دمًا، فقال داعيًا لا شامتًا: "اللهم اهدِ قومي فإنهم لا يعلمون". وفي تلك الفترة العصيبة أكرمه الله برحلة الإسراء والمعراج، فأُسري به من مكة إلى بيت المقدس ثم عُرج به إلى السماوات العليا، وفُرضت فيها الصلوات الخمس. وفي مواسم الحج التقى نفرًا من أهل يثرب (المدينة) فآمنوا به، وتكررت اللقاءات حتى كانت بيعتا العقبة الأولى والثانية، حيث بايعه الأنصار على نصرته وإيوائه، فكانت تمهيدًا للهجرة.`,
       lessons:[
        "الصبر على الأذى في سبيل الحق لا يعني السكوت عن الحق نفسه، كما جهر النبي ﷺ بدعوته رغم علمه بما سيلقاه.",
        "الهجرة فرارًا بالدين مشروعة عند اشتداد الأذى، ولو كانت إلى أرض غير المسلمين إن كانت عادلة كأرض النجاشي.",
        "الدعاء بالهداية للمؤذين بدل الدعاء عليهم، كما فعل النبي ﷺ في الطائف، من أعظم مقامات الرحمة.",
        "الفرج يأتي بعد الشدة؛ فبعد أحلك أيام عام الحزن أكرمه الله بالإسراء والمعراج وبداية النصرة في المدينة."
       ]},
      {title:"الجزء الرابع: الهجرة إلى المدينة وبناء المجتمع",
       content:`لما اطمأن النبي ﷺ لنصرة الأنصار، أذن لأصحابه بالهجرة إلى المدينة، فهاجروا أرسالاً، حتى تآمرت قريش على قتله في فراشه، فأمر عليًا رضي الله عنه أن ينام مكانه، وخرج هو وأبو بكر رضي الله عنه ليلاً، فاختبآ في غار ثور ثلاثة أيام بينما كان المشركون يبحثون عنهما، حتى وقف بعضهم على فم الغار، فقال أبو بكر خائفًا: "يا رسول الله، لو نظر أحدهم تحت قدميه لأبصرنا"، فقال النبي ﷺ بثقة المؤمن: "يا أبا بكر، ما ظنك باثنين الله ثالثهما؟" فصرف الله أبصارهم عنهما بنسج عنكبوت وعشّ حمامة على فم الغار.

وصل النبي ﷺ إلى المدينة فاستُقبل استقبالاً عظيمًا، وأول ما فعله أن بنى المسجد ليكون مركز الدولة الجديدة، وآخى بين المهاجرين والأنصار مؤاخاة حقيقية تقاسموا فيها حتى الأموال والديار، حتى قال بعض الأنصار لأحد إخوانه المهاجرين: "لي امرأتان فاختر إحداهما أطلّقها لك"، فكانت نموذجًا فريدًا في الإيثار لم يعرفه التاريخ. ثم كتب النبي ﷺ وثيقة المدينة التي نظّمت العلاقة بين المسلمين واليهود وسائر سكان المدينة، فكانت أول دستور مكتوب ينظّم مجتمعًا متعدد الأديان على أساس العدل والتعايش.

بهذا التأسيس، لم تعد المدينة مجرد ملجأ للمسلمين الفارّين بدينهم، بل صارت دولة ناشئة لها نظامها وقوانينها، تجمع بين المهاجرين الذين تركوا كل شيء في مكة والأنصار الذين فتحوا بيوتهم وقلوبهم لإخوانهم، في صورة من أروع صور الأخوّة الإيمانية.`,
       lessons:[
        "التضحية بالنفس فداءً للحق، كما نام علي رضي الله عنه في فراش النبي ﷺ، من أعلى درجات الإيمان.",
        "الثقة بنصر الله لا تتزعزع في أحلك اللحظات، كما قال النبي ﷺ لأبي بكر في الغار.",
        "بناء المجتمع يبدأ بالمسجد كمركز روحي، ثم بالأخوّة الحقيقية التي تتجاوز الأنساب إلى الإيمان.",
        "العدل مع غير المسلمين وتنظيم العلاقة معهم بوثيقة واضحة أساس لدولة مستقرة، كما في وثيقة المدينة."
       ]},
      {title:"الجزء الخامس: غزوات بدر وأُحد والخندق",
       content:`في السنة الثانية للهجرة خرج النبي ﷺ باتجاه قافلة لقريش، فعلمت قريش فجهّزت جيشًا لحمايتها، فالتقى الجمعان في بدر: ثلاثمئة وبضعة عشر من المسلمين قليلي العَتاد، في مواجهة ألف مقاتل من قريش بعدّتهم وعتادهم. دعا النبي ﷺ ربه في تلك الليلة دعاءً بليغًا: "اللهم إن تهلك هذه العصابة لا تُعبد في الأرض"، حتى سقط رداؤه من شدة تضرّعه فردّه أبو بكر عليه. وأكرم الله المسلمين بنصر عظيم رغم قلة عددهم، وقُتل من صناديد قريش من قُتل كأبي جهل، فكانت بدر أول معركة فاصلة عرفت بـ"يوم الفرقان".

في السنة الثالثة، جاءت قريش تطلب الثأر في معركة أُحد، وحقق المسلمون تقدّمًا في أول المعركة، لكن الرماة الذين أمرهم النبي ﷺ بالثبات على الجبل مهما حدث تركوا موقعهم طمعًا في الغنيمة، فاستغل خالد بن الوليد -وكان لا يزال مشركًا حينها- الثغرة والتفّ بفرسانه، فانقلبت المعركة وأصيب النبي ﷺ في وجهه وكُسرت رباعيته، واستشهد سبعون من الصحابة منهم حمزة عمّ النبي ﷺ. كانت هذه الهزيمة درسًا بليغًا في خطورة مخالفة الأوامر مهما بدت النتيجة مؤقتًا مغرية.

وفي السنة الخامسة، تحالفت قبائل من العرب واليهود في "الأحزاب" وحاصروا المدينة، فاقترح سلمان الفارسي رضي الله عنه -وكان قد رأى هذا الأسلوب في بلاد فارس- حفر خندق حول المدينة، وهو أسلوب لم تعرفه العرب من قبل، فتعجب المشركون منه ولم يستطيعوا اقتحامه. طال الحصار واشتد البرد والجوع، حتى أرسل الله ريحًا شديدة قلعت خيام الأحزاب وأطفأت نيرانهم، فتفرقوا منهزمين دون قتال يُذكر، مصداقًا لقوله تعالى: "وكفى الله المؤمنين القتال".`,
       lessons:[
        "الأخذ بالأسباب مع صدق التوكل على الله يجتمعان، كما في دعاء النبي ﷺ الملحّ يوم بدر رغم إعداد الجيش.",
        "طاعة القائد فيما يأمر به، ولو بدت المخالفة مكسبًا عاجلاً، شرط أساسي للنصر كما بيّنت غزوة أُحد.",
        "الأخذ بالخبرات الجديدة ولو من غير العرب، كما في اقتراح سلمان الفارسي بحفر الخندق، من الحكمة لا الضعف.",
        "بعد بذل الأسباب كاملة، فالنصر الأخير بيد الله وحده، كما أرسل الريح لهزيمة الأحزاب دون قتال."
       ]},
      {title:"الجزء السادس: صلح الحديبية وفتح مكة",
       content:`في السنة السادسة، خرج النبي ﷺ بأصحابه معتمرين لا محاربين، فصدّتهم قريش عند الحديبية، فتفاوض معهم على صلح بدت شروطه في ظاهرها مجحفة بحق المسلمين: رجوعهم ذلك العام دون عمرة، وردّ من يأتي مسلمًا من قريش إليهم دون العكس، ومدة عشر سنين بلا حرب. تألم بعض الصحابة من هذه الشروط حتى قال عمر رضي الله عنه معترضًا: "ألسنا على الحق وهم على الباطل؟"، فأجابه النبي ﷺ بثقة الواثق بربه: "إني رسول الله ولن يُضيّعني". ونزل قول الله تعالى واصفًا هذا الصلح بأنه: "فتحًا مبينًا"، فقد أعطى المسلمين هدنة استثمروها في نشر الدعوة، حتى دخل في الإسلام خلال السنتين التاليتين أضعاف من دخل فيه في السنوات العشرين السابقة كلها.

نقضت قريش الصلح بعد ذلك بمساعدة حلفائها على حلفاء النبي ﷺ، فخرج إليهم بجيش عظيم من عشرة آلاف مقاتل، ودخل مكة فاتحًا دون قتال يُذكر، فبعد سنوات من الطرد والتعذيب والحصار، دخلها منتصرًا لا منتقمًا. وقف عند الكعبة وسأل قريشًا: "ما تظنون أني فاعل بكم؟" فقالوا: "أخ كريم وابن أخ كريم"، فقال كلمته الخالدة التي رددت صدى قول يوسف عليه السلام لإخوته: "اذهبوا فأنتم الطلقاء"، فعفا عن الجميع رغم كل ما فعلوه به وبأصحابه.

طاف النبي ﷺ بالكعبة وحطّم الأصنام التي كانت حولها، وهو يتلو: "وقل جاء الحق وزهق الباطل، إن الباطل كان زهوقًا"، فطهّر بيت الله من الشرك بعد أن كان مركزه، ودخل الناس في دين الله أفواجًا بعد الفتح.`,
       lessons:[
        "قد يكون في ظاهر الأمر ما يبدو خسارة، وهو في حقيقته فتح وخير عظيم، كما كان صلح الحديبية.",
        "الحكمة السياسية والصبر على الشروط الصعبة أحيانًا خير من التعجّل بالمواجهة.",
        "العفو عند المقدرة أعظم انتصار، كما عفا النبي ﷺ عن أشد أعدائه يوم الفتح دون انتقام.",
        "تطهير القلب من الشرك أعظم من تطهير المكان، وقد بدأ النبي ﷺ بتحطيم الأصنام ليؤسس للتوحيد."
       ]},
      {title:"الجزء السابع: حجة الوداع والرحيل إلى الرفيق الأعلى",
       content:`في السنة العاشرة للهجرة، حجّ النبي ﷺ حجته الوحيدة مع أكثر من مئة ألف من المسلمين، وخطب فيهم خطبته الجامعة على جبل عرفة، أوصى فيها بحرمة الدماء والأموال، وحقوق النساء، ونبذ العصبية الجاهلية بقوله: "لا فضل لعربي على عجمي إلا بالتقوى"، وختمها بقوله: "ألا هل بلّغت؟" فقالوا: "نعم"، فقال: "اللهم اشهد". وفي ذلك الموقف نزل قوله تعالى: "اليوم أكملت لكم دينكم وأتممت عليكم نعمتي ورضيت لكم الإسلام دينًا"، إيذانًا بقرب اكتمال الرسالة.

عاد النبي ﷺ إلى المدينة، فمرض بعد أشهر قليلة مرضه الذي توفي فيه، وكان في مرضه يتفقد أصحابه ويؤمّهم في الصلاة ما استطاع، حتى ضعف فأمر أبا بكر أن يصلي بالناس، في إشارة لطيفة لخلافته من بعده. اشتد به المرض حتى قال في آخر لحظاته: "اللهم الرفيق الأعلى"، وتوفي ﷺ في حجر عائشة رضي الله عنها. فلما بلغ الخبر الصحابة ذُهلوا، حتى قام عمر رضي الله عنه يقول من شدة الصدمة إن النبي لم يمت، فقام أبو بكر خطيبًا بكلمات ثبّتت الأمة: "من كان يعبد محمدًا فإن محمدًا قد مات، ومن كان يعبد الله فإن الله حيّ لا يموت"، وتلا قوله تعالى: "وما محمد إلا رسول قد خلت من قبله الرسل، أفإن مات أو قُتل انقلبتم على أعقابكم".

دُفن النبي ﷺ في بيته حيث توفي، تاركًا للأمة كتاب الله وسنته، وقد أدّى الأمانة وبلّغ الرسالة ونصح الأمة، فختم الله به الرسالات، وبقيت سيرته ﷺ نبراسًا لكل من أراد الاقتداء بخير الخلق، مصداقًا لقوله تعالى: "لقد كان لكم في رسول الله أسوة حسنة".`,
       lessons:[
        "اكتمال الدين لا يعني نهاية العمل به، بل بداية المسؤولية في حمله ونقله للأجيال.",
        "القائد الحق يظل متواضعًا متفقدًا لأصحابه حتى آخر لحظة من حياته.",
        "الثبات عند الصدمات الكبرى يحتاج إلى من يذكّر الناس بالحقيقة الثابتة، كما فعل أبو بكر رضي الله عنه.",
        "بقاء الأثر بعد الرحيل الجسدي هو الخلود الحقيقي، وقد بقيت سنة النبي ﷺ حيّة تهدي الناس بعد وفاته."
       ]}
    ],
    hadith:"قال ﷺ: «إنما بُعثت لأتمّم مكارم الأخلاق» (رواه أحمد)، وقال تعالى: «وما أرسلناك إلا رحمة للعالمين» (الأنبياء: ١٠٧)، فجمعت رسالته ﷺ بين كمال الخُلق وسعة الرحمة، وهي الصفتان اللتان لخّصتا سيرته من مولده إلى وفاته."},
  {id:7, name:"سيدنا يونس عليه السلام", desc:"صاحب الحوت — غضب فخرج مغاضبًا لقومه، فابتلعه الحوت، ونجّاه الله بتسبيحه في الظلمات.", icon:"water", c1:"var(--teal-700)", c2:"var(--teal-500)",
    summary:"أُرسل يونس عليه السلام إلى أهل نينوى فدعاهم فلم يؤمنوا، فضاق بهم وخرج مغاضبًا دون أن ينتظر إذن ربه، فركب سفينة اضطربت بأهلها فأُلقي في اليمّ بالقُرعة فالتقمه الحوت، فنادى في ظلمات ثلاث بكلمة التوحيد فاستجاب الله له ونبذه بالعراء سقيمًا فأنبت عليه شجرة يقطين، ثم أرسله إلى قومه من جديد فآمنوا جميعًا، فكانت قريته القرية الوحيدة التي آمنت كلها فكشف الله عنها العذاب بعد أن كاد ينزل.",
    parts:[
      {title:"الجزء الأول: الدعوة والغضب والخروج بغير إذن",
       content:`أرسل الله يونس عليه السلام إلى أهل نينوى، وهي قرية عظيمة كان أهلها يزيدون على مئة ألف نسمة، فدعاهم إلى توحيد الله وترك عبادة الأصنام كما دعا الأنبياء من قبله أقوامهم، فأصرّ قومه على الكفر والعناد ولم يستجيبوا له رغم طول دعوته وتكرار إنذاره. أوعدهم يونس عليه السلام بنزول العذاب في أجل معين إن استمروا على كفرهم، فلما اقترب الأجل ولم ير منهم إيمانًا، ضاق صدره بهم غضبًا لله وحزنًا على إصرارهم على الكفر.

في تلك اللحظة، خرج يونس عليه السلام من بين قومه مغاضبًا لهم، دون أن ينتظر أمرًا من الله بمغادرتهم أو إذنًا صريحًا بترك مهمته، ظانًا أن الله لن يُضيّق عليه في ذلك: "وذا النون إذ ذهب مغاضبًا فظنّ أن لن نقدر عليه"، أي ظن أن الأمر متروك لتقديره هو، وهذا الظن -وإن كان يونس نبيًا مكرّمًا- كان فيه نوع من التسرع في ترك المهمة قبل أوانها المقدّر من الله، فكان هذا موضع الابتلاء الذي سيتعرض له بعدها.

ركب يونس عليه السلام سفينة هاربًا من قومه متجهًا إلى مكان آخر، وهو لا يعلم أن هذا القرار المتسرع سيقوده إلى واحدة من أعجب المحن التي مرّ بها نبي في تاريخ الرسالات، والتي ستكون درسًا خالدًا في الصبر على تبليغ الرسالة حتى النهاية مهما بلغ اليأس من استجابة القوم.`,
       lessons:[
        "ضيق الصدر من عناد المدعوّين شعور بشري حتى عند الأنبياء، لكن التصرف بمقتضاه دون إذن الله له عواقبه.",
        "ترك المهمة قبل اكتمال أجلها المقدّر، ولو بدافع الغيرة على الدين، قد يُحاسَب عليه صاحبه.",
        "حتى الأنبياء قد يظنون ظنًا يخالف الأولى فيُبتلون ليتعلموا ويعلّموا الأمم بعدهم درسًا في الصبر.",
        "قصة يونس تذكير أن القرار المتسرع في لحظة الغضب قد يقود إلى عواقب لم تكن في الحسبان."
       ]},
      {title:"الجزء الثاني: الالتقام في بطن الحوت والظلمات الثلاث",
       content:`وهو في عرض البحر، اضطربت السفينة اضطرابًا شديدًا كادت تغرق بمن فيها، فاجتهد أهلها في تخفيف حملها، حتى قرروا -بحسب عادتهم البحرية آنذاك- أن يقترعوا فيمن يُلقونه في الماء تخفيفًا عن السفينة، فوقعت القرعة على يونس عليه السلام، فأُلقي في اليمّ. وفي تلك اللحظة، أرسل الله حوتًا عظيمًا فالتقمه بأمر من الله، لا ليأكله بل ليكون بطنه سجنًا مؤقتًا يعتصمه من الغرق، مصداقًا لقول النبي ﷺ حين وصف الحوت بأنه "أُمر أن لا يخدش له لحمًا ولا يكسر له عظمًا".

وجد يونس عليه السلام نفسه في ظلمات ثلاث متتابعة: ظلمة بطن الحوت، وظلمة أعماق البحر، وظلمة الليل المخيّم، فأدرك في تلك اللحظة الرهيبة خطأه في ترك قومه دون إذن، فتوجّه إلى الله بكلمة التوحيد الخالصة معترفًا بذنبه: "فنادى في الظلمات أن لا إله إلا أنت سبحانك إني كنت من الظالمين"، فكانت هذه الكلمة أعظم درس في الرجوع إلى الله عند الشدة، والاعتراف بالتقصير دون تبرير أو مكابرة.

لم يكن دعاء يونس عليه السلام مجرد كلمات عابرة، بل كان تسبيحًا وتوحيدًا خالصًا صادرًا من قلب منكسر بين يدي الله، وقد بيّن القرآن أن هذا التسبيح الذي اعتاده يونس في رخائه هو ما أنقذه في شدّته: "فلولا أنه كان من المسبّحين، للبث في بطنه إلى يوم يُبعثون"، فلولا رصيده من التسبيح والعبادة في أيامه الأولى، لبقي في بطن الحوت إلى يوم القيامة.`,
       lessons:[
        "الرجوع إلى الله بالتوحيد والاعتراف بالتقصير، كما فعل يونس في الظلمات، أعظم مخرج من كل ضيق.",
        "رصيد العبد من العبادة في الرخاء هو ما ينفعه في الشدة، فقد أنجى التسبيح المعتاد يونس من بطن الحوت.",
        "الاعتراف بالخطأ دون تبرير النفس، كما قال يونس: 'إني كنت من الظالمين'، بداية كل توبة صادقة.",
        "أشد الظلمات اجتماعًا قد تنكشف بكلمة صدق واحدة يقولها القلب المنكسر بين يدي ربه."
       ]},
      {title:"الجزء الثالث: النجاة وشجرة اليقطين",
       content:`استجاب الله دعاء يونس عليه السلام في تلك الظلمات، فأمر الحوت أن ينبذه على الشاطئ، فقال تعالى: "فاستجبنا له ونجّيناه من الغمّ، وكذلك نُنجي المؤمنين"، فخرج من بطن الحوت حيًا بعد أن كان في ظلمة تفوق كل تصور، ليكون هذا مثالاً خالدًا لكل من دعا الله في كربته بصدق. لكن خروجه لم يكن على عافية تامة، بل نبذه الحوت على الأرض العراء وهو سقيم مريض ضعيف البدن من هول ما مرّ به، فقال تعالى: "فنبذناه بالعراء وهو سقيم".

من رحمة الله بعبده الضعيف في تلك اللحظة، أنبت الله عليه شجرة من يقطين (نوع من القرع) لتظلّله وتقيه حرّ الشمس، وكانت هذه الشجرة رحمة عملية ملموسة تُظهر عناية الله بعبده حتى بعد أن نجّاه، فلم يتركه وحيدًا في العراء دون رعاية. تعافى يونس عليه السلام تدريجيًا تحت ظل تلك الشجرة، مستعيدًا قوته بعد التجربة القاسية التي مرّ بها.

كانت هذه المحنة بكاملها، من الإلقاء في البحر إلى الالتقام إلى النجاة، درسًا مكثفًا في رحمة الله التي تحيط بعبده حتى في أحلك اللحظات، وفي أن التقصير -ولو من نبي- لا يُغلق باب التوبة والعودة إلى الله، بل إن الصدق في الدعاء واللجوء يفتح أبواب الفرج مهما بدا الموقف مستحيلاً.`,
       lessons:[
        "الاستجابة لدعاء المكروب سنة إلهية ثابتة، وقد جعل الله نجاة يونس مثالاً يُقتدى به: 'وكذلك نُنجي المؤمنين'.",
        "النجاة من الشدة لا تعني دائمًا العودة الفورية للعافية الكاملة، فقد نجا يونس لكنه خرج سقيمًا يحتاج رعاية.",
        "رحمة الله تلاحق عبده حتى بعد الفرج الأول، كما أنبت له شجرة اليقطين لتُظلّه وتُعينه على التعافي.",
        "لا يُغلق باب التوبة أمام من أخطأ ولو كان نبيًا، ما دام صادقًا في رجوعه إلى الله."
       ]},
      {title:"الجزء الرابع: العودة إلى قومه وإيمانهم جميعًا",
       content:`بعد أن تعافى يونس عليه السلام، أرسله الله من جديد إلى قومه الذين تركهم، فقال تعالى: "وأرسلناه إلى مئة ألف أو يزيدون"، فعاد إليهم يدعوهم كما كان، لكن الأمر هذه المرة اختلف اختلافًا عجيبًا: فبعد أن كان قد أوعدهم بنزول العذاب واقترب موعده حين غادرهم، رأى أهل نينوى بأعينهم علامات العذاب تلوح في الأفق كسحابة سوداء تقترب منهم، فأدركوا صدق ما أنذرهم به نبيهم.

في تلك اللحظة الحاسمة، وقبل أن يقع العذاب فعلاً، فعل أهل نينوى أمرًا فريدًا لم يفعله قوم آخرون في تاريخ الرسالات: خرجوا جميعًا -كبارهم وصغارهم، حتى بهائمهم- إلى الصحراء، ولبسوا خشن الثياب، وتضرّعوا إلى الله بصدق تام، ونادوا بالتوبة الجماعية معلنين إيمانهم بما جاءهم به يونس، فرفع الله عنهم العذاب الذي كان قد اقترب منهم إلى حدّ رؤيته بأعينهم، مصداقًا لقوله تعالى: "فلولا كانت قرية آمنت فنفعها إيمانها إلا قوم يونس، لما آمنوا كشفنا عنهم عذاب الخزي في الحياة الدنيا ومتّعناهم إلى حين".

بهذا، كانت قرية يونس عليه السلام الاستثناء الوحيد بين أمم الأنبياء الذين أُرسلوا: قوم رأوا علامات العذاب بأعينهم فآمنوا جميعًا قبل نزوله فرُفع عنهم، بينما هلكت أمم أخرى كثيرة رغم كل الإنذارات لأنها لم تؤمن إلا بعد فوات الأوان أو لم تؤمن أصلاً. فكانت قصتهم بشارة أن التوبة الصادقة الجماعية، ولو في آخر لحظة قبل نزول العذاب المرئي، يقبلها الله ويرفع بها البلاء.`,
       lessons:[
        "التوبة الجماعية الصادقة قبل نزول العذاب فعلاً يقبلها الله، كما نجا قوم يونس بعد أن رأوا علامات العذاب فآمنوا.",
        "إيمان القرية كلها ظاهرة فريدة في تاريخ الأمم، تدل أن الهداية الجماعية ممكنة إذا صدقت الإرادة والتضرع.",
        "الله يمهل عباده حتى آخر لحظة قبل نزول العقوبة، رحمة منه وفتحًا لباب التوبة إلى أقصى حدّ ممكن.",
        "قصة يونس بكاملها -من الخروج المتسرع إلى نجاة قومه- تجمع بين درس التوبة الفردية ودرس التوبة الجماعية معًا."
       ]}
    ],
    hadith:"قال ﷺ: «لا ينبغي لعبد أن يقول أنا خير من يونس بن متّى» (رواه البخاري)، تواضعًا وتنبيهًا على عظيم منزلته رغم ما مرّ به من ابتلاء، وقد سُمّيت سورة كاملة في القرآن باسم قومه 'يونس' تخليدًا لقصته، وقال تعالى في وصف دعائه الخالد: «فاستجبنا له ونجّيناه من الغمّ وكذلك نُنجي المؤمنين» (الأنبياء: ٨٨)، فبقيت كلماته في بطن الحوت دعاءً يردده كل مكروب إلى يوم القيامة."},
  {id:8, name:"سيدنا أيوب عليه السلام", desc:"ضرب المثل في الصبر على البلاء، فقد الصحة والمال والأهل، وصبر حتى كشف الله ضرّه.", icon:"star", c1:"var(--tan-400)", c2:"var(--tan-500)",
    summary:"أنعم الله على أيوب عليه السلام بمال وفير وأهل كثير وصحة تامة، فابتلاه ليمتحن صبره فسلبه ماله وأهله ثم أصابه بمرض شديد أقعده سنين طويلة، فصبر ولم يتسخّط ولم يفتر عن ذكر الله، حتى نادى ربه بأدب العبد لا بتذمّر الشاكي: 'مسّني الضرّ وأنت أرحم الراحمين'، فاستجاب الله له وأمره أن يضرب برجله فنبع الماء فشفي وعادت إليه الصحة والأهل والمال مضاعفًا، فصار مضرب المثل في الصبر إلى يوم القيامة.",
    parts:[
      {title:"الجزء الأول: النعمة الوافرة ثم الابتلاء بفقد المال والأهل",
       content:`كان أيوب عليه السلام نبيًا كريمًا آتاه الله نعمًا واسعة قلّ أن اجتمعت لأحد: مالاً وفيرًا من الأنعام والزروع، وأهلاً كثيرين من الأبناء والبنات، وصحة تامة وقوة بدن، مع صلاح في الدين وشكر دائم لله على نعمه. لم تكن هذه النعمة سببًا لغفلته عن ربه، بل كان من أكثر الناس عبادة وشكرًا وصدقة على المحتاجين، حتى ضرب المثل بحسن استخدام النعمة لا بمجرد امتلاكها.

اختار الله أن يبتلي أيوب عليه السلام ليرفع درجته ويجعل صبره آية خالدة يتأسى بها كل مبتلى إلى يوم القيامة، فبدأ الابتلاء بسلب النعم واحدة تلو الأخرى: فقد ماشيته وزروعه، ثم توالت عليه المصائب حتى فقد أبناءه جميعًا في حادثة واحدة مفجعة، فانهار حوله كل ما بناه من نعمة دنيوية في فترة قصيرة. ورغم هول هذه الخسارة المتتابعة، لم يتسخّط أيوب عليه السلام على قدر الله، ولم يتزعزع إيمانه، بل استقبل كل مصيبة بصبر جميل يعلم أن الأمر كله بيد الله.

لم يكن صبر أيوب عليه السلام عليه السلام صبرًا سلبيًا خاليًا من الشعور، بل كان يشعر بالألم كأي إنسان، لكنه لم يدع لألمه أن يقوده إلى الجزع أو الشكوى إلى الخلق، بل كان يردد في نفسه ما يعبّر عن رضاه بقضاء الله: أن النعمة كانت أمانة من الله أعارها له فترة ثم استردّها، فله الحمد على ما أعطى وله الحمد على ما أخذ.`,
       lessons:[
        "النعمة الكثيرة لا تنافي التقوى إذا اقترنت بالشكر واستخدامها في الخير، كما كان حال أيوب قبل الابتلاء.",
        "الابتلاء قد يصيب أصلح الناس وأكثرهم عبادة، فليس البلاء دليلاً على سخط الله على عبده.",
        "الصبر الحقيقي يشعر بالألم ولا يُنكره، لكنه لا يتحول إلى سخط أو جزع أمام قدر الله.",
        "النظر إلى النعم على أنها أمانة مستردة يهوّن فقدها ويحفظ للعبد إيمانه عند زوالها."

   per-hadith scholarly grading isn't available for the Arabic text editions.

function hadithAuthenticityNote(bookId){
  if(bookId==='bukhari'||bookId==='muslim') return 'صحيح — من أحاديث الصحيحين المتفق على صحتها.';
  if(bookId==='nawawi'||bookId==='riyadussalihin') return 'من الأحاديث الصحيحة أو الحسنة التي اختارها الإمام النووي من أمهات الكتب.';

}

   the redesigned hadith page (full sentence still shown underneath it). */

  if(bookId==='bukhari'||bookId==='muslim') return {label:'صحيح متفق عليه', cls:'grade-sahih'};
