/* ================================================================
   QURAN READER v2 — real Mushaf pagination (604 pages)
   Fetches one printed-Mushaf page at a time (api.alquran.cloud's
   /page/{n}/quran-uthmani endpoint), keyed and cached by page number,
   so what the user sees — and what downloadFullQuran() saves for offline
   use — always matches an actual paper Mushaf page, page for page. */
let quranPageCache = {}; // pageNum -> array of {surahId, numberInSurah, text}
function getQuranPage(pageNum){
  if(quranPageCache[pageNum]) return quranPageCache[pageNum];
  try{
    const raw = localStorage.getItem('sakina_qpage_'+pageNum);
    if(raw){ const parsed = JSON.parse(raw); quranPageCache[pageNum]=parsed; return parsed; }
  }catch(e){}
  return null;
}
async function fetchQuranPageIfNeeded(pageNum){
  if(getQuranPage(pageNum)) return true;
  if(typeof navigator!=='undefined' && navigator.onLine===false){
    const loading = document.getElementById('quranLoading');
    if(loading) loading.innerHTML = '📴 أنت غير متصل بالإنترنت الآن، ولم يتم تحميل هذه الصفحة مسبقًا.<br>اتصل بالإنترنت مرة واحدة لتحميلها، وستبقى محفوظة للقراءة بدون إنترنت بعد ذلك.<br><button class="btn-primary" style="margin-top:10px;" onclick="fetchQuranPageIfNeeded('+pageNum+')">إعادة المحاولة</button>';
    return false;
  }
  try{
    const res = await fetch(`https://api.alquran.cloud/v1/page/${pageNum}/quran-uthmani`);
    const json = await res.json();
    if(json && json.data && Array.isArray(json.data.ayahs)){
      const ayahs = json.data.ayahs.map(a=>{
        const surahId = a.surah.number, numberInSurah = a.numberInSurah;
        return {surahId, numberInSurah, text: a.text};
      });
      quranPageCache[pageNum] = ayahs;
      try{ localStorage.setItem('sakina_qpage_'+pageNum, JSON.stringify(ayahs)); }catch(e){ /* storage full, keep in-memory only */ }
      const cur = history_[history_.length-1];
      if(cur.page==='quranReader' && cur.data && Number(cur.data.page)===Number(pageNum)){
        const container = document.getElementById('ayatContainer');
        const loading = document.getElementById('quranLoading');
        if(container) container.innerHTML = formatQuranPage(ayahs);
        if(loading) loading.remove();
      }
      return true;
    } else { throw new Error('bad response'); }
  }catch(err){
    const loading = document.getElementById('quranLoading');
    if(loading) loading.innerHTML = '⚠️ تعذر تحميل نص الصفحة، تأكد من اتصالك بالإنترنت ثم أعد المحاولة.<br><button class="btn-primary" style="margin-top:10px;" onclick="fetchQuranPageIfNeeded('+pageNum+')">إعادة المحاولة</button>';
    return false;
  }
}
/* Builds the inner HTML of one Mushaf page. Whenever a Surah begins on
   this page (numberInSurah===1) it opens a titled divider, then — as its
   own centered line, never glued to Ayah 1 — the Bismillah (skipped only
   for Al-Fatihah, which already opens with it as its first Ayah, and
   for At-Tawbah, which classically has none). */
function stripLeadingBismillah(text){
  const norm = s=>s
    .replace(/\u0640/g,'')
    .replace(/\p{Mn}/gu,'')
    .replace(/[\u0622\u0623\u0625\u0671\u0672\u0673\u0675]/g,'ا');
  const words = text.trim().split(/\s+/);
  const target = ['بسم','الله','الرحمن','الرحيم'];
  if(words.length>=4 && words.slice(0,4).map(norm).join(' ')===target.join(' ')){
    return words.slice(4).join(' ');
  }
  return text;
}
function formatQuranPage(ayahs){
  let html = '';
  ayahs.forEach(a=>{
    let text = a.text;

      html += `<div class="qr-surah-open"><span class="name">${ICONS.rubHizb}سورة ${esc(s?s.name:'')}</span></div>`;
      if(a.surahId!==9){

        text = stripLeadingBismillah(text);
      }
    }
    if(!text.trim()) return; // ayah fully consumed by the bismillah header (e.g. Al-Fatiha's first ayah)
    const key = a.surahId+':'+(a.numberInSurah-1);
    const isSaved = savedAyahs.has(key);
    html += `${esc(text)} <span class="qr-ayah-num ${isSaved?'bookmarked':''}" data-key="${key}" onclick="toggleSaveAyah(${a.surahId}, ${a.numberInSurah-1})" title="اضغط لحفظ الآية">${a.numberInSurah}</span> `;
  });
  return html;
}

/* Swipe left/right to move between Mushaf pages (right-to-left reading
   order: a swipe toward the right = next page, toward the left = previous
   page — matches the direction pages turn in a real printed Mushaf). */
function quranSetupSwipeNav(page){
  const el = document.getElementById('qrPageWrap');
  if(!el) return;
  let sx=0, sy=0, tracking=false;
  el.addEventListener('touchstart', function(e){
    if(e.touches.length!==1) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; tracking = true;
  }, {passive:true});
  el.addEventListener('touchend', function(e){
    if(!tracking) return;
    tracking = false;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.3) return; // not a clear horizontal swipe
    if(dx > 0){ if(page < QURAN_TOTAL_PAGES) navigateTo('quranReader',{page:page+1}); }
    else{ if(page > 1) navigateTo('quranReader',{page:page-1}); }
  }, {passive:true});
}

/* Which real Mushaf pages a Surah's ayahs fall on (inclusive range), and
   whether every one of those pages is already cached for offline reading. */
function surahPageRange(id){
  const start = khatmaSurahStartPage(id);
  const end = id<114 ? khatmaSurahStartPage(id+1)-1 : QURAN_TOTAL_PAGES;
  return [start, Math.max(start,end)];
}
function surahIsFullyOffline(id){
  const [start,end] = surahPageRange(id);
  for(let p=start; p<=end; p++){ if(!getQuranPage(p)) return false; }
  return true;
}
function countDownloadedPages(){
  let n=0;
  for(let p=1; p<=QURAN_TOTAL_PAGES; p++){ if(getQuranPage(p)) n++; }
  return n;
}
async function downloadFullQuran(){
  const btn = document.getElementById('downloadQuranBtn');
  const status = document.getElementById('quranDownloadStatus');
  if(navigator.onLine===false){ showToast('يلزم الاتصال بالإنترنت لتحميل القرآن لأول مرة'); return; }
  if(btn) btn.disabled = true;
  const pagesNeeded = [];
  for(let p=1; p<=QURAN_TOTAL_PAGES; p++){ if(!getQuranPage(p)) pagesNeeded.push(p); }
  const CONCURRENCY = 8; // a few pages at once so 604 requests don't take forever
  let idx = 0;
  async function worker(){
    while(idx < pagesNeeded.length){
      const p = pagesNeeded[idx++];
      await fetchQuranPageIfNeeded(p);
      if(status) status.textContent = `جاري تحميل القرآن الكريم... (${countDownloadedPages()} من ${QURAN_TOTAL_PAGES} صفحة)`;
    }
  }
  await Promise.all(Array.from({length: Math.min(CONCURRENCY, pagesNeeded.length)}, worker));
  if(status) status.textContent = 'تم تحميل القرآن الكريم كاملاً ✅ — 604 صفحة مطابقة تمامًا للمصحف المطبوع، متاحة الآن للقراءة بدون إنترنت.';
  if(btn){ btn.disabled = false; btn.textContent = 'تم التحميل بالكامل'; }
}



/* ================================================================
   KHATMA (ختمة) — QURAN COMPLETION TRACKER
   Fully independent from the Quran reading pages: it reuses SURAHS,
   the reading engine (renderQuranReader / quranReadingEnter/Leave)
   and bookmarks, but keeps its own progress data — no Quran text or
   Surah data is duplicated here.
   ================================================================ */
const QURAN_TOTAL_PAGES = 604;
const QURAN_TOTAL_JUZ = 30;
/* Standard page each Surah begins on on the widely-used 604-page Madani
   Mushaf layout (may vary by ±1 page between print editions — used here
   only to drive the reading plan, never to render Quran text). */
const SURAH_START_PAGE = [
  1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,
  322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,
  477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,
  551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,
  586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,
  600,600,601,601,601,602,602,602,603,603,603,604,604,604
];
/* Starting page of each of the 30 Juz on the same standard layout. */
const JUZ_START_PAGE = [1,22,42,62,82,102,121,142,162,182,201,222,242,262,282,302,322,342,362,382,402,422,442,462,482,502,522,542,562,582];

function khatmaPageToSurah(page){
  page = Math.max(1, Math.min(QURAN_TOTAL_PAGES, page));
  let id = 1;
  for(let i=0;i<114;i++){ if(SURAH_START_PAGE[i] <= page) id = i+1; else break; }
  return id;
}
function khatmaPageToJuz(page){
  page = Math.max(1, Math.min(QURAN_TOTAL_PAGES, page));
  let j = 1;
  for(let i=0;i<30;i++){ if(JUZ_START_PAGE[i] <= page) j = i+1; else break; }
  return j;
}
function khatmaSurahStartPage(id){ return SURAH_START_PAGE[Math.max(1,Math.min(114,id))-1] || 1; }


/* ---- state / persistence ---- */
let khatmas = JSON.parse(localStorage.getItem('sakina_khatmas')||'[]');
let activeKhatmaId = localStorage.getItem('sakina_active_khatma') || null;
function saveKhatmas(){ localStorage.setItem('sakina_khatmas', JSON.stringify(khatmas)); }
function setActiveKhatma(id){ activeKhatmaId = id; localStorage.setItem('sakina_active_khatma', id||''); }
function getActiveKhatma(){ return khatmas.find(k=>k.id===activeKhatmaId && k.status==='active') || null; }
function getKhatmaHistory(){ return khatmas.filter(k=>k.status==='completed').sort((a,b)=>b.completedAt-a.completedAt); }
function findKhatma(id){ return khatmas.find(k=>k.id===id); }

const KHATMA_MODE_LABELS = {reading:'ختمة قراءة 📖', memorization:'ختمة حفظ 🧠', revision:'ختمة مراجعة 🔄'};
const KHATMA_PLAN_LABELS = {free:'ختمة حرة', '30':'30 يومًا', '15':'15 يومًا', '10':'10 أيام', '7':'7 أيام', ramadan:'ختمة رمضان', custom:'مدة مخصصة'};
function khatmaPlanLabel(k){ return k.planType==='custom' ? `${k.targetDays} يومًا (مخصصة)` : (KHATMA_PLAN_LABELS[k.planType]||''); }

/* ---- computed progress ---- */
function khatmaDaysElapsed(k){ return Math.max(1, Math.floor((Date.now()-new Date(k.startDate).getTime())/86400000)+1); }
function khatmaEffectiveTotalDays(k){
  if(k.planType==='ramadan') return 30;
  if(k.planType==='custom' || ['30','15','10','7'].includes(k.planType)) return k.targetDays;
  // free plan: no fixed deadline — project forward using the free daily pace
  const remaining = khatmaPagesRemaining(k);
  return khatmaDaysElapsed(k) + Math.max(1, Math.ceil(remaining/(k.freePace||4)));
}
function khatmaDaysRemaining(k){
  const total = khatmaEffectiveTotalDays(k);
  return Math.max(1, total - khatmaDaysElapsed(k) + 1);
}
function khatmaPagesRemaining(k){ return Math.max(0, QURAN_TOTAL_PAGES - k.pagesCompleted); }
function khatmaPercent(k){ return Math.min(100, Math.round((k.pagesCompleted/QURAN_TOTAL_PAGES)*100)); }
function khatmaJuzCompleted(k){
  let count=0;
  for(let i=0;i<30;i++){
    const nextStart = i<29 ? JUZ_START_PAGE[i+1] : QURAN_TOTAL_PAGES+1;
    if(k.pagesCompleted >= nextStart-1) count++;
  }
  return count;
}
function khatmaPagesPerDay(k){
  const remaining = khatmaPagesRemaining(k);
  if(remaining<=0) return 0;
  if(k.planType==='free') return Math.min(remaining, k.freePace||4);
  return Math.max(1, Math.min(remaining, Math.ceil(remaining/khatmaDaysRemaining(k))));
}
/* the day's goal is locked once computed, so it doesn't shift while the
   user is actively logging pages during the same day — but it is always
   recalculated automatically at the start of each new day, which is how
   skipped or extra days are silently redistributed with no manual math. */
function khatmaEnsureTodayGoal(k){
  const tk = todayKey();
  if(k.todayGoalDate !== tk){
    k.todayGoalDate = tk;
    k.todayGoalPages = khatmaPagesPerDay(k);
    saveKhatmas();
  }
  return k.todayGoalPages;
}
function khatmaEstimatedFinishDate(k){
  const remaining = khatmaPagesRemaining(k);
  if(remaining<=0) return k.completedAt ? new Date(k.completedAt) : new Date();
  const perDay = k.planType==='free' ? Math.max(1,k.freePace||4) : Math.max(1, Math.ceil(remaining/khatmaDaysRemaining(k)));
  const daysNeeded = Math.ceil(remaining/perDay);
  const d = new Date(); d.setDate(d.getDate()+daysNeeded);
  return d;
}
function khatmaStreak(k){
  if(!k) return 0;
  let streak=0; let d=new Date();
  if(!((k.dailyLog[todayKey(d)]||0)>0)) d.setDate(d.getDate()-1);
  for(;;){ if((k.dailyLog[todayKey(d)]||0)>0){ streak++; d.setDate(d.getDate()-1);} else break; }
  return streak;
}
function khatmaLongestStreak(k){
  if(!k) return 0;
  const dates = Object.keys(k.dailyLog||{}).filter(dt=>k.dailyLog[dt]>0).sort();
  if(!dates.length) return 0;
  let longest=1, cur=1;
  for(let i=1;i<dates.length;i++){
    const prev = new Date(dates[i-1]), now = new Date(dates[i]);
    const diffDays = Math.round((now-prev)/86400000);
    cur = diffDays===1 ? cur+1 : 1;
    if(cur>longest) longest=cur;
  }
  return longest;
}
function khatmaReadingDays(k){ return Object.keys(k.dailyLog||{}).filter(dt=>k.dailyLog[dt]>0).length; }
function khatmaAveragePagesPerDay(k){
  const days = khatmaReadingDays(k);
  return days? Math.round((k.pagesCompleted/days)*10)/10 : 0;
}
/* Accumulates real reading time on whichever Khatma is currently active,
   regardless of mode (reading/memorization/revision all count as time
   spent with the Quran open). Called from quranReadingLeave, i.e. every
   time a real reading session on the Quran Reader ends. */
function khatmaAddReadingSeconds(elapsed){
  const k = getActiveKhatma(); if(!k || elapsed<=0) return;
  k.readingSeconds = (k.readingSeconds||0) + elapsed;
  saveKhatmas();
}
function khatmaAvgReadingTimeFormatted(k){
  const days = khatmaReadingDays(k);
  const s = days ? Math.round(((k && k.readingSeconds)||0)/days) : 0;
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  return h>0 ? `${h} س ${m} د` : `${m} د`;
}
function khatmaSurahsCompletedCount(k){
  let count=0;
  for(let i=0;i<114;i++){
    const nextStart = i<113 ? SURAH_START_PAGE[i+1] : QURAN_TOTAL_PAGES+1;
    if(k.pagesCompleted >= nextStart-1) count++;
  }
  return count;
}
function khatmaTodayRangeLabel(k){
  const start = k.pagesCompleted+1;
  const goal = k.todayGoalPages||0;
  const end = Math.min(QURAN_TOTAL_PAGES, k.pagesCompleted+goal);
  if(start>QURAN_TOTAL_PAGES || goal<=0) return 'تم إنجاز كل صفحات الختمة 🎉';
  const sName = (SURAHS.find(s=>s.id===khatmaPageToSurah(start))||{}).name || '';
  return `من صفحة ${start} إلى ${end} — سورة ${esc(sName)}`;
}

/* ---- create / log / complete ---- */
let khatmaWizard = {step:1, mode:null, planType:null, customDays:30};
function khatmaWizardReset(){ khatmaWizard = {step:1, mode:null, planType:null, customDays:30}; }
function khatmaWizardChooseMode(mode){ khatmaWizard.mode = mode; khatmaWizard.step = 2; render(); }
function khatmaWizardBack(){ khatmaWizard.step = 1; render(); }
function khatmaWizardChoosePlan(planType){
  khatmaWizard.planType = planType;
  if(planType!=='custom'){ khatmaWizardCreate(); return; }
  render();
}
function khatmaWizardSetCustomDays(v){ khatmaWizard.customDays = Math.max(1, Math.min(365, parseInt(v)||30)); }
function khatmaWizardCreate(){
  const mode = khatmaWizard.mode, planType = khatmaWizard.planType;
  if(!mode || !planType) return;
  let targetDays = null;
  if(planType==='custom') targetDays = Math.max(1, parseInt(khatmaWizard.customDays)||30);
  else if(['30','15','10','7'].includes(planType)) targetDays = parseInt(planType,10);
  else if(planType==='ramadan') targetDays = 30;
  const k = {
    id:'kh_'+Date.now(), mode, planType, targetDays,
    startDate:new Date().toISOString(),
    pagesCompleted:0, dailyLog:{}, status:'active', completedAt:null,
    freePace:4, todayGoalDate:null, todayGoalPages:0, readingSeconds:0,
    memo:{surahs:{}, juz:{}, pages:{}, notes:{}},
    revision:{frequency:'daily', log:{}},
  };
  khatmas.push(k); saveKhatmas(); setActiveKhatma(k.id);
  khatmaWizardReset();
  addAppNotification({type:'khatma', title:'بدأت ختمة جديدة 🤍', msg:'وفّقك الله، تم إنشاء خطة ختمتك الجديدة بنجاح.', nav:{page:'khatma'}});
  resetToTab('home'); navigateTo('khatma');
  showToast('تم إنشاء الختمة بنجاح ✓');
}
function khatmaLogPages(pages, silent){
  const k = getActiveKhatma(); if(!k || pages<=0) return;
  khatmaEnsureTodayGoal(k);
  const before = k.pagesCompleted;
  k.pagesCompleted = Math.min(QURAN_TOTAL_PAGES, k.pagesCompleted + pages);
  const gained = k.pagesCompleted - before;
  if(gained<=0) return;
  const tk = todayKey();
  const loggedBefore = k.dailyLog[tk]||0;
  k.dailyLog[tk] = loggedBefore + gained;
  saveKhatmas();
  khatmaPropagateMyProgressToGroups();
  if(!silent){
    const wasGoalDone = loggedBefore >= k.todayGoalPages && k.todayGoalPages>0;
    if(!wasGoalDone && k.dailyLog[tk] >= k.todayGoalPages && k.todayGoalPages>0){
      showToast('✅ أتممت هدف اليوم من الختمة، بارك الله فيك!');
      addAppNotification({type:'khatma', title:'أتممت هدف اليوم', msg:'أحسنت! أنجزت هدف قراءتك لهذا اليوم في ختمتك.', nav:{page:'khatma'}});
    }
    const remaining = khatmaPagesRemaining(k);
    if(remaining>0 && remaining<=5){
      addAppNotification({type:'khatma', title:'اقتربت من ختم القرآن', msg:`تبقّى ${remaining} صفحات فقط لإتمام ختمتك 🤍`, nav:{page:'khatma'}});
    }
  }
  if(khatmaPagesRemaining(k)===0){ khatmaCompleteKhatma(k); }
  render();
}
/* Resolves exactly where the active Khatma last stopped, regardless of mode,
   as {surahId, page}. Reading mode advances pagesCompleted directly;
   memorization mode has no linear page counter, so it resumes at the last
   surah/juz/page the user interacted with (or the first not-yet-memorized
   surah if nothing was touched yet) — the surah is kept authoritative rather
   than derived from the page, since several short surahs near the end of the
   Mushaf share the same start page; revision mode has no per-page marks
   either, so it treats the cumulative pages reviewed the same way reading
   mode treats pagesCompleted. */
function khatmaContinueReadingTarget(k){
  if(k.mode==='memorization'){
    const touched = k.memo && k.memo.lastTouched;
    if(touched){
      if(touched.unit==='surah') return {surahId: touched.id, page: khatmaSurahStartPage(touched.id)};
      if(touched.unit==='juz'){
        const page = JUZ_START_PAGE[Math.max(1,Math.min(30,touched.id))-1] || 1;
        return {surahId: khatmaPageToSurah(page), page};
      }
      if(touched.unit==='page'){
        const page = Math.max(1, Math.min(QURAN_TOTAL_PAGES, touched.id));
        return {surahId: khatmaPageToSurah(page), page};
      }
    }
    const nextSurah = SURAHS.find(s=>khatmaMemoGet(k,'surah',s.id)!=='memorized');
    const surahId = nextSurah ? nextSurah.id : 1;
    return {surahId, page: khatmaSurahStartPage(surahId)};
  }
  if(k.mode==='revision'){
    const totalReviewed = Object.values(k.revision.log||{}).reduce((a,b)=>a+b,0);
    const page = Math.min(QURAN_TOTAL_PAGES, totalReviewed+1);
    return {surahId: khatmaPageToSurah(page), page};
  }
  const page = Math.min(QURAN_TOTAL_PAGES, k.pagesCompleted+1);
  return {surahId: khatmaPageToSurah(page), page};
}
function khatmaContinueReading(){
  const k = getActiveKhatma(); if(!k) return;
  const target = khatmaContinueReadingTarget(k);
  navigateTo('quranReader', {id: target.surahId, page: target.page, khatmaResumeHighlight: true});
}
function khatmaCompleteKhatma(k){
  k.status = 'completed';
  k.completedAt = Date.now();
  saveKhatmas();
  setActiveKhatma(null);
  addAppNotification({type:'khatma', title:'🎉 تم ختم القرآن الكريم', msg:'الحمد لله رب العالمين، أتممت ختمة القرآن الكريم بالكامل.', nav:{page:'khatmaCompletion', data:{id:k.id}}});
  navigateTo('khatmaCompletion', {id:k.id});
}
function openKhatmaAbandonSheet(){

    <div class="sheet-actions"><button class="btn-secondary" onclick="closeSheet()">تراجع</button><button class="btn-primary" style="background:#c0392b;" onclick="confirmKhatmaAbandon()">إلغاء الختمة</button></div>`);
}
function confirmKhatmaAbandon(){

  closeSheet(); render();

}

/* ---- auto bookmark: hooks into the existing Quran reading engine ---- */
function khatmaOnSurahLeave(surahId){
  const k = getActiveKhatma(); if(!k || k.mode!=='reading') return;
  const nextSurahNeeded = khatmaPageToSurah(k.pagesCompleted+1);
  if(surahId>=nextSurahNeeded){
    const endPage = surahId<114 ? khatmaSurahStartPage(surahId+1)-1 : QURAN_TOTAL_PAGES;
    if(endPage > k.pagesCompleted) khatmaLogPages(endPage - k.pagesCompleted, true);
  }
}

/* ---- day-by-day plan (خطة الختمة) — recalculated automatically ---- */
function khatmaGeneratePlanDays(k){
  const totalDays = khatmaEffectiveTotalDays(k);
  const perDay = Math.max(1, Math.ceil(QURAN_TOTAL_PAGES/totalDays));
  const days = [];
  let page = 1;
  const start = new Date(k.startDate);
  for(let d=1; d<=totalDays && page<=QURAN_TOTAL_PAGES; d++){
    const startPage = page;
    const endPage = Math.min(QURAN_TOTAL_PAGES, page+perDay-1);
    const date = new Date(start); date.setDate(date.getDate()+(d-1));
    let status = 'upcoming';
    if(k.pagesCompleted >= endPage) status = 'done';
    else if(k.pagesCompleted >= startPage-1) status = 'progress';
    days.push({day:d, date, startPage, endPage, startJuz:khatmaPageToJuz(startPage), endJuz:khatmaPageToJuz(endPage), status});
    page = endPage+1;
  }
  return days;
}

/* ---- calendar (per-date completion / missed) ---- */
function khatmaDayStatus(k, dateObj){
  const dk = todayKey(dateObj);
  const todayDk = todayKey();
  const startDk = todayKey(new Date(k.startDate));
  const logged = (k.dailyLog && k.dailyLog[dk]) || 0;
  if(logged>0) return 'completed';
  if(dk===todayDk) return 'today';
  if(dk<startDk) return 'none';
  if(dk<todayDk) return 'missed';
  return 'upcoming';
}

/* ---- notifications bridge ---- */
let _khatmaNotifSeed = 9000 + (function(){ try{ return JSON.parse(localStorage.getItem('sakina_dynamic_notifs')||'[]').length; }catch(e){ return 0; } })();
function addAppNotification(n){

    localStorage.setItem('sakina_dynamic_notifs', JSON.stringify(dyn.slice(0,40)));
  }catch(e){}
  if(typeof updateNotifBadge==='function') updateNotifBadge();
}
function khatmaMaybeNotifyDailyGoal(){
  const k = getActiveKhatma(); if(!k) return;
  khatmaEnsureTodayGoal(k);
  const tk = todayKey();
  if(k.lastDailyNotifDate === tk) return;
  k.lastDailyNotifDate = tk; saveKhatmas();
  if((k.dailyLog[tk]||0) < k.todayGoalPages){
    addAppNotification({type:'khatma', title:'خطة اليوم جاهزة', msg:`هدف اليوم في ختمتك: ${k.todayGoalPages} صفحة. أكملها الآن.`, nav:{page:'khatma'}});
  }
}

function khatmaOverallPercent(k){
  if(k.mode==='memorization'){
    const done = SURAHS.filter(s=>khatmaMemoGet(k,'surah',s.id)==='memorized').length;
    return Math.round((done/SURAHS.length)*100);
  }
  if(k.mode==='revision'){
    const totalReviewed = Object.values(k.revision.log).reduce((a,b)=>a+b,0);
    return Math.min(100, Math.round((totalReviewed/QURAN_TOTAL_PAGES)*100));
  }
  return khatmaPercent(k);
}

/* ---- HOME ---- */
function renderKhatma(){
  const k = getActiveKhatma();
  if(!k) return renderKhatmaEmptyHome();
  khatmaEnsureTodayGoal(k);
  const pct = khatmaOverallPercent(k);
  const remaining = khatmaPagesRemaining(k);
  const juzDone = khatmaJuzCompleted(k);
  const finish = khatmaEstimatedFinishDate(k);
  const streak = khatmaStreak(k);
  const tk = todayKey();
  const loggedToday = k.dailyLog[tk]||0;
  const goalToday = k.todayGoalPages||0;
  const goalPct = goalToday ? Math.min(100, Math.round((loggedToday/goalToday)*100)) : 100;
  return `
  <div class="khatma-wrap">
    <div class="khatma-hero-card">
      <div class="khatma-hero-top">
        <div>
          <div class="khatma-hero-label">${KHATMA_MODE_LABELS[k.mode]}</div>

/* ---- MEMORIZATION MODE ---- */
let khatmaMemoUnit = 'surah';
const KHATMA_MEMO_STORE = {surah:'surahs', juz:'juz', page:'pages'};
function khatmaMemoItemsList(unit){
  if(unit==='surah') return SURAHS.map(s=>({id:s.id, label:'سورة '+s.name}));
  if(unit==='juz') return Array.from({length:QURAN_TOTAL_JUZ},(_,i)=>({id:i+1, label:'الجزء '+(i+1)}));
  return Array.from({length:QURAN_TOTAL_PAGES},(_,i)=>({id:i+1, label:'صفحة '+(i+1)}));
}
function khatmaMemoGet(k, unit, id){ return (k.memo[KHATMA_MEMO_STORE[unit]] && k.memo[KHATMA_MEMO_STORE[unit]][id]) || 'not_started'; }
function khatmaMemoCycle(k, unit, id){
  if(!k) return;
  const store = k.memo[KHATMA_MEMO_STORE[unit]];
  const cur = store[id] || 'not_started';
  store[id] = cur==='not_started' ? 'memorized' : cur==='memorized' ? 'needs_revision' : 'not_started';
  k.memo.lastTouched = {unit, id, at:Date.now()};
  saveKhatmas(); render();
}
function renderKhatmaMemorizationSection(k){

  return `

      ${items.map(it=>{
        const st = khatmaMemoGet(k, khatmaMemoUnit, it.id);
        const label = st==='memorized'?'محفوظ ✓':st==='needs_revision'?'يحتاج مراجعة':'لم يبدأ';
        return `<div class="khatma-memo-item" onclick="khatmaMemoCycle(getActiveKhatma(),'${khatmaMemoUnit}',${it.id})">
          <span class="t">${esc(it.label)}</span>
          <span class="khatma-memo-status ${st}">${label}</span>
        </div>`;
      }).join('')}
    </div>
    <button class="btn-secondary" style="width:100%;margin-top:10px;" onclick="openKhatmaMemoNoteSheet('${khatmaMemoUnit}')">📝 إضافة ملاحظة شخصية</button>

}
function openKhatmaMemoNoteSheet(unit){

/* ---- REVISION MODE ---- */
function khatmaRevisionStreak(k){
  let streak=0; let d=new Date();
  if(!((k.revision.log[todayKey(d)]||0)>0)) d.setDate(d.getDate()-1);
  for(;;){ if((k.revision.log[todayKey(d)]||0)>0){ streak++; d.setDate(d.getDate()-1);} else break; }
  return streak;
}
function khatmaSetRevisionFreq(f){ const k=getActiveKhatma(); if(!k) return; k.revision.frequency=f; saveKhatmas(); render(); }
function khatmaRevisionAdjust(delta){
  const k=getActiveKhatma(); if(!k) return;
  const tk=todayKey();
  k.revision.log[tk] = Math.max(0, (k.revision.log[tk]||0)+delta);
  saveKhatmas(); render();
}
function renderKhatmaRevisionSection(k){

  const reviewedToday = rev.log[today]||0;

  const streak = khatmaRevisionStreak(k);
  const freqLabel = {daily:'يومية', weekly:'أسبوعية', monthly:'شهرية'};
  return `
  <div class="khatma-today-card">

    </div>
    <div class="stats-mini-grid" style="margin-bottom:10px;">
      <div class="stats-mini-card"><div class="v">${totalReviewed}</div><div class="l">صفحة مراجَعة</div></div>
      <div class="stats-mini-card"><div class="v">${khatmaPageToJuz(Math.max(1,totalReviewed))}</div><div class="l">جزء مراجَع تقريبًا</div></div>
      <div class="stats-mini-card"><div class="v">${pct}%</div><div class="l">نسبة الإنجاز</div></div>
    </div>
    <div class="khatma-today-row"><div class="lbl">مراجَع اليوم: <b>${reviewedToday}</b> صفحة — 🔥 ${streak} يوم مراجعة متتالٍ</div></div>
    <div class="khatma-today-actions">
      <button class="btn-secondary" onclick="khatmaRevisionAdjust(-1)">−1 صفحة</button>
      <button class="btn-secondary" onclick="khatmaRevisionAdjust(1)">+1 صفحة</button>
      <button class="btn-primary" onclick="khatmaRevisionAdjust(5)">+5 صفحات</button>

}

/* ---- CALENDAR ---- */
let khatmaCalMonth = new Date().getMonth();
let khatmaCalYear = new Date().getFullYear();
function khatmaCalShift(delta){
  khatmaCalMonth += delta;
  if(khatmaCalMonth<0){ khatmaCalMonth=11; khatmaCalYear--; }
  if(khatmaCalMonth>11){ khatmaCalMonth=0; khatmaCalYear++; }
  render();
}
function khatmaCalDayClick(y,m,d){
  const k = getActiveKhatma(); if(!k) return;
  const dateObj = new Date(y,m,d);
  const status = khatmaDayStatus(k, dateObj);
  const dk = todayKey(dateObj);
  const logged = (k.dailyLog[dk]||0);
  const statusLabel = {completed:'مكتمل 🟢', today:'اليوم 🟡', missed:'فائت 🔴', upcoming:'قادم ⚪', none:'قبل بداية الختمة'}[status];
  openSheet(`<h3>${esc(gregorianDateString(dateObj))}</h3><p>الحالة: ${statusLabel}</p><p>الصفحات المقروءة في هذا اليوم: <b>${logged}</b></p>
    <div class="sheet-actions"><button class="btn-primary" style="width:100%;" onclick="closeSheet(); khatmaContinueReading();">فتح القراءة</button></div>`);
}
function renderKhatmaCalendar(){
  const k = getActiveKhatma();
  if(!k) return emptyState('لا توجد ختمة نشطة حاليًا');
  const monthsAr=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const first = new Date(khatmaCalYear, khatmaCalMonth, 1);
  const startOffset = first.getDay();
  const daysInMonth = new Date(khatmaCalYear, khatmaCalMonth+1, 0).getDate();
  const dows = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  const cells = [];
  for(let i=0;i<startOffset;i++) cells.push(`<div class="khatma-cal-cell empty"></div>`);
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(khatmaCalYear, khatmaCalMonth, d);
    const status = khatmaDayStatus(k, dateObj);
    const cls = status==='completed'?'completed':status==='today'?'today':status==='missed'?'missed':'';
    const dot = status==='completed'?'🟢':status==='today'?'🟡':status==='missed'?'🔴':'';
    cells.push(`<div class="khatma-cal-cell ${cls}" onclick="khatmaCalDayClick(${khatmaCalYear},${khatmaCalMonth},${d})">${d}${dot?`<span style="position:absolute;bottom:2px;font-size:7px;">${dot}</span>`:''}</div>`);
  }
  return `
  <div class="khatma-cal-head">

/* ================================================================
   KHATMA COMPANION (رفيق الختمة) — optional group feature
   Independent from Communities. Users can use Khatma fully without
   ever opening this. Since the app has no live backend, other
   members' activity is simulated locally (deterministic, not random
   per render) so dashboards/stats/achievements have real content to
   show — exactly like the existing Communities module already does
   with its seeded member counts and posts.
   ================================================================ */
const KHATMA_GROUP_TYPES = {family:'ختمة عائلية', friends:'ختمة أصدقاء', mosque:'ختمة المسجد', study:'مجموعة دراسة', custom:'مجموعة مخصصة'};
const KHATMA_ENCOURAGEMENTS = [
  {emoji:'🌹', text:'ما شاء الله'},
  {emoji:'📖', text:'بارك الله فيك'},
  {emoji:'👏', text:'أحسنت'},
  {emoji:'🤲', text:'ربنا يتقبل'},
  {emoji:'❤️', text:'استمر'},
];
/* ============================================================
   KHATMA GROUPS — real, Firebase-backed shared groups.
   Every member is a real registered account; there is no simulated
   data anymore. Firebase layout:
     khatmaGroups/{groupId}                = {id,name,type,ownerUid,createdAt,dailyGoalPages,inviteCode}
     khatmaGroups/{groupId}/members/{uid}  = {id:uid, name, photoURL, privacy, pagesCompleted, dailyLog, joinedAt}
     khatmaGroupIds/{myUid}/{groupId}      = true          -- "which groups am I in" (written only by myself)
     khatmaInvites/{targetUid}/{inviteId}  = {...}          -- invite inbox (written by the sender)
     khatmaInviteCodes/{code}              = {groupId}      -- join-by-link/QR lookup
   ============================================================ */
let khatmaGroups = JSON.parse(localStorage.getItem('sakina_khatma_groups')||'[]');
function saveKhatmaGroupsLocal(){ localStorage.setItem('sakina_khatma_groups', JSON.stringify(khatmaGroups)); }
function findKhatmaGroup(id){ return khatmaGroups.find(g=>g.id===id); }
function khatmaMyUid(){ const s=authGetSession(); return s ? s.userId : null; }

let khatmaIncomingInvites = JSON.parse(localStorage.getItem('sakina_khatma_invites_in')||'[]');
function saveKhatmaIncomingInvitesLocal(){ localStorage.setItem('sakina_khatma_invites_in', JSON.stringify(khatmaIncomingInvites)); }

/* ---- per-member progress (reads the real active Khatma for "me", the synced record for everyone else) ---- */
function khatmaGroupMemberPages(group, member){
  if(member.isMe){ const k=getActiveKhatma(); return k ? k.pagesCompleted : (member.pagesCompleted||0); }
  return member.pagesCompleted||0;
}
function khatmaGroupMemberDailyLog(group, member){
  if(member.isMe){ const k=getActiveKhatma(); return k ? k.dailyLog : (member.dailyLog||{}); }
  return member.dailyLog||{};
}
function khatmaGroupMemberPct(group, member){ return Math.round((khatmaGroupMemberPages(group,member)/QURAN_TOTAL_PAGES)*100); }
function khatmaGroupMemberStreak(group, member){
  const log = khatmaGroupMemberDailyLog(group, member);
  let streak=0; let d=new Date();
  if(!((log[todayKey(d)]||0)>0)) d.setDate(d.getDate()-1);
  for(;;){ if((log[todayKey(d)]||0)>0){ streak++; d.setDate(d.getDate()-1);} else break; }
  return streak;
}
function khatmaGroupMemberTodayDone(group, member){
  const log = khatmaGroupMemberDailyLog(group, member);
  return (log[todayKey()]||0) >= (group.dailyGoalPages||4);
}
function khatmaGroupMemberJuz(group, member){ return khatmaJuzCompleted({pagesCompleted: khatmaGroupMemberPages(group,member)}); }

/* ---- group dashboard aggregates (unchanged logic, now over real data) ---- */
function khatmaGroupOverallPercent(group){
  const pcts = group.members.map(m=>khatmaGroupMemberPct(group,m));
  return pcts.length ? Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length) : 0;
}
function khatmaGroupTodayCompletedCount(group){ return group.members.filter(m=>khatmaGroupMemberTodayDone(group,m)).length; }
function khatmaGroupRemainingPages(group){ return group.members.reduce((sum,m)=>sum+Math.max(0,QURAN_TOTAL_PAGES-khatmaGroupMemberPages(group,m)),0); }
function khatmaGroupStreak(group){
  const allDoneOn = (dateObj)=> group.members.every(m=>{ const log=khatmaGroupMemberDailyLog(group,m); return (log[todayKey(dateObj)]||0) >= (group.dailyGoalPages||4); });
  let streak=0; let d=new Date();
  if(!allDoneOn(d)) d.setDate(d.getDate()-1);
  for(;;){ if(allDoneOn(d)){ streak++; d.setDate(d.getDate()-1);} else break; }
  return streak;
}

/* ---- group statistics ---- */
function khatmaGroupStats(group){
  const totalPages = group.members.reduce((s,m)=>s+khatmaGroupMemberPages(group,m),0);
  const totalJuz = group.members.reduce((s,m)=>s+khatmaGroupMemberJuz(group,m),0);
  const withDays = group.members.map(m=>{
    const log = khatmaGroupMemberDailyLog(group,m);
    const days = Object.keys(log).filter(d=>log[d]>0).length;
    const avg = days ? khatmaGroupMemberPages(group,m)/days : 0;
    return {m, days, avg, streak: khatmaGroupMemberStreak(group,m)};
  });
  const withActivity = withDays.filter(x=>x.days>0);
  const avgDaily = withActivity.length ? Math.round((withActivity.reduce((s,x)=>s+x.avg,0)/withActivity.length)*10)/10 : 0;
  const fastest = withActivity.slice().sort((a,b)=>b.avg-a.avg)[0] || null;
  const mostConsistent = withDays.slice().sort((a,b)=>b.streak-a.streak)[0] || null;
  return {totalPages, totalJuz, avgDaily, fastest, mostConsistent, pct: khatmaGroupOverallPercent(group)};
}
function khatmaGroupAchievements(group){
  const list = [];
  if(group.members.length && khatmaGroupTodayCompletedCount(group)===group.members.length) list.push({icon:'🏆', title:'الجميع أكملوا هدف اليوم'});
  if(khatmaGroupStreak(group)>=7) list.push({icon:'🏆', title:'٧ أيام متتالية'});
  if(khatmaGroupStreak(group)>=30) list.push({icon:'🏆', title:'٣٠ يوم متتالٍ'});
  if(group.members.some(m=>khatmaGroupMemberPages(group,m)>=QURAN_TOTAL_PAGES)) list.push({icon:'🏆', title:'أول ختمة مكتملة بالمجموعة'});
  return list;
}

function khatmaGroupWizardCreate(){

  if(!isFirebaseConfigured()){ showToast('يتطلب اتصالًا بالإنترنت لإنشاء مجموعة مشتركة'); return; }
  const name = (khatmaGroupWizard.name||'').trim() || 'ختمتي الجماعية';
  const id = 'kg_'+Date.now();

/* ---- invitations: real accounts only (username/email lookup, or join-by-code/QR) ---- */
function khatmaGenInviteCode(groupId){ return (groupId+Math.random().toString(36).slice(2,8)).toUpperCase().replace(/[^A-Z0-9]/g,'').slice(-8); }
function openKhatmaInviteSheet(groupId){
  const g = findKhatmaGroup(groupId); if(!g) return;
  const finish = ()=>{
    const link = `https://sakina.app/join/${g.inviteCode}`;
    openSheet(`<h3>دعوة أعضاء إلى "${esc(g.name)}"</h3>
      <div class="field"><label>اسم المستخدم أو البريد الإلكتروني لحساب مسجّل</label><input type="text" id="inviteTarget" placeholder="username@example.com"></div>
      <button class="btn-primary" style="width:100%;margin-bottom:14px;" onclick="khatmaSendInvite('${g.id}')">إرسال الدعوة</button>
      <div class="note-box" style="margin-top:0;word-break:break-all;">🔗 رابط الدعوة: <b>${link}</b></div>
      <button class="btn-secondary" style="width:100%;margin-top:10px;" onclick="khatmaCopyInviteLink('${link}')">نسخ الرابط</button>
      <div style="text-align:center;margin-top:18px;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(link)}" alt="QR" style="border-radius:12px;border:1px solid var(--border);" width="180" height="180">
        <div style="font-size:10.5px;color:var(--text-soft);margin-top:8px;">امسح رمز QR للانضمام عبر الجوال — يعمل مع أي حساب مسجّل حتى بدون دعوة مباشرة</div>
      </div>
      <div class="sheet-actions" style="margin-top:16px;"><button class="btn-secondary" style="width:100%;" onclick="closeSheet()">إغلاق</button></div>`);
  };
  if(!g.inviteCode && isFirebaseConfigured()){
    g.inviteCode = khatmaGenInviteCode(groupId);
    window.SAKINA_FIREBASE.db.update('khatmaGroups/'+groupId, {inviteCode:g.inviteCode})
      .then(()=>window.SAKINA_FIREBASE.db.set('khatmaInviteCodes/'+g.inviteCode, {groupId}))
      .then(()=>{ saveKhatmaGroupsLocal(); finish(); })
      .catch(e=>{ console.error('invite code create failed', e); g.inviteCode='——'; finish(); });
  } else finish();
}
function khatmaSendInvite(groupId){
  const g = findKhatmaGroup(groupId); if(!g) return;
  const uid = khatmaMyUid(); if(!uid || !isFirebaseConfigured()) return;
  const input = document.getElementById('inviteTarget');
  const val = input ? input.value.trim() : '';
  if(!val){ showToast('أدخل اسم مستخدم أو بريدًا إلكترونيًا'); return; }
  const method = val.includes('@') ? 'email' : 'username';
  // Real-account lookup only — resolves against the live registered-users directory
  // (see startUsersDirectoryLiveSync), never a made-up/simulated name.
  const target = authLoadUsers().find(u=> method==='email' ? (u.email||'').toLowerCase()===val.toLowerCase() : (u.username||'').toLowerCase()===val.toLowerCase());
  if(!target){ showToast('لا يوجد مستخدم مسجّل بهذا الاسم أو البريد'); return; }
  if(target.id===uid){ showToast('لا يمكنك دعوة نفسك'); return; }
  if(g.members.some(m=>m.id===target.id)){ showToast('هذا المستخدم عضو بالفعل'); return; }
  const me = authCurrentUser() || {};
  const inv = {id:'iv_'+Date.now(), groupId:g.id, groupName:g.name, type:g.type, fromUid:uid, fromName:userProfile.name||me.name||'', method, status:'pending', time:Date.now(), membersCount:g.members.length};
  window.SAKINA_FIREBASE.db.set('khatmaInvites/'+target.id+'/'+inv.id, inv)
    .then(()=>{ showToast('تم إرسال الدعوة ✓'); if(input) input.value=''; })
    .catch(e=>{ console.error('khatma invite send failed', e); showToast('تعذّر إرسال الدعوة'); });
}
function khatmaCopyInviteLink(link){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(link).then(()=>showToast('تم نسخ رابط الدعوة ✓')).catch(()=>showToast('رابط الدعوة: '+link));
  } else showToast('رابط الدعوة: '+link);
}
/* Shared by "accept invite" and "join by code": actually adds me as a real member of a real group. */
async function khatmaJoinGroupId(groupId){
  const uid = khatmaMyUid(); if(!uid || !isFirebaseConfigured()) return false;
  const existing = await window.SAKINA_FIREBASE.db.get('khatmaGroups/'+groupId);
  if(!existing) return false;
  if(existing.members && existing.members[uid]) { khatmaSubscribeToGroup(groupId); return true; } // already a member
  const k = getActiveKhatma();
  const me = authCurrentUser() || {};
  const myMember = {id:uid, name:userProfile.name||me.name||'', photoURL:userProfile.avatar||me.photoURL||null,
    privacy:'summary', pagesCompleted:k?k.pagesCompleted:0, dailyLog:k?k.dailyLog:{}, joinedAt:Date.now()};
  await window.SAKINA_FIREBASE.db.update('khatmaGroups/'+groupId+'/members', {[uid]:myMember});
  await window.SAKINA_FIREBASE.db.set('khatmaGroupIds/'+uid+'/'+groupId, true);
  khatmaSubscribeToGroup(groupId);
  return true;
}
function khatmaAcceptIncomingInvite(id){
  const inv = khatmaIncomingInvites.find(x=>x.id===id); if(!inv) return;
  const uid = khatmaMyUid(); if(!uid) return;
  khatmaJoinGroupId(inv.groupId).then(ok=>{
    if(ok){
      window.SAKINA_FIREBASE.db.remove('khatmaInvites/'+uid+'/'+id).catch(()=>{});
      showToast('انضممت إلى المجموعة ✓');
    } else showToast('تعذّر الانضمام — قد تكون المجموعة قد حُذفت');
    render();
  });
}
function khatmaDeclineIncomingInvite(id){
  const inv = khatmaIncomingInvites.find(x=>x.id===id); if(!inv) return;
  const uid = khatmaMyUid(); if(!uid) return;
  window.SAKINA_FIREBASE.db.remove('khatmaInvites/'+uid+'/'+id).catch(()=>{});
  showToast('تم رفض الدعوة');
}

  const code = input ? input.value.trim().toUpperCase() : '';
  if(!code){ showToast('أدخل كود الدعوة'); return; }

/* ---- Firebase live sync: membership index, per-group data, invite inbox ---- */
let khatmaGroupIdsUnsub = null;
let khatmaInvitesUnsub = null;
let khatmaGroupUnsubs = {}; // groupId -> unsubscribe fn
function khatmaSubscribeToGroup(groupId){
  if(khatmaGroupUnsubs[groupId]) return;
  const uid = khatmaMyUid();
  khatmaGroupUnsubs[groupId] = window.SAKINA_FIREBASE.db.onChange('khatmaGroups/'+groupId, (val)=>{
    if(!val){ // group was deleted
      khatmaGroups = khatmaGroups.filter(g=>g.id!==groupId);
      saveKhatmaGroupsLocal(); render();
      return;
    }
    const membersArr = Object.keys(val.members||{}).map(k=>({...val.members[k], id:k, isMe:k===uid}));
    const hydrated = {...val, members:membersArr};
    const i = khatmaGroups.findIndex(g=>g.id===groupId);
    if(i>-1) khatmaGroups[i] = hydrated; else khatmaGroups.push(hydrated);
    saveKhatmaGroupsLocal();
    render();
  });
}
function khatmaUnsubscribeFromGroup(groupId){
  try{ khatmaGroupUnsubs[groupId] && khatmaGroupUnsubs[groupId](); }catch(e){}
  delete khatmaGroupUnsubs[groupId];
}
function startKhatmaGroupsLiveSync(){
  if(!isFirebaseConfigured()) return;
  const uid = khatmaMyUid(); if(!uid) return;
  if(!khatmaGroupIdsUnsub){
    khatmaGroupIdsUnsub = window.SAKINA_FIREBASE.db.onChange('khatmaGroupIds/'+uid, (val)=>{
      const ids = val ? Object.keys(val) : [];
      ids.forEach(id=>khatmaSubscribeToGroup(id));
      // stop listening to groups I've left (via another device), and purge ANY locally
      // cached group not in this real membership index — this is also what clears out
      // pre-update fake/demo groups that were only ever stored in localStorage.
      Object.keys(khatmaGroupUnsubs).forEach(id=>{ if(!ids.includes(id)) khatmaUnsubscribeFromGroup(id); });
      khatmaGroups = khatmaGroups.filter(g=>ids.includes(g.id));
      saveKhatmaGroupsLocal();
    });
  }
  if(!khatmaInvitesUnsub){
    khatmaInvitesUnsub = window.SAKINA_FIREBASE.db.onChange('khatmaInvites/'+uid, (val)=>{
      khatmaIncomingInvites = val ? Object.values(val) : [];
      saveKhatmaIncomingInvitesLocal();
      render();
    });
  }
}
function stopKhatmaGroupsLiveSync(){
  try{ khatmaGroupIdsUnsub && khatmaGroupIdsUnsub(); }catch(e){}
  try{ khatmaInvitesUnsub && khatmaInvitesUnsub(); }catch(e){}
  khatmaGroupIdsUnsub = null; khatmaInvitesUnsub = null;
  Object.keys(khatmaGroupUnsubs).forEach(khatmaUnsubscribeFromGroup);
}
/* Pushes MY reading progress to every group I'm in — called from khatmaLogPages below.
   Without this, joining a group and then reading normally would never update what others see. */
function khatmaPropagateMyProgressToGroups(){
  const uid = khatmaMyUid(); if(!uid || !isFirebaseConfigured() || !khatmaGroups.length) return;
  const k = getActiveKhatma(); if(!k) return;
  khatmaGroups.forEach(g=>{
    window.SAKINA_FIREBASE.db.update('khatmaGroups/'+g.id+'/members/'+uid, {pagesCompleted:k.pagesCompleted, dailyLog:k.dailyLog})
      .catch(e=>console.error('khatma progress sync failed', g.id, e));
  });
}

/* ---- AI INTEGRATION: group progress questions ---- */
function aiKhatmaGroupAnswer(text){
  const t = (text||'').trim();
  const norm = t.replace(/[إأآا]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي');
  const mentionsGroup = /مجموعت|عائلت|اسرت|أسرت|رفيق الختمه|فريق/.test(norm);
  if(!mentionsGroup) return null;
  if(!khatmaGroups.length) return 'لا توجد لديك مجموعة ختمة حاليًا. يمكنك إنشاء واحدة من "رفيق الختمة" داخل قسم الختمة، ودعوة عائلتك أو أصدقائك للانضمام.';
  const g = khatmaGroups[0];
  const pct = khatmaGroupOverallPercent(g);
  const doneCount = khatmaGroupTodayCompletedCount(g);
  const remaining = khatmaGroupRemainingPages(g);
  const streak = khatmaGroupStreak(g);
  if(/من اكمل|من أكمل|مين خلص|من انهى|من انتهى/.test(norm)){
    const doneNames = g.members.filter(m=>khatmaGroupMemberTodayDone(g,m)).map(m=>m.name);
    return doneNames.length ? `أكمل هدف اليوم في "${g.name}": ${doneNames.join('، ')}.` : `لم يكمل أي عضو في "${g.name}" هدف اليوم بعد.`;
  }
  if(/كام صفح|كم صفح/.test(norm) && /باق|متبقي|متبقٍ/.test(norm)){
    return `تبقّى للمجموعة "${g.name}" مجتمعةً ${remaining} صفحة لإتمام ختماتها الفردية.`;
  }
  return `مجموعة "${g.name}" أنجزت ${pct}% إجمالًا، وأكمل ${doneCount} من ${g.members.length} أعضاء هدف اليوم، مع تتابع جماعي قدره 🔥 ${streak} يوم.`;
}

/* ---- QIBLA ---- */
function renderQibla(){
  const bearing = currentQiblaBearing;
  return `
  <div class="qibla-wrap">
    <div class="compass">
      <span class="dir n">شمال</span><span class="dir s">جنوب</span><span class="dir e">شرق</span><span class="dir w">غرب</span>
      <div class="needle" id="needle" style="transform:rotate(${bearing}deg)"></div>
    </div>
    <div class="qibla-deg">${bearing}°</div>
    <div class="qibla-note">اتجاه القبلة من ${esc(prayerLocation.city)} نحو الكعبة المشرفة بمكة المكرمة. قم بتدوير جهازك ببطء لمحاذاة المؤشر.</div>
    <button class="btn-primary" onclick="requestCompass()">تفعيل البوصلة</button>
  </div>`;
}
function requestCompass(){
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(r=>{
      if(r==='granted'){ window.addEventListener('deviceorientation', handleOrientation); showToast('تم تفعيل البوصلة'); }
      else showToast('تم رفض إذن الوصول للبوصلة');
    }).catch(()=> showToast('تعذر الوصول إلى حساس الاتجاه'));
  } else if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation', handleOrientation);
    showToast('تم تفعيل البوصلة');
  } else {
    showToast('جهازك لا يدعم حساس الاتجاه، سيتم عرض الاتجاه التقريبي فقط');
  }
}
function handleOrientation(e){
  const heading = e.webkitCompassHeading || (360 - e.alpha) || 0;
  const rotate = (currentQiblaBearing - heading + 360) % 360;
  const needle = document.getElementById('needle');
  if(needle) needle.style.transform = `rotate(${rotate}deg)`;
}

        <div class="field"><label>قيمة الذهب</label><input type="number" id="z_gold" placeholder="0" oninput="calcZakat()"></div>

}
function calcZakat(){
  const g = id=>parseFloat(document.getElementById(id).value)||0;
  const total = g('z_cash')+g('z_gold')+g('z_silver')+g('z_trade')-g('z_debt');
  const zakat = Math.max(total,0)*0.025;
  document.getElementById('z_result').textContent = zakat.toLocaleString('ar-EG',{maximumFractionDigits:2})+' جنيه';
}

/* ---- INHERITANCE (simplified) ---- */
function renderInheritance(){
  return `
  <div class="calc-wrap">
    <div class="calc-card">
      <div class="field"><label>إجمالي التركة (بالجنيه المصري)</label><input type="number" id="i_total" placeholder="0" oninput="calcInherit()"></div>
      <div class="field"><label>الزوجة على قيد الحياة؟</label>
        <select id="i_wife" onchange="calcInherit()"><option value="0">لا</option><option value="1">نعم</option></select>
      </div>
      <div class="two-col" style="margin-bottom:0;">
        <div class="field" style="margin-bottom:0;"><label>عدد الأبناء (ذكور)</label><input type="number" id="i_sons" placeholder="0" oninput="calcInherit()"></div>
        <div class="field" style="margin-bottom:0;"><label>عدد البنات</label><input type="number" id="i_daughters" placeholder="0" oninput="calcInherit()"></div>
      </div>
    </div>
    <div id="i_result"></div>
    <div class="note-box">حاسبة مبسطة لحالة شائعة فقط (المتوفى زوج، والورثة زوجة وأبناء/بنات). المواريث الشرعية تتأثر بوجود الأبوين والإخوة وحالات أخرى كثيرة؛ هذه النتيجة للاسترشاد العام فقط، ويجب الرجوع لعالم شرعي أو قاضٍ لتحديد الأنصبة الفعلية.</div>
  </div>`;
}
function calcInherit(){
  const total = parseFloat(document.getElementById('i_total').value)||0;
  const hasWife = document.getElementById('i_wife').value==='1';
  const sons = parseInt(document.getElementById('i_sons').value)||0;
  const daughters = parseInt(document.getElementById('i_daughters').value)||0;
  const box = document.getElementById('i_result');
  if(total<=0 || (sons===0 && daughters===0 && !hasWife)){ box.innerHTML=''; return; }
  let remain = total;
  let rows = [];
  if(hasWife){
    const hasChildren = sons+daughters>0;
    const wifeShare = hasChildren ? total/8 : total/4;
    rows.push(['الزوجة', wifeShare]);
    remain -= wifeShare;
  }
  const shares = sons*2+daughters;
  if(shares>0){
    const unit = remain/shares;
    if(sons>0) rows.push([`الأبناء (${sons}) — نصيب كل ابن`, unit*2]);
    if(daughters>0) rows.push([`البنات (${daughters}) — نصيب كل بنت`, unit]);
  }
  box.innerHTML = `<div class="result-box" style="text-align:right;">
    <div class="lbl" style="margin-bottom:8px;">التوزيع التقديري</div>
    ${rows.map(r=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.15)"><span>${r[0]}</span><b>${r[1].toLocaleString('ar-EG',{maximumFractionDigits:0})} جنيه</b></div>`).join('')}
  </div>`;
}

/* ---- ADHKAR DAILY LOG (drives رحلتي's Adhkar summary: completed-today / streak) ---- */
let adhkarDailyLog = JSON.parse(localStorage.getItem('sakina_adhkar_daily')||'{}');
function adhkarSaveDaily(){ localStorage.setItem('sakina_adhkar_daily', JSON.stringify(adhkarDailyLog)); }
function adhkarMarkDone(key){
  const dk = todayKey();
  if(!adhkarDailyLog[dk]) adhkarDailyLog[dk] = {};
  adhkarDailyLog[dk][key] = true;
  adhkarSaveDaily();
}
function adhkarCatDoneToday(cat, d){
  const items = ADHKAR_CATEGORIES[cat].items;
  const log = adhkarDailyLog[todayKey(d)] || {};
  return items.length>0 && items.every((_,i)=> log[cat+'_'+i]);
}
function adhkarCatPercentToday(cat, d){
  const items = ADHKAR_CATEGORIES[cat].items;
  const log = adhkarDailyLog[todayKey(d)] || {};
  const done = items.filter((_,i)=> log[cat+'_'+i]).length;
  return items.length ? Math.round((done/items.length)*100) : 0;
}
function adhkarAnyDoneOn(d){ const log = adhkarDailyLog[todayKey(d)]; return !!(log && Object.keys(log).length); }
function adhkarStreak(){
  let streak=0; let d=new Date();
  if(!adhkarAnyDoneOn(d)) d.setDate(d.getDate()-1);
  for(;;){ if(adhkarAnyDoneOn(d)){ streak++; d.setDate(d.getDate()-1); } else break; }
  return streak;
}
function adhkarLastActiveDateKey(){
  const keys = Object.keys(adhkarDailyLog).filter(k=>Object.keys(adhkarDailyLog[k]||{}).length);
  return keys.length ? keys.sort().pop() : null;
}

function persistSaved(type){

    project:['sakina_saved_projects', savedProjects],

}

  persistSaved('ayah');

  if(el) el.classList.toggle('bookmarked', savedAyahs.has(key));

function toggleSaveSurah(e, id){

  else { savedSurahs.add(id); showToast('تم حفظ السورة ✓'); }
  persistSaved('surah');
  render();
}
function toggleSaveProject(e, id){
  if(e) e.stopPropagation();
  if(savedProjects.has(id)){ savedProjects.delete(id); showToast('تمت إزالة القصة من المحفوظات'); }
  else { savedProjects.add(id); showToast('تم حفظ القصة ✓'); }
  persistSaved('project');
  render();

function removeSaved(type, key){
  if(type==='hadith'){ hadithBookmarks.delete(key); hadithSaveBookmarks(); render(); showToast('تمت الإزالة من المحفوظات'); return; }
  const map = {ayah:savedAyahs, surah:savedSurahs, project:savedProjects};
  const set = map[type];
  const val = (type==='surah'||type==='project') ? Number(key) : key;
  set.delete(val);
  persistSaved(type);

/* ================= TASBEEH ================= */
const TASBEEH_DEFAULT_DHIKRS = [
  {id:'subhanallah', text:'سُبْحَانَ اللَّهِ', target:33},
  {id:'alhamdulillah', text:'الْحَمْدُ لِلَّهِ', target:33},
  {id:'allahuakbar', text:'اللَّهُ أَكْبَرُ', target:34},
  {id:'lailaha', text:'لَا إِلَٰهَ إِلَّا اللَّهُ', target:100},
  {id:'astaghfirullah', text:'أَسْتَغْفِرُ اللَّهَ', target:100},
  {id:'salawat', text:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ', target:100},
];
const TSB_ACHIEVEMENTS = [
  {id:'first', icon:'🌱', title:'أول تسبيحة', test:()=>tsbLifetimeTotal()>=1},
  {id:'h100', icon:'💯', title:'١٠٠ تسبيحة', test:()=>tsbLifetimeTotal()>=100},
  {id:'k1', icon:'🏅', title:'١٠٠٠ تسبيحة', test:()=>tsbLifetimeTotal()>=1000},
  {id:'goal', icon:'🎯', title:'هدف اليوم', test:()=>tsbTodayCount(tsbSelected)>=tsbTarget(tsbSelected)},
  {id:'streak7', icon:'🔥', title:'استمرارية ٧ أيام', test:()=>tsbStreak()>=7},
  {id:'streak30', icon:'🌙', title:'استمرارية ٣٠ يومًا', test:()=>tsbStreak()>=30},
];
let tsbCustom = JSON.parse(localStorage.getItem('sakina_tsb_custom')||'[]');
let tsbGoals = JSON.parse(localStorage.getItem('sakina_tsb_goals')||'{}');
let tsbSelected = localStorage.getItem('sakina_tsb_selected') || TASBEEH_DEFAULT_DHIKRS[0].id;
let tsbSettings = Object.assign({sound:true, haptic:true}, JSON.parse(localStorage.getItem('sakina_tsb_settings')||'{}'));
let tsbLog = JSON.parse(localStorage.getItem('sakina_tsb_log')||'{}');
let tsbUnlockedSet = new Set(JSON.parse(localStorage.getItem('sakina_tsb_unlocked')||'[]'));
let tsbAudioCtx = null;

function tsbAllDhikrs(){ return TASBEEH_DEFAULT_DHIKRS.concat(tsbCustom); }
function tsbFind(id){ return tsbAllDhikrs().find(d=>d.id===id); }
function tsbTarget(id){ return tsbGoals[id] || (tsbFind(id)||{}).target || 33; }
function todayKey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function tsbTodayCount(id){ const day=tsbLog[todayKey()]; return (day && day.byDhikr[id]) || 0; }
function tsbSaveLog(){ localStorage.setItem('sakina_tsb_log', JSON.stringify(tsbLog)); }
function tsbLifetimeTotal(){ return Object.values(tsbLog).reduce((s,d)=>s+(d.total||0),0); }
function tsbRangeTotal(days){
  let total=0;
  for(let i=0;i<days;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const day=tsbLog[todayKey(d)]; total += (day && day.total) || 0;
  }
  return total;
}
function tsbLast7Days(){
  const names=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  const arr=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const day=tsbLog[todayKey(d)];
    arr.push({label:names[d.getDay()], count:(day && day.total) || 0});
  }
  return arr;
}
function tsbStreak(){
  let streak=0;
  let d=new Date();
  const hasToday = tsbLog[todayKey()] && tsbLog[todayKey()].total>0;
  if(!hasToday) d.setDate(d.getDate()-1);
  for(;;){
    const day = tsbLog[todayKey(d)];
    if(day && day.total>0){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}
function tsbPlayTick(){
  try{
    if(!tsbAudioCtx) tsbAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx=tsbAudioCtx, osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.type='sine'; osc.frequency.value=720;
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.09);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.09);
  }catch(e){ /* audio unavailable/blocked — fail silently */ }
}
function checkTsbAchievements(){
  TSB_ACHIEVEMENTS.forEach(a=>{
    if(!tsbUnlockedSet.has(a.id) && a.test()){
      tsbUnlockedSet.add(a.id);
      showToast('🎉 إنجاز جديد: '+a.title);
    }
  });
  localStorage.setItem('sakina_tsb_unlocked', JSON.stringify([...tsbUnlockedSet]));
}
function tsbTap(){
  const id=tsbSelected, key=todayKey();
  if(!tsbLog[key]) tsbLog[key]={total:0, byDhikr:{}};
  tsbLog[key].total = (tsbLog[key].total||0)+1;
  tsbLog[key].byDhikr[id] = (tsbLog[key].byDhikr[id]||0)+1;
  tsbSaveLog();
  const newCount = tsbLog[key].byDhikr[id];
  const target = tsbTarget(id);
  const justReachedGoal = newCount===target;
  if(tsbSettings.haptic && navigator.vibrate){ navigator.vibrate(justReachedGoal ? [20,40,20] : 12); }
  if(tsbSettings.sound){ tsbPlayTick(); }
  const numEl=document.getElementById('tsbCount'); if(numEl) numEl.textContent=newCount;
  const ring=document.getElementById('tsbRingFill');
  if(ring){
    const C=2*Math.PI*100, pct=Math.min(1, newCount/target);
    ring.style.strokeDashoffset = C*(1-pct);
  }
  const btn=document.getElementById('tsbCountBtn');
  if(btn){ btn.classList.remove('pulse'); void btn.offsetWidth; btn.classList.add('pulse'); }
  const todayEl=document.getElementById('tsbTodayStat'); if(todayEl) todayEl.textContent = tsbLog[key].total;
  const weekEl=document.getElementById('tsbWeekStat'); if(weekEl) weekEl.textContent = tsbRangeTotal(7);
  const monthEl=document.getElementById('tsbMonthStat'); if(monthEl) monthEl.textContent = tsbRangeTotal(30);
  if(justReachedGoal) showToast('أتممت الهدف 🎉 بارك الله فيك');
  checkTsbAchievements();
}

/* ---- HADITH MODULE ---- */
function hdTrunc(t,n){ if(!t) return ''; return t.length>n ? t.slice(0,n).trim()+'…' : t; }
function hadithNotBundledNote(bookId){
  const reason = hadithLoadError[bookId];
  const msg = reason==='offline'
    ? '📴 أنت غير متصل بالإنترنت الآن، ولم يتم تحميل هذا الكتاب من قبل.<br>اتصل بالإنترنت مرة واحدة لتحميله، وسيبقى محفوظًا للقراءة بدون إنترنت بعد ذلك.'
    : '⚠️ تعذّر تحميل نص هذا الكتاب، تأكد من اتصالك بالإنترنت ثم أعد المحاولة.';
  return `<div class="hd-loading-row" style="flex-direction:column;">${msg}<br><button class="btn-primary" style="margin-top:10px;" onclick="hadithRetryFetch('${bookId}')">إعادة المحاولة</button></div>`;
}
/* fetch the book behind the current page (if not cached) then re-render in place.
   Guarding on hadithLoadError too (not just hadithBookCache) matters: once a
   download has failed (offline, or a network hiccup), render() would keep
   re-triggering this function on every re-render for the same still-missing
   book, hammering the network instead of settling on the error state until
   the user taps "إعادة المحاولة" (hadithRetryFetch), which clears the flag. */
async function hadithRenderIfNeeded(bookId){
  if(!bookId || hadithBookCache[bookId] || hadithLoadError[bookId]) return;
  await hadithFetchBook(bookId);
  const cur = history_[history_.length-1];
  if(cur && (cur.page==='hadithBook'||cur.page==='hadithChapter'||cur.page==='hadithDetail'||cur.page==='knowledge')) render();
}
function hadithMarkRead(bookId, num, sectionNum){
  const key = hadithKey(bookId,num);
  if(!hadithsReadSet.has(key)){ hadithsReadSet.add(key); hadithSaveRead(); }
  if(!hadithBooksStarted.has(bookId)){ hadithBooksStarted.add(bookId); hadithSaveBooksStarted(); }
  hadithBookProgress[bookId] = {num:Number(num), ts:Date.now()};
  hadithSaveBookProgress();
  // READING HISTORY: newest first, re-reading a hadith moves it back to the top
  hadithHistory = hadithHistory.filter(e=>!(e.bookId===bookId && e.num===Number(num)));
  hadithHistory.unshift({bookId, num:Number(num), sectionNum: sectionNum||null, ts:Date.now()});
  if(hadithHistory.length>300) hadithHistory.length = 300;
  hadithSaveHistory();
}
function hadithOpen(bookId, num, sectionNum){
  hadithContinue = {bookId, num:Number(num), sectionNum: sectionNum||null, ts:Date.now()};
  hadithSaveContinue();
  navigateTo('hadithDetail', {id:bookId, num:Number(num)});
}
function hadithCopy(bookId, num){
  const h = hadithFindByNumber(bookId, num); if(!h) return;
  const book = hadithBookById(bookId);
  const text = h.text + '\n\n— ' + book.title + ' (حديث ' + h.hadithnumber + ')';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('تم نسخ الحديث ✓')).catch(()=>showToast('تعذر نسخ الحديث'));
  }
}
function hadithShare(bookId, num){
  const h = hadithFindByNumber(bookId, num); if(!h) return;
  const book = hadithBookById(bookId);
  const text = h.text + '\n\n— ' + book.title + ' (حديث ' + h.hadithnumber + ')';
  if(navigator.share){ navigator.share({title:book.title, text}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(text).then(()=>showToast('تم نسخ الحديث للمشاركة ✓')); }
}
function openHadithNoteSheet(bookId, num){

function saveHadithNote(bookId, num){

}

let hadithSearchScope = 'cached'; // 'cached' | 'all'
let hadithSearchField = 'all';    // 'all' | 'text' | 'narrator' | 'book' | 'chapter' | 'number'
let hadithSearchQuery = '';
let hadithSearchDebounceTimer = null;
const HADITH_SEARCH_FIELDS = [
  ['all','الكل (كلمات مفتاحية)'], ['text','نص الحديث'], ['narrator','الراوي'],
  ['book','الكتاب'], ['chapter','الباب'], ['number','رقم الحديث'],
];

  all:'ابحث بالنص، الراوي، الكتاب، الباب، أو رقم الحديث…', text:'اكتب كلمة أو جملة من نص الحديث…',

  chapter:'اكتب اسم الباب أو الفصل…', number:'اكتب رقم الحديث…',
};
/* Arabic-Indic (and Persian) digits typed by the user are converted to plain
   ASCII digits so hadith-number search works regardless of numeral input. */
function hadithLatinDigits(s){
  return String(s||'').replace(/[٠-٩۰-۹]/g, d=>{
    const arabic='٠١٢٣٤٥٦٧٨٩'.indexOf(d); if(arabic>-1) return arabic;
    const persian='۰۱۲۳۴۵۶۷۸۹'.indexOf(d); return persian>-1 ? persian : d;
  });
}
/* memoised per-book narrator index so repeated searches (and searches across
   the whole library) don't re-run the narrator regex over every hadith each
   keystroke; invalidated automatically since it's keyed off the book cache. */
let hadithNarratorIndexCache = {};
function hadithNarratorIndex(bookId){
  if(hadithNarratorIndexCache[bookId]) return hadithNarratorIndexCache[bookId];
  const c = hadithBookCache[bookId];
  if(!c) return null;
  const idx = c.hadiths.map(h=>({h, narrator:hadithExtractNarrator(h.text)}));
  hadithNarratorIndexCache[bookId] = idx;
  return idx;
}

/* Powerful, fully offline hadith search. Works purely off the in-memory
   HADITH_LOCAL_DATA already loaded via hadithFetchBook — no network calls.
   Supports six ways to search, selected via the field chips:
     all      → matches text, narrator, book, chapter AND hadith number at once
     text     → hadith body text only
     narrator → the narrator extracted from the start of the hadith
     book     → book title / author
     chapter  → chapter (bab) title
     number   → exact hadith number
   All text matching goes through matchAr/normalizeAr, which strips Arabic
   diacritics and normalises alef/ya/ta-marbuta variants, so results aren't
   thrown off by differing spellings or missing tashkeel. */
function hadithSearchResultsHtml(qRaw){
  const q = (qRaw||'').trim();
  if(!q) return `<div class="hd-loading-row">${HADITH_SEARCH_PLACEHOLDERS[hadithSearchField]}</div>`;
  const scopeBooks = hadithSearchScope==='all' ? HADITH_BOOKS : HADITH_BOOKS.filter(b=>hadithBookCache[b.id]);
  const notice = hadithSearchScope==='cached' ? ' في الكتب المفتوحة — جرّب "كل المكتبة"' : '';
  const field = hadithSearchField;
  const numQuery = hadithLatinDigits(q).match(/^\d+$/) ? Number(hadithLatinDigits(q)) : null;

  // ---- field: book — list matching books, no hadiths to sift through ----
  if(field==='book'){
    const books = HADITH_BOOKS.filter(b=>matchAr(b.title,q)||matchAr(b.author,q));
    if(!books.length) return `<div class="hd-loading-row">لا كتب مطابقة.</div>`;
    return books.map(b=>hadithBookCardHtml(b,true)).join('');
  }

  // ---- field: chapter — list matching chapters across the scoped books ----
  if(field==='chapter'){
    const rows = [];
    scopeBooks.forEach(b=>{
      const c = hadithBookCache[b.id]; if(!c) return;
      c.sections.filter(s=>matchAr(s.title,q)||matchAr(s.titleEn,q)).forEach(s=>{
        rows.push(`<div class="hd-chapter-item" onclick="navigateTo('hadithChapter',{id:'${b.id}',section:${s.num}})">
          <div class="num">${s.num}</div>
          <div class="tx"><b>${esc(s.title)}</b><span>${esc(b.title)} · ${s.last-s.first+1} حديثًا</span></div>
        </div>`);
      });
    });
    if(!rows.length) return `<div class="hd-loading-row">لا أبواب مطابقة${notice}.</div>`;
    return rows.join('');
  }

  // ---- field: number — exact hadith-number match ----
  if(field==='number'){
    if(numQuery===null) return `<div class="hd-loading-row">اكتب رقمًا صحيحًا للبحث عن حديث برقمه.</div>`;
    const rows = [];
    scopeBooks.forEach(b=>{
      const c = hadithBookCache[b.id]; if(!c) return;
      const h = c.hadiths.find(x=>x.hadithnumber===numQuery);
      if(h) rows.push(hadithResultRow(b.id, b.title, h));
    });
    if(!rows.length) return `<div class="hd-loading-row">لا حديث بهذا الرقم${notice}.</div>`;
    return rows.join('');
  }

  // ---- field: narrator ----
  if(field==='narrator'){
    const results = [];
    scopeBooks.forEach(b=>{
      const idx = hadithNarratorIndex(b.id); if(!idx) return;
      idx.forEach(({h,narrator})=>{ if(narrator && matchAr(narrator,q)) results.push({b,h,narrator}); });
    });
    if(!results.length) return `<div class="hd-loading-row">لا نتائج لهذا الراوي${notice}.</div>`;
    return results.slice(0,60).map(r=>hadithResultRow(r.b.id, r.b.title, r.h, 'الراوي: '+r.narrator)).join('');
  }

  // ---- field: text (hadith body only) ----
  if(field==='text'){
    const results = [];
    scopeBooks.forEach(b=>{
      const c = hadithBookCache[b.id]; if(!c) return;
      c.hadiths.forEach(h=>{ if(matchAr(h.text,q)) results.push({b,h}); });
    });
    if(!results.length) return `<div class="hd-loading-row">لا نتائج مطابقة${notice}.</div>`;
    return results.slice(0,60).map(r=>hadithResultRow(r.b.id, r.b.title, r.h)).join('');
  }

  // ---- field: all — keyword search across every field at once ----
  const bookMatches = HADITH_BOOKS.filter(b=>matchAr(b.title,q)||matchAr(b.author,q)).slice(0,4);
  const chapterMatches = [];
  scopeBooks.forEach(b=>{
    const c = hadithBookCache[b.id]; if(!c) return;
    c.sections.filter(s=>matchAr(s.title,q)||matchAr(s.titleEn,q)).forEach(s=>chapterMatches.push({b,s}));
  });
  const seen = new Set();
  const hadithResults = [];
  scopeBooks.forEach(b=>{
    const c = hadithBookCache[b.id]; if(!c) return;
    const narratorIdx = hadithNarratorIndex(b.id) || [];
    const narratorByNum = {}; narratorIdx.forEach(({h,narrator})=>{ narratorByNum[h.hadithnumber]=narrator; });
    c.hadiths.forEach(h=>{
      const key = b.id+':'+h.hadithnumber;
      if(seen.has(key)) return;
      if(numQuery!==null && h.hadithnumber===numQuery){ seen.add(key); hadithResults.push({b,h,badge:'رقم الحديث'}); return; }
      const narrator = narratorByNum[h.hadithnumber];
      if(narrator && matchAr(narrator,q)){ seen.add(key); hadithResults.push({b,h,badge:'الراوي: '+narrator}); return; }
      if(matchAr(h.text,q)){ seen.add(key); hadithResults.push({b,h,badge:null}); }
    });
  });
  if(!bookMatches.length && !chapterMatches.length && !hadithResults.length){
    return `<div class="hd-loading-row">لا نتائج مطابقة${notice}.</div>`;
  }
  let out = '';
  if(bookMatches.length){
    out += hadithSearchSectionLabel('كتب مطابقة');
    out += bookMatches.map(b=>hadithBookCardHtml(b,true)).join('');
  }
  if(chapterMatches.length){
    out += hadithSearchSectionLabel('أبواب مطابقة');
    out += chapterMatches.slice(0,8).map(({b,s})=>`<div class="hd-chapter-item" onclick="navigateTo('hadithChapter',{id:'${b.id}',section:${s.num}})">
      <div class="num">${s.num}</div>
      <div class="tx"><b>${esc(s.title)}</b><span>${esc(b.title)} · ${s.last-s.first+1} حديثًا</span></div>
    </div>`).join('');
  }
  if(hadithResults.length){
    out += hadithSearchSectionLabel('أحاديث مطابقة');
    out += hadithResults.slice(0,60).map(r=>hadithResultRow(r.b.id, r.b.title, r.h, r.badge)).join('');
  }
  return out;
}

  return `
  <div style="padding:16px 16px 0;">
    <input id="hdSearchInput" type="text" value="${esc(hadithSearchQuery)}" placeholder="${esc(HADITH_SEARCH_PLACEHOLDERS[hadithSearchField])}"
      style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r-pill,999px);background:var(--card);color:var(--text);font-family:inherit;font-size:14px;"

  </div>

function hadithSetSearchField(field){
  hadithSearchField = field;
  render();
  const inp = document.getElementById('hdSearchInput');
  if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}
function onHadithSearchInput(val){
  hadithSearchQuery = val;
  const wrap = document.getElementById('hdSearchResultsWrap');
  if(!wrap) return;
  clearTimeout(hadithSearchDebounceTimer);
  if(!val.trim()){ wrap.innerHTML = hadithSearchResultsHtml(''); return; }
  wrap.innerHTML = skeletonList(3);
  hadithSearchDebounceTimer = setTimeout(()=>{ wrap.innerHTML = hadithSearchResultsHtml(hadithSearchQuery); }, 220);
}
async function hadithSetSearchScope(scope){
  hadithSearchScope = scope;
  if(scope==='all'){
    const toLoad = HADITH_BOOKS.filter(b=>!hadithBookCache[b.id]);
    if(toLoad.length){
      render();
      const inp = document.getElementById('hdSearchInput'); if(inp) inp.focus();
      await Promise.all(toLoad.map(b=>hadithFetchBook(b.id)));
    }
  }
  render();
  const inp = document.getElementById('hdSearchInput');
  if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

/* Shared row list for both saved-hadith pages (Favorites / Bookmarks) — they
   were previously two near-identical functions; consolidated here to avoid
   duplicate logic. `set` is the Set to read from, `toggleFn` the name of the
   toggle function to call on tap, `icon` the filled icon to show. */
function hadithSavedListHtml(set, toggleFn, icon, emptyMsg){
  if(!set.size) return emptyState(emptyMsg);
  return [...set].reverse().map(key=>{
    const [bookId,num] = key.split(':');
    const book = hadithBookById(bookId);
    if(!book) return '';
    const h = hadithBookCache[bookId] ? hadithFindByNumber(bookId,num) : null;
    return `<div class="hd-hadith-row" onclick="hadithOpen('${bookId}',${num})">
      <div class="num">${num}</div>
      <div class="tx"><b style="font-family:inherit;font-size:11.5px;color:var(--teal-600);display:block;margin-bottom:2px;">${esc(book.title)}</b>${h?esc(hdTrunc(h.text,140)):'اضغط للفتح'}</div>
      <span class="save saved" onclick="${toggleFn}(event,'${bookId}',${num})">${icon}</span>
    </div>`;
  }).join('');
}
function renderHadithFavorites(){
  return hadithSavedListHtml(hadithBookmarks, 'toggleHadithBookmark', ICONS.bookmarkFill, 'لا توجد أحاديث مفضّلة بعد');
}
/* PHASE 7 — BOOKMARKS: separate "come back to this" place-markers, distinct
   from Favorites above. Same list layout, different icon/action/store. */

/* PHASE 7 — READING HISTORY: every hadith opened, newest first, grouped by
   day (اليوم / أمس / date) reusing the same day-label helpers as the app's
   chat-style history elsewhere. Remembers Last Book + Last Chapter + Last
   Hadith per entry, all read from localStorage — nothing here touches the
   network. */
function renderHadithHistory(){
  if(!hadithHistory.length) return emptyState('لا يوجد سجل قراءة بعد. كل حديث تفتحه سيظهر هنا.');
  let out = `<div style="padding:14px 16px 0;display:flex;justify-content:flex-end;">
    <button class="hd-action-btn" style="flex:none;padding:8px 16px;" onclick="hadithClearHistory()">${PICONS.trash} مسح السجل</button>
  </div>`;
  let lastLabel = null;
  hadithHistory.forEach(e=>{
    const book = hadithBookById(e.bookId); if(!book) return;
    const label = aiDateLabel(e.ts);
    if(label!==lastLabel){ out += `<div class="section-title" style="margin-top:6px;"><h2>${esc(label)}</h2></div>`; lastLabel = label; }
    const loaded = hadithBookCache[e.bookId];
    const section = loaded ? hadithSectionOf(e.bookId, e.num) : (e.sectionNum!=null ? {num:e.sectionNum} : null);
    const h = loaded ? hadithFindByNumber(e.bookId, e.num) : null;
    out += `<div class="hd-hadith-row" onclick="hadithOpen('${e.bookId}',${e.num})">
      <div class="num">${e.num}</div>
      <div class="tx">
        <b style="font-family:inherit;font-size:11.5px;color:var(--teal-600);display:block;margin-bottom:2px;">${esc(book.title)}${section&&section.title?' · '+esc(section.title):''}</b>
        ${h?esc(hdTrunc(h.text,120)):'اضغط لإعادة الفتح'}
      </div>
      <span style="font-size:10.5px;color:var(--text-soft);flex-shrink:0;align-self:flex-start;padding-top:2px;">${aiFormatTime(e.ts)}</span>
    </div>`;
  });
  return out;
}

/* ---- Dashboard-wide metrics: every number below is computed live from real
   app state (registered accounts, community store, ai chats) — nothing is
   hardcoded. Per-account activity data lives in shared device storage, so for
   the currently signed-in account we read the live values, and for every
   other account we read the snapshot captured at their last session. ---- */
function adminIsSelf(u){ const s=authGetSession(); return !!(s && s.userId===u.id); }
function adminUserValue(u, liveVal, snapKey){
  if(adminIsSelf(u)) return liveVal;
  return (u.statsSnapshot && u.statsSnapshot[snapKey]) || 0;
}
function adminDaysAgo(n){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-n); return d; }
function adminIsSameDay(iso, day){
  if(!iso) return false;
  const d = new Date(iso);
  return d.getFullYear()===day.getFullYear() && d.getMonth()===day.getMonth() && d.getDate()===day.getDate();
}
const ADMIN_WEEKDAYS_AR = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const ADMIN_MONTHS_AR = ['ينا','فبر','مار','أبر','ماي','يون','يول','أغس','سبت','أكت','نوف','ديس'];

function adminDashboardMetrics(){
  const users = authLoadUsers();
  const today = adminDaysAgo(0);
  const weekAgo = adminDaysAgo(7);
  const activeToday = users.filter(u=>adminIsSameDay(u.lastLoginAt, today)).length;
  const newThisWeek = users.filter(u=>u.createdAt && new Date(u.createdAt) >= weekAgo).length;
  const allPosts = communityAllPosts();
  const totalComments = allPosts.reduce((s,p)=>s+CommunityStore.commentCount(p.id),0);
  const totalAiConversations = users.reduce((s,u)=>s+adminUserValue(u, (typeof aiChats!=='undefined'?aiChats.length:0), 'aiConversations'),0);
  const totalTasbeeh = users.reduce((s,u)=>s+adminUserValue(u, statsDhikr().total, 'tasbeehTotal'),0);
  const totalQuranSessions = users.reduce((s,u)=>s+adminUserValue(u, statsQuran().surahsCompleted, 'quranSurahsRead'),0);
  const totalWirdCompletions = users.reduce((s,u)=>{
    if(adminIsSelf(u)) return s+statsWird().completed;
    const rate = (u.statsSnapshot && u.statsSnapshot.wirdSuccessRate) || 0;
    return s + Math.round(rate/100 * (typeof wirdGoals!=='undefined'?wirdGoals.length:0));
  },0);
  return {
    totalUsers: users.length, activeToday, newThisWeek,
    totalCommunities: COMMUNITIES.length, totalPosts: allPosts.length, totalComments,
    totalAiConversations, totalQuranSessions, totalTasbeeh, totalWirdCompletions,
  };
}

function adminChartDailyActive(){
  const users = authLoadUsers();
  const days = [];
  for(let i=6;i>=0;i--){
    const day = adminDaysAgo(i);
    const count = users.filter(u=>adminIsSameDay(u.lastLoginAt, day)).length;
    days.push({label: ADMIN_WEEKDAYS_AR[day.getDay()], count});
  }
  return days;
}
function adminChartWeeklyActivity(){
  // Logins bucketed by weekday across the account list — a weekly activity rhythm.
  const users = authLoadUsers();
  const byWeekday = new Array(7).fill(0);
  users.forEach(u=>{ if(u.lastLoginAt){ byWeekday[new Date(u.lastLoginAt).getDay()]++; } });
  return ADMIN_WEEKDAYS_AR.map((label,i)=>({label, count:byWeekday[i]}));
}
function adminChartMonthlyGrowth(){
  const users = authLoadUsers();
  const months = [];
  const now = new Date();
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const count = users.filter(u=>{
      if(!u.createdAt) return false;
      const c = new Date(u.createdAt);
      return c.getFullYear()===d.getFullYear() && c.getMonth()===d.getMonth();
    }).length;
    months.push({label: ADMIN_MONTHS_AR[d.getMonth()], count});
  }
  return months;
}
function adminChartAiUsage(){
  const days = [];
  const chats = (typeof aiChats!=='undefined') ? aiChats : [];
  for(let i=6;i>=0;i--){
    const day = adminDaysAgo(i);
    let count = 0;
    chats.forEach(ch=>(ch.messages||[]).forEach(m=>{ if(m.role==='user' && adminIsSameDay(new Date(m.time).toISOString(), day)) count++; }));
    days.push({label: ADMIN_WEEKDAYS_AR[day.getDay()], count});
  }
  return days;
}
function adminChartQuranProgress(){
  const users = authLoadUsers();
  const buckets = [{label:'0-25%',count:0},{label:'26-50%',count:0},{label:'51-75%',count:0},{label:'76-100%',count:0}];
  users.forEach(u=>{
    const pct = adminIsSelf(u) ? statsQuran().pct : ((u.statsSnapshot && u.statsSnapshot.quranPct) || 0);
    const idx = pct<=25?0:pct<=50?1:pct<=75?2:3;
    buckets[idx].count++;
  });
  return buckets;
}
function adminChartCommunityActivity(){
  return COMMUNITIES.map(c=>({label: String(c.name||'').slice(0,6), count: CommunityStore.getFeed(c.id).length}))
    .sort((a,b)=>b.count-a.count).slice(0,6);
}
