/* ---- USER MANAGEMENT (view/search/filter/sort: moderator+ · manage: superadmin only) ---- */
let adminUserSearchQuery = '';
let adminUserFilterRole = 'all';
let adminUserFilterStatus = 'all';
let adminUserSort = 'role';
let adminUserPage = 1;
const ADMIN_USERS_PAGE_SIZE = 8;

function onAdminUserSearchInput(val){
  adminUserSearchQuery = val;
  adminUserPage = 1;
  adminRefreshUsersList();
}
function setAdminUserFilterRole(role){ adminUserFilterRole = role; adminUserPage = 1; adminRefreshUsersView(); }
function setAdminUserFilterStatus(status){ adminUserFilterStatus = status; adminUserPage = 1; adminRefreshUsersView(); }
function onAdminUserSortChange(val){ adminUserSort = val; adminUserPage = 1; adminRefreshUsersList(); }
function adminUserGoPage(delta){
  adminUserPage = Math.max(1, adminUserPage + delta);
  adminRefreshUsersList();
}
function adminRefreshUsersList(){
  const wrap = document.getElementById('adminUsersListWrap');
  if(wrap) wrap.innerHTML = renderAdminUsersList();
}
function adminRefreshUsersView(){
  // filters change the chip highlighting too, so re-render the whole body
  const page = document.getElementById('adminUsersPageBody');
  if(page) page.innerHTML = renderAdminUsersBody();
}
function adminInitials(name){
  return ((name||'?').trim().split(/\s+/).slice(0,2).map(p=>p[0]||'').join('')||'?').toUpperCase();
}
function adminFilteredSortedUsers(){
  authSyncCurrentUserSnapshot(); // keep the signed-in account's own snapshot fresh while browsing here
  let users = authLoadUsers().slice();
  const q = adminUserSearchQuery;
  if(q && q.trim()){
    users = users.filter(u=> matchAr(u.name||'',q) || matchAr(u.username||'',q) || String(u.email||'').toLowerCase().includes(q.trim().toLowerCase()));
  }
  if(adminUserFilterRole!=='all') users = users.filter(u=>u.role===adminUserFilterRole);
  if(adminUserFilterStatus!=='all') users = users.filter(u=> adminUserFilterStatus==='suspended' ? u.status==='suspended' : u.status!=='suspended');
  const byNewest = (a,b)=> new Date(b.createdAt||0)-new Date(a.createdAt||0);
  if(adminUserSort==='role') users.sort((a,b)=> (ROLE_RANK[b.role]||0)-(ROLE_RANK[a.role]||0) || String(a.name).localeCompare(String(b.name),'ar'));
  else if(adminUserSort==='name') users.sort((a,b)=>String(a.name).localeCompare(String(b.name),'ar'));
  else if(adminUserSort==='newest') users.sort(byNewest);
  else if(adminUserSort==='oldest') users.sort((a,b)=>-byNewest(a,b));
  return users;
}
function renderAdminUsersList(){
  const all = adminFilteredSortedUsers();
  if(!all.length) return emptyState('لا يوجد مستخدمون مطابقون لبحثك أو عوامل التصفية');
  const totalPages = Math.max(1, Math.ceil(all.length/ADMIN_USERS_PAGE_SIZE));
  adminUserPage = Math.min(adminUserPage, totalPages);
  const start = (adminUserPage-1)*ADMIN_USERS_PAGE_SIZE;
  const pageUsers = all.slice(start, start+ADMIN_USERS_PAGE_SIZE);
  const rows = pageUsers.map(u=>`
    <div class="admin-user-row" onclick="navigateTo('adminUserDetail',{id:'${u.id}'})">
      <div class="au-avatar">${u.photoURL?`<img src="${u.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`:adminInitials(u.name)}</div>
      <div class="au-info">
        <div class="name">${esc(u.name)} <span class="role-badge ${u.role}">${ROLE_LABELS_AR[u.role]||u.role}</span>${u.status==='suspended'?`<span class="status-pill suspended">موقوف</span>`:''}</div>
        <div class="sub">@${esc(u.username||'')} · ${esc(u.email||'')}</div>
      </div>
      ${PICONS.chevron}
    </div>`).join('');
  return rows + `
    <div class="admin-pagination">
      <button class="btn-secondary" ${adminUserPage<=1?'disabled':''} onclick="adminUserGoPage(-1)">السابق</button>
      <span class="pg-lbl">صفحة ${adminUserPage} من ${totalPages} · ${all.length} مستخدم</span>
      <button class="btn-secondary" ${adminUserPage>=totalPages?'disabled':''} onclick="adminUserGoPage(1)">التالي</button>
    </div>`;

// Reads the existing offline AI knowledge base (read-only) to tally which topic
// each real user message is closest to — used only for the "most asked topics"
// analytics below. Nothing about the AI assistant itself is changed.
function adminAiTopics(limit){
  const chats = (typeof aiChats!=='undefined') ? aiChats : [];
  const tally = {};
  chats.forEach(ch=>(ch.messages||[]).forEach(m=>{
    if(m.role!=='user' || !m.text) return;
    const entry = (typeof aiClassifyOffline==='function') ? aiClassifyOffline(m.text) : null;
    const key = entry ? entry.keywords[0] : 'أسئلة عامة / متصلة بالإنترنت';
    tally[key] = (tally[key]||0)+1;
  }));
  return Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0, limit||5).map(([label,count])=>({label,count}));
}

/* -- Offline audio cache (IndexedDB): same pattern already used for hadith downloads above -- */
const AZAN_IDB_NAME = 'sakina_azan_store';
const AZAN_IDB_VERSION = 1;
const AZAN_IDB_STORE = 'audio';
let azanIdbPromise = null;
function azanIdbOpen(){
  if(azanIdbPromise) return azanIdbPromise;
  azanIdbPromise = new Promise((resolve)=>{
    if(typeof indexedDB==='undefined'){ resolve(null); return; }
    let req;
    try{ req = indexedDB.open(AZAN_IDB_NAME, AZAN_IDB_VERSION); }
    catch(e){ resolve(null); return; }
    req.onupgradeneeded = ()=>{ const db=req.result; if(!db.objectStoreNames.contains(AZAN_IDB_STORE)) db.createObjectStore(AZAN_IDB_STORE); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> resolve(null);
  });
  return azanIdbPromise;
}
async function azanIdbGet(key){
  const db = await azanIdbOpen(); if(!db) return undefined;
  return new Promise(resolve=>{
    try{
      const rq = db.transaction(AZAN_IDB_STORE,'readonly').objectStore(AZAN_IDB_STORE).get(key);
      rq.onsuccess = ()=> resolve(rq.result);
      rq.onerror = ()=> resolve(undefined);
    }catch(e){ resolve(undefined); }
  });
}
async function azanIdbSet(key, value){
  const db = await azanIdbOpen(); if(!db) return false;
  return new Promise(resolve=>{
    try{
      const tx = db.transaction(AZAN_IDB_STORE,'readwrite');
      tx.objectStore(AZAN_IDB_STORE).put(value, key);
      tx.oncomplete = ()=> resolve(true);
      tx.onerror = ()=> resolve(false);
    }catch(e){ resolve(false); }
  });
}
let azanCachedIds = new Set();
async function azanRefreshCachedStatus(){
  for(const m of MUEZZINS){
    const blob = await azanIdbGet(m.id);
    if(blob) azanCachedIds.add(m.id); else azanCachedIds.delete(m.id);
  }
  if(typeof render==='function') render();
}
/* Downloads + caches a muezzin's audio for offline use. Safe to call repeatedly — no-ops if already cached.
   NOTE: this fetch() reads the CDN's response bytes, which requires the CDN to send CORS headers for our
   origin. If it doesn't (or the request just times out on a weak connection), the fetch fails here — that's
   a source-CDN/network limitation, not something fixable from this page's own code. Streaming playback in
   previewMuezzin() below does NOT need CORS and keeps working online regardless of this failing. */
async function ensureAzanCached(id){
  const m = MUEZZINS.find(x=>x.id===id); if(!m) return false;
  const existing = await azanIdbGet(id);
  if(existing){ azanCachedIds.add(id); return true; }
  if(typeof navigator!=='undefined' && navigator.onLine===false) return false;
  try{
    // Plain timeout race (not an AbortController signal passed into fetch()) — some browser/webview
    // setups fail with "DataCloneError: AbortSignal object could not be cloned" if a signal is handed
    // to fetch, so we just abandon waiting on it instead of trying to truly cancel the request.
    const res = await Promise.race([
      fetch(m.url),
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('azan-fetch-timeout')), 15000)),
    ]);
    if(!res.ok){ console.warn('azan download: bad HTTP status', m.id, res.status); return false; }
    const blob = await res.blob();
    const ok = await azanIdbSet(id, blob);
    if(ok) azanCachedIds.add(id);
    return ok;
  }catch(e){
    // Logged (not shown to the user) so the real cause — CORS block, timeout, or genuine offline — can be
    // told apart in devtools instead of always looking like "no internet".
    console.warn('azan download failed', m.id, e && e.name, e && e.message);
    return false;
  }
}
/* Returns a playable URL for a muezzin: the offline-cached blob if we have it (works with no internet),
   otherwise falls back to streaming the CDN URL directly (works whenever the device is online). */
async function getAzanPlayableUrl(id){
  const m = MUEZZINS.find(x=>x.id===id) || MUEZZINS[0];
  try{
    const blob = await azanIdbGet(m.id);
    if(blob){
      // Some browsers (notably older Android WebViews) refuse to decode a blob: URL
      // whose Blob has no/incorrect MIME type. The bytes are always MP3 here (see
      // ensureAzanCached's fetch above), so make sure the type is set even if the
      // original response was missing a Content-Type header.
      const typed = blob.type && blob.type.startsWith('audio') ? blob : new Blob([blob], {type:'audio/mpeg'});
      return {url:URL.createObjectURL(typed), isBlob:true};
    }
  }catch(e){
    console.warn('azan cached-blob read failed, falling back to streaming', m.id, e);
  }
  ensureAzanCached(m.id); // opportunistically cache for next time, don't block playback on it
  return {url:m.url, isBlob:false};
}
function downloadMuezzinOffline(id, ev){
  if(ev){ ev.stopPropagation(); ev.preventDefault(); }
  const m = MUEZZINS.find(x=>x.id===id); if(!m) return;
  showToast('جاري التحميل للاستخدام بدون إنترنت...');
  ensureAzanCached(id).then(ok=>{
    showToast(ok? `تم تحميل أذان ${m.name} — سيعمل حتى بدون إنترنت ✓` : 'تعذّر التحميل، تحقّق من اتصال الإنترنت وحاول مجددًا');
    render();
  });
}

/* -- Mobile/Android autoplay unlock --------------------------------------
   Prayer-time adhan playback (playAzan, below) is triggered by a setInterval
   timer, not a tap — and most mobile browsers (Chrome/WebView on Android in
   particular) block audio.play() unless it happens during, or shortly after,
   a real user gesture. Without this, the adhan can silently fail to play on
   exactly the devices/moments it matters most.
   Fix: the first tap/touch anywhere in the app plays+immediately-pauses a
   silent clip, which "unlocks" audio playback for the rest of the session,
   so the later timer-triggered play() calls are allowed through. */
let azanAudioUnlocked = false;
const AZAN_SILENT_WAV = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==';
function azanUnlockAudio(){
  if(azanAudioUnlocked) return;
  azanAudioUnlocked = true;
  try{
    const a = new Audio(AZAN_SILENT_WAV);
    a.volume = 0;
    const p = a.play();
    if(p && p.catch) p.then(()=>{ try{ a.pause(); }catch(e){} }).catch(()=>{ /* fine — a real gesture will unlock it anyway */ });
  }catch(e){}
}
['touchstart','click','keydown'].forEach(ev=>{
  document.addEventListener(ev, azanUnlockAudio, {once:true, passive:true});
});

let azanPreviewAudio = null, azanPreviewAudioUrlIsBlob = false, azanLiveAudio = null;
async function previewMuezzin(id, ev){
  if(ev){ ev.stopPropagation(); ev.preventDefault(); }
  azanUnlockAudio(); // this IS a user gesture, but call anyway in case it's the very first one
  const m = MUEZZINS.find(x=>x.id===id); if(!m) return;
  if(azanPreviewAudio){
    try{ azanPreviewAudio.pause(); }catch(e){}
    if(azanPreviewAudioUrlIsBlob){ try{ URL.revokeObjectURL(azanPreviewAudio.src); }catch(e){} }
  }
  let {url, isBlob} = await getAzanPlayableUrl(id);
  azanPreviewAudioUrlIsBlob = isBlob;
  azanPreviewAudio = new Audio();
  azanPreviewAudio.preload = 'auto';
  // Two distinct failure points: play() itself can reject immediately (e.g. blocked), or the browser can
  // fail to actually load the stream a moment later (e.g. the CDN request errors out) — both need a toast,
  // and neither should be confused with the "تعذّر التحميل" offline-download message above.
  let fallenBack = false;
  azanPreviewAudio.addEventListener('error', ()=>{
    console.warn('azan preview stream failed', m.id, azanPreviewAudio.error);
    // If we were playing a cached blob and it failed to decode/load, retry once by
    // streaming straight from the CDN instead of giving up.
    if(!fallenBack && isBlob){
      fallenBack = true;
      if(azanPreviewAudioUrlIsBlob){ try{ URL.revokeObjectURL(azanPreviewAudio.src); }catch(e){} }
      azanPreviewAudioUrlIsBlob = false;
      azanPreviewAudio.src = m.url;
      azanPreviewAudio.load();
      azanPreviewAudio.play().catch(()=>{ showToast('تعذّر تشغيل المعاينة، تحقّق من الاتصال بالإنترنت'); });
      return;
    }
    showToast('تعذّر تشغيل المعاينة، تحقّق من الاتصال بالإنترنت');
  });
  azanPreviewAudio.src = url;
  azanPreviewAudio.load();
  azanPreviewAudio.play().catch(e=>{
    console.warn('azan preview play() rejected', m.id, e && e.name, e && e.message);
    if(e && e.name==='NotAllowedError') showToast('اضغط مرة أخرى لتشغيل المعاينة');
    else showToast('تعذّر تشغيل المعاينة، تحقّق من الاتصال بالإنترنت');
  });
}
/* Called every second from the global tick (see PRAYERS tick below) while the app is open.
   Fires only if the super admin's master switch is on AND this user hasn't turned azan off personally. */
function checkAzanTrigger(){
  if(!adminAppSettings.azanEnabled) return;
  if(typeof appSettings!=='undefined' && appSettings.azanAutoPlay===false) return;
  const nowMs = cairoNow().getTime();
  const lastFired = localStorage.getItem('sakina_azan_last_fired');
  for(const p of PRAYERS){
    const pMs = p.date.getTime();
    if(pMs<=nowMs && (nowMs-pMs)<4000){
      const key = String(pMs);
      if(lastFired===key) continue;
      localStorage.setItem('sakina_azan_last_fired', key);
      playAzan(p.name);
      break;
    }
  }
}
/* Plays the adhan for a prayer, with a fallback chain so a broken/uncached URL for the
   user's chosen muezzin doesn't mean total silence at prayer time:
   cached blob (chosen) -> streamed CDN URL (chosen) -> streamed CDN URL (default: Alafasy). */
async function playAzan(prayerName){
  const chosenId = (typeof appSettings!=='undefined' && appSettings.azanMuezzinId) || 'alafasy';
  showToast(`حان الآن وقت أذان ${prayerName} 🕌`);
  const tryPlay = (url)=>new Promise((resolve)=>{
    try{
      if(azanLiveAudio){ try{ azanLiveAudio.pause(); }catch(e){} }
      azanLiveAudio = new Audio();
      azanLiveAudio.preload = 'auto';
      let settled = false;
      azanLiveAudio.addEventListener('error', ()=>{ if(!settled){ settled=true; resolve(false); } });
      azanLiveAudio.src = url;
      azanLiveAudio.load();
      azanLiveAudio.play().then(()=>{ if(!settled){ settled=true; resolve(true); } }).catch((e)=>{
        console.warn('adhan play() rejected', e && e.name, e && e.message);
        if(!settled){ settled=true; resolve(false); }
      });
    }catch(e){ resolve(false); }
  });
  try{
    const {url} = await getAzanPlayableUrl(chosenId);
    let ok = await tryPlay(url);
    if(!ok && chosenId!=='alafasy'){
      // Chosen muezzin's audio failed entirely (bad cache, dead CDN path, etc.) —
      // fall back to the default rather than the adhan going silent at prayer time.
      const fallback = MUEZZINS.find(x=>x.id==='alafasy');
      if(fallback) ok = await tryPlay(fallback.url);
    }
    if(!ok) console.warn('adhan playback failed for all fallbacks at', prayerName);
  }catch(e){ console.warn('playAzan failed', e); }
}

/* ---- RBAC: per-account stats snapshot for the admin "User Profile Inspection" screen ----
   This app's activity data (Quran progress, tasbeeh, wird, posts, saved items, AI chats...)
   lives in shared local-storage keys on this device rather than namespaced per account.
   So the live numbers below always describe whoever is CURRENTLY signed in; authSyncCurrentUserSnapshot()
   captures that live state into the signed-in user's own record (called on logout, and whenever a
   Super Admin/Admin/Moderator opens their own profile in User Management) so their stats stay current
   for later inspection. Other accounts show the snapshot captured during their own last session. */
function authComputeLiveStatsSnapshot(){
  const q = statsQuran(), w = statsWird(), d = statsDhikr(), c = statsCommunity();
  const ach = (typeof getProfileAchievements==='function') ? getProfileAchievements() : [];
  const aiUsage = (typeof aiChats!=='undefined') ? aiChats.reduce((s,ch)=>s+((ch.messages||[]).filter(m=>m.role==='user').length),0) : 0;
  const aiConversations = (typeof aiChats!=='undefined') ? aiChats.length : 0;
  const saved = (typeof hadithBookmarks!=='undefined'?hadithBookmarks.size:0) + (typeof savedProjects!=='undefined'?savedProjects.size:0)
    + (typeof savedSurahs!=='undefined'?savedSurahs.size:0) + (typeof savedAyahs!=='undefined'?savedAyahs.size:0);
  return {
    quranPct: q.pct, wirdSuccessRate: w.successRate, tasbeehTotal: d.total,
    achievementsDone: ach.filter(a=>a.done).length, achievementsTotal: ach.length,
    communitiesJoined: c.joined, posts: c.posts, comments: c.commentsWritten,
    savedItems: saved, aiUsage,
    quranSurahsRead: q.surahsCompleted, quranPagesRead: q.pagesRead, quranJuz: q.juzCompleted,
    wirdStreak: w.streak, aiConversations,
    lastActivityAt: new Date().toISOString(),
  };
}
function authSyncCurrentUserSnapshot(){
  const s = authGetSession(); if(!s) return;
  const users = authLoadUsers();
  const idx = users.findIndex(u=>u.id===s.userId);
  if(idx===-1) return;
  const snap = authComputeLiveStatsSnapshot();
  users[idx].statsSnapshot = snap;
  authSaveUsers(users);
  // Issue: "Super Admin can't really see members' real data" — this write is what carries
  // MY OWN real Quran/Adhkar/Wird/community activity out to Firebase so every other
  // signed-in device (including the Super Admin's) can see it live via
  // startUsersDirectoryLiveSync's merge below, instead of frozen zeros.
  if(isFirebaseConfigured()){
    window.SAKINA_FIREBASE.db.update('users/'+s.userId+'/profile', {statsSnapshot:snap})
      .catch(e=>console.error('activity stats sync failed', e));
  }
}

  return `
  <svg class="ring-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="ring-track" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"/>
    <circle class="ring-progress" data-target="${offset}" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}" stroke-dasharray="${c}" stroke-dashoffset="${c}"/>
    <text class="ring-center-text" x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-size="${size*0.24}">${valueText}</text>

}

function joinDateFormatted(){

function handleAvatarUpload(e){
  const f=e.target.files && e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=()=>{
    userProfile.avatar=reader.result; saveProfile(); render(); showToast('تم تحديث الصورة الشخصية ✓');
    // Best-effort: also store on the Firebase profile record so the Super Admin
    // dashboard's "Profile Picture" column has it without needing appData access.
    if(isFirebaseConfigured()){
      const uid = window.SAKINA_FIREBASE.auth.currentUid();
      if(uid) window.SAKINA_FIREBASE.db.update('users/'+uid+'/profile', {photoURL:userProfile.avatar}).catch(e=>console.error('avatar profile sync failed', e));
    }
  };
  reader.readAsDataURL(f);
}
function handleCoverUpload(e){
  const f=e.target.files && e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=()=>{ userProfile.cover=reader.result; saveProfile(); render(); showToast('تم تحديث صورة الغلاف ✓'); };
  reader.readAsDataURL(f);
}

function timeAgo(ts){
  const diff=Math.floor((Date.now()-ts)/1000);
  if(diff<60) return 'الآن';
  if(diff<3600) return Math.floor(diff/60)+' د';
  if(diff<86400) return Math.floor(diff/3600)+' س';
  return Math.floor(diff/86400)+' يوم';
}

const WIRD_TYPES = [
  {id:'quran_pages', label:'صفحات القرآن', unit:'صفحة', icon:'📖', defaultTarget:5},
  {id:'quran_juz', label:'أجزاء القرآن', unit:'جزء', icon:'📗', defaultTarget:1},

  {id:'dhikr', label:'ذكر يومي', unit:'مرة', icon:'✨', defaultTarget:100},
];
function wirdTypeInfo(typeId){ return WIRD_TYPES.find(t=>t.id===typeId) || WIRD_TYPES[0]; }
function wirdTypeLabel(typeId){ return wirdTypeInfo(typeId).label; }

let wirdGoals = JSON.parse(localStorage.getItem('sakina_wird_goals')||'null') || [
  {id:'g1', typeId:'quran_pages', target:5},
  {id:'g2', typeId:'istighfar', target:100},
  {id:'g3', typeId:'salawat', target:100},
];
function saveWirdGoals(){ localStorage.setItem('sakina_wird_goals', JSON.stringify(wirdGoals)); }

let wirdLog = JSON.parse(localStorage.getItem('sakina_wird_log')||'{}');
function wirdSaveLog(){ localStorage.setItem('sakina_wird_log', JSON.stringify(wirdLog)); }
function wirdTodayVal(goalId){ const day=wirdLog[todayKey()]; return (day && day[goalId])||0; }
function wirdSetVal(goalId, val){
  const key=todayKey();
  if(!wirdLog[key]) wirdLog[key]={};
  wirdLog[key][goalId]=Math.max(0,val);
  wirdSaveLog();
}
function wirdDayPercent(d){
  const day=wirdLog[todayKey(d)];
  if(!day || wirdGoals.length===0) return 0;
  let sum=0;
  wirdGoals.forEach(g=>{ sum += Math.min(1, (day[g.id]||0)/g.target); });
  return Math.round((sum/wirdGoals.length)*100);
}
function wirdOverallPercent(){ return wirdDayPercent(new Date()); }
function wirdLast7Days(){
  const names=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  const arr=[];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); arr.push({label:names[d.getDay()], pct:wirdDayPercent(d)}); }
  return arr;
}
function wirdMonthAvg(){
  let sum=0,count=0;
  for(let i=0;i<30;i++){ const d=new Date(); d.setDate(d.getDate()-i); if(wirdLog[todayKey(d)]){ sum+=wirdDayPercent(d); count++; } }
  return count? Math.round(sum/count):0;
}
function wirdFullDaysThisMonth(){
  let count=0;
  for(let i=0;i<30;i++){ const d=new Date(); d.setDate(d.getDate()-i); if(wirdDayPercent(d)>=100) count++; }
  return count;
}
function wirdStreak(){
  let streak=0; let d=new Date();
  if(wirdDayPercent(new Date())<100) d.setDate(d.getDate()-1);
  for(;;){ if(wirdDayPercent(d)>=100){ streak++; d.setDate(d.getDate()-1);} else break; }
  return streak;
}
function wirdIncrement(goalId, amount){
  const goal=wirdGoals.find(g=>g.id===goalId); if(!goal) return;
  const cur=wirdTodayVal(goalId);
  const wasComplete = cur>=goal.target;
  const newVal=cur+amount;
  wirdSetVal(goalId,newVal);
  if(!wasComplete && newVal>=goal.target){
    showToast('🎉 أتممت هدف «'+wirdTypeLabel(goal.typeId)+'» اليوم، بارك الله فيك!');
  }
  if(wirdOverallPercent()>=100){
    const key=todayKey();
    if(wirdLog[key] && !wirdLog[key]._allDoneShown){
      wirdLog[key]._allDoneShown=true; wirdSaveLog();
      showToast('🤍 ما شاء الله! أتممت جميع أهداف وردك اليوم');
    }
  }
  render();
}

function renderWird(){
  const goals = wirdGoals;
  const totalPct = wirdOverallPercent();
  const R=100, C=2*Math.PI*R;
  const offset = C*(1-Math.min(1,totalPct/100));
  const remaining = goals.filter(g=>wirdTodayVal(g.id) < g.target).length;

  return `

      <div class="tsb-ring-wrap">

        </svg>

    <div class="tsb-section-title">التقدم الأسبوعي</div>

}

function exportUserData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); data[k]=localStorage.getItem(k); }
  const blob=new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='sakina-data-export.json'; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('تم تصدير بياناتك ✓');
}
function triggerImportBackup(){
  const inp=document.getElementById('backupFileInput');
  if(inp) inp.click();
}
function importUserData(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || typeof data !== 'object') throw new Error('invalid');
      Object.keys(data).forEach(k=>localStorage.setItem(k, data[k]));
      showToast('تم استيراد النسخة الاحتياطية، جارٍ إعادة التحميل...');
      setTimeout(()=>location.reload(), 900);
    }catch(e){
      showToast('تعذّر قراءة ملف النسخة الاحتياطية، تأكد أنه الملف الصحيح');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function communityInitials(name){
  const parts=(name||'').trim().split(/\s+/);
  return (parts.slice(0,2).map(w=>w[0]||'').join('')||'ع').toUpperCase();
}
function avatarColorFor(name){
  const palette=[['var(--teal-500)','var(--teal-700)'],['#c99b62','#8a5a2b'],['#2b78c4','#154a80'],['#8a5ac9','#4a2b80'],['#c95a7a','#802b4a'],['#4a9c6d','#1f5c3a']];
  let h=0; for(let i=0;i<(name||'').length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  return palette[h%palette.length];
}
/* ---- Real community ownership/permissions ----
   Replaces the old isCurrentUserAdmin/isCurrentUserMod flags (which were hardcoded
   `true` in the COMMUNITIES seed, so literally every visitor saw themselves as the
   owner of community #1). Ownership is now tracked with real Firebase uids
   (c.ownerUid, c.adminUids[], c.modUids[]) synced through the existing
   communityOverrides Firebase node — same mechanism as name/desc/rules/privacy.
   Super Admin always has full control (bootstrap + safety net); a community's
   owner/admins are assigned by Super Admin from "نقل الملكية / تعيين مشرفين"
   in community settings (see openCommunityOwnershipSheet). */
function communityUserName(uid){
  if(!uid) return null;
  const u = authLoadUsers().find(x=>x.id===uid);
  return u ? u.name : null;
}
function isAdminOfCommunity(c){
  if(!c) return false;
  if(typeof authIsSuperAdmin==='function' && authIsSuperAdmin()) return true;
  const u = typeof authCurrentUser==='function' ? authCurrentUser() : null;
  if(!u) return false;
  if(c.ownerUid && c.ownerUid===u.id) return true;
  return !!(c.adminUids||[]).includes(u.id);
}
function isModOfCommunity(c){
  if(isAdminOfCommunity(c)) return true;
  if(!c) return false;
  const u = typeof authCurrentUser==='function' ? authCurrentUser() : null;
  if(!u) return false;
  return !!(c.modUids||[]).includes(u.id);
}
function communityAdmins(c){
  const list=[...(c.admins||[])];
  const ownerName = communityUserName(c.ownerUid);
  if(ownerName && !list.includes(ownerName)) list.unshift(ownerName);
  (c.adminUids||[]).forEach(uid=>{ const n=communityUserName(uid); if(n && !list.includes(n)) list.push(n); });
  return list;
}
function communityMods(c){
  const list=[...(c.mods||[])];
  (c.modUids||[]).forEach(uid=>{ const n=communityUserName(uid); if(n && !list.includes(n)) list.push(n); });
  return list;
}

}

const CommunityStore = (function(){
  const K_POSTS='sakina_c_posts', K_COMMENTS='sakina_c_comments', K_LIKES='sakina_c_likes',
        K_SAVES='sakina_c_saves', K_CLIKES='sakina_c_clikes', K_BANNED='sakina_c_banned',
        K_MUTED='sakina_c_muted', K_LOCKED='sakina_c_locked', K_POLLVOTES='sakina_c_pollvotes',
        K_DRAFTS='sakina_c_drafts';
  // Issue 1 fix: root paths in the Firebase Realtime Database that every
  // account reads/writes, so posts and comments are shared instead of
  // living only in this device's localStorage.
  const FB_POSTS_PATH = 'communityPosts';
  const FB_COMMENTS_PATH = 'communityComments';
  const FB_MODERATION_PATH = 'communityModeration';

  let posts = JSON.parse(localStorage.getItem(K_POSTS)||'null');
  if(!posts){ posts = seedCommunityPosts(); localStorage.setItem(K_POSTS, JSON.stringify(posts)); }
  let comments = JSON.parse(localStorage.getItem(K_COMMENTS)||'null');
  if(!comments){ comments = seedCommunityComments(); localStorage.setItem(K_COMMENTS, JSON.stringify(comments)); }
  let liked = new Set(JSON.parse(localStorage.getItem(K_LIKES)||'[]'));
  let saved = new Set(JSON.parse(localStorage.getItem(K_SAVES)||'[]'));
  let clikes = new Set(JSON.parse(localStorage.getItem(K_CLIKES)||'[]'));
  let banned = JSON.parse(localStorage.getItem(K_BANNED)||'{}');
  let muted = JSON.parse(localStorage.getItem(K_MUTED)||'{}');
  let locked = new Set(JSON.parse(localStorage.getItem(K_LOCKED)||'[]'));
  let pollVotes = JSON.parse(localStorage.getItem(K_POLLVOTES)||'{}');

  // Debounced per-key push queue (same pattern as syncQueuePush above), so
  // rapid successive writes (e.g. someone spamming a like button) don't
  // spam the network with one request per keystroke.
  let fbPushTimers = {};
  function fbPush(path, value){
    if(!isFirebaseConfigured()) return;
    clearTimeout(fbPushTimers[path]);
    fbPushTimers[path] = setTimeout(()=>{
      window.SAKINA_FIREBASE.db.set(path, value).catch(e=>console.error('community sync push failed', path, e));
    }, 400);
  }

  // `changedPostId`/`changedPostIds`: which post(s) actually changed, so we push
  // only that post's node to Firebase (communityPosts/{id}) instead of the whole
  // collection — avoids clobbering posts created concurrently by other accounts.
  function pPosts(changedPostIds){
    localStorage.setItem(K_POSTS, JSON.stringify(posts));
    recomputePostCounts();
    const ids = changedPostIds==null ? [] : (Array.isArray(changedPostIds) ? changedPostIds : [changedPostIds]);
    ids.forEach(id=>{
      const p = posts.find(x=>x.id===id);
      if(p) fbPush(FB_POSTS_PATH+'/'+id, p);
    });
  }
  // Comments are pushed per-post (the whole thread for that one post), which
  // keeps collisions limited to two people commenting on the exact same post
  // in the same instant — far narrower than a single blob for all posts.
  function pComments(postId){
    localStorage.setItem(K_COMMENTS, JSON.stringify(comments));
    if(postId) fbPush(FB_COMMENTS_PATH+'/'+postId, comments[postId]||[]);
  }
  function pLiked(){ localStorage.setItem(K_LIKES, JSON.stringify([...liked])); }
  function pSaved(){ localStorage.setItem(K_SAVES, JSON.stringify([...saved])); }
  function pClikes(){ localStorage.setItem(K_CLIKES, JSON.stringify([...clikes])); }
  function pBanned(){ localStorage.setItem(K_BANNED, JSON.stringify(banned)); fbPush(FB_MODERATION_PATH+'/banned', banned); }
  function pMuted(){ localStorage.setItem(K_MUTED, JSON.stringify(muted)); fbPush(FB_MODERATION_PATH+'/muted', muted); }
  function pLocked(){ localStorage.setItem(K_LOCKED, JSON.stringify([...locked])); }
  function pPollVotes(){ localStorage.setItem(K_POLLVOTES, JSON.stringify(pollVotes)); }
  // Keeps c.posts on every community real and live — replaces the old frozen
  // seed number. Counts only visible posts (not deleted/pending), matching
  // what getFeed() actually shows.
  function recomputePostCounts(){
    if(typeof COMMUNITIES==='undefined') return;
    const counts = {};
    posts.forEach(p=>{ if(!p.deleted && !p.pendingApproval) counts[p.communityId]=(counts[p.communityId]||0)+1; });
    COMMUNITIES.forEach(c=>{ c.posts = counts[c.id]||0; });
  }
  recomputePostCounts();

  // Starts the live two-way sync with Firebase. Safe to call multiple times.
  // Real-time listeners (onValue, via the app's fb.db.onChange bridge) mean
  // a post/comment created, edited, or deleted on one account appears on
  // every other signed-in account instantly, with no page refresh.
  let fbSyncStarted = false;
  function initFirebaseSync(){
    if(!isFirebaseConfigured() || fbSyncStarted) return;
    fbSyncStarted = true;
    const fb = window.SAKINA_FIREBASE;

    let postsFirstCallback = true;
    // Tracks which post ids this device already knows about, so we can tell
    // a genuinely new post (created by someone, somewhere, just now) apart
    // from the initial full sync of pre-existing posts. Stays null until the
    // first real batch of posts is loaded. knownPostLikes tracks each known
    // post's like count, so a real rise in likes on one of MY posts (not
    // just "posts exist") is what triggers a like notification — never a
    // fabricated one.
    let knownPostIds = null;
    let knownPostLikes = null;
    fb.db.onChange(FB_POSTS_PATH, (val)=>{
      if(postsFirstCallback){
        postsFirstCallback = false;
        if(val==null && posts.length){
          // First run ever for this Firebase project: seed the shared posts
          // collection from whatever this device already has (the built-in
          // demo posts), so every other account starts from the same feed.
          const obj = {}; posts.forEach(p=>{ obj[p.id]=p; });
          window.SAKINA_FIREBASE.db.set(FB_POSTS_PATH, obj).catch(e=>console.error('community posts seed failed', e));
          return;
        }
      }
      if(val==null) return;
      const incoming = Object.values(val).sort((a,b)=>(b.time||0)-(a.time||0));
      if(knownPostIds===null){
        // Initial load: just learn what already exists, don't notify about it.
        knownPostIds = new Set(incoming.map(p=>p.id));
        knownPostLikes = new Map(incoming.map(p=>[p.id, p.likes||0]));
      } else {
        incoming.forEach(p=>{
          if(!knownPostIds.has(p.id)){
            knownPostIds.add(p.id);
            knownPostLikes.set(p.id, p.likes||0);
            // Only notify about real, visible posts from other members, in
            // communities this device has actually joined.
            if(p.deleted || p.pendingApproval) return;
            if(p.authorName===userProfile.name) return;
            if(!joinedSet.has(p.communityId)) return;
            pushCommunityNotification('community', 'منشور جديد في '+communityNameById(p.communityId),
              p.authorName+' شارك: '+String(p.text||'').slice(0,60), {page:'postDetail', data:{id:p.id}});
            updateNotifBadge();
            return;
          }
          // Existing post: a real rise in its like count, on a post that is
          // actually mine, is a real "someone liked your post" event.
          const prevLikes = knownPostLikes.get(p.id)||0;
          const nowLikes = p.likes||0;
          if(nowLikes>prevLikes && p.authorName===userProfile.name && !p.deleted){
            pushCommunityNotification('like', 'إعجاب بمشاركتك',
              'أعجب أحد الأعضاء بمشاركتك في '+communityNameById(p.communityId)+'.', {page:'postDetail', data:{id:p.id}});
            updateNotifBadge();
          }
          knownPostLikes.set(p.id, nowLikes);
        });
      }
      posts = incoming;
      localStorage.setItem(K_POSTS, JSON.stringify(posts));
      recomputePostCounts();
      if(typeof render==='function') render();
    });

    let commentsFirstCallback = true;
    // Tracks which comment ids this device already knows about, so a
    // genuinely new comment on one of MY posts (added by someone else) can
    // trigger a real notification instead of a scripted one.
    let knownCommentIds = null;
    fb.db.onChange(FB_COMMENTS_PATH, (val)=>{
      if(commentsFirstCallback){
        commentsFirstCallback = false;
        if(val==null && Object.keys(comments).length){
          window.SAKINA_FIREBASE.db.set(FB_COMMENTS_PATH, comments).catch(e=>console.error('community comments seed failed', e));
          return;
        }
      }
      if(val==null) return;
      const incomingAll = [];
      Object.keys(val).forEach(postId=>(val[postId]||[]).forEach(c=>incomingAll.push(Object.assign({postId}, c))));
      if(knownCommentIds===null){
        knownCommentIds = new Set(incomingAll.map(c=>c.id));
      } else {
        incomingAll.forEach(c=>{
          if(knownCommentIds.has(c.id)) return;
          knownCommentIds.add(c.id);
          if(c.deleted || c.authorName===userProfile.name) return;
          const post = posts.find(p=>p.id===c.postId);
          if(!post || post.authorName!==userProfile.name || post.deleted) return;
          pushCommunityNotification('comment', 'تعليق جديد على مشاركتك',
            c.authorName+' علّق: '+String(c.text||'').slice(0,60), {page:'postDetail', data:{id:c.postId}});
          updateNotifBadge();
        });
      }
      comments = val;
      localStorage.setItem(K_COMMENTS, JSON.stringify(comments));
      if(typeof render==='function') render();
    });

    let bannedFirstCallback = true;
    fb.db.onChange(FB_MODERATION_PATH+'/banned', (val)=>{
      if(bannedFirstCallback){
        bannedFirstCallback = false;
        if(val==null && Object.keys(banned).length){
          window.SAKINA_FIREBASE.db.set(FB_MODERATION_PATH+'/banned', banned).catch(e=>console.error('community banned-list seed failed', e));
          return;
        }
      }
      if(val==null) return;
      banned = val;
      localStorage.setItem(K_BANNED, JSON.stringify(banned));
      if(typeof render==='function') render();
    });

    let mutedFirstCallback = true;
    fb.db.onChange(FB_MODERATION_PATH+'/muted', (val)=>{
      if(mutedFirstCallback){
        mutedFirstCallback = false;
        if(val==null && Object.keys(muted).length){
          window.SAKINA_FIREBASE.db.set(FB_MODERATION_PATH+'/muted', muted).catch(e=>console.error('community muted-list seed failed', e));
          return;
        }
      }
      if(val==null) return;
      muted = val;
      localStorage.setItem(K_MUTED, JSON.stringify(muted));
      if(typeof render==='function') render();
    });

    if(typeof startCommunityOverridesLiveSync==='function') startCommunityOverridesLiveSync();
    if(typeof startCommunityRequestsLiveSync==='function') startCommunityRequestsLiveSync();
    if(typeof startApprovedCommunitiesLiveSync==='function') startApprovedCommunitiesLiveSync();
  }

  return {
    initFirebaseSync,
    getFeed(communityId){ return posts.filter(p=>p.communityId===communityId && !p.deleted && !p.pendingApproval); },
    getPendingPosts(communityId){ return posts.filter(p=>p.communityId===communityId && !p.deleted && p.pendingApproval); },
    approvePost(id){ const p=posts.find(x=>x.id===id); if(p){ p.pendingApproval=false; pPosts(id); } },
    getPost(id){ return posts.find(x=>x.id===id); },
    createPost(obj){ posts.unshift(obj); pPosts(obj.id); return obj; },
    updatePost(id, patch){ const p=posts.find(x=>x.id===id); if(p) Object.assign(p, patch, {edited:true}); pPosts(id); },
    deletePost(id){ const p=posts.find(x=>x.id===id); if(p) p.deleted=true; pPosts(id); },
    toggleLike(id){
      if(liked.has(id)) liked.delete(id); else liked.add(id);
      pLiked();
      const p=posts.find(x=>x.id===id); if(p) p.likes=Math.max(0,(p.likes||0)+(liked.has(id)?1:-1));
      pPosts(id);
      return liked.has(id);
    },
    isLiked(id){ return liked.has(id); },
    toggleSave(id){ if(saved.has(id)) saved.delete(id); else saved.add(id); pSaved(); return saved.has(id); },
    isSaved(id){ return saved.has(id); },
    togglePin(id){ const p=posts.find(x=>x.id===id); if(p){ p.pinned=!p.pinned; pPosts(id); return p.pinned; } return false; },
    toggleLock(id){ if(locked.has(id)) locked.delete(id); else locked.add(id); pLocked(); return locked.has(id); },
    isLocked(id){ return locked.has(id); },
    markBestAnswer(postId, commentId){ const p=posts.find(x=>x.id===postId); if(p){ p.bestAnswerId=commentId; p.solved=true; pPosts(postId); } },
    unmarkBestAnswer(postId){ const p=posts.find(x=>x.id===postId); if(p){ p.bestAnswerId=null; p.solved=false; pPosts(postId); } },
    votePoll(postId, optIdx){
      const p=posts.find(x=>x.id===postId); if(!p||!p.poll) return;
      const prev = pollVotes[postId];
      if(prev===optIdx) return;
      if(prev!==undefined) p.poll.options[prev].votes=Math.max(0,p.poll.options[prev].votes-1);
      p.poll.options[optIdx].votes++;
      pollVotes[postId]=optIdx; pPollVotes(); pPosts(postId);
    },
    myVote(postId){ return pollVotes[postId]; },
    getComments(postId){ return (comments[postId]||[]).filter(c=>!c.deleted); },
    addComment(postId, text, parentId){
      if(!comments[postId]) comments[postId]=[];
      const c = {id:'c_'+Date.now()+Math.floor(Math.random()*1000), postId, authorName:userProfile.name, isMe:true, text, time:Date.now(), parentId:parentId||null, likes:0, deleted:false, edited:false};
      comments[postId].push(c); pComments(postId);
      return c;
    },
    editComment(postId, cid, text){ const arr=comments[postId]||[]; const c=arr.find(x=>x.id===cid); if(c){ c.text=text; c.edited=true; pComments(postId); } },
    deleteComment(postId, cid){ const arr=comments[postId]||[]; const c=arr.find(x=>x.id===cid); if(c){ c.deleted=true; pComments(postId); } },
    toggleCommentLike(postId, cid){
      if(clikes.has(cid)) clikes.delete(cid); else clikes.add(cid);
      pClikes();
      const arr=comments[postId]||[]; const c=arr.find(x=>x.id===cid); if(c) c.likes=Math.max(0,(c.likes||0)+(clikes.has(cid)?1:-1));
      pComments(postId);
      return clikes.has(cid);
    },
    isCommentLiked(cid){ return clikes.has(cid); },
    commentCount(postId){ return (comments[postId]||[]).filter(c=>!c.deleted).length; },
    isBanned(cid, name){ return (banned[cid]||[]).includes(name); },
    toggleBan(cid, name){
      if(!banned[cid]) banned[cid]=[];
      const i=banned[cid].indexOf(name);
      if(i>-1) banned[cid].splice(i,1); else banned[cid].push(name);
      pBanned(); return banned[cid].includes(name);
    },
    isMuted(cid, name){ return (muted[cid]||[]).includes(name); },
    toggleMute(cid, name){
      if(!muted[cid]) muted[cid]=[];
      const i=muted[cid].indexOf(name);
      if(i>-1) muted[cid].splice(i,1); else muted[cid].push(name);
      pMuted(); return muted[cid].includes(name);
    },
    saveDraft(obj){ const drafts=JSON.parse(localStorage.getItem(K_DRAFTS)||'[]'); drafts.unshift(obj); localStorage.setItem(K_DRAFTS, JSON.stringify(drafts)); },
    getDrafts(communityId){ return JSON.parse(localStorage.getItem(K_DRAFTS)||'[]').filter(d=>d.communityId===communityId); },
    deleteDraft(idx){ const drafts=JSON.parse(localStorage.getItem(K_DRAFTS)||'[]'); drafts.splice(idx,1); localStorage.setItem(K_DRAFTS, JSON.stringify(drafts)); },
  };
})();

function communityAllPosts(){ return COMMUNITIES.flatMap(c=>CommunityStore.getFeed(c.id)); }

/* ---- feed sorting / pagination / skeleton / infinite scroll ---- */
let communityFeedTab = 'latest';
let communityFeedPage = 1;
const FEED_PAGE_SIZE = 4;
function setCommunityFeedTab(t){ communityFeedTab=t; communityFeedPage=1; render(); }
function getSortedFeedPosts(communityId){
  const list = CommunityStore.getFeed(communityId);
  const pinned = list.filter(p=>p.pinned);
  let rest = list.filter(p=>!p.pinned);
  if(communityFeedTab==='trending'){
    rest = rest.slice().sort((a,b)=> (b.likes*2+CommunityStore.commentCount(b.id)*3) - (a.likes*2+CommunityStore.commentCount(a.id)*3));
  } else if(communityFeedTab==='top'){
    rest = rest.slice().sort((a,b)=> b.likes - a.likes);
  } else {
    rest = rest.slice().sort((a,b)=> b.time - a.time);
  }
  return {pinned, rest};
}
function renderCommunitySkeleton(){
  return `
  <div class="comm-cover"></div>
  <div class="comm-head">
    <div class="comm-icon-wrap"></div>
    <div class="skel-line" style="width:60%;height:16px;margin-top:14px;"></div>
    <div class="skel-line" style="width:40%;height:10px;margin-top:8px;"></div>
    <div class="skel-line" style="width:90%;height:10px;margin-top:14px;"></div>
    <div class="skel-line" style="width:70%;height:10px;margin-top:6px;"></div>
  </div>
  ${[1,2,3].map(()=>`
  <div class="skeleton-card">
    <div style="display:flex;gap:9px;align-items:center;margin-bottom:10px;">
      <div class="skel-line" style="width:36px;height:36px;border-radius:50%;"></div>
      <div style="flex:1;"><div class="skel-line" style="width:40%;height:9px;"></div></div>
    </div>
    <div class="skel-line" style="width:100%;height:10px;margin-bottom:6px;"></div>
    <div class="skel-line" style="width:80%;height:10px;"></div>
  </div>`).join('')}`;
}
function setupFeedInfiniteScroll(communityId){
  const sentinel = document.getElementById('feedSentinel');
  const root = document.getElementById('main');
  if(!sentinel || !root) return;
  if(window._feedObserver) window._feedObserver.disconnect();
  window._feedObserver = new IntersectionObserver((entries)=>{
    if(entries[0].isIntersecting){
      const {rest} = getSortedFeedPosts(communityId);
      if(communityFeedPage*FEED_PAGE_SIZE < rest.length){
        communityFeedPage++;
        appendFeedPosts(communityId);
      }
    }
  }, {root, threshold:0.05});
  window._feedObserver.observe(sentinel);
}
function appendFeedPosts(communityId){
  const sentinel = document.getElementById('feedSentinel');
  if(!sentinel) return;
  const c = COMMUNITIES.find(x=>x.id===communityId);
  const {rest} = getSortedFeedPosts(communityId);
  const start=(communityFeedPage-1)*FEED_PAGE_SIZE;
  const pagePosts = rest.slice(start, start+FEED_PAGE_SIZE);
  sentinel.insertAdjacentHTML('beforebegin', pagePosts.map(p=>renderPostCard(p,c)).join(''));
  if(communityFeedPage*FEED_PAGE_SIZE >= rest.length){ sentinel.insertAdjacentHTML('afterend', `<div style="text-align:center;font-size:11px;color:var(--text-soft);padding:10px;">لا مزيد من المنشورات</div>`); }
}

/* ---- post card ---- */
function requireJoinedForAction(postId){
  const p=CommunityStore.getPost(postId); if(!p) return false;
  if(!joinedSet.has(p.communityId)){ showToast('انضم للمجتمع أولًا للتفاعل مع المنشورات'); return false; }
  return true;
}
function renderPostImages(images){
  const n = images.length;
  const cls = n===1?'n1': n===2?'n2':'n3';
  const shown = images.slice(0,3);
  return `<div class="fpost-images ${cls}">${shown.map(src=>`<img src="${src}" onclick="openImage('${src}','')">`).join('')}</div>`;
}
function renderPollUI(p){
  const total = p.poll.options.reduce((s,o)=>s+o.votes,0) || 0;
  const myVote = CommunityStore.myVote(p.id);
  return `<div class="fpost-poll">
    <div style="font-weight:700;font-size:12.5px;margin-bottom:8px;font-family:'Cairo';">${esc(p.text)}</div>
    ${p.poll.options.map((o,i)=>{
      const pct = total? Math.round((o.votes/total)*100):0;
      const isMy = myVote===i;
      return `<div class="poll-opt ${isMy?'voted':''}" onclick="handleVotePoll('${p.id}',${i})">
        <div class="fillbar" style="width:${pct}%;"></div>
        <div class="row"><span>${isMy?'✓ ':''}${esc(o.text)}</span><span>${pct}%</span></div>
      </div>`;
    }).join('')}
    <div class="poll-meta">${total} صوت${myVote!==undefined?' • صوّتّ بالفعل':''}</div>
  </div>`;
}
function renderPostCard(p, c){
  const liked = CommunityStore.isLiked(p.id);
  const saved = CommunityStore.isSaved(p.id);
  const locked = CommunityStore.isLocked(p.id);
  const commentCount = CommunityStore.commentCount(p.id);
  const [g1,g2] = avatarColorFor(p.authorName);
  const typeLabel = {text:'', image:'صورة', images:'صور', link:'رابط', quote:'فائدة إسلامية', poll:'استطلاع', question: p.solved?'✓ سؤال محلول':'سؤال', announcement:'📢 إعلان رسمي'}[p.type] || '';
  return `
  <div class="fpost-card ${p.type==='announcement'?'announce':''}" id="post-${p.id}">
    <div class="fpost-head">
      <div class="fpost-avatar" style="background:linear-gradient(135deg,${g1},${g2});" onclick="openMemberSheet('${esc(p.authorName)}')">${communityInitials(p.authorName)}</div>
      <div class="who">
        <div class="n" onclick="openMemberSheet('${esc(p.authorName)}')">${esc(p.authorName)}${p.isMe?' <span style="color:var(--text-soft);font-weight:400;">(أنت)</span>':''}</div>
        <div class="t">${timeAgo(p.time)}${p.edited?' • مُعدّل':''}${p.pinned?` • <span class="pinned-badge">${CICONS.pin}مثبّت</span>`:''}</div>
      </div>
      <button class="fpost-menu-btn" onclick="openPostMenuSheet('${p.id}')">${CICONS.more}</button>
    </div>
    ${typeLabel? `<div class="fpost-badges"><span class="fpost-type-badge ${p.type==='question'&&p.solved?'solved':''}">${typeLabel}</span></div>`:''}
    <div class="fpost-body">
      ${p.type==='quote'? `<div class="fpost-quote">${CICONS.quoteMark} ${esc(p.text)}</div>` : (p.type==='poll'? '' : `<p>${esc(p.text)}</p>`)}
      ${(p.type==='image'||p.type==='images') && p.images && p.images.length ? renderPostImages(p.images) : ''}
      ${p.type==='link' && p.link ? `<div class="fpost-linkcard">${CICONS.link} ${esc(p.link)}</div>` : ''}
      ${p.type==='poll' && p.poll ? renderPollUI(p) : ''}
    </div>
    <div class="fpost-actions">
      <button class="${liked?'active':''}" onclick="handleLikePost('${p.id}')">${liked? CICONS.heartFill : ICONS.heart} <span>${p.likes}</span></button>
      <button onclick="openPostDetail('${p.id}')">${ICONS.comment} ${commentCount}</button>
      <button onclick="sharePost('${p.id}')">${PICONS.share}</button>
      <button class="${saved?'saved':''}" onclick="handleSavePost('${p.id}')">${saved? ICONS.bookmarkFill : ICONS.bookmark}</button>
    </div>
    ${locked? `<div class="fpost-locked-note">${CICONS.lock} التعليقات مغلقة على هذا المنشور</div>` : ''}
  </div>`;
}
function handleLikePost(id){ if(!requireJoinedForAction(id)) return; CommunityStore.toggleLike(id); render(); }
function handleSavePost(id){ const s=CommunityStore.toggleSave(id); showToast(s?'تم حفظ المنشور':'تم إلغاء الحفظ'); render(); }
function sharePost(id){
  const p=CommunityStore.getPost(id); if(!p) return;
  const text = p.text || 'منشور من سكينة';
  if(navigator.share){ navigator.share({title:'سكينة', text, url:location.href}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(text+' - '+location.href).then(()=>showToast('تم نسخ رابط المنشور ✓')); }
  else showToast('المشاركة غير مدعومة في هذا المتصفح');
}
function copyPostLink(id){
  const link = location.href.split('#')[0]+'#post-'+id;
  if(navigator.clipboard){ navigator.clipboard.writeText(link).then(()=>showToast('تم نسخ الرابط ✓')); }
  else showToast('تعذر نسخ الرابط');
}
function handleVotePoll(id, idx){ if(!requireJoinedForAction(id)) return; CommunityStore.votePoll(id, idx); render(); }

/* ---- post menu / edit / delete / pin / lock / report ---- */
function openPostMenuSheet(id){
  const p=CommunityStore.getPost(id); if(!p) return;
  const c=COMMUNITIES.find(x=>x.id===p.communityId);
  const mine = p.isMe;
  const mod = isModOfCommunity(c);
  let items = [];
  items.push(`<div class="set-row link" onclick="copyPostLink('${id}'); closeSheet();"><div class="lbl">${CICONS.link} نسخ الرابط</div></div>`);
  items.push(`<div class="set-row link" onclick="sharePost('${id}'); closeSheet();"><div class="lbl">${PICONS.share} مشاركة</div></div>`);
  if(mine){
    items.push(`<div class="set-row link" onclick="openEditPostSheet('${id}')"><div class="lbl">${PICONS.edit} تعديل المنشور</div></div>`);
    items.push(`<div class="set-row link danger" onclick="confirmDeletePost('${id}')"><div class="lbl">${PICONS.trash} حذف المنشور</div></div>`);
  } else {
    items.push(`<div class="set-row link danger" onclick="reportItem('post','${id}')"><div class="lbl">${CICONS.flag} إبلاغ عن المنشور</div></div>`);
  }
  if(mod){
    items.push(`<div class="set-row link" onclick="handlePinToggle('${id}')"><div class="lbl">${CICONS.pin} ${p.pinned?'إلغاء التثبيت':'تثبيت المنشور'}</div></div>`);
    items.push(`<div class="set-row link" onclick="handleLockToggle('${id}')"><div class="lbl">${CICONS.lock} ${CommunityStore.isLocked(id)?'فتح التعليقات':'قفل التعليقات'}</div></div>`);
    if(!mine) items.push(`<div class="set-row link danger" onclick="confirmDeletePost('${id}')"><div class="lbl">${PICONS.trash} حذف المنشور (إشراف)</div></div>`);
  }
  openSheet(`<h3>خيارات المنشور</h3><div class="settings-list" style="margin-top:4px;">${items.join('')}</div>`);
}
function handlePinToggle(id){ const pinned=CommunityStore.togglePin(id); closeSheet(); render(); showToast(pinned?'تم تثبيت المنشور':'تم إلغاء تثبيت المنشور'); }

/* ---- create post (compose) ---- */
let composeState = {type:'text', images:[], pollOptions:['',''], communityId:null, link:'', text:''};
function openCreatePostSheet(communityId){
  composeState = {type:'text', images:[], pollOptions:['',''], communityId, link:'', text:''};
  renderComposeSheet();
}
function renderComposeSheet(){
  const s = composeState;
  const c = COMMUNITIES.find(x=>x.id===s.communityId);
  const typeDefs = [
    {id:'text', label:'نص', icon:PICONS.edit},
    {id:'image', label:'صور', icon:CICONS.image},
    {id:'link', label:'رابط', icon:CICONS.link},
    {id:'quote', label:'فائدة إسلامية', icon:CICONS.quoteMark},
    {id:'poll', label:'استطلاع', icon:CICONS.poll},
    {id:'question', label:'سؤال', icon:CICONS.question},
  ];
  if(c && isModOfCommunity(c)) typeDefs.push({id:'announcement', label:'إعلان رسمي', icon:'📢'});
  let extra = '';
  if(s.type==='image'){
    extra = `<div class="field">
      <input type="file" id="composeImgInput" accept="image/*" multiple style="display:none" onchange="handleComposeImages(event)">
      <button class="btn-secondary" style="width:100%;" onclick="document.getElementById('composeImgInput').click()">${CICONS.image} إضافة صور</button>
      <div class="compose-imgs">${s.images.map((src,i)=>`<div class="ci"><img src="${src}"><button onclick="removeComposeImage(${i})">✕</button></div>`).join('')}</div>
    </div>`;
  } else if(s.type==='link'){
    extra = `<div class="field"><label>الرابط</label><input type="url" id="composeLink" placeholder="https://" value="${esc(s.link||'')}"></div>`;
  } else if(s.type==='poll'){
    extra = `<div class="field"><label>خيارات الاستطلاع</label>
      ${s.pollOptions.map((v,i)=>`<div class="poll-opt-input-row"><input type="text" value="${esc(v)}" oninput="updatePollOption(${i}, this.value)" placeholder="خيار ${i+1}">${s.pollOptions.length>2?`<button onclick="removePollOption(${i})">✕</button>`:''}</div>`).join('')}
      ${s.pollOptions.length<5?`<span style="font-size:11.5px;color:var(--teal-600);cursor:pointer;font-weight:700;" onclick="addPollOption()">+ إضافة خيار</span>`:''}
    </div>`;
  }
  const textLabel = s.type==='quote'?'نص الفائدة الإسلامية' : s.type==='question'?'اكتب سؤالك' : s.type==='poll'?'عنوان الاستطلاع' : s.type==='announcement'?'نص الإعلان الرسمي':'ماذا تريد أن تشارك؟';
  const drafts = CommunityStore.getDrafts(s.communityId);
  openSheet(`
    <h3>إنشاء منشور ${drafts.length? `<span style="font-size:11px;font-weight:400;color:var(--teal-600);cursor:pointer;" onclick="openDraftsSheet(${s.communityId})">(${drafts.length} مسودة محفوظة)</span>`:''}</h3>
    <div class="post-type-picker">
      ${typeDefs.map(t=>`<div class="post-type-opt ${s.type===t.id?'active':''}" onclick="setComposeType('${t.id}')">${t.icon}<div>${t.label}</div></div>`).join('')}
    </div>
    <div class="field"><label>${textLabel}</label><textarea id="composeText" rows="4" style="width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;">${esc(s.text||'')}</textarea></div>
    ${extra}
    <div class="sheet-actions">
      <button class="btn-secondary" onclick="saveComposeDraft()">حفظ كمسودة</button>
      <button class="btn-primary" onclick="publishComposePost()">نشر</button>
    </div>`);
}
function captureComposeText(){ const el=document.getElementById('composeText'); if(el) composeState.text=el.value; }
function setComposeType(t){ captureComposeText(); composeState.type=t; renderComposeSheet(); }
function handleComposeImages(e){
  captureComposeText();
  const files = Array.from(e.target.files||[]).slice(0, Math.max(0,4-composeState.images.length));
  if(!files.length) return;
  let remaining = files.length;
  files.forEach(f=>{
    const reader = new FileReader();
    reader.onload = ()=>{ composeState.images.push(reader.result); remaining--; if(remaining===0) renderComposeSheet(); };
    reader.readAsDataURL(f);
  });
}
function removeComposeImage(i){ captureComposeText(); composeState.images.splice(i,1); renderComposeSheet(); }
function updatePollOption(i, v){ composeState.pollOptions[i]=v; }
function addPollOption(){ captureComposeText(); composeState.pollOptions.push(''); renderComposeSheet(); }
function removePollOption(i){ captureComposeText(); composeState.pollOptions.splice(i,1); renderComposeSheet(); }
function collectComposeText(){ const el=document.getElementById('composeText'); return el? el.value.trim() : (composeState.text||'').trim(); }
function saveComposeDraft(){
  const text = collectComposeText();
  if(!text){ showToast('اكتب محتوى المنشور أولًا'); return; }
  const linkEl = document.getElementById('composeLink');
  CommunityStore.saveDraft({
    communityId: composeState.communityId, type: composeState.type, text,
    link: linkEl?linkEl.value.trim():undefined,
    images: composeState.images.slice(),
    pollOptions: composeState.type==='poll' ? composeState.pollOptions.slice() : undefined,
    savedAt: Date.now(),
  });
  closeSheet(); showToast('تم حفظ المسودة ✓');
}
function openDraftsSheet(communityId){
  const drafts = CommunityStore.getDrafts(communityId);
  const typeNames = {text:'نص',image:'صور',link:'رابط',quote:'اقتباس',poll:'استطلاع',question:'سؤال'};
  openSheet(`<h3>المسودات المحفوظة</h3>
  ${drafts.length? drafts.map((d,i)=>`
    <div class="item-card" style="cursor:pointer;" onclick="resumeDraft(${communityId},${i})">
      <div class="content"><h3>${typeNames[d.type]||'منشور'}</h3><p>${esc((d.text||'').slice(0,80))}</p></div>
    </div>`).join('') : emptyState('لا توجد مسودات محفوظة')}
  <div class="sheet-actions"><button class="btn-primary" style="width:100%;" onclick="openCreatePostSheet(${communityId})">رجوع</button></div>`);
}
function resumeDraft(communityId, idx){
  const drafts = CommunityStore.getDrafts(communityId);
  const d = drafts[idx]; if(!d) return;
  composeState = {type:d.type, images:d.images||[], pollOptions:d.pollOptions||['',''], communityId, link:d.link||'', text:d.text||''};
  CommunityStore.deleteDraft(idx);
  renderComposeSheet();
}
function publishComposePost(){
  const text = collectComposeText();
  if(!text){ showToast('اكتب محتوى المنشور أولًا'); return; }
  const c = COMMUNITIES.find(x=>x.id===composeState.communityId);
  if(composeState.type==='poll'){
    const opts = composeState.pollOptions.map(o=>o.trim()).filter(Boolean);
    if(opts.length<2){ showToast('أضف خيارين على الأقل للاستطلاع'); return; }
  }
  const linkEl = document.getElementById('composeLink');
  const post = {
    id:'p_'+Date.now(), communityId: composeState.communityId, authorName: userProfile.name, isMe:true,
    type: composeState.type, text, time: Date.now(), pinned:false, likes:0, edited:false, deleted:false,
    pendingApproval: !!(c && c.privacy==='private' && !isModOfCommunity(c)),
  };
  if(composeState.type==='image'){
    post.images = composeState.images.slice();
    if(!post.images.length){ showToast('أضف صورة واحدة على الأقل'); return; }
    post.type = post.images.length>1?'images':'image';
  }
  if(composeState.type==='link'){
    post.link = linkEl?linkEl.value.trim():'';
    if(!post.link){ showToast('أدخل رابطًا صحيحًا'); return; }
  }
  if(composeState.type==='poll'){
    const opts = composeState.pollOptions.map(o=>o.trim()).filter(Boolean);
    post.poll = {options: opts.map(t=>({text:t, votes:0}))};
  }
  if(composeState.type==='announcement'){
    post.pinned = true;
    post.pendingApproval = false;
  }
  if(composeState.type==='question'){
    post.solved = false;
    post.bestAnswerId = null;
  }
  CommunityStore.createPost(post);
  closeSheet(); render();
  if(post.pendingApproval) showToast('تم إرسال منشورك لمراجعة المشرفين ✓');
  else if(post.type==='announcement'){ showToast('تم نشر الإعلان للمجتمع ✓'); pushCommunityNotification('community','إعلان جديد في '+communityNameById(post.communityId), text.slice(0,80), {page:'postDetail', data:{id:post.id}}); updateNotifBadge(); }
  else { showToast('تم نشر منشورك ✓ بارك الله فيك'); }
}
function pushCommunityNotification(type, title, msg, nav){
  addAppNotification({type, title, msg, nav});
}

/* ---- post detail + comments ---- */
function openPostDetail(id){ navigateTo('postDetail', {id}); }
function buildCommentTree(list){
  const map={}; const roots=[];
  list.forEach(c=>{ map[c.id]={...c, replies:[]}; });
  list.forEach(c=>{ if(c.parentId && map[c.parentId]) map[c.parentId].replies.push(map[c.id]); else roots.push(map[c.id]); });
  return roots;
}
function renderMentionText(text){
  return esc(text).replace(/@([\u0600-\u06FFa-zA-Z0-9_]+)/g, '<span style="color:var(--teal-600);font-weight:700;">@$1</span>');
}
function renderCommentThread(cm, p, c){
  const liked = CommunityStore.isCommentLiked(cm.id);
  const mine = cm.isMe;
  const mod = isModOfCommunity(c);
  const [g1,g2] = avatarColorFor(cm.authorName);
  const isQuestion = p.type==='question';
  const isBest = isQuestion && p.bestAnswerId === cm.id;
  const canMarkBest = isQuestion && (p.isMe || mod) && !cm.parentId;
  return `
  <div class="comment-item ${isBest?'best-answer':''}">
    <div class="c-avatar" style="background:linear-gradient(135deg,${g1},${g2});">${communityInitials(cm.authorName)}</div>
    <div class="c-body">
      <div class="c-bubble">
        <div class="c-name">${esc(cm.authorName)}${mine?' <span style="font-weight:400;color:var(--text-soft);">(أنت)</span>':''}${isBest?`<span class="best-answer-tag">${CICONS.checkCircle} أفضل إجابة</span>`:''}</div>
        <div class="c-text">${renderMentionText(cm.text)}</div>
      </div>
      <div class="c-meta">
        <span>${timeAgo(cm.time)}${cm.edited?' • مُعدّل':''}</span>
        <span class="${liked?'liked':''}" onclick="handleLikeComment('${cm.id}','${p.id}')">${liked?'💗 أعجبني':'♡ إعجاب'} ${cm.likes||0}</span>
        <span onclick="openReplyTo('${cm.id}','${esc(cm.authorName)}')">${ICONS.reply} رد</span>
        ${mine? `<span onclick="openEditCommentPrompt('${p.id}','${cm.id}')">تعديل</span><span onclick="confirmDeleteComment('${p.id}','${cm.id}')">حذف</span>` : `<span onclick="reportItem('comment','${cm.id}')">إبلاغ</span>`}
        ${(!mine && mod)? `<span onclick="confirmDeleteComment('${p.id}','${cm.id}')" style="color:#c0392b;">حذف (إشراف)</span>`:''}
        ${canMarkBest? `<span onclick="toggleBestAnswer('${p.id}','${cm.id}')" style="color:${isBest?'#16a34a':'var(--teal-600)'};font-weight:700;">${isBest?'إلغاء أفضل إجابة':'تحديد كأفضل إجابة'}</span>`:''}
      </div>
      ${cm.replies && cm.replies.length? `<div class="comment-replies">${cm.replies.map(r=>renderCommentThread(r,p,c)).join('')}</div>`:''}
    </div>
  </div>`;
}
function toggleBestAnswer(postId, cid){
  const p = CommunityStore.getPost(postId); if(!p) return;
  if(p.bestAnswerId === cid){ CommunityStore.unmarkBestAnswer(postId); showToast('تم إلغاء تحديد أفضل إجابة'); }
  else { CommunityStore.markBestAnswer(postId, cid); showToast('✓ تم تحديد أفضل إجابة، وُسم السؤال كمحلول'); }
  render();
}
function renderPostDetail(data){
  const p = CommunityStore.getPost(data.id);
  if(!p || p.deleted) return emptyState('هذا المنشور لم يعد متاحًا');
  const c = COMMUNITIES.find(x=>x.id===p.communityId);
  const commentsList = CommunityStore.getComments(p.id);
  const tree = buildCommentTree(commentsList);
  const locked = CommunityStore.isLocked(p.id);
  const isQuestion = p.type==='question';
  return `
  <div style="padding-bottom:80px;">
    ${renderPostCard(p, c)}
    ${isQuestion && p.solved? `<div class="note-box" style="margin:0 16px 14px;text-align:center;background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.35);">${CICONS.checkCircle} تم حل هذا السؤال، شاهد الإجابة الأفضل أدناه 🤍</div>` : ''}
    ${isQuestion && !p.solved && p.isMe && commentsList.length>0? `<div class="note-box" style="margin:0 16px 14px;text-align:center;">اضغط "تحديد كأفضل إجابة" على الرد الأنسب لوضع علامة الحل ✓</div>` : ''}
    <div class="tsb-section-title">التعليقات (${commentsList.length})</div>
    <div id="commentsList">
      ${tree.length? tree.map(cm=>renderCommentThread(cm, p, c)).join('') : emptyState('لا توجد تعليقات بعد، كن أول من يعلّق')}
    </div>
  </div>
  ${!locked ? `
  <div class="comment-input-bar">
    <input type="text" id="newCommentInput" placeholder="أضف تعليقًا... (@لإشارة عضو)">
    <button onclick="submitComment('${p.id}')">${CICONS.send}</button>
  </div>` : `<div class="fpost-locked-note" style="position:fixed;bottom:var(--nav-h);left:0;right:0;max-width:480px;margin:0 auto;background:var(--card);justify-content:center;">${CICONS.lock} التعليقات مغلقة على هذا المنشور</div>`}
  `;
}
let replyingToCommentId = null;
function openReplyTo(cid, authorName){

function openCommunitySearchSheet(communityId){
  openSheet(`<h3>البحث داخل المجتمع</h3>

function runCommunitySearch(communityId){
  const q = (document.getElementById('commSearchInput').value||'').trim();
  const box = document.getElementById('commSearchResults');
  if(!q){ box.innerHTML = emptyState('اكتب كلمة للبحث'); return; }
  const c = COMMUNITIES.find(x=>x.id===communityId);
  const posts = CommunityStore.getFeed(communityId).filter(p=> matchAr(p.text||'', q) || (p.poll && p.poll.options.some(o=>matchAr(o.text,q))));
  const members = [...new Set(CommunityStore.getFeed(communityId).map(p=>p.authorName))].filter(n=>matchAr(n,q));
  const tags = (c.tags||[]).filter(t=>matchAr(t,q));
  if(!posts.length && !members.length && !tags.length){ box.innerHTML = emptyState('لا توجد نتائج مطابقة'); return; }
  box.innerHTML = `
    ${tags.length? `<div style="font-size:11px;color:var(--text-soft);margin:10px 4px 4px;">الوسوم</div><div class="comm-tags-row" style="padding:0 4px;">${tags.map(t=>`<span class="comm-tag">#${esc(t)}</span>`).join('')}</div>`:''}

/* ---- community settings (admin) ----
   Issue found on follow-up: community settings changed by an owner (name, description,
   rules, cover, privacy...) were only ever saved to sakina_community_overrides, which is
   a PER-USER synced key — meaning the change only ever reached the owner's OWN other
   devices, never the other members. Fixed the same way as posts/users/khatma groups:
   a shared Firebase node with a live listener, applied over the static COMMUNITIES seed. */
function saveCommunityOverride(id, patch){
  const overrides = JSON.parse(localStorage.getItem('sakina_community_overrides')||'{}');
  overrides[id] = Object.assign({}, overrides[id]||{}, patch);
  localStorage.setItem('sakina_community_overrides', JSON.stringify(overrides));
  if(isFirebaseConfigured()){
    window.SAKINA_FIREBASE.db.update('communityOverrides/'+id, patch).catch(e=>console.error('community settings sync failed', id, e));
  }
}
function applyCommunityOverridesMap(overrides){
  COMMUNITIES.forEach(c=>{ if(overrides[c.id]) Object.assign(c, overrides[c.id]); });
}
(function applyCommunityOverrides(){
  applyCommunityOverridesMap(JSON.parse(localStorage.getItem('sakina_community_overrides')||'{}'));
})();
let communityOverridesUnsub = null;
function startCommunityOverridesLiveSync(){
  if(!isFirebaseConfigured() || communityOverridesUnsub) return;
  let first = true;
  communityOverridesUnsub = window.SAKINA_FIREBASE.db.onChange('communityOverrides', (val)=>{
    if(first){
      first = false;
      const local = JSON.parse(localStorage.getItem('sakina_community_overrides')||'{}');
      if(val==null && Object.keys(local).length){
        // First run ever for this Firebase project: seed from whatever overrides already exist locally.
        window.SAKINA_FIREBASE.db.set('communityOverrides', local).catch(e=>console.error('community overrides seed failed', e));
        return;
      }
    }
    if(val==null) return;
    localStorage.setItem('sakina_community_overrides', JSON.stringify(val));
    applyCommunityOverridesMap(val);
    if(typeof render==='function') render();
  });
}
function stopCommunityOverridesLiveSync(){
  try{ communityOverridesUnsub && communityOverridesUnsub(); }catch(e){}
  communityOverridesUnsub = null;
}

/* ================= COMMUNITY CREATION REQUESTS =================
   Any signed-in user can propose a new community. It's stored as a
   "pending" request (communityRequests/{id} in Firebase) and does NOT
   appear in the public communities list until Super Admin approves it.
   Once approved, it's written as a full community record to
   approvedCommunities/{id} and merged into the in-memory COMMUNITIES
   array on every device (live), with the requester set as the REAL
   owner (ownerUid) — using the same permission system as the rest of
   community ownership/admin management above. */
const K_COMMUNITY_REQUESTS = 'sakina_community_requests';
const K_APPROVED_COMMUNITIES = 'sakina_approved_communities';
const FB_COMMUNITY_REQUESTS_PATH = 'communityRequests';
const FB_APPROVED_COMMUNITIES_PATH = 'approvedCommunities';

let communityRequests = JSON.parse(localStorage.getItem(K_COMMUNITY_REQUESTS)||'[]');
(function loadApprovedCommunitiesCache(){
  const cached = JSON.parse(localStorage.getItem(K_APPROVED_COMMUNITIES)||'{}');
  Object.values(cached).forEach(c=>{ if(c && !COMMUNITIES.find(x=>x.id===c.id)) COMMUNITIES.push(c); });
})();

function saveCommunityRequestsLocal(){ localStorage.setItem(K_COMMUNITY_REQUESTS, JSON.stringify(communityRequests)); }

function submitCommunityRequest(data){
  const u = authCurrentUser();
  if(!u){ showToast('يجب تسجيل الدخول أولًا'); return null; }
  const req = {
    id: 'req_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),
    requesterUid: u.id, requesterName: u.name,
    name: data.name, desc: data.desc, category: data.category||'', tags: data.tags||[],
    privacy: data.privacy||'public', icon: data.icon||'star', c1: data.c1, c2: data.c2,
    status: 'pending', createdAt: Date.now(), reviewedAt: null, reviewNote: null,
  };
  communityRequests.unshift(req);
  saveCommunityRequestsLocal();
  if(isFirebaseConfigured()) window.SAKINA_FIREBASE.db.set(FB_COMMUNITY_REQUESTS_PATH+'/'+req.id, req).catch(e=>console.error('community request sync failed', req.id, e));
  showToast('تم إرسال طلبك، بانتظار موافقة المدير العام ✓');
  return req;
}
function myCommunityRequests(){
  const u = authCurrentUser();
  if(!u) return [];
  return communityRequests.filter(r=>r.requesterUid===u.id).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
}
function pendingCommunityRequests(){ return communityRequests.filter(r=>r.status==='pending').sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)); }

function approveCommunityRequest(reqId){
  if(!authIsSuperAdmin()){ showToast('الموافقة على المجتمعات متاحة للمدير العام فقط'); return; }
  const req = communityRequests.find(r=>r.id===reqId);
  if(!req || req.status!=='pending') return;
  const newId = Date.now();
  const community = {
    id:newId, name:req.name, desc:req.desc, members:1, posts:0,
    icon:req.icon||'star', c1:req.c1||'var(--teal-500)', c2:req.c2||'var(--teal-800)',
    category:req.category||'مجتمع عام', tags:req.tags||[], createdDate:new Date().toISOString().slice(0,10),
    privacy:req.privacy||'public', admins:[], mods:[], rules:[],
    ownerUid:req.requesterUid, adminUids:[], modUids:[],
  };
  if(!COMMUNITIES.find(x=>x.id===newId)) COMMUNITIES.push(community);
  req.status = 'approved'; req.reviewedAt = Date.now();
  saveCommunityRequestsLocal();
  if(isFirebaseConfigured()){
    window.SAKINA_FIREBASE.db.set(FB_APPROVED_COMMUNITIES_PATH+'/'+newId, community).catch(e=>console.error('approved community sync failed', newId, e));
    window.SAKINA_FIREBASE.db.update(FB_COMMUNITY_REQUESTS_PATH+'/'+reqId, {status:'approved', reviewedAt:req.reviewedAt}).catch(e=>console.error('community request status sync failed', reqId, e));
  } else {
    const cached = JSON.parse(localStorage.getItem(K_APPROVED_COMMUNITIES)||'{}');
    cached[newId] = community;
    localStorage.setItem(K_APPROVED_COMMUNITIES, JSON.stringify(cached));
  }
  showToast('تم قبول المجتمع ونشره ✓');
  render();
}
function rejectCommunityRequest(reqId, note){
  if(!authIsSuperAdmin()){ showToast('غير مسموح'); return; }
  const req = communityRequests.find(r=>r.id===reqId);
  if(!req || req.status!=='pending') return;
  req.status = 'rejected'; req.reviewedAt = Date.now(); req.reviewNote = (note||'').trim() || null;
  saveCommunityRequestsLocal();
  if(isFirebaseConfigured()){
    window.SAKINA_FIREBASE.db.update(FB_COMMUNITY_REQUESTS_PATH+'/'+reqId, {status:'rejected', reviewedAt:req.reviewedAt, reviewNote:req.reviewNote}).catch(e=>console.error('community request reject sync failed', reqId, e));
  }
  showToast('تم رفض الطلب');
  render();
}

let communityRequestsUnsub = null, approvedCommunitiesUnsub = null;
function startCommunityRequestsLiveSync(){
  if(!isFirebaseConfigured() || communityRequestsUnsub) return;
  let first = true;
  communityRequestsUnsub = window.SAKINA_FIREBASE.db.onChange(FB_COMMUNITY_REQUESTS_PATH, (val)=>{
    if(first){
      first = false;
      if(val==null && communityRequests.length){
        const obj = {}; communityRequests.forEach(r=>{ obj[r.id]=r; });
        window.SAKINA_FIREBASE.db.set(FB_COMMUNITY_REQUESTS_PATH, obj).catch(e=>console.error('community requests seed failed', e));
        return;
      }
    }
    communityRequests = val ? Object.values(val) : [];
    saveCommunityRequestsLocal();
    if(typeof render==='function') render();
  });
}
function startApprovedCommunitiesLiveSync(){
  if(!isFirebaseConfigured() || approvedCommunitiesUnsub) return;
  approvedCommunitiesUnsub = window.SAKINA_FIREBASE.db.onChange(FB_APPROVED_COMMUNITIES_PATH, (val)=>{
    if(val==null) return;
    Object.values(val).forEach(c=>{
      if(!c) return;
      const existing = COMMUNITIES.find(x=>x.id===c.id);
      if(!existing) COMMUNITIES.push(c); else Object.assign(existing, c);
    });
    localStorage.setItem(K_APPROVED_COMMUNITIES, JSON.stringify(val));
    applyCommunityOverridesMap(JSON.parse(localStorage.getItem('sakina_community_overrides')||'{}'));
    if(typeof render==='function') render();
  });
}
function stopCommunityRequestsLiveSync(){
  try{ communityRequestsUnsub && communityRequestsUnsub(); }catch(e){}
  communityRequestsUnsub = null;
}
function stopApprovedCommunitiesLiveSync(){
  try{ approvedCommunitiesUnsub && approvedCommunitiesUnsub(); }catch(e){}
  approvedCommunitiesUnsub = null;
}

/* ================= REAL MEMBERSHIP + REAL PRESENCE =================
   Fixes two more fabricated numbers:
   - c.members used to be the frozen seed number forever (joining/leaving never
     touched it). Now every join/leave writes a real record to
     communityMembers/{communityId}/{uid} in Firebase, and c.members is the live
     count of that node's keys — shared across everyone, not per-device.
   - onlineCount(c) used to be `members*0.06`, pure fabrication. Now it's the
     real count of that community's members who are currently online, tracked
     via presence/{uid} in Firebase using onDisconnect (see presenceGoOnline
     above) — Firebase's server itself detects the disconnect, no guessing.
   ===================================================================== */
let communityMembersMap = {};   // communityId -> {uid:true, ...}
let presenceMap = {};           // uid -> {name, ts}
let communityMembersUnsub = null, presenceUnsub = null;
let presenceHeartbeatTimer = null;
const PRESENCE_STALE_MS = 5*60*1000; // if a heartbeat is older than this, treat as offline (covers onDisconnect misses, e.g. a hard crash)

function recomputeCommunityMemberCounts(){
  COMMUNITIES.forEach(c=>{ c.members = Object.keys(communityMembersMap[c.id]||{}).length; });
}
function startCommunityMembersLiveSync(){
  if(!isFirebaseConfigured() || communityMembersUnsub) return;
  let first = true;
  communityMembersUnsub = window.SAKINA_FIREBASE.db.onChange('communityMembers', (val)=>{
    if(first){
      first = false;
      if(val==null && joinedSet.size){
        // First run ever for this Firebase project: this device's existing local
        // joins are the only membership record that exists anywhere — seed the
        // shared node from them so real counts don't start hidden at zero.
        const u = authCurrentUser();
        if(u){
          const obj = {}; joinedSet.forEach(id=>{ obj[id] = {[u.id]: true}; });
          window.SAKINA_FIREBASE.db.set('communityMembers', obj).catch(e=>console.error('community members seed failed', e));
        }
        return;
      }
    }
    communityMembersMap = val || {};
    recomputeCommunityMemberCounts();
    if(typeof render==='function') render();
  });
}
function stopCommunityMembersLiveSync(){
  try{ communityMembersUnsub && communityMembersUnsub(); }catch(e){}
  communityMembersUnsub = null;
}
function isUidOnline(uid){
  const p = presenceMap[uid];
  return !!(p && (Date.now()-(p.ts||0)) < PRESENCE_STALE_MS);
}
function onlineCount(c){
  const memberIds = Object.keys(communityMembersMap[c.id]||{});
  return memberIds.filter(isUidOnline).length;
}
function startPresence(){
  if(!isFirebaseConfigured()) return;
  const u = authCurrentUser();
  if(!u) return;
  window.SAKINA_FIREBASE.db.presenceGoOnline('presence/'+u.id, {name:u.name, ts:Date.now()}).catch(e=>console.error('presence online failed', e));
  clearInterval(presenceHeartbeatTimer);
  // Refresh the timestamp periodically so this account keeps counting as "online"
  // for as long as the tab is actually open (onDisconnect alone only handles the
  // moment the connection drops, not "is this tab still genuinely in use").
  presenceHeartbeatTimer = setInterval(()=>{
    if(!isFirebaseConfigured()) return;
    window.SAKINA_FIREBASE.db.update('presence/'+u.id, {ts:Date.now()}).catch(()=>{});
  }, 60000);
  window.addEventListener('beforeunload', stopPresence);
}
function stopPresence(){
  clearInterval(presenceHeartbeatTimer);
  presenceHeartbeatTimer = null;
  const u = authCurrentUser();
  if(isFirebaseConfigured() && u) window.SAKINA_FIREBASE.db.presenceGoOffline('presence/'+u.id).catch(()=>{});
}
function startPresenceLiveSync(){
  if(!isFirebaseConfigured() || presenceUnsub) return;
  presenceUnsub = window.SAKINA_FIREBASE.db.onChange('presence', (val)=>{
    presenceMap = val || {};
    if(typeof render==='function') render();
  });
}
function stopPresenceLiveSync(){
  try{ presenceUnsub && presenceUnsub(); }catch(e){}
  presenceUnsub = null;
}
// Real join/leave: writes the membership record everyone sees, in addition to
// this device's own joinedSet (used to render the "عضو"/"انضمام" button state).
function syncCommunityMembershipWrite(communityId, joining){
  if(!isFirebaseConfigured()) return;
  const u = authCurrentUser();
  if(!u) return;
  const path = 'communityMembers/'+communityId+'/'+u.id;
  (joining ? window.SAKINA_FIREBASE.db.set(path, true) : window.SAKINA_FIREBASE.db.remove(path))
    .catch(e=>console.error('community membership sync failed', communityId, e));
}
