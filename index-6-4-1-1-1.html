/* ================================================================
   PHASE 1 — HADITH OFFLINE STORAGE (IndexedDB)
   ------------------------------------------------------------------
   Everything hadith-related that needs to survive offline (raw book
   text, شرح/فوائد/تطبيق, and علّم أبناءك) used to live in localStorage.
   localStorage has a small, browser-enforced quota (commonly 5–10MB per
   origin) — a single fully-downloaded book (thousands of hadiths, each
   with its own explanation + kids content) can exceed that on its own,
   and every extra downloaded book eats into the same shared budget.
   Once a localStorage.setItem call silently fails past that quota, the
   content is simply gone from disk even though the download reported
   success — so the next time that hadith opens, there is nothing to
   read back, and (if online) it gets silently regenerated from the API,
   which looks exactly like "the explanation reloads every time it's
   opened". IndexedDB has a far larger, browser-managed quota (typically
   hundreds of MB or more) and stores JS objects directly via structured
   clone, so there's no JSON.stringify/JSON.parse of multi-megabyte
   strings blocking the main thread on every read or write either — a
   real win for scroll/UI smoothness on top of the capacity fix.
   A small in-memory layer (hadithAIContentCache / hadithKidsContentCache
   / hadithBookCache, already used lower down) sits in front of every
   store so a hadith already touched this session never needs a second
   IndexedDB round-trip — see hadithPreloadBookContent below, which
   bulk-warms that memory layer for an entire book in one pass so
   opening any hadith in it is a synchronous, in-memory read. */
const HADITH_IDB_NAME = 'sakina_hadith_store';
const HADITH_IDB_VERSION = 1;
const HADITH_IDB_STORES = ['books','explain','kids'];
let hadithIdbPromise = null;
function hadithIdbOpen(){
  if(hadithIdbPromise) return hadithIdbPromise;
  hadithIdbPromise = new Promise((resolve)=>{
    if(typeof indexedDB==='undefined'){ resolve(null); return; }
    let req;
    try{ req = indexedDB.open(HADITH_IDB_NAME, HADITH_IDB_VERSION); }
    catch(e){ resolve(null); return; }
    req.onupgradeneeded = ()=>{
      const db = req.result;
      HADITH_IDB_STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)) db.createObjectStore(s); });
    };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> resolve(null); // IndexedDB unavailable (private mode, disabled, etc.) — callers degrade to session-only memory
  });
  return hadithIdbPromise;
}
async function hadithIdbGet(store, key){
  const db = await hadithIdbOpen();
  if(!db) return undefined;
  return new Promise(resolve=>{
    try{
      const rq = db.transaction(store,'readonly').objectStore(store).get(key);
      rq.onsuccess = ()=> resolve(rq.result);
      rq.onerror = ()=> resolve(undefined);
    }catch(e){ resolve(undefined); }
  });
}
async function hadithIdbSet(store, key, value){
  const db = await hadithIdbOpen();
  if(!db) return false;
  return new Promise(resolve=>{
    try{
      const tx = db.transaction(store,'readwrite');
      tx.objectStore(store).put(value, key);
      tx.oncomplete = ()=> resolve(true);
      tx.onerror = ()=> resolve(false);
    }catch(e){ resolve(false); }
  });
}
async function hadithIdbDelete(store, key){
  const db = await hadithIdbOpen();
  if(!db) return false;
  return new Promise(resolve=>{
    try{
      const tx = db.transaction(store,'readwrite');
      tx.objectStore(store).delete(key);
      tx.oncomplete = ()=> resolve(true);
      tx.onerror = ()=> resolve(false);
    }catch(e){ resolve(false); }
  });
}
async function hadithIdbKeys(store){
  const db = await hadithIdbOpen();
  if(!db) return [];
  return new Promise(resolve=>{
    try{
      const rq = db.transaction(store,'readonly').objectStore(store).getAllKeys();
      rq.onsuccess = ()=> resolve(rq.result||[]);
      rq.onerror = ()=> resolve([]);
    }catch(e){ resolve([]); }
  });
}
/* Bulk-deletes every record in `store` whose key starts with `prefix` using
   a single cursor sweep, instead of one await per key — used to wipe a
   whole book's explanation/kids content in one pass (hadithDeleteDownload). */
async function hadithIdbDeleteByPrefix(store, prefix){
  const db = await hadithIdbOpen();
  if(!db) return;
  return new Promise(resolve=>{
    try{
      const os = db.transaction(store,'readwrite').objectStore(store);
      const range = IDBKeyRange.bound(prefix, prefix+'\uffff');
      const req = os.openCursor(range);
      req.onsuccess = ()=>{
        const cursor = req.result;
        if(cursor){ cursor.delete(); cursor.continue(); } else resolve();
      };
      req.onerror = ()=> resolve();
    }catch(e){ resolve(); }
  });
}
/* One-time migration for returning users: pulls any book text / explanation
   / kids content already sitting in localStorage from before this phase
   into IndexedDB, then clears those keys out of localStorage to reclaim
   its quota immediately. Safe to call on every boot — no-ops once nothing
   old is left to migrate. */
let hadithMigrationDone = false;
async function hadithMigrateLegacyStorage(){
  if(hadithMigrationDone) return;
  hadithMigrationDone = true;
  if(typeof localStorage==='undefined') return;
  let keys;
  try{ keys = Object.keys(localStorage); }catch(e){ return; }
  for(const k of keys){
    try{
      if(k.indexOf('sakina_hadith_data_')===0){
        const val = JSON.parse(localStorage.getItem(k));
        if(val) await hadithIdbSet('books', k.slice('sakina_hadith_data_'.length), val);
        localStorage.removeItem(k);
      } else if(k.indexOf('sakina_hadith_ai_v1_')===0){
        const val = JSON.parse(localStorage.getItem(k));
        if(val) await hadithIdbSet('explain', k.slice('sakina_hadith_ai_v1_'.length), val);
        localStorage.removeItem(k);
      } else if(k.indexOf('sakina_hadith_kids_v1_')===0){
        const val = JSON.parse(localStorage.getItem(k));
        if(val) await hadithIdbSet('kids', k.slice('sakina_hadith_kids_v1_'.length), val);
        localStorage.removeItem(k);
      }
    }catch(e){ /* one corrupt legacy entry shouldn't abort the rest of the migration */ }
  }
}
/* bookIds confirmed present in the IndexedDB 'books' store — kept in memory
   so hadithIsBookCached() (used throughout the download-manager UI render
   path) can stay perfectly synchronous instead of every card needing an
   async IndexedDB round-trip just to paint its status pill. Populated at
   boot and kept up to date on every save/delete. */
let hadithKnownCachedBookIds = new Set();
async function hadithRefreshKnownCachedBooks(){
  hadithKnownCachedBookIds = new Set(await hadithIdbKeys('books'));
}
async function hadithInitStorage(){
  await hadithMigrateLegacyStorage();
  await hadithRefreshKnownCachedBooks();
}
/* bookIds whose explanation+kids IndexedDB records have already been bulk-
   loaded into the in-memory caches this session — see hadithPreloadBookContent. */
let hadithContentPreloaded = new Set();
/* Warms hadithAIContentCache/hadithKidsContentCache with every explanation
   and "علّم أبناءك" record this device already has for `bookId`, in one
   cursor sweep per store instead of one IndexedDB read per hadith. After
   this resolves, opening ANY hadith in the book is a synchronous, already-
   in-memory read — no per-hadith loading state, no per-hadith IndexedDB
   round-trip. Never overwrites an entry already in memory (e.g. generated
   earlier this same session), so it only ever fills in what's missing. */
async function hadithPreloadBookContent(bookId){
  if(hadithContentPreloaded.has(bookId)) return;
  hadithContentPreloaded.add(bookId);
  const db = await hadithIdbOpen();
  if(!db) return;
  const prefix = bookId+':';
  const range = IDBKeyRange.bound(prefix, prefix+'\uffff');
  await Promise.all(['explain','kids'].map(store=> new Promise(resolve=>{
    try{
      const req = db.transaction(store,'readonly').objectStore(store).openCursor(range);
      req.onsuccess = ()=>{
        const cursor = req.result;
        if(cursor){
          const target = store==='explain' ? hadithAIContentCache : hadithKidsContentCache;
          if(!target[cursor.key]) target[cursor.key] = cursor.value;
          cursor.continue();
        } else resolve();
      };
      req.onerror = ()=> resolve();
    }catch(e){ resolve(); }
  })));
  const cur = history_[history_.length-1];
  if(cur && cur.data && cur.data.id===bookId && (cur.page==='hadithDetail'||cur.page==='hadithChapter'||cur.page==='hadithBook')) render();
}
/* Shared by hadithEnsureAIContent/hadithEnsureKidsContent below: re-renders
   only if the hadith that just finished loading/generating is still the
   one actually on screen (the user may have navigated away while an await
   was in flight). */
function hadithRerenderIfOnPage(bookId, num){
  const cur = history_[history_.length-1];
  if(cur && cur.page==='hadithDetail' && cur.data && cur.data.id===bookId && Number(cur.data.num)===Number(num)) render();
}

/* ---- PHASE 9: شرح الحديث / الفوائد / التطبيق — محتوى خاص بكل حديث ----
   Replaces the old theme-based system (which reused the same handful of
   paragraphs across every hadith that shared a chapter topic). Every
   hadith now gets its own explanation, benefits and practical application
   generated specifically from its own Arabic text via the Claude API, so
   no two hadiths share the same wording. Results are cached in
   IndexedDB (keyed per book+number, see PHASE 1 above) so a given hadith
   is generated only once, then loads instantly offline afterwards. */
let hadithAIContentCache = Object.assign({}, (typeof HADITH_EXPLAIN_DATA!=='undefined' ? HADITH_EXPLAIN_DATA : {}));   // "bookId:num" -> parsed content object; pre-seeded from the bundled offline dataset
let hadithAIState = {};          // "bookId:num" -> 'loading' | 'error' | undefined
let hadithAIErrorReason = {};    // "bookId:num" -> 'offline' | 'other', set alongside hadithAIState==='error'
function hadithAIKey(bookId, num){ return bookId+':'+num; }
async function hadithAILoadFromStorage(bookId, num){
  try{ return (await hadithIdbGet('explain', hadithAIKey(bookId,num))) || null; }catch(e){ return null; }
}
async function hadithAISaveToStorage(bookId, num, content){
  try{ await hadithIdbSet('explain', hadithAIKey(bookId,num), content); }catch(e){}
}
/* Guards against a malformed/partial API response ever reaching the UI. */
function hadithAIValidate(o){
  return !!o && Array.isArray(o.difficult_words) && typeof o.meaning==='string' && o.meaning.trim() &&
    Array.isArray(o.lessons) && o.lessons.length && Array.isArray(o.benefits) && o.benefits.length &&
    typeof o.apply_today==='string' && o.apply_today.trim() && typeof o.avoid==='string' && o.avoid.trim() &&
    typeof o.at_home==='string' && o.at_home.trim() && typeof o.at_work_school==='string' && o.at_work_school.trim();
}
/* ---- v12: hadith AI calls now run on the same Gemini key already used by
   المساعد الذكي (see GEMINI_API_KEY / GEMINI_ENDPOINT further down this
   file), instead of requiring a separately-entered Anthropic key. Nothing
   to configure — this works as soon as the device is online. Note this key
   lives in plain JS in this file, so anyone who views this page's source or
   its network requests can read it; that's fine for a personal/private
   build but keep that in mind if this file is ever shared or hosted
   somewhere public. */
async function hadithCallClaude(system, userMsg){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 20000);
  let response;
  try{
    response = await fetch(GEMINI_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system_instruction: { parts:[{ text: system }] },
        contents: [{ role:'user', parts:[{ text: userMsg }] }],
        generationConfig: { temperature: 0.4, maxOutputTokens: 1200, responseMimeType: "application/json" }
      }),
      signal: ctrl.signal
    });
  } finally { clearTimeout(timer); }
  if(!response.ok){
    let bodyText = '';
    try{ bodyText = await response.text(); }catch(e2){}
    console.error('[hadithCallClaude] Gemini API request failed', { status: response.status, body: bodyText });
    const e = new Error('http_'+response.status);
    if(response.status===401 || response.status===403) e.code = 'auth';
    else if(response.status===429) e.code = 'quota';
    else if(response.status===404) e.code = 'notfound';
    else e.code = 'http_'+response.status;
    throw e;
  }
  const data = await response.json();
  const cand = data && data.candidates && data.candidates[0];
  const raw = (cand && cand.content && cand.content.parts && cand.content.parts.map(p=>p.text||'').join('')) || '';
  if(!raw) {
    console.error('[hadithCallClaude] Gemini API returned no usable text', data);
    const e = new Error('empty_response'); e.code='other'; throw e;
  }
  return raw.replace(/```json|```/g,'').trim();
}
/* Calls the Claude API with the hadith's own text and asks for a strict
   JSON object built only from that text — no shared/generic wording. */
async function hadithGenerateAIContent(book, section, h){
  const narrator = hadithExtractNarrator(h.text);
  const system = "أنت باحث شرعي متخصص في شرح الأحاديث النبوية بدقة وأمانة علمية. مهمتك تحليل نص الحديث المُعطى فقط دون غيره، واستخراج شرح وفوائد وتطبيقات خاصة به تحديدًا لا عبارات عامة تصلح لأي حديث آخر. أجب حصرًا بكائن JSON صالح دون أي مقدمة أو علامات ترميز، بالمفاتيح التالية بالضبط:\n"+
    "difficult_words: مصفوفة كائنات {word,meaning} لأبرز 2 إلى 5 ألفاظ غريبة وردت حرفيًا في نص الحديث (مصفوفة فارغة إن لم توجد ألفاظ غريبة)\n"+
    "meaning: فقرة من جملتين إلى أربع جمل تشرح المعنى الإجمالي لهذا الحديث تحديدًا\n"+
    "lessons: مصفوفة من 3 إلى 5 دروس قصيرة مستفادة من هذا الحديث تحديدًا\n"+
    "benefits: مصفوفة من 3 إلى 5 فوائد قصيرة مستخرجة من مضمون هذا الحديث تحديدًا\n"+
    "apply_today: توجيه عملي واحد موجز: ماذا يفعل المسلم اليوم تطبيقًا لهذا الحديث تحديدًا\n"+
    "avoid: توجيه عملي واحد موجز: ما الذي ينبغي تجنبه استنادًا إلى هذا الحديث تحديدًا\n"+
    "at_home: توجيه عملي واحد موجز لتطبيق هذا الحديث داخل المنزل تحديدًا\n"+
    "at_work_school: توجيه عملي واحد موجز لتطبيق هذا الحديث في العمل أو الدراسة تحديدًا\n"+
    "اكتب كل الحقول باللهجة المصرية العامية البسيطة (زي كلام الناس العادي)، مش بالفصحى، إلا نص الحديث نفسه فيبقى زي ما هو. كل حقل يجب أن يُبنى على ألفاظ هذا الحديث ومعناه فقط، بلا أي تكرار مع حديث آخر، وبلا أي رموز ماركداون زي # أو **.";
  const userMsg = `نص الحديث:\n"${h.text}"\n\nالكتاب: ${book.title}\nالباب: ${section?section.title:book.title}\nرقم الحديث: ${h.hadithnumber}${narrator?'\nالراوي: '+narrator:''}\n\nحلّل هذا الحديث تحديدًا وأعد كائن JSON فقط بالمفاتيح المطلوبة، باللهجة المصرية العامية.`;
  const clean = await hadithCallClaude(system, userMsg);
  const parsed = JSON.parse(clean);
  if(!hadithAIValidate(parsed)) throw new Error('bad_shape');
  return parsed;
}
/* ---- v13: shared helpers that build the question text for "الشرح" /
   "علّم أبناءك" buttons and hand it to سكينة شات (aiSendMessage), instead
   of calling the AI directly per-hadith. UTF-8-safe base64 round trip is
   needed because the question (Arabic text, quotes, newlines) has to travel
   through an HTML onclick="" attribute. */
function hadithAskEncode(str){
  try{ return btoa(unescape(encodeURIComponent(str))); }catch(e){ return ''; }
}
function hadithAskDecode(str){
  try{ return decodeURIComponent(escape(atob(str))); }catch(e){ return ''; }
}
function hadithExplainQuestion(book, section, h){

  return `اشرح لي هذا الحديث النبوي، واذكر: معناه الإجمالي، أبرز الدروس المستفادة منه، وكيف أطبقه في حياتي اليومية:\n\n"${h.text}"\n\nالكتاب: ${book.title}\nالباب: ${section?section.title:book.title}\nرقم الحديث: ${h.hadithnumber}${narrator?'\nالراوي: '+narrator:''}`;
}

}
/* Opens a fresh سكينة شات conversation and sends the question immediately,
   so the person lands straight on the answer instead of an empty chat. */
function hadithAskAssistant(encoded){
  const question = hadithAskDecode(encoded);
  if(!question) return;
  const chat = aiCreateBlankChat();
  aiChats.unshift(chat);
  aiSaveChats();
  aiSetCurrentChat(chat);
  navigateTo('assistant');
  aiSendMessage(question, false, true);
}
/* Retry button for a hadith whose explanation failed to generate. */
function hadithRetryAIContent(bookId, num){

/* v18: fetches + caches this one hadith's شرح/فوائد/تطبيق automatically the
   moment its page is opened (if not already cached), instead of waiting for
   a manual button tap. Only ever touches the single hadith being viewed —
   NOT a whole-book bulk pass — so it can't get stuck the way bulk download
   used to. Safe to call on every render: it no-ops once content or a
   loading/error state already exists for this key. */
async function hadithEnsureAIContent(book, section, h){
  const key = hadithAIKey(book.id, h.hadithnumber);
  if(hadithAIContentCache[key] || hadithAIState[key]) return;
  hadithAIState[key] = 'loading';
  const stored = await hadithAILoadFromStorage(book.id, h.hadithnumber);
  if(stored && hadithAIValidate(stored)){
    hadithAIContentCache[key] = stored;
    delete hadithAIState[key];
    render();
    return;
  }
  if(typeof navigator!=='undefined' && navigator.onLine===false){
    hadithAIState[key] = 'error'; hadithAIErrorReason[key] = 'offline'; render(); return;
  }
  try{
    const content = await hadithGenerateAIContent(book, section, h);
    hadithAIContentCache[key] = content;
    await hadithAISaveToStorage(book.id, h.hadithnumber, content);
    delete hadithAIState[key];
  }catch(e){
    console.error('[hadithEnsureAIContent] failed for', book.id, h.hadithnumber, e);
    hadithAIState[key] = 'error'; hadithAIErrorReason[key] = e && e.code ? e.code : 'other';
  }
  render();
}

let hadithKidsContentCache = Object.assign({}, (typeof HADITH_KIDS_DATA!=='undefined' ? HADITH_KIDS_DATA : {}));   // "bookId:num" -> parsed content object; pre-seeded from the bundled offline dataset

async function hadithGenerateKidsContent(book, section, h){

/* v18: same auto-load pattern as hadithEnsureAIContent — fetches + caches
   this one hadith's "علّم أبناءك" content the moment its page is opened,
   if not already cached. Only the single hadith being viewed, never a
   whole-book bulk pass. */
async function hadithEnsureKidsContent(book, section, h){
  const key = hadithAIKey(book.id, h.hadithnumber);
  if(hadithKidsContentCache[key] || hadithKidsState[key]) return;
  hadithKidsState[key] = 'loading';
  const stored = await hadithKidsLoadFromStorage(book.id, h.hadithnumber);
  if(stored && hadithKidsValidate(stored)){
    hadithKidsContentCache[key] = stored;
    delete hadithKidsState[key];
    render();
    return;
  }
  if(typeof navigator!=='undefined' && navigator.onLine===false){
    hadithKidsState[key] = 'error'; hadithKidsErrorReason[key] = 'offline'; render(); return;
  }
  try{
    const content = await hadithGenerateKidsContent(book, section, h);
    hadithKidsContentCache[key] = content;
    await hadithKidsSaveToStorage(book.id, h.hadithnumber, content);
    delete hadithKidsState[key];
  }catch(e){
    console.error('[hadithEnsureKidsContent] failed for', book.id, h.hadithnumber, e);
    hadithKidsState[key] = 'error'; hadithKidsErrorReason[key] = e && e.code ? e.code : 'other';
  }
  render();
}

/* English kitab-name → Arabic. If nothing in the table matches, the caller
   (hadithFetchBook) needs a title that is either real Arabic or nothing at
   all — never the raw English string — since this text ends up as the big
   heading on the hadith page. Falling through to English there is exactly
   what caused an untranslated chapter name like "Revelation" to show up in
   an otherwise all-Arabic screen. */
function arabicizeSection(enTitle){
  if(!enTitle) return '';
  for(const [re,ar] of HADITH_KITAB_AR){ if(re.test(enTitle)) return ar; }
  const stripped = enTitle.replace(/\s*\(kitab[^)]*\)\s*/i,'').trim();
  return /[A-Za-z]/.test(stripped) ? '' : stripped;
}

/* ---- data layer ----
   Order of lookup for a book's text, mirroring how the Quran module already
   handles Quran pages in this app (see fetchQuranPageIfNeeded further down):
     1) HADITH_LOCAL_DATA — a bundle shipped inside the app itself (optional).
     2) IndexedDB — a copy downloaded previously in this browser (see PHASE 1
        storage layer above), so the book keeps working with no internet
        from then on, and reads back as a plain object with no JSON parse.
     3) network — first time only: fetch the Arabic text of the book from
        the free, public Hadith API (fawazahmed0/hadith-api) and cache it
        into IndexedDB for offline use afterwards.
   Every book now "just works" the first time it's opened while online, then
   reads instantly offline forever after — same promise the Quran reader
   already makes. */
const HADITH_CDN_BASE = 'https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/';
function hadithStorageKey(bookId){ return bookId; } // IndexedDB 'books' store key — kept as a named function since callers already use it as the lookup key
let hadithBookCache = {};      // bookId -> {metadata, hadiths, sections:[{num,title,titleAr,first,last}]}
let hadithLoadError = {};      // bookId -> 'offline' | 'network' while the book's text isn't available yet
async function hadithFetchBook(bookId){
  if(hadithBookCache[bookId]) return hadithBookCache[bookId];
  const book = hadithBookById(bookId);
  if(!book) return null;
  delete hadithLoadError[bookId];

  // 1) bundle shipped with the app, if one was baked in
  let data = (typeof HADITH_LOCAL_DATA!=='undefined') ? HADITH_LOCAL_DATA[bookId] : null;

  // 2) previously-downloaded copy already sitting in this browser
  if(!data || !Array.isArray(data.hadiths) || !data.hadiths.length){
    try{
      const cached = await hadithIdbGet('books', hadithStorageKey(bookId));
      if(cached) data = cached;
    }catch(e){ /* corrupt/unavailable cache entry — fall through and re-download */ }
  }

  // 3) not on this device yet — download it (needs internet just this once)
  if(!data || !Array.isArray(data.hadiths) || !data.hadiths.length){
    if(typeof navigator!=='undefined' && navigator.onLine===false){
      hadithLoadError[bookId] = 'offline';
      return null;
    }
    try{
      const res = await fetch(HADITH_CDN_BASE + book.edition + '.min.json');
      const json = await res.json();
      if(json && Array.isArray(json.hadiths) && json.hadiths.length){
        data = json;
        const saved = await hadithIdbSet('books', hadithStorageKey(bookId), data);
        if(saved) hadithKnownCachedBookIds.add(bookId);
        // storage unavailable/full — keep in memory for this session only, same graceful degrade as before
      } else { throw new Error('bad response'); }
    }catch(err){
      hadithLoadError[bookId] = 'network';
      return null;
    }
  } else {
    hadithKnownCachedBookIds.add(bookId);
  }

  const sections = Object.keys((data.metadata&&data.metadata.section_details)||{})
    .map(n=>Number(n)).filter(n=>n>0).sort((a,b)=>a-b)
    .map(n=>{
      const d = data.metadata.section_details[n];
      const enTitle = ((data.metadata.sections)||{})[n] || '';
      return {num:n, titleEn:enTitle, title: arabicizeSection(enTitle) || `الباب ${n}`, first:d.hadithnumber_first, last:d.hadithnumber_last};
    }).filter(s=>s.last>=s.first && s.last>0);
  hadithBookCache[bookId] = {metadata:data.metadata||{}, hadiths:data.hadiths, sections};
  // Book text is in hand — warm the explanation/kids in-memory caches for
  // the whole book in one background pass (PHASE 1 preload, see above) so
  // navigating between hadiths in a downloaded book is a synchronous read.
  hadithPreloadBookContent(bookId);
  return hadithBookCache[bookId];
}

// True the moment the book's actual text is sitting in IndexedDB (or

// (شرح+فوائد+تطبيق عملي, or علّم أبناءك بكل عناصره) must be generated.
function hadithNeedsExplainGroup(prefs){ return !!(prefs && (prefs.explain||prefs.benefits||prefs.application)); }
function hadithNeedsKidsGroup(prefs){ return !!(prefs && (prefs.teachKids||prefs.stories||prefs.activities||prefs.questions||prefs.duas)); }
// Rough per-hadith content size, used only to estimate/display total download
// size before/while downloading (actual bytes are tracked live during download
// from the real generated JSON — see hadithDownloadAllContentForBook).
const HADITH_EST_EXPLAIN_KB = 1.3;
const HADITH_EST_KIDS_KB = 1.9;
function hadithEstimatedTotalKB(book, prefs){
  return book.sizeKB;
}
// A book only counts as "downloaded" once a full pass through
// hadithDownloadAllContentForBook has actually completed for it (meta.completedAt
// set) — not merely because its raw text happens to be cached from casual
// reading. This guarantees "downloaded" really means "everything is here,
// opening any hadith needs zero network calls".
function hadithDlStatus(bookId){
  if(hadithDownloadingSet.has(bookId)) return 'downloading';
  const meta = hadithDlMeta(bookId);
  if(!meta || !meta.completedAt || !hadithIsBookCached(bookId)) return 'none';
  const book = hadithBookById(bookId);
  if((meta.ver||1) < (book.ver||1)) return 'update';
  return 'downloaded';
}
function hadithDownloadedBooksCount(){
  return HADITH_BOOKS.filter(b=>{ const s=hadithDlStatus(b.id); return s==='downloaded'||s==='update'; }).length;
}
function hadithFormatSizeKB(kb){
  if(kb>=1024) return (kb/1024).toFixed(1).replace(/\.0$/,'') + ' ميجابايت';
  return Math.round(kb) + ' كيلوبايت';
}
function hadithDlStatusMeta(status){
  if(status==='downloading') return {label:'جارٍ التحميل', cls:'st-downloading', icon:`<svg class="hdl-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 10-3 6.7"/></svg>`};
  if(status==='downloaded')  return {label:'محمّل', cls:'st-downloaded', icon:PICONS.check};
  if(status==='update')      return {label:'يوجد تحديث', cls:'st-update', icon:PICONS.refresh};
  return {label:'غير محمّل', cls:'st-none', icon:PICONS.download};
}

/* ---- small circular progress ring used on the in-progress card ---- */
function hadithDlRingHtml(percent, size, stroke){
  size = size||54; stroke = stroke||5;
  const r = (size-stroke)/2, c = 2*Math.PI*r;
  const pct = Math.max(0, Math.min(100, percent||0));
  const off = c - (pct/100)*c;
  return `<div class="hdl-ring-holder">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="hdl-ring-track" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${stroke}"/>
      <circle class="hdl-ring-fill" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${stroke}"
        stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
        transform="rotate(-90 ${size/2} ${size/2})"/>
    </svg>
    <div class="hdl-ring-pct">${Math.round(pct)}%</div>
  </div>`;
}

    const pct = p.total ? Math.round((p.done/p.total)*100) : 0;
    bodyHtml = `
    <div class="hdl-progress-wrap">

  } else if(status==='downloaded'){

    <div class="hdl-done-row">✅ تم التحميل</div>
    <div class="hdl-actions">
      <button class="hdl-btn-delete" onclick="hadithDeleteDownload('${book.id}')">🗑 حذف من الجهاز</button>

/* Runs an async op with a couple of retries (small backoff) — needed because a
   download now means dozens/hundreds of sequential API calls, and a single
   transient network hiccup shouldn't fail the whole book. */
async function hadithWithRetry(fn, retries){
  let lastErr;
  for(let i=0;i<=retries;i++){
    try{ return await fn(); }
    catch(e){ lastErr = e; if(i<retries) await new Promise(r=>setTimeout(r, 400*(i+1))); }
  }
  throw lastErr;
}

/* ---- generates + caches شرح/فوائد/تطبيق and علّم أبناءك for EVERY hadith in
   the book (per the selected prefs), so the book is truly complete offline —
   opening any hadith afterwards reads instantly from cache, no network call.
   Idempotent: already-cached hadiths (from a previous partial download, or
   from having been opened individually before) are skipped, so re-running
   this after an interruption simply resumes where it left off. ---- */
async function hadithDownloadAllContentForBook(bookId, prefs, bookData){
  const book = hadithBookById(bookId);
  const needExplain = hadithNeedsExplainGroup(prefs);
  const needKids = hadithNeedsKidsGroup(prefs);
  const hadiths = bookData.hadiths;
  const groupsPerHadith = (needExplain?1:0) + (needKids?1:0);
  const total = hadiths.length * groupsPerHadith;
  let done = 0, failed = 0, bytesDoneKB = book.sizeKB;
  const bytesTotalKB = hadithEstimatedTotalKB(book, prefs);
  const setProgress = ()=>{ hadithDlProgress[bookId] = {done, total, failed, bytesDoneKB, bytesTotalKB}; };
  setProgress();
  if(total===0) return {failed:0};
  render();

  let idx = 0;
  const CONCURRENCY = 4;
  async function handleOne(h){
    const section = hadithSectionOf(bookId, h.hadithnumber);
    if(needExplain){
      const key = hadithAIKey(bookId, h.hadithnumber);
      let have = !!hadithAIContentCache[key];
      if(!have){ const c = await hadithAILoadFromStorage(bookId, h.hadithnumber); if(c && hadithAIValidate(c)){ hadithAIContentCache[key]=c; have=true; } }
      if(!have){
        try{
          const content = await hadithWithRetry(()=>hadithGenerateAIContent(book, section, h), 2);
          hadithAIContentCache[key] = content;
          await hadithAISaveToStorage(bookId, h.hadithnumber, content);
          bytesDoneKB += JSON.stringify(content).length/1024;
        }catch(e){ failed++; }
      }
      done++; setProgress();
      if(done%2===0 || done===total) render();
    }
    if(needKids){
      const key = hadithAIKey(bookId, h.hadithnumber);
      let have = !!hadithKidsContentCache[key];
      if(!have){ const c = await hadithKidsLoadFromStorage(bookId, h.hadithnumber); if(c && hadithKidsValidate(c)){ hadithKidsContentCache[key]=c; have=true; } }
      if(!have){
        try{
          const content = await hadithWithRetry(()=>hadithGenerateKidsContent(book, section, h), 2);
          hadithKidsContentCache[key] = content;
          await hadithKidsSaveToStorage(bookId, h.hadithnumber, content);
          bytesDoneKB += JSON.stringify(content).length/1024;
        }catch(e){ failed++; }
      }
      done++; setProgress();
      if(done%2===0 || done===total) render();
    }
  }
  async function worker(){
    while(idx<hadiths.length){
      // stops cleanly if the book was deleted or cancelled mid-download
      if(!hadithDownloadingSet.has(bookId)) return;
      const h = hadiths[idx++];
      // FIX (v11): a single unforeseen error here must never take down the
      // whole Promise.all below and leave the book stuck in "downloading".
      try{ await handleOne(h); }catch(e){ failed++; done+=groupsPerHadith; setProgress(); }
    }
  }
  await Promise.all(Array.from({length:Math.min(CONCURRENCY, hadiths.length)}, worker));
  delete hadithDlProgress[bookId];
  return {failed};
}

/* ---- the actual download: fetch+cache the raw text, then generate+cache
   every piece of per-hadith content the prefs ask for. Only marked complete
   (hadithDlStatus === 'downloaded') once this whole pipeline finishes. ---- */
async function hadithStartDownload(bookId, prefs){
  if(hadithDownloadingSet.has(bookId)) return;
  if(typeof navigator!=='undefined' && navigator.onLine===false){
    showToast('يلزم الاتصال بالإنترنت لتحميل الكتاب لأول مرة');
    return;
  }
  const book = hadithBookById(bookId);
  if(!book) return;
  hadithDownloadingSet.add(bookId);
  render();
  // v17: التحميل بقى بيجيب نص الحديث بس (استدعاء شبكة واحد)، من غير ما
  // يولّد شرح/فوائد/تطبيق أو قصص/أنشطة/أدعية لكل حديث على حدة — ده كان
  // بيتطلب مئات نداءات الـ AI بالتتابع وده اللي كان بيخلي الكتاب يفضل
  // "جارٍ التحميل" لفترة طويلة أو يعلّق. الشرح و"علّم أبناءك" لسه متاحين
  // عند فتح أي حديث بشكل منفصل (عند الطلب فقط)، مش أثناء التحميل.
  try{
    const data = await hadithFetchBook(bookId);
    if(!data){
      showToast(`تعذّر تحميل ${book.title}، تحقّق من اتصالك بالإنترنت وأعد المحاولة`);
      return;
    }
    hadithSaveDlMeta(bookId, {completedAt: Date.now(), downloadedAt: Date.now(), ver: book.ver||1, prefs:{}, failedCount: 0});
    showToast(`تم تحميل ${book.title} بالكامل ✅ — يعمل الآن بدون إنترنت تمامًا`);
  }catch(e){
    showToast(`حدث خطأ غير متوقع أثناء تحميل ${book.title}. أعد المحاولة.`);
  }finally{
    hadithDownloadingSet.delete(bookId);
    render();
  }
}
async function hadithDownloadAllBooks(){
  const remaining = HADITH_BOOKS.filter(b=>hadithDlStatus(b.id)==='none');
  if(!remaining.length) return;
  if(typeof navigator!=='undefined' && navigator.onLine===false){
    showToast('يلزم الاتصال بالإنترنت لتحميل كتب الحديث لأول مرة');
    return;
  }
  for(const b of remaining){
    if(hadithDlStatus(b.id)!=='none') continue;
    await hadithStartDownload(b.id);
  }
  showToast(hadithDownloadedBooksCount()>=HADITH_BOOKS.length ? 'تم تحميل جميع كتب الحديث بنجاح ✅' : 'تعذّر تحميل بعض الكتب، تحقّق من اتصالك وأعد المحاولة');
}
/* Deletes ONE book only: its raw text, its download-manager metadata, and
   every per-hadith شرح/فوائد/تطبيق + علّم أبناءك cache entry — all of which
   are keyed by this bookId specifically, so no other downloaded book is
   ever touched. Also halts an in-flight download of this same book cleanly
   (the worker loop above checks hadithDownloadingSet on every iteration). */
async function hadithDeleteDownload(bookId){
  const book = hadithBookById(bookId);
  await Promise.all([
    hadithIdbDeleteByPrefix('explain', bookId+':'),
    hadithIdbDeleteByPrefix('kids', bookId+':'),
  ]);
  await hadithIdbDelete('books', hadithStorageKey(bookId));
  Object.keys(hadithAIContentCache).forEach(k=>{ if(k.indexOf(bookId+':')===0) delete hadithAIContentCache[k]; });
  Object.keys(hadithKidsContentCache).forEach(k=>{ if(k.indexOf(bookId+':')===0) delete hadithKidsContentCache[k]; });
  Object.keys(hadithAIState).forEach(k=>{ if(k.indexOf(bookId+':')===0) delete hadithAIState[k]; });
  Object.keys(hadithKidsState).forEach(k=>{ if(k.indexOf(bookId+':')===0) delete hadithKidsState[k]; });
  try{ localStorage.removeItem(hadithDlMetaKey(bookId)); }catch(e){}
  delete hadithBookCache[bookId];
  delete hadithDlProgress[bookId];
  hadithDownloadingSet.delete(bookId);
  hadithKnownCachedBookIds.delete(bookId);
  hadithContentPreloaded.delete(bookId);
  showToast(`تم حذف ${book?book.title:'الكتاب'} من جهازك بالكامل`);
  render();
}

/* Clears a stuck error state and tries again — wired to the "إعادة المحاولة"
   button shown wherever a book failed to load (see hadithNotBundledNote). */
function hadithRetryFetch(bookId){
  delete hadithLoadError[bookId];
  hadithRenderIfNeeded(bookId);
  render();
}
function hadithFindByNumber(bookId, num){
  const b = hadithBookCache[bookId];
  if(!b) return null;
  return b.hadiths.find(h=>h.hadithnumber===Number(num)) || null;
}
function hadithSectionOf(bookId, num){
  const b = hadithBookCache[bookId];
  if(!b) return null;
  return b.sections.find(s=>num>=s.first && num<=s.last) || null;
}
/* best-effort narrator extraction from the start of the Arabic text — only
   returns a substring that is literally already present in the hadith text,
   never invents one; falls back to empty (nothing shown) if unsure. */
function hadithExtractNarrator(text){
  if(!text) return '';
  const m = text.match(/^(?:وَ)?عَ?نْ\s+([^.,:؛]{3,45}?)\s*(?:رَضِيَ\s*اللَّهُ|أَنَّ|قَالَ|أَنَّهُ|قَالَتْ)/);
  if(m) return m[1].replace(/\s+/g,' ').trim();
  const m2 = text.match(/^([^:.،؛]{3,45}?)\s*رَضِيَ\s*اللَّهُ\s*عَنْ/);
  if(m2) return m2[1].replace(/\s+/g,' ').trim();
  return '';
}

function hadithSaveMarks(){ localStorage.setItem('sakina_hadith_marks', JSON.stringify([...hadithMarks])); }
function hadithSaveHistory(){ localStorage.setItem('sakina_hadith_history', JSON.stringify(hadithHistory)); }

/* HADITH_BOOKS[].count is stored as Arabic-Indic digits (e.g. "٧٥٦٣") for
   display; this converts it back to a plain number for progress math. */
function hadithCountNumber(b){
  if(typeof b.count==='number') return b.count;
  return Number(String(b.count).replace(/[٠-٩]/g, d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d))) || 0;
}
function hadithBookReadCount(bookId){
  let n = 0;
  hadithsReadSet.forEach(k=>{ if(k.startsWith(bookId+':')) n++; });
  return n;
}
function hadithBookProgressPct(b){
  const total = hadithCountNumber(b);
  if(!total) return 0;
  return Math.min(100, Math.round((hadithBookReadCount(b.id)/total)*100));
}
function toggleHadithBookmark(e, bookId, num){
  if(e) e.stopPropagation();
  const key = hadithKey(bookId,num);
  if(hadithBookmarks.has(key)){ hadithBookmarks.delete(key); showToast('تمت إزالة الحديث من المفضلة'); }
  else { hadithBookmarks.add(key); showToast('تم حفظ الحديث في المفضلة ✓'); }
  hadithSaveBookmarks();
  render();
}
/* BOOKMARKS — separate from Favorites: a lightweight "come back to this"
   place-marker rather than a statement of love for the hadith. */
function toggleHadithMark(e, bookId, num){
  if(e) e.stopPropagation();
  const key = hadithKey(bookId,num);
  if(hadithMarks.has(key)){ hadithMarks.delete(key); showToast('تمت إزالة الإشارة المرجعية'); }
  else { hadithMarks.add(key); showToast('تم وضع إشارة مرجعية 🔖'); }
  hadithSaveMarks();
  render();
}
function hadithClearHistory(){
  hadithHistory = [];
  hadithSaveHistory();
  render();
  showToast('تم مسح سجل القراءة');
}
/* deterministic "hadith of the day" — same pick all day, changes daily, no
   network call needed once the book behind it is cached */
function hadithDailyPick(){
  const d = new Date(); const seed = d.getFullYear()*372 + d.getMonth()*31 + d.getDate();
  const book = HADITH_BOOKS[seed % HADITH_BOOKS.length];
  return {bookId:book.id, seed};
}

/* ---- Nearby mosques: real device GPS + free OpenStreetMap/Overpass lookup
   (no API key needed). Replaces the old hardcoded 4-place fake list. ---- */
let mosquesState = {status:'idle', list:[], error:null}; // idle | locating | loading | ready | denied | error
function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function formatDistanceKm(km){ return km<1 ? Math.round(km*1000)+' م' : km.toFixed(km<10?1:0)+' كم'; }
function loadNearbyMosques(forceRetry){
  if(!forceRetry && ['locating','loading','ready'].includes(mosquesState.status)) return;
  if(typeof navigator==='undefined' || !navigator.geolocation){
    mosquesState = {status:'error', list:[], error:'الموقع الجغرافي غير مدعوم في هذا المتصفح.'};
    if(typeof render==='function') render();
    return;
  }
  mosquesState = {status:'locating', list:[], error:null};
  if(typeof render==='function') render();
  navigator.geolocation.getCurrentPosition(
    async pos=>{
      const {latitude, longitude} = pos.coords;
      mosquesState = {status:'loading', list:[], error:null, lat:latitude, lng:longitude};
      if(typeof render==='function') render();
      try{
        const q = `[out:json][timeout:15];(node["amenity"="place_of_worship"]["religion"="muslim"](around:3000,${latitude},${longitude});way["amenity"="place_of_worship"]["religion"="muslim"](around:3000,${latitude},${longitude}););out center 30;`;
        const res = await fetch('https://overpass-api.de/api/interpreter', {method:'POST', body:q});
        if(!res.ok) throw new Error('network');
        const data = await res.json();
        const list = (data.elements||[]).map(el=>{
          const lat = el.lat!=null?el.lat:(el.center&&el.center.lat);
          const lng = el.lon!=null?el.lon:(el.center&&el.center.lon);
          if(lat==null||lng==null) return null;
          const name = (el.tags&&(el.tags['name:ar']||el.tags.name)) || 'مسجد';
          return {name, lat, lng, distKm: haversineKm(latitude, longitude, lat, lng)};
        }).filter(Boolean).sort((a,b)=>a.distKm-b.distKm).slice(0,20);
        mosquesState = {status:'ready', list, error:null, lat:latitude, lng:longitude};
      }catch(e){
        mosquesState = {status:'error', list:[], error:'تعذّر جلب المساجد القريبة، تحقق من اتصالك بالإنترنت.', lat:latitude, lng:longitude};
      }
      if(typeof render==='function') render();
    },
    err=>{
      const denied = err && err.code===1;
      mosquesState = {status: denied?'denied':'error', list:[],
        error: denied?'التطبيق محتاج إذن الوصول لموقعك لعرض أقرب المساجد.':'تعذّر تحديد موقعك، حاول مرة أخرى.'};
      if(typeof render==='function') render();
    },
    {enableHighAccuracy:true, timeout:10000, maximumAge:300000}
  );
}

(function initPullToRefresh(){
  let startY=0, pulling=false, dist=0;
  const THRESHOLD = 70;
  const indicator = document.getElementById('pullIndicator');
  const spin = indicator ? indicator.querySelector('.pull-spin') : null;
  $main.addEventListener('touchstart', e=>{
    pulling = $main.scrollTop<=0;
    startY = e.touches[0].clientY;
  }, {passive:true});
  $main.addEventListener('touchmove', e=>{
    if(!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if(dy>0 && $main.scrollTop<=0){
      dist = Math.min(dy*0.5, 90);
      if(spin) spin.style.transform = `translateY(${dist-40}px) rotate(${dist*3}deg)`;
    } else { pulling = false; }
  }, {passive:true});
  $main.addEventListener('touchend', ()=>{
    if(!pulling) return;
    pulling = false;
    if(dist > THRESHOLD){
      if(indicator) indicator.classList.add('refreshing');
      setTimeout(()=>{
        render();
        if(indicator) indicator.classList.remove('refreshing');
        if(spin) spin.style.transform = 'translateY(-40px)';
        showToast('تم التحديث ✓');
      }, 450);
    } else if(spin){ spin.style.transform = 'translateY(-40px)'; }
    dist = 0;
  }, {passive:true});
})();

function esc(s){return (s+'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toArabicDigits(n){
  const map=['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(n).replace(/[0-9]/g, d=>map[+d]);
}
function normalizeAr(s){
  return (s+'').replace(/[\u064B-\u0652\u0670\u06D6-\u06ED]/g,'').replace(/[إأآا]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').trim().toLowerCase();
}
function matchAr(text, q){ return normalizeAr(text).includes(normalizeAr(q)); }

// instead of leaving the bar looking "unselected". Pages not listed here

const PAGE_TAB_MAP = {

  projects:'projects', projectDetail:'projects',
  knowledge:'knowledge', hadithBooks:'knowledge', hadithBook:'knowledge', hadithChapter:'knowledge',
  hadithDetail:'knowledge', hadithSearch:'knowledge', hadithFavorites:'knowledge',
  hadithBookmarksList:'knowledge', hadithHistory:'knowledge',

function updateBottomNav(page){
  const activeTab = PAGE_TAB_MAP[page] || 'more';
  const slot = document.getElementById('navActiveSlot');
  const group = document.getElementById('navGroup');
  // Walking the buttons in their original document order and re-appending
  // each one to its target container keeps the group's relative order
  // stable (home, projects, knowledge, communities, more, minus whichever
  // one is active) while the active button floats alone in its own slot.
  document.querySelectorAll('.nav-btn').forEach(b=>{

// Resolves once the Firebase module bridge (window.SAKINA_FIREBASE, see the
// type="module" script above) has finished initializing. The module
// script is deferred by the browser and may still be loading when this
// classic script starts running, so every Firebase-dependent call awaits

function waitForFb(){

// Creates the one-and-only default Super Admin account on first init,
// for real, in Firebase Auth + Realtime Database. Idempotent: if a
// superadmin profile already exists locally, this does nothing.
async function authEnsureDefaultSuperAdmin(){
  const users = authLoadUsers();
  if(users.some(u=>u.role==='superadmin')) return;
  const seed = SUPER_ADMIN_SEED;
  const fb = await waitForFb();
  let uid;
  try{
    // First run ever: actually creates the account in Firebase Auth.
    const fbUser = await fb.signUp(seed.email, seed.password);
    uid = fbUser.uid;
  }catch(e){
    if(e && e.code==='auth/email-already-in-use'){
      // Account already exists in Firebase from a previous run, but the
      // local profile cache was cleared (e.g. different browser/device).
      // Sign in to recover the uid instead of creating a duplicate account.
      const fbUser = await fb.signIn(seed.email, seed.password, true);
      uid = fbUser.uid;
    } else {
      console.error('authEnsureDefaultSuperAdmin failed:', e);
      return;
    }
  }
  const user = {
    id: uid, name:seed.name, username:seed.username,
    email:String(seed.email).trim().toLowerCase(),
    role:'superadmin', status:'active', emailVerified:true,
    createdAt:new Date().toISOString(), lastLoginAt:null, loginCount:0,
    isDefaultSuperAdmin:true,
    statsSnapshot: authEmptyStatsSnapshot(),
  };
  users.push(user);
  authSaveUsers(users);
  try{
    await window.SAKINA_FIREBASE.db.set('users/'+uid+'/profile', {
      name:user.name, username:user.username, email:user.email, role:'superadmin',
      status:'active', photoURL:null, createdAt:user.createdAt,
    });
  }catch(e){ /* DB write is best-effort; local profile above already works */ }
}

// FIREBASE HOOK: delete this function once Firebase Auth is wired in —
// Firebase hashes/salts passwords server-side and none of this is needed.
// It exists only so the local demo never keeps a plaintext password.
async function authHash(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function authGenId(){ return 'u_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function authGenToken(){ return 'tok_'+Date.now().toString(36)+Math.random().toString(36).slice(2,10); }

function authValidateEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email||'').trim()); }
function authPasswordStrength(pw){
  pw = pw||''; let score=0;
  if(pw.length>=8) score++;
  if(/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  return Math.min(score,4);
}
function authValidatePassword(pw){ return String(pw||'').length>=8 && /[0-9]/.test(pw) && /[A-Za-z]/.test(pw); }

// FIREBASE HOOK: replace with onAuthStateChanged's cached user / getAuth().currentUser
function authGetSession(){
  const raw = localStorage.getItem(AUTH_SESSION_KEY) || sessionStorage.getItem(AUTH_SESSION_KEY);
  if(!raw) return null;
  try{
    const s = JSON.parse(raw);
    if(s.expiresAt && Date.now() > s.expiresAt){ authClearSession(); return null; }
    return s;
  }catch(e){ return null; }
}
function authClearSession(){
  localStorage.removeItem(AUTH_SESSION_KEY);
  sessionStorage.removeItem(AUTH_SESSION_KEY);
}
function authCurrentUser(){
  const s = authGetSession();
  if(!s) return null;
  return authLoadUsers().find(u=>u.id===s.userId) || null;
}
function authCreateSession(user, remember){
  const session = {
    userId:user.id, token:authGenToken(), remember:!!remember,
    // "remember me" keeps the session for 30 days; otherwise it lasts 12h or until the tab closes
    expiresAt: Date.now() + (remember ? 1000*60*60*24*30 : 1000*60*60*12),
  };
  (remember?localStorage:sessionStorage).setItem(AUTH_SESSION_KEY, JSON.stringify(session));
  (remember?sessionStorage:localStorage).removeItem(AUTH_SESSION_KEY);
}

function authValidateUsername(u){ return /^[a-zA-Z0-9_.\u0600-\u06FF]{3,20}$/.test(String(u||'').trim()); }

// Creates a real Firebase Auth account, then stores the app-facing
// profile (name, username, role, stats) locally, keyed by the Firebase uid.
async function authRegister({name,username,email,password,confirm}){
  if(!authIsOnline()) return {ok:false, errors:{form:'تحقق من اتصالك بالإنترنت وحاول مرة أخرى'}};
  if(typeof adminAppSettings!=='undefined' && adminAppSettings.allowRegistrations===false){
    return {ok:false, errors:{form:'التسجيل مغلق حاليًا، تواصل مع الإدارة'}};
  }
  const errors = {};
  if(!name || name.trim().length<2) errors.name = 'الاسم قصير جدًا';
  if(!authValidateUsername(username)) errors.username = 'اسم المستخدم 3-20 حرفًا (أحرف وأرقام و_ فقط)';
  if(!authValidateEmail(email)) errors.email = 'بريد إلكتروني غير صالح';
  if(!authValidatePassword(password)) errors.password = 'كلمة المرور 8 أحرف على الأقل، حرف ورقم على الأقل';
  if(password !== confirm) errors.confirm = 'كلمتا المرور غير متطابقتين';
  try{
    const users = authLoadUsers();
    if(!errors.username && users.some(u=>String(u.username||'').toLowerCase()===String(username).trim().toLowerCase())) errors.username = 'اسم المستخدم هذا محجوز بالفعل';
    if(Object.keys(errors).length) return {ok:false, errors};

    const fb = await waitForFb();
    let fbUser;
    try{
      fbUser = await fb.signUp(String(email).trim().toLowerCase(), password);
    }catch(e){
      if(e && e.code==='auth/email-already-in-use') return {ok:false, errors:{email:'هذا البريد مستخدم بالفعل'}};
      if(e && e.code==='auth/weak-password') return {ok:false, errors:{password:'كلمة المرور ضعيفة جدًا'}};
      return {ok:false, errors:{form:authNetworkOrServerError(e)}};
    }

    const user = {
      id: fbUser.uid, name:name.trim(), username:String(username).trim(),
      email:String(email).trim().toLowerCase(),
      role:'user', // every new registration is a plain "User" — only a Super Admin can promote from here
      status:'active', emailVerified:false, createdAt:new Date().toISOString(),
      lastLoginAt:new Date().toISOString(), loginCount:1,
      statsSnapshot: authEmptyStatsSnapshot(),
    };
    users.push(user);
    authSaveUsers(users);
    // Issue 2/3 fix: this write is what makes the new account show up in the Super
    // Admin dashboard (see startUsersDirectoryLiveSync below) — it must happen
    // synchronously right after signUp succeeds, with the full profile the
    // dashboard needs (name/email/uid/photo/registration date/role), and must
    // not be silently swallowed on failure (a permission-denied Realtime
    // Database rule would otherwise hide every new user from the admin).
    try{
      await window.SAKINA_FIREBASE.db.set('users/'+fbUser.uid+'/profile', {
        name:user.name, username:user.username, email:user.email, role:'user',
        status:'active', photoURL:null, createdAt:user.createdAt,
      });
    }catch(e){
      console.error('Failed to create Firestore/RTDB user profile after registration — the Super Admin dashboard will not see this account until this succeeds:', e);
    }
    return {ok:true, user};
  }catch(e){
    return {ok:false, errors:{form:authNetworkOrServerError(e)}};
  }
}

// Verifies the password against real Firebase Auth (never against
// anything stored in this file or in localStorage), then loads/creates
// the local app-facing profile keyed by the Firebase uid.
async function authLogin({email,password,remember}){
  if(!authIsOnline()) return {ok:false, errors:{form:'تحقق من اتصالك بالإنترنت وحاول مرة أخرى'}};
  const errors = {};
  if(!authValidateEmail(email)) errors.email = 'بريد إلكتروني غير صالح';
  if(!password) errors.password = 'أدخل كلمة المرور';
  if(Object.keys(errors).length) return {ok:false, errors};
  try{
    const fb = await waitForFb();
    let fbUser;
    try{
      fbUser = await fb.signIn(String(email).trim().toLowerCase(), password, remember);
    }catch(e){
      if(e && (e.code==='auth/invalid-credential' || e.code==='auth/wrong-password' || e.code==='auth/user-not-found')){
        return {ok:false, errors:{form:'البريد الإلكتروني أو كلمة المرور غير صحيحة'}};
      }
      if(e && e.code==='auth/too-many-requests'){
        return {ok:false, errors:{form:'محاولات كثيرة جدًا، حاول لاحقًا'}};
      }
      return {ok:false, errors:{form:authNetworkOrServerError(e)}};
    }

    const users = authLoadUsers();
    let user = users.find(u=>u.id===fbUser.uid);
    if(user && user.status==='suspended'){
      await fb.signOutUser();
      return {ok:false, errors:{form:'هذا الحساب موقوف حاليًا. تواصل مع الدعم.'}};
    }
    if(!user){
      // Signed in successfully in Firebase but no local profile cache yet
      // (e.g. first login on a new browser) — rebuild a minimal one.
      user = {
        id: fbUser.uid, name: fbUser.email.split('@')[0], username: fbUser.email.split('@')[0],
        email: String(email).trim().toLowerCase(), role:'user', status:'active',
        emailVerified:true, createdAt:new Date().toISOString(),
        lastLoginAt:new Date().toISOString(), loginCount:0,
        statsSnapshot: authEmptyStatsSnapshot(),
      };
      users.push(user);
    }
    user.lastLoginAt = new Date().toISOString();
    user.loginCount = (user.loginCount||0) + 1;
    authSaveUsers(users);
    authCreateSession(user, remember);
    return {ok:true, user};
  }catch(e){
    return {ok:false, errors:{form:authNetworkOrServerError(e)}};
  }
}

/* =====================================================================
   REALTIME CROSS-DEVICE SYNC
   Generic layer that mirrors the app's localStorage-based data to
   Firebase Realtime Database, so a change made on one signed-in device
   appears live on every other device signed into the same account —
   without having to individually rewrite every feature in the app.
   How it works:
   1. localStorage.setItem is wrapped: any write to a "synced" key also
      pushes the new value to Firebase (debounced, so fast repeated
      writes like a tasbeeh counter don't spam the network).
   2. A live onValue listener is attached per synced key; whenever the
      value changes remotely (from another device), it's written into
      localStorage here and the UI is re-rendered — instantly, no
      refresh needed.
   ===================================================================== */

// Keys scoped to the signed-in user only (their own personal data).
const SYNC_USER_KEYS = [
  'sakina_active_khatma','sakina_adhkar_daily','sakina_ai_chats','sakina_c_saves',
  'sakina_community_overrides','sakina_counters','sakina_dynamic_notifs',
  'sakina_hadith_book_progress','sakina_hadith_bookmarks','sakina_hadith_books_started',
  'sakina_hadith_continue','sakina_hadith_history','sakina_hadith_marks','sakina_hadith_notes',
  'sakina_hadith_read','sakina_joined','sakina_journey_layout',
  'sakina_khatmas','sakina_my_posts','sakina_notif_read',
  'sakina_profile','sakina_quran_reading','sakina_rating','sakina_saved_ayahs',
  'sakina_saved_projects','sakina_saved_surahs','sakina_settings','sakina_subscribed',
  'sakina_theme','sakina_tsb_custom','sakina_tsb_goals','sakina_tsb_log','sakina_tsb_selected',
  'sakina_tsb_settings','sakina_tsb_unlocked','sakina_wird_goals','sakina_wird_log','sakina_wird_reminder',
];
// Keys shared by the whole app — every signed-in user/device sees the same
// value (the super-admin master toggles, and the full user directory that
// the admin dashboard needs to see regardless of which device a user
// registered from).
const SYNC_GLOBAL_KEYS = ['sakina_admin_app_settings', AUTH_USERS_KEY];

let syncApplyingRemote = false; // true while writing a value that came FROM Firebase, so we don't echo it straight back up
let syncPushTimers = {};
let syncUnsubs = [];
let syncActiveUid = null;

const syncOrigSetItem = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(key, value){
  syncOrigSetItem(key, value);
  if(syncApplyingRemote) return; // came from Firebase already — don't push it right back
  if(!isFirebaseConfigured() || !syncActiveUid) return;
  if(SYNC_USER_KEYS.includes(key)) syncQueuePush('users/'+syncActiveUid+'/appData/'+key, value);
  else if(SYNC_GLOBAL_KEYS.includes(key)) syncQueuePush('shared/'+key, value);
};
let syncGlobalFailToastShown = false;
function syncQueuePush(path, value){
  clearTimeout(syncPushTimers[path]);
  syncPushTimers[path] = setTimeout(()=>{
    window.SAKINA_FIREBASE.db.set(path, value).catch(e=>{
      console.error('sync push failed', path, e);
      // A failure on a "shared" path (admin settings / user directory) means this change did NOT
      // reach other devices — most commonly a Firebase Realtime Database security-rule rejection
      // (permission_denied). Surface it once so it's not mistaken for "sync is just slow".
      if(path.startsWith('shared/') && !syncGlobalFailToastShown){
        syncGlobalFailToastShown = true;
        showToast('تعذّر مزامنة هذا التغيير مع باقي الأجهزة (تحقّق من صلاحيات قاعدة البيانات في Firebase)');
      }
    });
  }, 500); // debounce rapid successive writes
}
function syncApplyRemoteValue(key, val){
  if(val==null || val===localStorage.getItem(key)) return; // nothing actually changed
  syncApplyingRemote = true;
  try{ localStorage.setItem(key, val); } finally { syncApplyingRemote = false; }
  if(typeof render==='function') render();
}

// Starts live two-way sync for the signed-in user (call right after login/
// registration/boot). Safe to call multiple times — no-ops if already
// running for this uid.
async function syncStartForUser(uid){
  if(!isFirebaseConfigured() || !uid || syncActiveUid===uid) return;
  syncStop();
  syncActiveUid = uid;
  const fb = window.SAKINA_FIREBASE;
  const entries = [
    ...SYNC_USER_KEYS.map(k=>({key:k, path:'users/'+uid+'/appData/'+k})),
    ...SYNC_GLOBAL_KEYS.map(k=>({key:k, path:'shared/'+k})),
  ];
  for(const {key, path} of entries){
    let firstCallback = true;
    const unsub = fb.db.onChange(path, (val)=>{
      if(firstCallback){
        firstCallback = false;
        const local = localStorage.getItem(key);
        if(val==null && local!=null){ syncQueuePush(path, local); return; } // seed Firebase from this device the first time
      }
      syncApplyRemoteValue(key, val);
    });
    syncUnsubs.push(unsub);
  }
  startUsersDirectoryLiveSync();
  startKhatmaGroupsLiveSync();
  startCommunityMembersLiveSync();
  startPresenceLiveSync();
  startPresence();
  if(typeof authSyncCurrentUserSnapshot==='function') authSyncCurrentUserSnapshot();
  if(typeof CommunityStore!=='undefined' && CommunityStore.initFirebaseSync) CommunityStore.initFirebaseSync();
}
function syncStop(){
  syncUnsubs.forEach(unsub=>{ try{ unsub && unsub(); }catch(e){} });
  syncUnsubs = [];
  syncActiveUid = null;
  stopUsersDirectoryLiveSync();
  stopKhatmaGroupsLiveSync();
  stopCommunityMembersLiveSync();
  stopPresenceLiveSync();
  stopPresence();
  if(typeof stopCommunityOverridesLiveSync==='function') stopCommunityOverridesLiveSync();
  if(typeof stopCommunityRequestsLiveSync==='function') stopCommunityRequestsLiveSync();
  if(typeof stopApprovedCommunitiesLiveSync==='function') stopApprovedCommunitiesLiveSync();
}

/* ---------------------------------------------------------------------
   Issue 2 & 3 fix — LIVE USER DIRECTORY (Super Admin "cannot see users")
   Root cause: the admin dashboard read authLoadUsers(), which is just a
   localStorage array. It was kept in sync across devices only by pushing
   the ENTIRE array as one blob to shared/sakina_auth_users — so whichever
   device synced last would silently overwrite/drop users registered on
   other devices ("last write wins" on the whole list). Meanwhile every
   registration DOES write an individual record to users/{uid}/profile
   (see authRegister / authEnsureDefaultSuperAdmin above), but nothing
   was listening to it.
   Fix: listen live on the whole 'users' node (one child per uid). Every
   registered user's profile is merged into the local users array the
   instant it appears/changes in Firebase, on every signed-in device —
   independent of, and immune to, the old blob-sync race condition.
   --------------------------------------------------------------------- */
let usersDirUnsub = null;
function startUsersDirectoryLiveSync(){
  if(!isFirebaseConfigured() || usersDirUnsub) return;
  usersDirUnsub = window.SAKINA_FIREBASE.db.onChange('users', (usersObj)=>{
    if(!usersObj) return;
    const local = authLoadUsers();
    let changed = false;
    Object.keys(usersObj).forEach(uid=>{
      const remote = usersObj[uid] && usersObj[uid].profile;
      if(!remote) return;
      let u = local.find(x=>x.id===uid);
      if(!u){
        // A registered user Firebase knows about but this device has never seen — add them now.
        local.push({
          id: uid, name: remote.name||'', username: remote.username||'',
          email: remote.email||'', role: remote.role||'user',
          status: remote.status||'active', emailVerified: !!remote.emailVerified,
          createdAt: remote.createdAt || new Date().toISOString(),
          lastLoginAt: remote.lastLoginAt || null, loginCount: 0,
          photoURL: remote.photoURL || null,
          statsSnapshot: remote.statsSnapshot || authEmptyStatsSnapshot(),
        });
        changed = true;
      } else {
        // Keep role/status/name/photo in sync with whatever Firebase has (e.g. an
        // admin action taken on another device), without clobbering local-only stats.
        if(remote.role && u.role!==remote.role){ u.role=remote.role; changed=true; }
        if(remote.status && u.status!==remote.status){ u.status=remote.status; changed=true; }
        if(remote.name && u.name!==remote.name){ u.name=remote.name; changed=true; }
        if(remote.username && u.username!==remote.username){ u.username=remote.username; changed=true; }
        if('photoURL' in remote && u.photoURL!==remote.photoURL){ u.photoURL=remote.photoURL; changed=true; }
        if(remote.createdAt && !u.createdAt){ u.createdAt=remote.createdAt; changed=true; }
        if(remote.statsSnapshot){ u.statsSnapshot=remote.statsSnapshot; changed=true; }
      }
    });
    if(changed){
      authSaveUsers(local);
      if(typeof render==='function') render();
    }
  });
}
function stopUsersDirectoryLiveSync(){
  try{ usersDirUnsub && usersDirUnsub(); }catch(e){}
  usersDirUnsub = null;
}

// FIREBASE HOOK: replace body with `await window.SAKINA_FIREBASE.auth.sendPasswordResetEmail(email)`
// (i.e. sendPasswordResetEmail(getAuth(), email)). Firebase emails the user a
// reset LINK (not a code) that opens this app again with ?mode=resetPassword&oobCode=...
// — see authGetResetOobCode() / boot(). Until Firebase is connected, this never
// pretends an email went out: it honestly reports that mail sending isn't configured.
async function authRequestReset(email){
  if(!authValidateEmail(email)) return {ok:false, error:'بريد إلكتروني غير صالح'};
  if(!isFirebaseConfigured()){
    return {ok:false, notConfigured:true,
      error:'لم يتم تفعيل خدمة إرسال البريد الإلكتروني بعد. سيتم تفعيلها فور ربط Firebase Authentication بالتطبيق. للمساعدة الآن، تواصل مع فريق الدعم.'};
  }
  if(!authIsOnline()) return {ok:false, error:'تحقق من اتصالك بالإنترنت وحاول مرة أخرى'};
  try{
    await window.SAKINA_FIREBASE.auth.sendPasswordResetEmail(String(email).trim().toLowerCase());
    return {ok:true};
  }catch(e){
    return {ok:false, error:authMapFirebaseError(e)};
  }
}

// Reads the Firebase-style password-reset link params (?mode=resetPassword&oobCode=...)
// that Firebase puts in the email it sends. Returns null when this isn't a reset link.
function authGetResetOobCode(){
  try{
    const params = new URLSearchParams(window.location.search);
    if(params.get('mode')==='resetPassword' && params.get('oobCode')) return params.get('oobCode');
  }catch(e){}
  return null;
}

// FIREBASE HOOK: replace body with `await window.SAKINA_FIREBASE.auth.confirmPasswordReset(oobCode, newPassword)`
async function authConfirmReset(oobCode, newPassword){
  if(!authValidatePassword(newPassword)) return {ok:false, error:'كلمة المرور ضعيفة جدًا (8 أحرف على الأقل، حرف ورقم)'};
  if(!isFirebaseConfigured()) return {ok:false, error:'لم يتم تفعيل خدمة إعادة تعيين كلمة المرور بعد.'};
  if(!authIsOnline()) return {ok:false, error:'تحقق من اتصالك بالإنترنت وحاول مرة أخرى'};
  try{
    await window.SAKINA_FIREBASE.auth.confirmPasswordReset(oobCode, newPassword);
    return {ok:true};
  }catch(e){
    return {ok:false, error:authMapFirebaseError(e)};
  }
}

// FIREBASE HOOK: replace body with `await sendEmailVerification(userCredential.user)`.
// Called right after registration; silently no-ops (architecture-only) until
// Firebase is connected, so it never claims to have sent an email it didn't.
async function authSendVerificationEmail(user){
  if(!isFirebaseConfigured()) return {ok:false, notConfigured:true};
  try{
    await window.SAKINA_FIREBASE.auth.sendEmailVerification(user);
    return {ok:true};
  }catch(e){
    return {ok:false, error:authMapFirebaseError(e)};
  }
}

function authTogglePw(id, btn){
  const input = document.getElementById(id);
  const show = input.type==='password';
  input.type = show?'text':'password';
  btn.innerHTML = show?AUTH_ICON.eyeOn:AUTH_ICON.eyeOff;
}
function authShowFieldError(id, msg){
  const wrap = document.getElementById(id+'Wrap');
  const err = document.getElementById(id+'Err');
  if(wrap) wrap.classList.toggle('error', !!msg);
  if(err){ err.classList.toggle('show', !!msg); const span=err.querySelector('span'); if(span) span.textContent = msg||''; }
  if(wrap && !msg && document.getElementById(id) && document.getElementById(id).value){ wrap.classList.add('success'); }
}
function authClearAllErrors(ids){ ids.forEach(id=>authShowFieldError(id,'')); }
function authSetLoading(btn, loading){
  if(!btn) return;
  btn.disabled = loading;
  btn.classList.toggle('is-loading', loading);
}

async function authHandleLogin(evt){
  evt.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('loginRemember').checked;
  authClearAllErrors(['loginEmail','loginPassword','loginFormErr']);
  const btn = document.getElementById('loginSubmitBtn');
  authSetLoading(btn, true);
  const res = await authLogin({email,password,remember});
  authSetLoading(btn, false);
  if(!res.ok){
    if(res.errors.email) authShowFieldError('loginEmail', res.errors.email);
    if(res.errors.password) authShowFieldError('loginPassword', res.errors.password);
    if(res.errors.form) authShowFieldError('loginFormErr', res.errors.form);
    return false;
  }
  showToast(`أهلًا بعودتك، ${res.user.name.split(' ')[0]} 🤍`);
  await syncStartForUser(res.user.id);
  userProfile = Object.assign({}, DEFAULT_PROFILE, JSON.parse(localStorage.getItem('sakina_profile')||'{}'), {name:res.user.name});
  saveProfile();
  showApp();
  return false;
}

async function authHandleRegister(evt){
  evt.preventDefault();
  const name = document.getElementById('regName').value;
  const username = document.getElementById('regUsername').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  authClearAllErrors(['regName','regUsername','regEmail','regPassword','regConfirm','registerFormErr']);
  const btn = document.getElementById('registerSubmitBtn');
  authSetLoading(btn, true);
  const res = await authRegister({name,username,email,password,confirm});
  authSetLoading(btn, false);
  if(!res.ok){
    Object.keys(res.errors).forEach(k=>authShowFieldError(k==='confirm'?'regConfirm':'reg'+k[0].toUpperCase()+k.slice(1), res.errors[k]));
    return false;
  }
  authCreateSession(res.user, true);
  await syncStartForUser(res.user.id);
  // Fire-and-forget: sends a real verification email once Firebase is connected;
  // silently no-ops until then so the app never claims a mail was sent.
  authSendVerificationEmail(res.user).catch(()=>{});
  userProfile = Object.assign({}, DEFAULT_PROFILE, {name:res.user.name, username:res.user.username});
  saveProfile();
  showToast('تم إنشاء حسابك بنجاح، أهلًا بك 🤍');
  showApp();
  return false;
}

async function authHandleForgotRequest(evt){
  evt.preventDefault();
  const email = document.getElementById('forgotEmail').value;
  authClearAllErrors(['forgotEmail','forgotFormErr']);
  document.getElementById('forgotNotConfigured').style.display = 'none';
  if(!authValidateEmail(email)){ authShowFieldError('forgotEmail','بريد إلكتروني غير صالح'); return false; }
  const btn = document.getElementById('forgotSubmitBtn');
  authSetLoading(btn, true);
  const res = await authRequestReset(email);
  authSetLoading(btn, false);
  if(!res.ok){
    if(res.notConfigured){
      const note = document.getElementById('forgotNotConfigured');
      note.style.display = 'flex';
      note.querySelector('span').textContent = res.error;
    } else {
      authShowFieldError('forgotFormErr', res.error);
    }
    return false;
  }
  document.getElementById('forgotBody').innerHTML = authForgotSuccessPanel(String(email).trim());
  return false;
}

async function authHandleReset(evt, oobCode){
  evt.preventDefault();
  const newPassword = document.getElementById('resetPassword').value;
  const confirm = document.getElementById('resetConfirm').value;
  authClearAllErrors(['resetPassword','resetConfirm','resetFormErr']);
  if(newPassword !== confirm){ authShowFieldError('resetConfirm','كلمتا المرور غير متطابقتين'); return false; }
  const btn = document.getElementById('resetSubmitBtn');
  authSetLoading(btn, true);
  const res = await authConfirmReset(oobCode, newPassword);
  authSetLoading(btn, false);
  if(!res.ok){ authShowFieldError('resetFormErr', res.error); return false; }
  showToast('تم تغيير كلمة المرور بنجاح، سجّل الدخول الآن');
  showAuthScreen('login');
  return false;
}
function authUpdateStrength(inputId, barsId, labelId){
  inputId = inputId||'regPassword'; barsId = barsId||'regStrength'; labelId = labelId||'regStrengthLabel';
  const pw = document.getElementById(inputId).value;
  const score = authPasswordStrength(pw);
  const labels = ['ضعيفة جدًا','ضعيفة','متوسطة','قوية','قوية جدًا'];
  const colors = ['#c9575a','#c9575a','#c99b62','#1c8f78','#177563'];
  document.querySelectorAll('#'+barsId+' i').forEach((b,i)=>{ b.style.background = i<score ? colors[score] : 'var(--border)'; });
  document.getElementById(labelId).textContent = pw? labels[score] : '';
  document.getElementById(labelId).style.color = pw? colors[score] : '';
}



function navigateTo(page, data){
  if(ADMIN_PAGE_PERMISSIONS[page] && !authCanAccessPage(page)){
    showToast('غير مصرح لك بالوصول إلى هذه الصفحة');
    return;
  }
  if(page==='quranReader'){
    data = Object.assign({}, data);
    if(!data.page) data.page = data.id ? khatmaSurahStartPage(Number(data.id)) : 1;
    data.page = Math.max(1, Math.min(QURAN_TOTAL_PAGES, Number(data.page)));
    if(!data.id) data.id = khatmaPageToSurah(data.page);
  }
  const prev = history_[history_.length-1];
  // v19: remember exactly where we were scrolled to on the page we're
  // leaving, so if the user comes back to it (via goBack) later, it opens
  // back at the same spot instead of snapping to the top every time.
  if(prev) prev.scrollTop = $main.scrollTop;
  if(prev && prev.page==='quranReader' && page!=='quranReader') quranReadingLeave();
  history_.push({page, data, scrollTop:0});
  if(page==='quranReader' && data && data.id) quranReadingEnter(data.id);
  render();
  updateBottomNav(page);
  $main.scrollTop = 0;
}
function _goBackInternal(){
  const prev = history_[history_.length-1];
  if(prev && prev.page==='quranReader') quranReadingLeave();
  if(history_.length>1){
    history_.pop();
    render();
    // v19: restore the scroll position this (now current) page had when the
    // user left it, instead of always resetting to the top — applies to
    // every page in the app (hadith chapters, communities, settings lists…),
    // not just one specific section.
    const restore = history_[history_.length-1];
    $main.scrollTop = (restore && restore.scrollTop) || 0;
    updateBottomNav(history_[history_.length-1].page);
  }
}
// v20: the in-app back arrows/chevrons and the phone's hardware back button
// now share one code path. goBack() simply asks the browser to go back;
// the popstate listener below performs the real state pop. This means the
// system back button steps back through the app's own page stack (surah →
// quran list → home, etc.) instead of immediately exiting/closing the tab.
function goBack(){
  if(history_.length>1) history.back();
}
window.addEventListener('popstate', function(){
  _goBackInternal();
});
function resetToTab(page){
  history_ = [{page}];
  render();
  updateBottomNav(page);
}

/* ---- AI FAB — draggable floating button (drag anywhere on screen, position persists) ---- */
let aiFabDragState = null;
function aiFabClampPosition(x, y){
  const el = document.getElementById('aiFab');
  const w = (el && el.offsetWidth) || 52, h = (el && el.offsetHeight) || 52;
  const margin = 6;
  const maxX = Math.max(margin, window.innerWidth - w - margin);
  const maxY = Math.max(margin, window.innerHeight - h - margin);
  return { x: Math.min(Math.max(margin, x), maxX), y: Math.min(Math.max(margin, y), maxY) };
}
function aiFabSavePosition(x, y){
  try{ localStorage.setItem('sakina_ai_fab_pos', JSON.stringify({x, y})); }catch(e){}
}
function aiFabRestorePosition(){
  const el = document.getElementById('aiFab');
  if(!el) return;
  let pos = null;
  try{ pos = JSON.parse(localStorage.getItem('sakina_ai_fab_pos')||'null'); }catch(e){}
  if(pos && typeof pos.x==='number' && typeof pos.y==='number'){
    const c = aiFabClampPosition(pos.x, pos.y);
    el.style.left = c.x+'px'; el.style.top = c.y+'px';
    el.style.bottom = 'auto'; el.style.right = 'auto';
  }
}
function initAiFabDrag(){
  const el = document.getElementById('aiFab');
  if(!el || el.dataset.dragBound) return;
  el.dataset.dragBound = '1';
  el.addEventListener('pointerdown', (e)=>{
    const rect = el.getBoundingClientRect();
    aiFabDragState = {
      startX: e.clientX, startY: e.clientY,
      offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top,
      moved: false, pointerId: e.pointerId,
    };
    try{ el.setPointerCapture(e.pointerId); }catch(err){}
  });
  el.addEventListener('pointermove', (e)=>{
    if(!aiFabDragState || aiFabDragState.pointerId!==e.pointerId) return;
    const dx = e.clientX - aiFabDragState.startX, dy = e.clientY - aiFabDragState.startY;
    if(!aiFabDragState.moved && Math.hypot(dx,dy) < 6) return;
    aiFabDragState.moved = true;
    el.classList.add('dragging');
    const c = aiFabClampPosition(e.clientX - aiFabDragState.offsetX, e.clientY - aiFabDragState.offsetY);
    el.style.left = c.x+'px'; el.style.top = c.y+'px';
    el.style.bottom = 'auto'; el.style.right = 'auto';
  });
  const endDrag = (e)=>{
    if(!aiFabDragState || aiFabDragState.pointerId!==e.pointerId) return;
    el.classList.remove('dragging');
    if(aiFabDragState.moved){
      const rect = el.getBoundingClientRect();
      aiFabSavePosition(rect.left, rect.top);
    }
  };
  el.addEventListener('pointerup', endDrag);
  el.addEventListener('pointercancel', endDrag);
  window.addEventListener('resize', ()=>{
    if(el.style.left){
      const rect = el.getBoundingClientRect();
      const c = aiFabClampPosition(rect.left, rect.top);
      el.style.left = c.x+'px'; el.style.top = c.y+'px';
    }
  });
}
function handleAiFabClick(e){
  if(aiFabDragState && aiFabDragState.moved){ e.preventDefault(); e.stopPropagation(); return; }
  navigateTo('assistant');
}
// override navigateTo for bottom-tab pages to reset stack (so back button behaves predictably)
const TAB_PAGES = ['home','projects','knowledge','communities','more'];
const _origNav = navigateTo;
navigateTo = function(page,data){
  if(TAB_PAGES.includes(page) && !data){ resetToTab(page); return; }
  _origNav(page,data);
  // v20: keep the real browser history stack in sync with our internal one
  // (only for drill-down pages, not tab switches) — see goBack()/popstate above.
  try{ history.pushState({sakinaDepth: history_.length}, '', location.href); }catch(e){}
};

function fmtCountdown(totalSeconds){
  totalSeconds = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(totalSeconds/3600);
  const m = Math.floor((totalSeconds%3600)/60);
  const s = totalSeconds%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function fmtCountdownHumanHTML(totalSeconds){
  totalSeconds = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(totalSeconds/3600);
  const m = Math.floor((totalSeconds%3600)/60);
  const hUnit = n=> n===1?'ساعة':n===2?'ساعتين':(n>=3&&n<=10)?'ساعات':'ساعة';
  const mUnit = n=> n===1?'دقيقة':n===2?'دقيقتين':(n>=3&&n<=10)?'دقائق':'دقيقة';
  if(h<=0 && m<=0) return `باقي <b>أقل من دقيقة</b>`;
  const parts=[];
  if(h>0) parts.push(`<b>${toArabicDigits(h)}</b> ${hUnit(h)}`);
  if(m>0 || h<=0) parts.push(`<b>${toArabicDigits(m)}</b> ${mUnit(m)}`);
  return 'باقي '+parts.join(' و');
}
function prevPrayerObj(nextDate){
  let prev = null;
  for(const p of PRAYERS){ if(p.date.getTime() < nextDate.getTime()) prev = p; }
  if(!prev) prev = PRAYERS[PRAYERS.length-1]; // next is tomorrow's Fajr → previous is today's Isha
  return prev;
}
function prevPrayerTs(nextDate){
  let prev = null;
  for(const p of PRAYERS){ if(p.date.getTime() < nextDate.getTime()) prev = p.date; }
  if(!prev) prev = PRAYERS[PRAYERS.length-1].date; // next is tomorrow's Fajr → previous is today's Isha
  return prev.getTime();
}
function countdownProgressPct(nextDate){
  const now = cairoNow().getTime();
  const prevTs = prevPrayerTs(nextDate);
  const nextTs = nextDate.getTime();
  if(nextTs<=prevTs) return 0;
  const pct = ((now-prevTs)/(nextTs-prevTs))*100;
  return Math.max(0, Math.min(100, Math.round(pct)));
}
function nextPrayer(){
  const now = cairoNow();
  for(const p of PRAYERS){
    if(p.date.getTime()>now.getTime()){
      const diffSec = (p.date.getTime()-now.getTime())/1000;
      return {next:p, remain: fmtCountdown(diffSec), remainSec: Math.round(diffSec)};
    }
  }
  const tomorrowFajr = computeTomorrowFajr();
  const diffSec = (tomorrowFajr.date.getTime()-now.getTime())/1000;
  return {next:tomorrowFajr, remain: fmtCountdown(diffSec), remainSec: Math.round(diffSec)};
}
/* current (ongoing) prayer — the last one whose time has passed today */
function currentPrayerName(){
  const now = cairoNow();
  let cur = null;
  for(const p of PRAYERS){ if(p.date.getTime()<=now.getTime()) cur = p; else break; }
  return cur ? cur.name : PRAYERS[PRAYERS.length-1].name; // before Fajr: still "Isha" period
}
